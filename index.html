iliyet. Müşteri "bu taktik" dese utanır mısın? Muhtemelen evet. Alternatif: "Bütçe dönemimiz kapanıyor, bu koşullarla ilerlersek şu avantajları yakalayabilirsiniz" — eğer gerçekten bir dönem avantajı varsa etik, yoksa manipülasyon.</p>\n<p>Senaryo 4: "Ürün Eksikliği"</p>\n<p>Durum: Müşteri bir özellik soruyor, ürünün yok ama 3 ay sonra gelecek. "Var" dersen kapanış kolay. "Yok ama gelecek" dersen müşteri beklemeye geçebilir.</p>\n<p>Analiz: "Var" demek yalan — çizgi net. "3 ay sonra gelecek" demek dürüst ama riskli. Çözüm: "Şu anda yok, 3 ay içinde planlıyoruz. Bu arada şu alternatifle ihtiyacınızı karşılayabilirsiniz" — şeffaf, çözüm odaklı, güven koruyan.</p>\n<p>Senaryo 5: "Aile Şirketi Dinamiği"</p>\n<p>Durum: Patron oğula söz vermiş, oğul sana gelmiş, ürünü almak istiyor. Ama senin gözlemin: Bu ürün şirkete uygun değil, asıl ihtiyaçları farklı. Oğul ısrarcı — patronun sözü var.</p>\n<p>Analiz: Karşılıklı çıkar testi — bu satış şirkete fayda sağlamayacak. Ama oğul "karar verildi" diyor. Karar: "Anlıyorum ki bu konuda karar verilmiş. Ben yine de şu gözlemimi paylaşmak istiyorum: [dürüst değerlendirme]. Son karar sizin" — dürüstlüğünü göster, kararı müşteriye bırak. Satarsan bile dürüst oldun; satmazsan bile güven kurdun.</p>\n<p>Senaryo 6: "Ben Yokken"</p>\n<p>Durum: Müşteri senden aldı, memnun. Ama şirketinden ayrıldın, yeni şirketinde farklı ürün satıyorsun. Eski müşterini arasan mı? Eski şirketinin ürünü hâlâ iyi — ama sen artık orada değilsin.</p>\n<p>Analiz: Müşteriyle ilişki kimin — senin mi, şirketin mi? Türkiye\'de çoğu zaman satışçının. Ama eski şirketinin ürünü müşteriye hâlâ faydalıysa, müşteriyi koparmak karşılıklı çıkar testini geçmiyor. Karar: Müşteriyi ara, yeni durumunu anlat, ama "eski ürününüzle ilgili sorun yoksa devam edin" de. Eğer yeni ürünün gerçekten daha uygunsa — karşılaştırmayı müşteriye bırak.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">ETİK EROZYON HARİTASI</div></div>\n<p>Son 6 ayı düşünerek aşağıdaki alanları değerlendir: 1 (hiç yapmadım) — 5 (düzenli yapıyorum).</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Referans/sonuç verilerini abartma veya süsleme</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Yapay aciliyet yaratma (gerçek olmayan deadline)</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Rakip hakkında doğrulanmamış olumsuz bilgi paylaşma</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Ürün eksikliğini gizleme veya küçümseme</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">İhtiyacı olmayan müşteriye ürün satma</span></div>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">Fiyat karşılaştırmasını çarpıtma</span></div>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">"Herkes yapıyor" diye kendini meşrulaştırma</span></div>\n<div class="test-q"><span class="q-label">8</span><span class="q-text">Müşteriye verdiğin sözü tutmama veya geciktirme</span></div>\n<div class="score-box"><strong>📊 Puanlama:</strong> </div>\n<p>8-16: Etik çizgin sağlam. 17-28: Erozyon başlamış — muhtemelen 1-2 alan kronikleşmiş. 3 testi bu alanlarda bilinçli uygula. 29-40: Ciddi erozyon — Bazerman\'ın "ethical fading" muhtemelen ilerlemiş. Bu haritayı güvendiğin bir meslektaşa göster ve dürüst geribildirim iste.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">KİŞİSEL ETİK KARAR ÇERÇEVESİ</div></div>\n<p>Bu çerçeveyi her etik ikilemde kullan. 5 adım, 5 dakika.</p>\n<p>Adım 1: Durumu tanımla — ne yapacağım ve neden?</p>\n<p>Adım 2: 3 testi uygula — şeffaflık (müşteri bilse?), doğrulanabilirlik (doğrulasa?), karşılıklı çıkar (1 yıl sonra memnun mu?).</p>\n<p>Adım 3: Alternatifler — etik sınırı aşmadan başka ne yapabilirim?</p>\n<p>Adım 4: Bedeli kabul et — etik yol kısa vadede bedelli olabilir. Bedelini biliyorum ve kabul ediyorum.</p>\n<p>Adım 5: Karar ver ve kaydet — ne karar verdim, neden, ne oldu. Bu kayıt etik kasının gelişimi için kritik.</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<p>O\'Keefe, D. J. (2016). Persuasion (3rd ed.). Sage.</p>\n<div class="ref-line">Cialdini, R. B. (2016). Pre-Suasion. Simon &amp; Schuster.</div>\n<h4 class="researcher">Bazerman, M. H. &amp; Tenbrunsel, A. E. (2011). Blind Spots. Princeton UP.</h4>\n<h4 class="researcher">Bandura, A. (1999). Moral disengagement. PSPR, 3(3), 193-209.</h4>\n<div class="ref-line">Haidt, J. (2001). The emotional dog and its rational tail. Psychological Review, 108(4), 814-834.</div>\n<h4 class="researcher">Rest, J. R. (1986). Moral Development. Praeger.</h4>\n<div class="ref-line">Greene, J. D. et al. (2001). fMRI investigation of moral judgment. Science, 293(5537), 2105-2108.</div>\n<div class="ref-line">Drumwright, M. E. &amp; Murphy, P. E. (2004). Advertising ethics. Journal of Advertising, 33(2), 7-24.</div>\n<h4 class="researcher">Tenbrunsel, A. E. &amp; Messick, D. M. (2004). Ethical fading. ROB, 25, 223-261.</h4>\n<div class="ref-line">Drumwright, M. E. &amp; Murphy, P. E. (2004). Advertising ethics. Journal of Advertising, 33(2), 7-24.</div>\n<h4 class="researcher">Tenbrunsel, A. E. &amp; Messick, D. M. (2004). Ethical fading. ROB, 25, 223-261.</h4>\n<h4 class="researcher">Brignull, H. (2010). Dark patterns — user interfaces designed to trick people. darkpatterns.org.</h4>\n<div class="mod-header"><div class="mod-num">5</div><div class="mod-title">ETİK GÜNLÜĞÜ — 4 HAFTALIK FARKINDALIK PROGRAMI</div></div>\n<p>Bu program etik kasını güçlendirmek için tasarlanmış. Her hafta 1 odak.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Farkındalık Haftası</div></div>\n<p>Bu hafta her müşteri etkileşiminden sonra 2 dakika ayır ve kendine sor: "Bu etkileşimde 3 testi geçemeyen bir şey yaptım mı?" Hemen değiştirmene gerek yok — sadece fark et. Rest\'in modeli hatırla: Etik karar vermenin ilk adımı ahlaki farkındalık. Fark etmeden değiştiremezsin. Not al: Kaç etkileşimde etik bir boyut gördün? Kaçında görmedin — ama belki olabilirdi?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Alternatif Haftası</div></div>\n<p>Bu hafta her "gri alan" durumunda kendine sor: "Etik sınırı aşmadan başka ne yapabilirdim?" Her durum için en az 1 alternatif üret. Yapay aciliyet yerine ne? Referans süsleme yerine ne? Ürün eksikliğini gizleme yerine ne? Bu egzersiz beynin "etik alternatif üretme" kasını geliştiriyor — tıpkı Gamze\'nin ABC günlüğünün otomatik düşünceleri sorgulamayı öğretmesi gibi (Kısım 1 Bölüm 6).</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Cesaret Haftası</div></div>\n<p>Bu hafta 1 müşteriye tam dürüst ol — daha dürüst olabileceğin 1 konuda şeffaflık göster. Ürünün eksik bir yönünü kabul et. Referans verisini tüm gerçekliğiyle paylaş. Rakibin güçlü yönünü itiraf et. Sibel\'in cesaretini 1 kez dene — ve müşterinin tepkisini gözle. Çoğu satışçı bunu ilk kez yaptığında şaşırıyor: Müşteri kızmıyor, güveniyor.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Sistem Haftası</div></div>\n<p>Bu hafta etik sorunu bireysel değil, sistemik olarak değerlendir. Şirketinin satış sürecinde etik erozyona yol açan yapısal sorunlar var mı? Ulaşılamaz hedefler? Yapay aciliyet teşviki? Müşteri memnuniyeti ölçümü eksikliği? Bu sorunları not al — ve en az 1 tanesini müdürünle konuş. Cesaret ister. Ama sistem değişmezse bireysel etik sürdürülebilir değil.</p>'},
'3-10':{b:'Sentez',d:'İkna Mühendisi Kontrol Listesi',c:9591,h:'<h4 class="section-title">SENTEZ</h4>\n<p>İkna Mühendisinin Tam Araç Kutusu</p>\n<p>Ana bölümde 9 bölümün haritasını, kişisel ikna profilini ve 90 günlük gelişim yol haritasını gördün. Bu ek, Kısım 3\'ün en kapsamlı Derine Dal\'ı: Tüm araçları birleştiren kontrol listesi, entegre değerlendirme aracı, 90 günlük plan şablonu ve Kısım 3 skor kartı.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">İKNA MÜHENDİSİ KONTROL LİSTESİ</div></div>\n<p>Her önemli satış sürecinde bu listeyi kullan. 9 alan, her alanda 2-3 kontrol sorusu.</p>\n<p>ETKİ (Bölüm 1)</p>\n<p>Cialdini\'nin hangi ilkeleri bu müşteride doğal çalışıyor? Bu müşteri ELM\'in merkez yolunda mı çevre yolunda mı? Etki mi kuruyorum yoksa manipülasyon mu yapıyorum — 3 testi geçiyor muyum?</p>\n<p>SUNUM (Bölüm 2)</p>\n<p>Sunumum hangi mimari — Piramit, Köprü, Yolculuk? Bilişsel yük kontrol altında mı — maksimum 3 ana mesaj var mı? İlk 90 saniyede müşterinin dikkatini çekecek açılışım var mı?</p>\n<p>FİYAT (Bölüm 3)</p>\n<p>Fiyattan önce çıpa koydum mu — sektör ortalaması, müşterinin mevcut maliyeti, değer? Fiyatı söylerken ses tonum ve göz temasım sağlam mı? Fiyat sonrası 5 saniye sussabilecek miyim?</p>\n<p>İTİRAZ (Bölüm 4)</p>\n<p>İtiraz geldiğinde 3 saniye sus, soru sor: "Bu konuda sizi en çok endişelendiren ne?" Bu 7 hayırdan hangisi? "Ama" yerine "ve" kullanıyorum — reaktans tetiklemiyorum.</p>\n<p>MÜZAKERE (Bölüm 5)</p>\n<p>BATNA\'m ne — güçlü mü zayıf mı? Müşterinin BATNA\'sı ne? Pozisyon mu çıkar mı — "neden" sorusunu sordum mu? Pastayı büyütmenin yolu var mı?</p>\n<p>KAPANIŞ (Bölüm 6)</p>\n<p>Sahiplenme sinyalleri görüyor muyum? Kapanış sorusunu sormaya hazır mıyım — korkum var mı? Davet eden kapanış: "Devam etmek ister misiniz, yoksa düşünmeniz gereken bir şey var mı?"</p>\n<p>HİKAYE (Bölüm 7)</p>\n<p>Bu müşteriye uygun bir hikayem var mı — 5 tipten hangisi? Hikaye 2 dakikada anlatılabilir mi? Hikaye gerçek, doğrulanabilir ve kirli mi (zorluklar dahil)?</p>\n<p>DİJİTAL (Bölüm 8)</p>\n<p>Video toplantı ise: Kamera göz hizasında mı, 20 dakika sınırı var mı? E-posta ise: Subject line kişisel ve spesifik mi, tek CTA var mı?</p>\n<p>ETİK (Bölüm 9)</p>\n<p>3 test: Şeffaflık (müşteri bilse?), doğrulanabilirlik (doğrulasa?), karşılıklı çıkar (1 yıl sonra memnun mu?). Etik erozyonun bir göstergesi var mı — "herkes yapıyor" diye kendimi meşrulaştırıyor muyum?</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">ENTEGRE DEĞERLENDİRME — 9 ALAN, 1 PUAN</div></div>\n<p>Her alandan en kritik 1 soruyu cevapla. 1-5 arası puan.</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">ETKİ: Müşteriye etki mi kuruyorum yoksa ikna etmeye mi çalışıyorum?</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">SUNUM: Sunumumu müşterinin ihtiyacına göre uyarlıyorum — standart değil?</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">FİYAT: Fiyat söylerken güvenli ve rahat mıyım?</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">İTİRAZ: İtiraz geldiğinde soru soruyorum — savunmaya geçmiyorum?</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">MÜZAKERE: Müzakereye BATNA hazırlığıyla giriyorum?</span></div>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">KAPANIŞ: Kapanış sorusunu sormaktan kaçınmıyorum?</span></div>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">HİKAYE: En az 3 hazır satış hikayem var?</span></div>\n<div class="test-q"><span class="q-label">8</span><span class="q-text">DİJİTAL: Online ve yüz yüze stratejimi farklılaştırıyorum?</span></div>\n<div class="test-q"><span class="q-label">9</span><span class="q-text">ETİK: Son 6 ayda 3 etik testi geçemeyen bir eylemim olmadı?</span></div>\n<p>Toplam Puanlama</p>\n<p>36-45: İkna mühendisi — araç kutun dolu, sahada etkilisin. 22-35: Gelişen mühendis — 2-3 kritik alan var, 90 günlük planla çalış. 9-21: Başlangıç — Kısım 1\'e geri dön, temelden başla. En zayıf 3 alanı belirle ve gelişim yol haritasını kur.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">90 GÜNLÜK GELİŞİM PLANI ŞABLONU</div></div>\n<p>Ay 1: (en zayıf alanı yaz)</p>\n<p>Hedef: Bu alandaki 1 spesifik beceriyi geliştirmek. Kaynak: İlgili bölümün DD antrenman programı. Pratik: Hafta 1 [yaz], Hafta 2 [yaz], Hafta 3 [yaz], Hafta 4 değerlendirme. Ölçüm: Başlangıç puanı [yaz], ay sonu puanı [yaz].</p>\n<p>Ay 2: (ikinci zayıf alanı yaz)</p>\n<p>Hedef: İkinci beceriyi ekle, birincisiyle entegre çalıştır. Kaynak: İlgili DD antrenman programı. Pratik: Haftalık plan [yaz]. Ölçüm: İki alanın entegrasyonu çalışıyor mu?</p>\n<p>Ay 3: Saha Testi</p>\n<p>Hedef: Yeni becerileri gerçek müşterilerde test et. Her hafta 2-3 görüşmede bilinçli uygulama. Not: Ne denedim, ne oldu, ne öğrendim? Ay sonu: 9 alanın entegre değerlendirmesini tekrar yap — puanlar değişti mi?</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">KISIM 3 SKOR KARTI</div></div>\n<p>3 ayda bir bu skor kartını doldur. Gelişimi izle.</p>\n<div class="fill-blank">Tarih: _____ Entegre puan: ___/45</div>\n<div class="fill-blank">En güçlü 3 alan: 1)_____ 2)_____ 3)_____</div>\n<div class="fill-blank">En zayıf 3 alan: 1)_____ 2)_____ 3)_____</div>\n<div class="fill-blank">Son 3 ayda en büyük gelişim: _____</div>\n<div class="fill-blank">Son 3 ayda en büyük zorluk: _____</div>\n<div class="fill-blank">Sonraki 3 ayın odağı: _____</div>\n<p>Bu kartı yalnız doldurma — güvendiğin bir meslektaşla veya koçunla paylaş. Dışarıdan bakış Dunning-Kruger\'a en iyi panzehir.</p>\n<div class="mod-header"><div class="mod-num">5</div><div class="mod-title">ENTEGRASYON SENARYOLARİ — 4 SAHA VAKASI</div></div>\n<p>Her senaryo birden fazla aracı birlikte kullanmayı gerektiriyor. Kendi cevabını düşün, sonra analizi oku.</p>\n<p>Senaryo 1: İlk Görüşme — Her Şey Yeni</p>\n<p>Durum: Yeni müşteri, ilk görüşme, B2B yazılım satışı. Müşteri: Orta ölçekli üretim firmasının operasyon müdürü. 30 dakika randevun var.</p>\n<p>Entegre yaklaşım: Pre-suasion (Bölüm 1) — görüşmeye müşterinin sorunuyla aç, şirketinle değil. Köprü mimarisi (Bölüm 2) — ilk 10 dakika sektörel gözlem, 15 dakika keşif (MI soruları, Bölüm 4 bağlantısı), son 5 dakika özelleştirilmiş cevap. Hikaye (Bölüm 7) — benzer sektörde bir müşteri başarı hikayesi, 2 dakika, kirli (zorluklar dahil). Mikro taahhüt (Bölüm 6) — görüşme sonunda "size detaylı bir demo hazırlayalım mı?" İlk görüşmede kapanış yok — merdiven başlıyor. Ve etik kontrol (Bölüm 9): Müşterinin ihtiyacını henüz tam bilmiyorsun, ürünü zorla konumlandırma.</p>\n<p>Senaryo 2: Fiyat Müzakeresi — Tıkanma Anı</p>\n<p>Durum: 3. görüşme, her şey yolunda, fiyat masada. Müşteri: "Rakibiniz yüzde 25 daha ucuz."</p>\n<p>Entegre yaklaşım: İtiraz teşhisi (Bölüm 4) — bu 7 hayırdan hangisi? "Neye göre ucuz?" sorusu. Fiyat çerçevelemesi (Bölüm 3) — değer çıpası kur, müşterinin mevcut maliyetini görünür kıl. Müzakere (Bölüm 5) — pozisyondan çıkara geç: "Asıl endişeniz fiyat mı, yoksa bütçe onayı mı?" Bütünleştirici çözüm: Faz yapma, kapsam esnekliği, ödeme planı. Sessizlik (Kısım 2 B9) — fiyatı söyledikten sonra 5 saniye sus. Ve kapanış sinyali oku (Bölüm 6): Müşteri "peki ödeme planı nasıl olur" diyorsa sahiplenme sinyali — kapat.</p>\n<p>Senaryo 3: Online Sunum — 4 Kişilik Ekran</p>\n<p>Durum: Video toplantı, 4 karar verici. Genel müdür, CFO, IT müdürü, satın alma. 30 dakika.</p>\n<p>Entegre yaklaşım: Dijital kurallar (Bölüm 8) — kamera göz hizası, 20 dakika sunum + 10 dakika diyalog. ELM (Bölüm 1) — GM\'ye çevre yol (vizyon hikayesi), CFO\'ya merkez yol (ROI), IT\'ye teknik özet, satın almaya maliyet özeti. Ama 30 dakikada hepsine hitap edemezsin — önceden herkesle 10 dakikalık ön görüşme yap (Selin stratejisi, Bölüm 6 DD). Toplantıda dikkat yönetimi: Her 7-8 dakikada etkileşim — soru, anket, chat. Ve kapanışta: "Bir sonraki adım olarak ne yapalım?" — davet eden kapanış, video ortamında baskı yapmadan.</p>\n<p>Senaryo 4: Etik İkilem — Satmalı mı Satmamalı mı?</p>\n<p>Durum: Müşteri premium paket istiyor, bütçesi var, karar vermeye hazır. Ama senin gözlemin: Standart paket ihtiyacını karşılıyor, premium gereksiz.</p>\n<p>Entegre yaklaşım: Etik 3 test (Bölüm 9) — karşılıklı çıkar testi: Müşteri 1 yıl sonra premium\'dan memnun olacak mı? Eğer hayır — satma. Sibel stratejisi: "Standart paket ihtiyacınızı karşılıyor, premium\'a geçmenizi şu anda önermiyorum." Kısa vadede komisyon kaybı, uzun vadede güven yatırımı. Ve eğer müşteri ısrar ederse? Dürüst ol: "Premium\'un ek faydası sizin durumunuzda sınırlı, ama karar sizin." Özerkliği koru, bilgiyi ver, kararı müşteriye bırak.</p>\n<div class="mod-header"><div class="mod-num">6</div><div class="mod-title">KİTABIN 30 BÖLÜMÜ — TEK SAYFA ÖZET</div></div>\n<p>Bu özet kitabın tamamını tek sayfada topluyor. Duvara as, her sabah oku, her akşam kontrol et.</p>\n<p>KISIM 1: İÇ OYUN — Kendini Bil</p>\n<p>B1 Ayna (kör noktalar), B2 Korku (amigdala yönetimi), B3 Reddedilme ("hayır"ın kimyası), B4 Motivasyon (içsel güdü), B5 Özgüven (özyeterlilik), B6 Zihin (otomatik düşünceler), B7 Beden (enerji yönetimi), B8 Dayanıklılık (düşme-kalkma), B9 Sabır (ertelenen tatmin), B10 Değerler (pusula).</p>\n<p>KISIM 2: MÜŞTERİYİ OKU — Dışarıya Bak</p>\n<p>B1 Beyin (Sistem 1/2), B2 Arketip (etiket değil gözlem), B3 Beden (küme okuma), B4 Güven (3 bileşen + tamir), B5 Bölge (kültürel harita), B6 İhtiyaç (3 katman + MI), B7 Karar (komite dinamiği), B8 Dil (müşterinin dili), B9 Sessizlik (4 tür), B10 Yolculuk (6 psikolojik aşama).</p>\n<p>KISIM 3: İKNA MÜHENDİSLİĞİ — Birleştir ve Uygula</p>\n<p>B1 Etki (Cialdini + ELM), B2 Sunum (bilişsel yük + 3 yapı), B3 Fiyat (çıpa + prospect theory), B4 İtiraz (7 hayır + judo), B5 Müzakere (Fisher-Ury + BATNA), B6 Kapanış (sinyal + davet), B7 Hikaye (nöral eşleşme + 5 tip), B8 Dijital (Zoom + e-posta + AI), B9 Etik (3 test + erozyon), B10 Sentez (araç kutusu + yol haritası).</p>\n<p>30 bölüm, 1 ilke: İnsan psikolojisini anla, müşterinin gerçek faydasına kullan. Geri kalan teknik. Ve teknik pratikle oturur — sahada, gerçek müşterilerle, iki ileri bir geri.</p>\n<div class="mod-header"><div class="mod-num">7</div><div class="mod-title">HAFTALIK REFLEKSIYON SORUSU</div></div>\n<p>Her cuma akşamı 5 dakika ayır. Tek bir soru cevapla — haftaya göre değişir. 4 haftalık döngü, tekrar et.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Bu hafta en çok hangi aracı kullandım — ve en çok hangisini ihmal ettim?</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Bu hafta bir müşteride "iki ileri bir geri" yaşadım mı — eski refleks geri döndü mü?</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Bu hafta 3 etik testi geçemeyen bir eylemim oldu mu? Fark ettim mi, yoksa sonradan mı gördüm?</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Bu ay en büyük öğrenmem ne oldu — ve bunu bir sonraki aya nasıl taşıyacağım?</div></div>\n<p>Bu 4 sorunun amacı "meta-farkındalık" — Kısım 1 Bölüm 1\'deki Dunning-Kruger\'ın panzehiri. Kendi pratiğini gözlemleyen satışçı, kör noktalarını daha erken fark eder. Ve farkındalık yönü belirler.</p>\n<h4 class="section-title">SON SÖZ</h4>\n<p>Bu kitap sana bilgi verdi, araçlar verdi, hikayeler anlattı. Ama hiçbiri sahada yerine oturana kadar kağıt üzerinde kalır. Kısım 1 Bölüm 1\'deki Volkan\'ı hatırla: 15 yıldır müşteriyi dinlemiyordu — farkındalık 1 dakika sürdü, değişim 1 yıl. Bu kitap sana farkındalık veriyor. Değişim senin.</p>\n<p>İki ileri bir geri. Devam et.</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<p>Bu bölümün kaynakçası Kısım 3\'ün tüm bölümlerinin kaynakçalarını kapsar. Her bölümün kendi DD\'sinde detaylı kaynakça mevcuttur.</p>'},
'4-1':{b:'Prospecting',d:'Sosyal Sermaye',c:7141,h:'<h4 class="section-title">PROSPECTING</h4>\n<p>Prospecting Laboratuvarı: Ağ Mimarisi, Vaka Otopsisi, Kanal Profili</p>\n<p>Ana bölümde prospecting\'in neden sayı oyunu olmadığını, 3 Filtre çerçevesini, soğuk aramanın nörolojisini, referans ağı stratejisini ve dijital prospecting\'i gördün. Bu ek farklı: Burada sosyal sermaye bilimini derinleştirecek, 3 prospecting vakasını otopsi edecek, kanal profil testini yapacak ve 4 haftalık saha antrenmanına gireceksin.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">SOSYAL SERMAYE VE AĞ MİMARİSİ</div></div>\n<p>Ana bölümde Granovetter\'ın zayıf bağlar teorisini gördük. Şimdi bir katman daha derine: Nan Lin\'in sosyal sermaye kuramı (2001) basit bir önermeden yola çıkar: Bireylerin kaynaklara erişimi kendi bireysel kaynaklarından çok sosyal ağlarının yapısına bağlıdır. Ne bildiğin kadar kimi bildiğin — ve o kişilerin kimi bildiği — önemli.</p>\n<p>Lin 3 tür sosyal sermaye tanımlıyor: Köprü sermaye (bridging) — farklı sosyal grupları birbirine bağlayan bağlantılar. Granovetter\'ın zayıf bağları buna karşılık gelir. Satışçı için: Farklı sektörlerdeki, farklı şehirlerdeki bağlantılar. Bağlayıcı sermaye (bonding) — yakın çevredeki güçlü bağlar. Sadakat ve destek sağlar ama bilgi çeşitliliği düşük. Satışçı için: Mevcut müşteri ağı, yakın iş arkadaşları. Bağlama sermaye (linking) — farklı güç seviyelerindeki grupları birbirine bağlayan dikey bağlar. Satışçı için: Üst yönetimle ilişki, sektör liderleriyle bağlantı.</p>\n<p>Satışçının ağ mimarisi bu 3 sermayenin dengesi. Ozan\'ın (Bölüm 1) başarısı köprü sermayesindeydi: Farklı sektörlerden zayıf bağlar. Gülşen\'in başarısızlığı: Sadece bağlayıcı sermaye — hep aynı havuzda yüzüyordu. Pratik soru: Senin ağındaki köprü/bağlayıcı/bağlama oranı ne? Çoğu satışçıda bağlayıcı sermaye baskın — çünkü konfor alanı. Köprü sermayesi çaba gerektirir ama yeni fırsatlar oradan gelir.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">VAKA OTOPSİLERİ — 3 PROSPECTING, 3 SONUÇ</div></div>\n<p>Vaka 1: Emre — Telefonu Kaldıramayan Satışçı</p>\n<p>Emre\'yi Bölüm 1\'de gördük: Telefonu kaldıramıyordu. Soğuk arama korkusu — Eisenberger\'ın sosyal acı araştırması. Emre\'nin evrimi: İlk ay 5 arama/gün (zorla). 3. ay 15 arama/gün (rutin). 6. ay: Aramaları bıraktı — ama referans ağı kurmuştu. Artık soğuk arama yapmasına gerek yoktu çünkü sıcak bağlantılar geliyordu. Kör nokta: Emre referans ağına çok güvendi — 9. ayda ağ kuruduğunda soğuk aramaya dönmek zorunda kaldı. İki ileri bir geri.</p>\n<p>Vaka 2: Gülşen — 247 Arama, 2 Kapanış</p>\n<p>Gülşen\'in sorunu kalite değil miktar odağıydı. Otopsi: 247 aramanın 200\'ü sorun filtresi geçmiyordu — müşterinin Gülşen\'in ürününe ihtiyacı yoktu. 47\'si sorun filtresi geçti ama erişim filtresi geçmedi — doğru kişiye ulaşamadı. 12\'si 3 filtreden geçti — ve 2\'si kapandı. Kapanış oranı aslında yüzde 17 (12\'de 2) — kötü değil. Sorun: 235 gereksiz arama enerji ve motivasyon çaldı.</p>\n<p>Vaka 3: Ozan — 38 Arama, 7 Kapanış</p>\n<p>Ozan\'ın sırrı araştırma zamanıydı. Her hafta 2-3 saat CRM ve LinkedIn\'de araştırma yapıyordu. 38 temasın 22\'si referans kanalından geldi — Granovetter\'ın zayıf bağları. 16\'sı hedefli soğuk temas — ama her birinin gerekçesi vardı. Ozan\'ın ağ haritası: Köprü sermayesi yüksek (farklı sektörlerde bağlantılar), bağlayıcı sermaye orta, bağlama sermayesi düşük. Gelişim alanı: Üst yönetimle bağlantı (bağlama sermayesi).</p>\n<p>Üç vakanın ortak dersi: Prospecting\'te başarı = doğru kişiye, doğru zamanda, doğru kanaldan, doğru mesajla ulaşmak. 4 değişken — ve her birini yanlış yapmak sonucu sıfırlar. Gülşen 4\'ünü de yanlış yapıyordu. Ozan 4\'ünü de doğru yapıyordu — ama bilinçli değildi, sezgiseldi. Sezgisel doğruyu bilinçli doğruya dönüştürmek bu modülün amacı.</p>\n<p>Prospecting\'te sektörel farklar büyük: SaaS enterprise prospecting\'te LinkedIn + referans dominant — soğuk arama neredeyse ölü. Gayrimenkulde dijital reklam + showroom trafiği dominant — prospecting otomatikleşiyor ama kişisel takip hâlâ fark yaratıyor. Bankacılıkta mevcut portföy içi prospecting (cross-sell) dominant — yeni müşteri kazanma ikincil. FMCG\'de saha ziyareti + distribütör ağı dominant — dijital prospecting henüz olgunlaşmamış. Sigortada referans ağı altın — çünkü sigorta kararı güven bazlı ve tanıdık önerisi her şeyden güçlü. Sağlık sektöründe KOL (key opinion leader) ağı — doktorlar birbirini dinler. Eğitim hizmetlerinde İK ağı + konferans networking — sektör küçük, herkes birbirini tanır.</p>\n<p>Dijital prospecting\'in yükselişi geleneksel yöntemleri öldürmedi ama dönüştürdü. LinkedIn Sales Navigator, CRM zekâsı, intent data — hepsi prospecting\'i veriye dayalı hale getiriyor. Ama teknoloji aracı, stratejiyi değiştirmez: Yanlış kişiye yapay zekâ desteğiyle ulaşmak hâlâ yanlış kişiye ulaşmaktır. Goodhart yasası dijital prospecting\'te de geçerli: \'Haftalık 50 LinkedIn mesajı\' hedefi kaliteyi düşürür.</p>\n<p>Bir de prospecting\'in duygusal maliyetini konuşalım. Eisenberger\'ın sosyal acı araştırması (Kısım 1 Bölüm 2) reddedilmenin beyin acı merkezlerini aktive ettiğini gösteriyor. Hedefli prospecting\'te bu acı daha keskin — çünkü yatırım daha yüksek. Ama araştırma bir şey daha gösteriyor: Acı zamanla azalır (habituation). Emre\'nin 5 aramadan 15\'e çıkması habituasyonun kanıtı. İlk 10 soğuk arama en zoru — sonra beyin alışır. Ama alışma kaybolabilir: 2 hafta ara verdiğinde yeniden başlamak zor. Egzersiz gibi — düzenlilik koruyucu.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">KANAL PROFİL TESTİ</div></div>\n<p>Her satışçının doğal prospecting kanalı farklı. Aşağıdaki soruları 1-5 arası puanla:</p>\n<p>Telefon konforu (1-5): Soğuk arama beni strese sokar mı? Yüz yüze konforu (1-5): Networking etkinliklerine gitmekten hoşlanır mıyım? Dijital konforu (1-5): LinkedIn\'de içerik paylaşmak ve mesaj atmak bana doğal geliyor mu? Referans konforu (1-5): Mevcut müşterilerimden referans istemek rahat mı?</p>\n<p>En yüksek puanın doğal kanalın. Ama dikkat: Konfor alanı ≠ en etkili kanal. Emre telefondan kaçtı ama referansa sığındı — referans kuruduğunda çaresiz kaldı. Dengeli profil: Her kanalda en az 3 puan. 2\'nin altında olan kanalda bilinçli gelişim planı yap.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">4 HAFTALIK SAHA ANTRENMAN PROGRAMI</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Ağ Haritası</div></div>\n<p>Mevcut ağını 3 sermaye türüne göre haritalandır. Köprü bağlantıların kimler? Bağlayıcı bağlantıların kimler? Bağlama bağlantıların kimler? Eksik olan sermaye türünde bu hafta 1 yeni bağlantı kur.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">3 Filtre Uygulaması</div></div>\n<p>Bu hafta prospecting listeni 3 filtreyle (sorun, erişim, zamanlama) süz. Kaç tanesi 3 filtreden geçiyor? Geçmeyenleri listeden çıkar — Gülşen\'in 235 gereksiz aramasını yapma.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Kanal Deneyi</div></div>\n<p>Kanal profil testinde en düşük puanını aldığın kanalda 5 temas yap. Telefon korkun varsa 5 soğuk arama yap. Dijital zayıfsa 5 LinkedIn mesajı gönder. Konfor alanını genişlet.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Referans Sistemi</div></div>\n<p>Mevcut en memnun 5 müşterinden referans iste. Cümle basit: \'Çevrenizde benzer bir ihtiyacı olan biri var mı?\' Granovetter\'ın zayıf bağlar gücü burada devreye girer — müşterinin tanıdıkları senin görmediğin dünyalara açılır.</p>\n<p>Kaynakça</p>\n<h4 class="researcher">Burt, R. S. (2004). Structural holes and good ideas. AJS, 110(2), 349–399.</h4>\n<div class="ref-line">Eisenberger, N. I. et al. (2003). Does rejection hurt? Science, 302, 290–292.</div>\n<h4 class="researcher">Granovetter, M. S. (1973). The Strength of Weak Ties. AJS, 78(6), 1360–1380.</h4>\n<div class="ref-line">Lin, N. (2001). Social Capital. Cambridge University Press.</div>\n<div class="ref-line">Putnam, R. D. (2000). Bowling Alone. Simon &amp; Schuster.</div>'},
'4-2':{b:'Saha Haritası',d:'Sektörel Farklılaşma',c:5508,h:'<h4 class="section-title">SAHA HARİTASI</h4>\n<p>Sektörel Profil Laboratuvarı: Bilişsel Temel, Vaka Otopsisi, Kanal Entegrasyonu</p>\n<p>Ana bölümde 7 satış kanalının panoramasını ve 8 sektörün haritalarını gördün. Bu ek farklı: Burada sektörel farklılaşmanın bilişsel temelini inceleyecek, 4 sektörden vaka otopsisi yapacak, kendi sektörel profilini çıkaracak ve kanal entegrasyon stratejisi tasarlayacaksın.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">SEKTÖREL FARKLILAŞMANIN BİLİŞSEL TEMELİ</div></div>\n<p>Neden aynı ikna tekniği bir sektörde çalışıp diğerinde çalışmıyor? Cevap Petty ve Cacioppo\'nun ELM\'inde (Kısım 3 Bölüm 1): İkna iki yoldan gerçekleşir — merkez yol (argüman kalitesi) ve çevre yol (ipuçları, duygular, kısayollar). Sektör, müşterinin hangi yolu kullanacağını belirliyor.</p>\n<p>Teknoloji alıcısı (IT müdürü): Merkez yol dominant. Teknik argüman, veri, karşılaştırma. Gayrimenkul alıcısı (bireysel): Çevre yol dominant — ama bunu kabul etmez. Banka müşterisi: Karma — ürüne göre değişir. Sigorta müşterisi: Çevre yol baskın (korku + güven), satın alma anında merkez yol devreye girer (prim karşılaştırma). FMCG bayisi: Merkez yol (marj, dönüş hızı, veri) ama ilişki çevre yolunu da etkiler. Sağlık sektörü (doktor): Merkez yol çok güçlü — bilimsel kanıt şart. Eğitim hizmetleri: Karma — İK müdürü merkez yol (ROI), katılımcı çevre yol (deneyim).</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">SEKTÖREL VAKA OTOPSİLERİ</div></div>\n<p>Vaka 1: SaaS — Demo Tuzağı</p>\n<p>Berna 6 aydır demo yapıyor, müşteri karar veremiyor. Otopsi: Demo sayısı arttıkça karar kalitesi düşüyor — Iyengar-Schwartz seçim paradoksu. Çözüm: Demo sayısını azalt, müşterinin gerçek sorununa odaklan. İşe yarayan: 1 demo, müşterinin sorununa özel. İşe yaramayan: 5 demo, her seferinde yeni özellik.</p>\n<p>Vaka 2: Gayrimenkul — Showroom Psikolojisi</p>\n<p>Aslı\'nın showroom devrimi: Mehrabian-Russell PAD modeli — ortamın duyguya, duygunun karara etkisi. Koku, ışık, müzik. Pine-Gilmore deneyim ekonomisi: Müşteri ürün değil deneyim satın alıyor. Otopsi: Showroom\'u değiştirmeden önce kapanış yüzde 12, sonra yüzde 18. Fark: Deneyim tasarımı.</p>\n<p>Vaka 3: Bankacılık — Portföy Yönetimi</p>\n<p>Taner\'ın 320 müşterili portföyü. Otopsi: Herkese aynı yaklaşım — kişiselleştirme yok. Segmentasyon sonrası: A grubu (yüksek değer, 20 müşteri) yüz yüze aylık. B grubu (orta değer, 80 müşteri) telefon aylık. C grubu (düşük değer, 220 müşteri) dijital çeyreklik. Sonuç: A grubunda cross-sell yüzde 40 arttı.</p>\n<p>Vaka 4: FMCG — Bayi Sadakati</p>\n<p>Hasan\'ın distribütör ağı. Otopsi: Bayilere sadece sipariş almaya gidiyordu — uzmanlık gücü sunmuyordu. Değişim: Her ziyarette pazar verisi paylaşımı, raf analizi, rakip hareketi bilgisi. French-Raven uzmanlık gücü: Bayi Hasan\'ı bilgi kaynağı olarak gördüğünde sadakat arttı.</p>\n<p>4 vakanın ortak dersi: Sektörel farklılaşmayı bilmek yetmez — uygulamak gerekir. Ve uygulama her seferinde farklı: Aynı sektörde bile her müşteri farklı bir kombinasyon. IT müdürü merkez yol kullanır ama ofis ortamında çevre yol sinyalleri de alır — kahve makinesi, duvar rengi, satışçının giyimi. Gayrimenkul müşterisi çevre yol dominant ama fiyat tablosuna bakınca Sistem 2 devreye girer. Bankacılık müşterisi ürüne göre yol değiştirir. Satışçı bu geçişleri okuyabilmeli — ve beden dili, ses tonu, soru türü ipucu verir (Kısım 2 Bölüm 3).</p>\n<p>Kanal seçimi de sektörel profille bağlantılı: Teknoloji sektöründe dijital kanallar dominant, yüz yüze temas stratejik — demo ve kapanış için. Gayrimenkulde fiziksel kanal hâlâ birincil ama dijital pre-suasion artan önemde — Instagram, YouTube, sanal turlar. Bankacılıkta omnichannel zorunlu — mobil + şube + telefon entegrasyonu. FMCG\'de saha ziyareti hâlâ kral ama dijital veri desteği (POS verisi, stok takibi) fark yaratıyor. Sigortada telefon + yüz yüze karma — ama dijital onboarding hızlanıyor.</p>\n<p>Otomotiv sektöründe ilginç bir kanal evrimi var: Showroom ziyareti azalıyor, online araştırma artıyor. Müşteri showroom\'a gelmeden önce 3-5 marka araştırmış, fiyat karşılaştırması yapmış. Pine-Gilmore deneyim ekonomisi burada da geçerli: Showroom artık bilgi noktası değil, deneyim noktası. Test sürüşü = Ariely\'nin IKEA etkisi: Müşteri sürdüğünde sahipleniyor. Eğitim hizmetlerinde de benzer bir dönüşüm var: Demo/pilot uygulama eğitimin showroom\'u — müşteri deneyimlemeden satın almaz.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">SEKTÖREL PROFİL TESTİ</div></div>\n<p>Kendi sektörünü analiz et: Müşterinin baskın ikna yolu ne — merkez mi çevre mi? Satış döngüsü ne kadar — günler mi aylar mı? Karar verici tek mi çoğul mu? Ürün somut mu soyut mu? Rekabet fiyat bazlı mı değer bazlı mı? Bu 5 sorunun cevabı senin sektörel profilini çıkarır — ve hangi araçların öncelikli olduğunu gösterir.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">4 HAFTALIK KANAL ENTEGRASYON ANTRENMAN</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Kanal Haritası</div></div>\n<p>Müşterilerinle hangi kanalları kullanıyorsun? Her kanal için güçlü ve zayıf yönlerini yaz. Eksik kanal var mı?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Kanal Deneyi</div></div>\n<p>Kullanmadığın 1 kanalda 5 temas yap. Sonuçları not et.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Omnichannel Tutarlılık</div></div>\n<p>Tüm kanallarında mesajın tutarlı mı? Müşteri bir kanalda başlayıp diğerinde devam edebiliyor mu? Tutarsızlık noktalarını tespit et.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Kalibrasyon</div></div>\n<p>3 haftanın verisini topla: Hangi kanal hangi müşteri tipinde etkili? Sektörel profil testinin sonuçlarıyla karşılaştır. Kendi kanal formülünü oluştur.</p>\n<p>Kaynakça</p>\n<div class="ref-line">Iyengar, S. S. &amp; Lepper, M. R. (2000). When choice is demotivating. JPSP, 79(6), 995–1006.</div>\n<div class="ref-line">Mehrabian, A. &amp; Russell, J. A. (1974). An Approach to Environmental Psychology. MIT Press.</div>\n<div class="ref-line">Petty, R. E. &amp; Cacioppo, J. T. (1986). Communication and Persuasion. Springer.</div>\n<h4 class="researcher">Pine, B. J. &amp; Gilmore, J. H. (1998). Welcome to the experience economy. HBR, 76(4), 97–105.</h4>'},
'4-3':{b:'Pipeline',d:'Tahmin Psikolojisi',c:10563,h:'<h4 class="section-title">PİPELINE</h4>\n<p>Pipeline Kliniği: Tahmin Otopsisi, Sektörel Şablonlar, Haftalık Günlük</p>\n<p>Ana bölümde pipeline\'ın psikolojik tuzaklarını, CRM\'in neden doğru kullanılmadığını, hayalet pipeline\'ın sektörel versiyonlarını, qualification testini, Sinan\'ın 8 aylık B2B tuzağını ve forecast\'un yanıltıcılığını gördün. Bu ek farklı: Burada tahmin psikolojisinin bilimsel derinliğine inecek, gerçek pipeline\'ları otopsi edecek, sektörel pipeline şablonları oluşturacak ve 4 haftalık pipeline sağlık günlüğüne gireceksin.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">TAHMİN PSİKOLOJİSİ — NİYE SÜREKLİ YANILIYORUZ?</div></div>\n<p>Ana bölümde Lovallo-Kahneman\'ın iyimserlik biasını ve planlama yanılsamasını gördük. Şimdi daha derine: Neden tahminlerimizi düzeltemiyoruz?</p>\n<p>Philip Tetlock\'un 20 yıllık tahmin araştırması (2005) çarpıcı bir sonuç ortaya koydu: Uzmanların tahminleri, basit istatistik modellerden daha kötü. Neden? Çünkü uzmanlar "içeriden bakış" ile karar veriyor — her durumu özel görüyor, genel kalıplara bakmıyor. Satışçı da aynısını yapıyor: "Bu müşteri farklı, bu satış özel, 3 ayda kapatırım." Benzer 20 satış ortalama 7 ay sürmüş olsa bile.</p>\n<p>Tetlock\'un keşfettiği "süper tahminciler" (superforecasters) farklı yapıyor: Dışarıdan bakışla başlıyor (base rate), sonra içeriden bakışla ince ayar yapıyor. Satışa uyarlarsak: Önce "benzer satışlar ortalama kaç ayda kapanıyor" sorusunu yanıtla (dışarıdan bakış). Sonra "bu satışın özel koşulları ne — daha hızlı mı, daha yavaş mı yapan faktörler var mı" sorusunu yanıtla (içeriden bakış). İki bakışı birleştir.</p>\n<p>Satışçılar neden süper tahminci olamıyor? Çünkü motivasyonel bozulma var. Forecast\'ın iyimser olması yönetici toplantısında iyi görünür. Gerçekçi forecast "bu çeyrekte 5 değil 3 kapanış bekliyorum" demek, yöneticinin yüzünün düşmesi demek. Goodhart yasası yine: Forecast ölçüt olunca gerçeği değil, beklentiyi yansıtır.</p>\n<p>Bir katman daha: Kalibrasyon problemi. İyi tahmin sadece "doğru" olmak değil, kalibre olmaktır. Kalibre tahminci "yüzde 70 olasılık" dediğinde gerçekten 10 tahminden 7\'si doğru çıkar. Çoğu satışçı kalibre değil — "yüzde 70" diyor ama gerçekte yüzde 40. Tetlock\'un süper tahmincileri kendilerini sürekli kalibrasyon testiyle denetliyor: Geçmiş tahminlere bakıp "ne kadar yanıldım" sorusunu soruyorlar. Satışçıya pratik çeviri: Her çeyrek sonunda forecast\'ını gerçekle karşılaştır. Sapma yüzdeni hesapla. Zamanla bu yüzdeyi düşürmeyi hedefle.</p>\n<p>Kalibrasyon Egzersizi: Son çeyrekteki 10 forecast\'ını al. Her biri için verdiğin olasılığı ve gerçek sonucu yan yana yaz. "Yüzde 70" dediğin kaç tanesi kapandı? "3 ayda" dediğin kaç tanesi gerçekten 3 ayda kapandı? Bu basit egzersiz kalibrasyon farkındalığı yaratır — ve çoğu satışçı ilk kez yaptığında şaşırır.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">VAKA OTOPSİLERİ — 3 PİPELINE, 3 HAYAL KIRIKLIĞI</div></div>\n<p>Her vakada aynı soru: Pipeline nerede çarpıldı, neden çarpıldı, nasıl düzeltildi?</p>\n<p>Vaka 1: Sinan — 200 Saatlik Batık Maliyet</p>\n<p>Ana bölümde Sinan\'ın 8 aylık B2B tuzağını gördük. Şimdi pipeline perspektifinden otopsi yapalım.</p>\n<p>Sinan\'ın pipeline zaman çizelgesi: Ay 1 — IT müdürü heyecanlı, pipeline\'a "yüzde 70, 3 ayda" yazıldı. Ay 3 — İkinci demo, teknik sorular arttı, "yüzde 60, 2 ay daha" güncellendi. Ay 5 — Satın alma müdürü devreye girdi, bütçe belirsiz, pipeline notu "yüzde 50, belirsiz" oldu. Ay 7 — Toplantı ertelemeleri, sessizlik, Sinan notu güncellemedi — pipeline\'da hâlâ "yüzde 50". Ay 8 — Proje iptal.</p>\n<p>Otopsi bulguları: 3. ayda ilk alarm — teknik soruların artması "ilerleme" değil, "erteleme" sinyaliydi. Müşteri sorarak zaman kazanıyordu. 5. ayda ikinci alarm — satın alma müdürünün bütçe sorusu "karar yaklaşıyor" değil, "karar mekanizması henüz devreye girmemiş" sinyaliydi. 7. ayda üçüncü alarm — sessizlik = Bölüm 4\'teki ghost tiplerinden "hayır ama söyleyemiyorum". Sinan 3 alarmı da gördü ama görmezden geldi — Pronin kör noktası + batık maliyet.</p>\n<p>En kritik bulgu: Sinan\'ın pipeline\'ındaki diğer 6 fırsatın 3\'ü bu 8 ay içinde rakibe gitmişti. Fırsat maliyeti = 200+ saatin doğrudan maliyeti + kaybedilen 3 fırsatın geliri. Pipeline\'da "büyük balık" takıntısı bazen küçük balıkları kaçırır.</p>\n<p>Vaka 2: Taner — Banka Pipeline\'ının Özel Halleri</p>\n<p>Portföy yöneticisi Taner\'ın pipeline\'ı klasik satış pipeline\'ından farklı: Müşterileri zaten var. Yeni müşteri kazanmak değil, mevcut müşteriye çapraz satış ve derinleştirme.</p>\n<p>Taner\'ın hatası (Bölüm 2\'de detayları gördük): "Her müşteriye 3 ürün" hedefi, pipeline\'ı şişirdi. 320 müşterinin 50\'sinde "yatırım fonuna geçecek" notu vardı — gerçekçi olasılık 12–15. Geri kalan 35 hayalet. Otopsi: Taner sıcak ilişkiyi taahhütle karıştırıyordu. Müşteri "belki" dediğinde Taner "evet" olarak kodluyordu — Türk kültüründe "belki" çoğunlukla nazik "hayır"dır.</p>\n<p>Bankacılık pipeline\'ının özel boyutu: Tahsilat pipeline\'ı. Satış pipeline\'ı "kime satacağım" sorusunu yanıtlar. Tahsilat pipeline\'ı "kimden alacağım" sorusunu. Ve psikolojisi tersine döner: Satışta güven inşa edersin, tahsilatta güveni koruyarak baskı uygularsın. Bu gerilim Bölüm 7\'de derinleşecek.</p>\n<p>Vaka 3: Hasan — FMCG\'de Görünmeyen Pipeline</p>\n<p>Distribütör Hasan\'a "pipeline\'ın ne durumda" diye sorduğumda güldü: "Sernaz Hanım, bizde pipeline yok — sipariş var ya da yok." FMCG\'de pipeline kavramı B2B\'den farklı: Döngü haftalık, müşteri = bayi/market alıcısı, karar hızlı.</p>\n<p>Ama FMCG\'de de bir pipeline var — görünür değil ama var: Yeni müşteri (yeni market, yeni bölge) açma pipeline\'ı. Mevcut müşteride yeni ürün girme pipeline\'ı. Kaybı önleme pipeline\'ı (hangi bayi risk altında?). Hasan bunları kafasında taşıyordu ama sistematik değildi.</p>\n<p>Hasan\'la basit bir deneme yaptık: 4 hafta boyunca "risk altındaki 10 bayi" listesini tuttu. Her hafta güncelledi: Sipariş düştü mü, rakip ürün rafa girdi mi, bayi ile ilişki soğudu mu? 4 haftada 3 bayide erken müdahale yaptı — 2\'sini korudu, 1\'ini kaybetti ama "en azından görerek kaybettim" dedi. Görünmeyen pipeline\'ı görünür yapmak, kontrol hissini artırıyor — Deci-Ryan\'ın özerklik ihtiyacı (Kısım 1 Bölüm 4).</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">SEKTÖREL PİPELINE ŞABLONLARI</div></div>\n<p>Her sektörün pipeline\'ı farklı aşamalardan oluşuyor. Aşağıdaki şablonları kendi sektörüne göre uyarla:</p>\n<p>SaaS/Teknoloji: Prospecting → Keşif görüşmesi → Demo/POC → Teklif → Müzakere → Kapanış → Onboarding. Ortalama: 3–12 ay. Kritik geçiş: Demo\'dan teklife. Müşteri demo\'da "güzel" deyip teklif istemezse — hayalet sinyali. Sinan\'ın vakasında kritik geçiş: Teklif\'ten müzakereye — müşteri teklifi aldı ama müzakere başlatmadı.</p>\n<p>Gayrimenkul: Dijital temas → Showroom ziyareti → 2. ziyaret (aileyle) → Kredi ön onay → Rezervasyon → Sözleşme. Ortalama: 1–6 ay. Kritik geçiş: 1. ziyaretten 2. ziyarete. 2. ziyaret yoksa — hayalet.</p>\n<p>Bankacılık (cross-sell): Mevcut ilişki → İhtiyaç tespiti → Ürün sunumu → Başvuru → Onay → Aktivasyon. Ortalama: Günler–haftalar. Kritik geçiş: İhtiyaç tespitinden başvuruya. Müşteri "olur" deyip başvuru yapmadıysa — sahte evet.</p>\n<p>Sigorta: Prospecting/referans → İhtiyaç analizi → Teklif → Karşılaştırma → Karar → Poliçe. Ortalama: 2 hafta–2 ay. Kritik geçiş: Teklif aşamasından karara. Müşteri teklifi alıp sessiz kaldıysa — rakiple karşılaştırıyor veya erteledi.</p>\n<p>FMCG (yeni müşteri): Hedef belirleme → İlk temas → Ürün tanıtım → Deneme siparişi → Düzenli sipariş → Genişletme. Ortalama: 2–8 hafta. Kritik geçiş: Deneme siparişinden düzenli siparişe. İlk sipariş geldiyse ama ikincisi gelmiyorsa — ürün rafta dönmedi.</p>\n<p>Eğitim hizmetleri: Referans/temas → İhtiyaç analizi → Teklif → İç onay süreci → Pilot → Sözleşme. Ortalama: 2–6 ay. Kritik geçiş: Tekliften iç onaya. Teklif İK\'da kaldıysa ve CFO\'ya çıkmadıysa — champion zayıf veya öncelik düşük.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">4 HAFTALIK PİPELINE SAĞLIK GÜNLÜĞÜ</div></div>\n<p>Bu modül klasik antrenman değil — 4 haftalık bir günlük. Her gün 5 dakika, her hafta 1 saat. Amaç: Pipeline sağlığını ölçülebilir hale getirmek ve kalibrasyon kasını geliştirmek.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Hayalet Avı Günlüğü</div></div>\n<p>Pipeline\'ını aç. Her fırsata 4 soru testini uygula (ana bölümden): Somut adım, bugün tanışsam, gerçek neden, kültürel kod. Kategorize et: Gerçek fırsat / Hayalet / Park et. Hayaletleri çıkar. Park edilenleri ayrı listeye al. Her gün akşam 5 dakika: Bugün hangi fırsatla ilgili ne yaptım? Hareket benden mi geldi yoksa müşteriden mi? Hafta sonu notu: Kaç hayalet buldun? Pipeline kaçtan kaça düştü? Bu azalma seni rahatsız ediyor mu — yoksa rahatlatıyor musun?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Forecast Kalibrasyon Günlüğü</div></div>\n<p>Kalan gerçek fırsatlar için Tetlock\'un yöntemini uygula: Önce dışarıdan bakış (benzer satışlar ortalama kaç ayda kapanıyor?), sonra içeriden bakış (bu satışın özel koşulları ne?). İki tahmini yaz: İyimser ve gerçekçi. Aradaki fark iyimserlik biasının ölçüsü. Her gün akşam: Bugün hangi fırsatta müşteriden somut sinyal aldım? O sinyal forecast\'umu değiştirmeli mi? Değiştirdiysen yaz — değiştirmediysen de yaz (neden değiştirmedin?).</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Milestone Kontrol Günlüğü</div></div>\n<p>Her fırsat için sektörel pipeline şablonundaki aşamayı belirle. Fırsat hangi aşamada? Bir önceki aşamadan bu aşamaya geçiş ne zaman oldu? Geçiş olalı 30 günü geçtiyse ve ilerleme yoksa — stuck sinyali. Her gün akşam: "Bugün en çok zaman harcadığım fırsat hangisi? O fırsat stuck mı?" Sinan\'ın 200 saatlik tuzağı bu soruyu her gün sorsaydı 3. ayda ortaya çıkardı.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Retrospektif + Günlük Devam Planı</div></div>\n<p>4 haftanın verisini topla. Pipeline ne kadar küçüldü? Forecast\'ın ne kadar değişti? Motivasyonun nasıl etkilendi? En önemli soru: Bu rutini sürdürebilir misin? Günlük tutmak 5 dakika — ama o 5 dakika farkındalık yarattı mı? Kararlarını değiştirdi mi? Günlüğe devam edeceksen: Aylık retrospektif planla. Çeyreklik kalibrasyon testi ekle. Pipeline sağlık günlüğü, yıllık check-up gibi — sıkıcı ama hayat kurtarıcı.</p>\n<p>Kaynakça</p>\n<h4 class="researcher">Arkes, H. R. &amp; Blumer, C. (1985). The psychology of sunk cost. Organizational Behavior and Human Decision Processes, 35(1), 124–140.</h4>\n<div class="ref-line">Buehler, R., Griffin, D. &amp; Ross, M. (1994). Exploring the \'planning fallacy\'. Journal of Personality and Social Psychology, 67(3), 366–381.</div>\n<h4 class="researcher">Hall, E. T. (1976). Beyond Culture. Anchor Books.</h4>\n<h4 class="researcher">Kağıtçıbaşı, Ç. (2007). Family, Self, and Human Development Across Cultures (2nd ed.). Lawrence Erlbaum.</h4>\n<div class="ref-line">Kahneman, D. &amp; Tversky, A. (1979). Intuitive prediction: Biases and corrective procedures. TIMS Studies in Management Science, 12, 313–327.</div>\n<div class="ref-line">Lovallo, D. &amp; Kahneman, D. (2003). Delusions of success. Harvard Business Review, 81(7), 56–63.</div>\n<div class="ref-line">Mischel, W. et al. (1989). Delay of gratification in children. Science, 244, 933–938.</div>\n<div class="ref-line">Tetlock, P. E. (2005). Expert Political Judgment: How Good Is It? How Can We Know? Princeton University Press.</div>\n<div class="ref-line">Tetlock, P. E. &amp; Gardner, D. (2015). Superforecasting: The Art and Science of Prediction. Crown.</div>'},
'4-4':{b:'Takip',d:'Sosyal Normlar',c:9753,h:'<p>TAKİP</p>\n<p>Takip Protokolü: Sosyal Sınırlar, Mert Simülasyonu, Ritim Takvimi</p>\n<p>Ana bölümde Zajonc-Brehm gerilimini, değer bazlı takibin mekaniğini, ghost müşterinin 4 anlamını, Demet\'in evrimini ve Mert\'in 3 şehir hikayesini gördün. Bu ek farklı: Burada sosyal normlar ve ısrarın bilimsel sınırlarını inceleyecek, Mert\'in 3 şehir simülasyonunu derinleştirecek, sektörel takip şablonları oluşturacak ve 4 haftalık ritim takvimi antrenmanına gireceksin.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">SOSYAL NORMLAR VE ISRARIN SINIRLARI</div></div>\n<p>Takibin psikolojik sınırı sosyal normlarla belirlenir. Grice\'ın konuşma işbirliği ilkelerini Kısım 2 Bölüm 9\'da görmüştük: İletişim karşılıklı işbirliği gerektirir. Müşteri yanıt vermiyorsa, işbirliğini geri çekmiş demektir. Israr etmek, işbirliği normunu ihlal etmek — sosyal olarak "ayıp."</p>\n<p>Ama burada bir asimetri var: Satışçının ısrarı müşteri tarafından farklı okunur. Cialdini\'nin tutarlılık ilkesini hatırla (Kısım 3 Bölüm 1): Müşteri bir kez "ilgileniyorum" dediyse, satışçının takibi meşru görülür — çünkü müşteri kendi tutarlılığını korumak ister. Ama müşteri hiç ilgi göstermemişse takip "spam" olarak okunur. Sınır: Müşterinin verdiği ilgi sinyalinin büyüklüğü, takibin meşruiyet aralığını belirler.</p>\n<p>Howard\'ın (1995) takip araştırmasında ilginç bir bulgu: Müşteriler "faydalı bilgi sunan" satışçı takibine ortalama 5 temasa kadar olumlu tepki veriyor. "Satın aldın mı" soran takibe 2. temastan sonra olumsuz tepki veriyor. Fark 2.5 kat. Değer bazlı takip, sınırı genişletiyor.</p>\n<p>Türkiye\'de bu sınırlar ek bir katmanla karmaşıklaşır: Misafirperverlik normu. Hofstede\'nin toplulukçuluk boyutunda Türkiye yüksek skor alır — ilişkisel bağ güçlüdür. Müşteri satışçıyı "misafir" gibi karşılar — ilk 2-3 temasta. Ama misafirperverlik sınırsız değildir: "Misafir 3 gün kalır" atasözü, Türk kültüründe bile karşılama süresinin sınırlı olduğunu gösterir. Satışçı 4. temasta "misafir" olmaktan çıkıp "rahatsız edici" olmaya başlar — eğer değer katmıyorsa.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">MERT SİMÜLASYONU — 3 ŞEHİR, 3 KARAR ANI</div></div>\n<p>Bu modülde Mert sensin. Her senaryoyu oku, durumun içine gir, kararını ver — sonra Mert\'in ne yaptığını ve sonucunu oku. Doğru cevap yok — ama her seçeneğin bedeli farklı.</p>\n<p>Senaryo 1: İstanbul — Dijital Ghost</p>\n<p>Sen Mert\'sin. Levent\'te bir teknoloji şirketinin IT direktörüne 2 hafta önce demo yaptın. Demo iyi geçti, müşteri "ekibimle konuşup döneceğim" dedi. 1 hafta sonra e-posta attın — cevap yok. LinkedIn mesajı — görüldü ama cevap yok. Telefon — "toplantıda, sonra arayacağım" — aramadı. Saat 17:00, ofiste oturuyorsun. Ne yaparsın?</p>\n<p>A) Bir kez daha ara — belki bu sefer açar, ısrar bazen işe yarar. B) Demo\'da konuştuğunuz entegrasyon konusunda bir case study hazırla, e-postayla gönder — sormadan değer sun. C) IT direktörünü bırak, teknik ekipten biriyle LinkedIn\'de bağlantı kur — belki oradan bilgi alırsın. D) Kısa bir mesaj at: "Zamanlamanız uygun değilse hiç sorun değil, ileride konuşmak isterseniz buradayım" — çıkış yolu sun.</p>\n<p>Mert ne yaptı: Önce B\'yi denedi — case study gönderdi. 4 gün sessizlik. Sonra D\'yi uyguladı — çıkış yolu sundu. IT direktörü 2 gün sonra yanıt verdi: "Özür dilerim, iç süreç uzadı. Gelecek hafta toplantı ayarlayalım." Ghost\'un nedeni: Unutma + iç süreç yavaşlığı. Baskılı arama (A) yapılsaydı müşteri rahatsız olurdu — çünkü müşteri kendi sürecinde takılmıştı, satışçının baskısı işleri hızlandırmaz, sadece ilişkiyi soğutur.</p>\n<p>Senaryo 2: Kayseri — Patron Susuyor</p>\n<p>Sen Mert\'sin. Aile şirketi patronuyla geçen ay yüz yüze görüştün, çay içtiniz, iyi geçti. Patron "bu işi yapalım, oğlumla konuşayım" dedi. 2 hafta geçti, ses yok. Patronu aradığında telefonları açıyor ama konuyu değiştiriyor — "nasılsın, hava güzel değil mi" diyor, işe gelmiyor. İçinden bir ses "oğuldan onay gelmemiş" diyor. Ne yaparsın?</p>\n<p>A) Patrona doğrudan sor: "Oğlunuz ne dedi?" — net ve hızlı. B) "Teknik detayları oğlunuzla da paylaşsam iyi olur, tanışabilir miyiz?" de — oğulla doğrudan bağlantı kur. C) Kayseri\'ye git, patronla yüz yüze otur, konu kendiliğinden açılsın — Anadolu\'da iş masada konuşulur. D) Sektörle ilgili bir rapor gönder — ilişkiyi canlı tut, baskı yapma.</p>\n<p>Mert ne yaptı: İlk seferde A\'yı denedi — "Patron bey, oğlunuzla konuştunuz mu?" Patron\'un sesi değişti: "Oğlan meşgul, konuşacağız." Kısa. Soğuk. Mert hissetti: Yanlış hamle. Patronun kararını sorgulatmıştı — Türk aile şirketinde patron "benden hızlı olma" mesajını verir. 1 hafta sonra Mert C\'yi uyguladı: Kayseri\'ye uçtu, patronla çay içti, 15 dakika havadan sudan konuştu. Patron kendiliğinden açtı: "Oğlan biraz itiraz etti ama ben ikna edeceğim, sen merak etme." Bilgi geldi — ama Mert\'in ilk hatası (A) olmasa daha erken gelebilirdi. Kayseri\'de sabır = saygı. Sormak = baskı.</p>\n<p>Senaryo 3: Trabzon — Bayi Sessizleşiyor</p>\n<p>Sen Mert\'sin. Gıda dağıtım bayisi 3 haftadır sipariş vermedi. Normalde haftalık sipariş verir. Telefonda "stok var, gelecek hafta" diyor — 3 haftadır aynı söz. Dün marketin rafına baktın: Rakip ürün görünmüş. Miden bulanıyor. Ne yaparsın?</p>\n<p>A) Doğrudan sor: "Rakip ürün gördüm, bir sorun mu var?" — samimi ve doğrudan. B) Sahaya git, bayiyle yüz yüze otur, raflara birlikte bak — en güvenilir bilgi sahada. C) Bölge pazar verisi hazırla: "Şu üründe fırsat var, birlikte değerlendirelim" — değer sun, bilgi al. D) Promosyon öner: "2+1 kampanya yapalım" — hemen harekete geç.</p>\n<p>Mert ne yaptı: B\'yi seçti — Trabzon\'a gitti, bayiye haber vermeden markete girdi, raflara baktı. Rakip ürün gerçekten oradaydı — 2 raf. Bayiye gitti, çay söyledi, 5 dakika sohbet ettikten sonra bayinin kendisi açtı: "Mert abi, rakibin adamı 3 hafta üst üste geldi, yüzde 15 indirim verdi, mecbur koydum." Mert kızmadı, sordu: "Dönüyor mu?" Bayi: "Yavaş." Mert C\'yi uyguladı: Bölge satış verisini gösterdi, rakip ürünün dönüş hızının düşük olduğunu kanıtladı. Bayiyle birlikte raf planı yaptı. Promosyon (D) önermedi — çünkü fiyat savaşına girmenin uzun vadeli maliyetini biliyordu (Thaler). 2 haftada bayi kendi iradesiyle rakip ürünü azalttı. Sahaya gitmek her şeyi çözmüştü — Trabzon\'da bilgi telefonda değil, yüz yüzede akar.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">SEKTÖREL TAKİP ŞABLONLARI</div></div>\n<p>Her sektör için takip ritmi, kanalı ve değer içeriği farklı. Aşağıdaki şablonları kendi satış ortamına uyarla:</p>\n<p>SaaS/Teknoloji takip şablonu: Demo sonrası 48 saat: Teşekkür + demo özeti. 1 hafta: Müşterinin sorduğu konuda ek bilgi. 2 hafta: İlgili case study. 3 hafta: "Ekibinizle paylaşabileceğiniz kısa özet hazırladım" (champion\'a araç ver). 4 hafta: Sessizse — çıkış yolu. Kanal: E-posta + LinkedIn. Telefon sadece randevulu.</p>\n<p>Gayrimenkul takip şablonu: Showroom sonrası 24 saat: WhatsApp ile teşekkür + görsel (günışığı fotoğrafı). 3. gün: Çevre bilgisi (okul, market, ulaşım). 7. gün: 2. ziyaret daveti. 14. gün: Kredi ön onay hatırlatması. 21. gün: Sessizse — çıkış yolu. Kanal: WhatsApp dominant (Türkiye\'de gayrimenkulde WhatsApp birincil kanal).</p>\n<p>Bankacılık takip şablonu: İhtiyaç tespiti sonrası 2 gün: Kişiselleştirilmiş ürün özeti. 1 hafta: Başvuru hatırlatması. 2 hafta: Piyasa güncellemesi + ürün bağlantısı. Aylık: Proaktif portföy değerlendirmesi. Kanal: Telefon + uygulama içi mesaj. Yüz yüze şube ziyareti özel durumlar için.</p>\n<p>Sigorta takip şablonu: Yenileme -60 gün: İlk bilgilendirme. -45 gün: Mevcut poliçe analizi. -30 gün: Kişiselleştirilmiş teklif. -15 gün: Karar hatırlatması. -7 gün: Son fırsat. Kanal: Telefon + e-posta. WhatsApp özel durumlar (hasar sonrası vb.).</p>\n<p>FMCG bayi takip şablonu: Haftalık: Sipariş kontrolü + pazar bilgisi. 2 haftada bir: Rakip hareket raporu. Aylık: Yüz yüze ziyaret + raf analizi. Çeyreklik: Satış performans değerlendirmesi. Kanal: Telefon birincil, yüz yüze zorunlu.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">4 HAFTALIK TAKİP RİTİM TAKVİMİ</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Ghost Teşhis Haftası</div></div>\n<p>Pipeline\'ındaki tüm ghost müşterileri listele. Her birine 4 neden testini uygula (hayır, zamanlama, unuttu, rakip). Her birine uygun strateji belirle. Bu hafta 1 değer bazlı temas yap — her ghost\'a farklı içerikle. Her temasın sonucunu not et: Cevap geldi mi? Hangi kanaldan? Hangi içerik işe yaradı?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Kanal Deneyi Haftası</div></div>\n<p>Bu hafta takip kanalını değiştir. E-posta ile takip ettiğin müşteriye WhatsApp dene. Telefon eden müşteriye LinkedIn mesajı dene. Mert\'in 3 şehir dersini uygula: Her müşterinin tercih ettiği kanalı keşfet. Hafta sonu: Hangi kanal değişikliği işe yaradı? Hangi müşteri hangi kanala tepki verdi?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Değer Envanteri Haftası</div></div>\n<p>Bu hafta her takip teması için değer içeriği hazırla. Her sektörel şablondaki "değer" sütununu doldur: Sektör haberi, araştırma verisi, case study, kişiselleştirilmiş analiz. Amaç: En az 10 tane "hazır değer temas içeriği" oluştur — bir kütüphane. Hafta sonu: Hangi değer içeriği en çok tepki aldı?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Ritim Kalibrasyonu</div></div>\n<p>3 haftanın verisini topla: Hangi sıklık, hangi kanal, hangi içerik hangi müşteri tipinde işe yaradı? Kendi takip ritim takvimini oluştur — sektörel şablonları baz al ama kendi deneyimle kalibre et. En önemli çıktı: "Benim optimal takip formülüm" — her müşteri segmenti için farklı. Mert 3 şehirde 3 farklı formül buldu — sen de müşteri segmentlerinde farklı formüller bulacaksın.</p>\n<p>Kaynakça</p>\n<div class="ref-line">Brehm, J. W. (1966). A Theory of Psychological Reactance. Academic Press.</div>\n<div class="ref-line">Cialdini, R. B. (2009). Influence: Science and Practice (5th ed.). Pearson.</div>\n<div class="ref-line">Fitzsimons, G. J. &amp; Lehmann, D. R. (2004). Reactance to recommendations. Marketing Science, 23(1), 82–94.</div>\n<h4 class="researcher">Grice, H. P. (1975). Logic and conversation. In P. Cole &amp; J. Morgan (Eds.), Syntax and Semantics, Vol. 3.</h4>\n<h4 class="researcher">Hofstede, G. (2001). Culture\'s Consequences (2nd ed.). Sage.</h4>\n<h4 class="researcher">Kağıtçıbaşı, Ç. (2007). Family, Self, and Human Development Across Cultures (2nd ed.). Lawrence Erlbaum.</h4>\n<div class="ref-line">Mardin, Ş. (2006). Religion, Society and Modernity in Turkey. Syracuse University Press.</div>\n<div class="ref-line">Zajonc, R. B. (1968). Attitudinal effects of mere exposure. JPSP, 9(2), 1–27.</div>'},
'4-5':{b:'Key Account',d:'CLV ve İlişki Derinliği',c:8601,h:'<h4 class="section-title">KEY ACCOUNT</h4>\n<p>Key Account Envanteri: CLV Bilimi, Derinlik Haritası, Kayıp Otopsisi</p>\n<p>Ana bölümde Cengiz-Burak hikayesini, büyük müşteri paradoksunu, Türkiye\'deki aile şirketi dinamiğini, cross-sell etik haritasını ve Volkan\'ın key account sınavını gördün. Bu ek farklı: Burada müşteri yaşam boyu değeri (CLV) biliminin derinliğine inecek, ilişki derinlik envanteri aracını öğrenecek, kayıp post-mortem protokolü uygulayacak ve 4 haftalık key account sağlık kontrolü antrenmanına gireceksin.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">MÜŞTERİ YAŞAM BOYU DEĞERİ (CLV) — BİLİMSEL DERİNLİK</div></div>\n<p>Reichheld-Sasser\'ın yüzde 5 tutma = yüzde 25–95 kâr formülünü ana bölümde gördük. CLV bu formülün matematik versiyonu: Bir müşterinin tüm ilişki süresince şirkete getireceği toplam değer. Ve CLV, satışçının karar pusulası olmalı.</p>\n<p>CLV hesaplamanın temel formülü: CLV = (Ortalama satış değeri × Satış sıklığı × Ortalama müşteri ömrü) – Müşteri edinme maliyeti. Basit görünüyor ama her sektörde farklı parametreler devreye girer.</p>\n<p>Bankacılık: Bireysel müşterinin CLV\'si 20–30 yıl. İlk kredi sadece giriş — arkasından yatırım, sigorta, emeklilik, çocukların hesapları gelir. Taner\'ın cross-sell yangını CLV\'yi kısa vadeli hedefe feda etti. Bir müşteriyi 3 ürün dayatmasıyla kaybetmek = 20 yıllık potansiyel geliri kaybetmek. Doğru CLV düşüncesi: "Bu müşterinin 20 yıllık değeri nedir?" sorusu, çeyreklik hedefi perspektife sokar.</p>\n<p>Gayrimenkul: CLV daha kısa görünür ("tek sefer satış") ama gerçekte referans değeri devasa: Memnun müşteri 5–10 referans üretir, her referans yeni satış potansiyeli. Bir gayrimenkul satışının CLV\'si = Satış geliri + (Referans sayısı × Referans dönüşüm oranı × Ortalama satış geliri). Aslı\'nın showroom modelinde memnun müşteri referans programı CLV\'yi 3 kat artırdı — çünkü referans müşterinin edinme maliyeti sıfıra yakın.</p>\n<p>SaaS: CLV = ARR (yıllık tekrarlanan gelir) × ortalama müşteri ömrü. Churn yüzde 1 düşmesi, yıllar içinde milyon lira fark yaratabilir. SaaS\'ta CLV düşüncesi "yeni müşteri kazan" yerine "mevcut müşteriyi koru" stratejisine kaymalı — çünkü yeni müşteri edinme maliyeti mevcut müşteriyi koruma maliyetinin 5–7 katı (Reichheld verisi).</p>\n<p>FMCG: Bayi CLV\'si = Aylık sipariş hacmi × 12 × Ortalama bayi ömrü. Hasan\'ın distribütör ağında en değerli 10 bayinin toplam cirosu diğer 50 bayinin toplamına eşitti — Pareto\'nun acımasız versiyonu.</p>\n<p>Sigorta: CLV = Yıllık prim × Ortalama poliçe ömrü + Yenileme değeri + Çapraz satış potansiyeli. Sigorta müşterisi uzun vadeli — 10–15 yıllık ilişkiler normal. Her yenileme bir yeniden karar anı.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">İLİŞKİ DERİNLİK ENVANTERİ</div></div>\n<p>Bu araç her key account için ilişki derinliğini ölçüyor. Her soruyu 1–5 arası puanla. Toplam skor ilişkinin sağlığını gösteriyor.</p>\n<p>Boyut 1: Temas çeşitliliği (1–5). 1 = Tek kişiyle ilişki (Burak). 3 = 2–3 farklı seviyede temas. 5 = Organizasyonun farklı departmanlarında, farklı seviyelerinde 5+ temas noktası.</p>\n<p>Boyut 2: Bilgi derinliği (1–5). 1 = Sadece iş konuşuyoruz. 3 = Müşterinin iş önceliklerini, organizasyonel dinamiklerini biliyorum. 5 = Müşterinin stratejik planlarını, kültürel dinamiklerini, kilit karar verici profillerini biliyorum. Aile şirketiyse: Aile dinamiklerini, kuşak geçiş durumunu biliyorum.</p>\n<p>Boyut 3: Karşılıklı değer algısı (1–5). 1 = Müşteri beni tedarikçi olarak görüyor (değiştirilebilir). 3 = Müşteri beni güvenilir iş ortağı olarak görüyor. 5 = Müşteri beni stratejik danışman olarak görüyor — karar süreçlerine dahil ediyor.</p>\n<p>Boyut 4: İletişim kalitesi (1–5). 1 = Sadece sorun olduğunda konuşuyoruz. 3 = Düzenli proaktif temas var. 5 = Hem planlı hem spontan iletişim — müşteri beni arar, ben onu ararım, arada iş dışı sohbet de olur.</p>\n<p>Boyut 5: Kriz dayanıklılığı (1–5). 1 = İlk sorun ilişkiyi bitirir (Cengiz-Burak). 3 = Küçük sorunlar affedilir ama büyük sorun risk. 5 = Ciddi bir sorun olsa bile ilişki dayanır — çünkü güven yatırımı yüksek. Gottman\'ın 5:1 oranı: 5 olumlunun 1 olumsuzla dengelenmesi.</p>\n<div class="score-box"><strong>📊 Puanlama:</strong>  5–12 = Kritik risk — tek bir şok ilişkiyi bitirir, Burak sendromu. Acil müdahale: Bu hafta en az 1 yeni temas noktası kur. 13–17 = Dikkat bölgesi — ilişki var ama sığ. Derinleştirme planı yap: 3 ay içinde her boyutu 1 puan artır. 18–21 = Sağlıklı — ilişki çok katmanlı, krizlere dayanıklı. Koruma + büyütme. 22–25 = Stratejik ortak — bu ilişkiyi model al, diğer key account\'ları buraya taşı.</div>\n<p>Burak\'ın Cengiz ilişkisi bu envanterde kaç alırdı? Temas çeşitliliği: 1 (tek kişi). Bilgi derinliği: 2 (yüzeysel). Karşılıklı değer: 2 (tedarikçi). İletişim: 3 (düzenli ama derinliksiz). Kriz dayanıklılığı: 1 (ilk sorun bitti). Toplam: 9 — kritik risk. Burak bunu bilseydi...</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">KAYIP POST-MORTEM PROTOKOLÜ</div></div>\n<p>Key account kaybettiğinde acı doğal. Ama acıyı öğrenmeye dönüştürmek stratejik. Bu protokol her müşteri kaybı sonrası uygulanmalı — 1 hafta içinde, hafıza tazeyken.</p>\n<p>Adım 1: Kronoloji Çıkar</p>\n<p>İlişkinin başlangıcından kopuşa kadar zaman çizelgesi oluştur. Ana dönüm noktaları: İlişki kurulduğu an, ilk sorun, ilk sinyal, kopuş kararı, son temas. Sinan\'ın 8 aylık pipeline\'ı: Her ayın sonunda ne oldu, hangi sinyal geldi, ne kaçırıldı?</p>\n<p>Adım 2: Sinyal Analizi</p>\n<p>Davranışsal, duygusal ve yapısal sinyalleri listele. Hangilerini gördün? Hangilerini gördün ama görmezden geldin (Pronin kör noktası)? Hangilerini hiç fark etmedin? Burak\'ın post-mortemi: Davranışsal sinyal (teslimat gecikmesi) görüldü ama yapısal sinyal (Cengiz\'in şirketindeki satın alma politikası değişikliği) fark edilmedi.</p>\n<p>Adım 3: Kök Neden Analizi</p>\n<p>Kaybın gerçek nedeni ne? Yetkinlik sorunu (teslimat, kalite, servis)? İyi niyet sorunu (müşteri "umursamadılar" hissetti)? Yapısal sorun (fiyat, organizasyonel değişiklik)? İlişki sorunu (tek bağlantı noktası koptu)? Çoğu zaman birden fazla neden var — ama bir tanesi tetikleyicidir.</p>\n<p>Adım 4: Önlem Planı</p>\n<p>Bu kayıptan ne öğrendin? Diğer key account\'larında aynı risk var mı? Envanterde hangi boyut zayıf? Somut 3 eylem belirle — bu hafta başla.</p>\n<p>Adım 5: Geri Kazanma Değerlendirmesi</p>\n<p>Bu müşteri geri kazanılabilir mi? Kim-Dirks\'in güven tamir çerçevesini uygula: Yetkinlik sorunu → somut iyileştirme kanıtı. İyi niyet sorunu → sorumluluk + özür + somut adım. Zamanlama: Müşteri rakipten memnun olmadığında pencere açılır — o pencereyi izle. Volkan\'ın hikayesi: Geri kazanma mümkün oldu çünkü ilişki organizasyona taşınmıştı.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">4 HAFTALIK KEY ACCOUNT SAĞLIK KONTROLÜ</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Envanter Haftası</div></div>\n<p>En büyük 5 key account\'un için ilişki derinlik envanterini doldur. Her birini 5 boyutta puanla. 10 altı olanları kırmızı olarak işaretle. Her kırmızı hesap için: Bu hafta 1 somut adım at — yeni temas noktası kur, bilgi derinliğini artır, proaktif temas yap.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">CLV Hesaplama Haftası</div></div>\n<p>Her key account için basit CLV tahmini yap: Yıllık gelir × tahmini müşteri ömrü. Sonra referans değerini ekle: Bu müşteriden son 2 yılda kaç referans geldi? Her referansın ortalama değeri ne? CLV + referans değeri = gerçek müşteri değeri. Bu sayı çeyreklik hedefle karşılaştır — perspektif kazanacaksın.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Erken Uyarı Kurulumu</div></div>\n<p>Her key account için 3 sinyal belirle: Sipariş/aktivite trendi (ölçülebilir), iletişim sıcaklığı (gözlemsel), organizasyonel değişiklik (istihbarat). Her sinyal için eşik koy: "Sipariş yüzde 20 düşerse", "2 haftadır temas yoksa", "yeni CEO/müdür atandıysa". Eşik geçildiğinde ne yapacağını planla — reaktif değil, proaktif.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Büyüme Planı</div></div>\n<p>Envanter puanı 16+ olan sağlıklı hesaplar için büyüme planı yap: Cross-sell fırsatı var mı (Sibel testi: gerçek ihtiyaç var mı)? Up-sell fırsatı var mı (mevcut kullanım yüksek mi)? Referans programı kurabilir misin? Bu hafta 1 sağlıklı hesapta 1 büyüme adımı at.</p>\n<p>Kaynakça</p>\n<div class="ref-line">Berger, P. D. &amp; Nasr, N. I. (1998). Customer lifetime value: Marketing models and applications. Journal of Interactive Marketing, 12(1), 17–30.</div>\n<h4 class="researcher">Bourdieu, P. (1986). The Forms of Capital. In J. Richardson (Ed.), Handbook of Theory and Research for the Sociology of Education.</h4>\n<div class="ref-line">Gottman, J. M. &amp; Silver, N. (1999). The Seven Principles for Making Marriage Work. Three Rivers Press.</div>\n<h4 class="researcher">Gupta, S. &amp; Lehmann, D. R. (2005). Managing Customers as Investments. Wharton School Publishing.</h4>\n<h4 class="researcher">Kağıtçıbaşı, Ç. (2007). Family, Self, and Human Development Across Cultures (2nd ed.). Lawrence Erlbaum.</h4>\n<div class="ref-line">Kumar, V. &amp; Reinartz, W. (2016). Creating enduring customer value. Journal of Marketing, 80(6), 36–68.</div>\n<div class="ref-line">Millman, T. &amp; Wilson, K. (1995). From key account selling to key account management. Journal of Marketing Practice, 1(1), 9–21.</div>\n<h4 class="researcher">Reichheld, F. F. &amp; Sasser, W. E. (1990). Zero defections: Quality comes to services. HBR, 68(5), 105–111.</h4>\n<h4 class="researcher">Reichheld, F. F. (2003). The one number you need to grow. HBR, 81(12), 46–54.</h4>'},
'4-6':{b:'Rekabet',d:'Win-Back Simülasyonu',c:8738,h:'<h4 class="section-title">REKABET</h4>\n<p>Rekabet Laboratuvarı: Rekabetçi Zeka, Win-Back Simülasyonu, Fiyat Karar Ağacı</p>\n<p>Ana bölümde rakibi kötüleme tuzağını, Berna\'nın feature war deneyimini, 3 rekabet stratejisini (kaçınma, konumlanma, geri kazanma) ve sektörel rekabet haritasını gördün. Bu ek farklı: Burada rekabetçi zekanın bilimsel temelini inceleyecek, 3 win-back senaryosunu simüle edecek, fiyat savaşı karar ağacı oluşturacak ve sektörel rekabet profilini çıkaracak.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">REKABETÇİ ZEKA — RAKİBİ MÜŞTERİNİN GÖZÜNDEN OKU</div></div>\n<p>Rekabetçi zeka, casus gibi bilgi toplamak değil — müşterinin gözünden rekabeti okumak. Kısım 2 Bölüm 7\'de (Karar) müşterinin karar anatomisini gördük. Rekabetçi zeka aynı anatominin farklı açısı: Müşteri neyi karşılaştırıyor ve karşılaştırma kriterleri ne?</p>\n<p>Michael Porter\'ın rekabetçi strateji çerçevesini herkes bilir. Ama Porter\'ın gözden kaçan içgörüsü: Rekabet avantajı mutlak değil, algısaldır. Müşteri senin gerçek farkını görmeyebilir — algıladığı farkı görür. Todorov\'un 33 milisaniye ilk izlenim araştırmasının (Kısım 1 Bölüm 5) strateji versiyonu: Müşteri seni ve rakibini "ilk bakışta" konumlandırır — ve bu konumlandırma sonraki tüm değerlendirmeyi renklendirir. Halo etkisi (Thorndike): Bir boyutta olumlu izlenim diğer boyutlara sızar.</p>\n<p>Pratik çıkarım: Rakibini tanımak için rakibi değil, müşteriyi dinle. "Rakibimiz ne yapıyor" sorusu yerine "Müşteri bizi ve rakibi nasıl görüyor" sorusu. Keşif görüşmelerinde, MI tekniğiyle (Kısım 2 Bölüm 6): "Alternatiflerinizi değerlendirirken en çok neye bakıyorsunuz?" sorusu, müşterinin karar kriterlerini ortaya koyar — ve senin konumlanma stratejini belirler.</p>\n<p>Rekabetçi zeka toplama yöntemleri (etik sınırlar içinde): Müşteri görüşmelerinde açık uçlu sorular — "Piyasada başka kimlerle konuşuyorsunuz?" (sormaktan korkma, çoğu müşteri söyler). Kaybedilen satışlarda post-mortem — "Neden rakibi seçtiniz?" sorusu altın değerinde. Sektör etkinliklerinde gözlem — rakibin sunumu, mesajı, müşteri algısı. CRM verisi — hangi müşteri segmentinde hangi rakipten kaybediyoruz?</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">WIN-BACK SİMÜLASYONU — 3 SENARYO</div></div>\n<p>Her senaryoda kaybedilmiş bir müşteriyi geri kazanma fırsatı var. Kim-Dirks\'in güven tamir çerçevesini uygula: Yetkinlik sorunu mu, iyi niyet sorunu mu?</p>\n<p>Senaryo 1: Teslimat Krizi — Yetkinlik Kaybı</p>\n<p>Durum: 3 yıllık FMCG bayisi rakibe geçti. Neden: 2 ardı ardına geciken teslimat. Bayi "güvenemiyorum artık" dedi. Rakip aynı fiyata zamanında teslimat vaadi verdi.</p>\n<p>Kim-Dirks analizi: Bu bir yetkinlik sorunu. Bayi satışçının iyi niyetinden şüphe duymuyor — operasyonel kapasiteden şüphe duyuyor. Tamir yolu: Somut kanıt. "Artık geciktirmeyeceğiz" sözü yetmez — müşteri sözden değil, eylemden ikna olur.</p>\n<p>Strateji: 3 ay bekle (bayi yeni tedarikçiyle çalışma sürecinde). Bu sürede lojistik altyapını düzelt. 3. ayda bayiye değer bazlı temas: "Lojistik sürecimizi yeniledik, şu somut iyileştirmeleri yaptık" + kanıt (diğer bayilerin teslimat verileri). Fiyat düşürme: Kesinlikle hayır — "ucuza razıyız" mesajı verir, yetkinlik algısını daha da düşürür.</p>\n<p>Zamanlama kritik: Bayi rakipten memnun değilse pencere açılır. Hasan\'ın distribütör ağında kayıp bayilerin yüzde 30\'u 6 ay içinde memnuniyetsizlik sinyali verdi — erken uyarı sistemi burada da geçerli.</p>\n<p>Senaryo 2: İhmal Hissi — İyi Niyet Kaybı</p>\n<p>Durum: 5 yıllık kurumsal eğitim müşterisi rakibe geçti. Neden: "Siz bize standart paket sunuyorsunuz, biz özel hissetmek istiyoruz." Teknik kalite iyi — ama müşteri "önemsenmiyorum" hissetti.</p>\n<p>Kim-Dirks analizi: Bu bir iyi niyet sorunu. Yetkinlik yerinde ama müşteri satışçının kendisini gerçekten önemsediğine inanmıyor. Tamir yolu: Sorumluluk al + somut farklılık göster. "Haklısınız, yeterince kişiselleştirmedik" itirafı önemli — ama arkasından somut plan gelmeli.</p>\n<p>Strateji: 2 ay sonra kişiselleştirilmiş temas: "Firmanızın son dönem stratejik planlarını inceledim, şu konularda özel bir program hazırladım — görmek ister misiniz?" Müşteriye iki şeyi birden göster: Onları tanıyorsun (ilgi) ve onlar için çalıştın (emek). Karşılıklılık ilkesi devreye girer ama zamanlamasız olursa manipülatif görünür.</p>\n<p>Senaryo 3: Fiyat Baskısı — Yapısal Kayıp</p>\n<p>Durum: SaaS müşterisi rakibe geçti. Neden: Rakip yüzde 30 ucuz. Müşteri "aynı işi daha ucuza yapıyorlar" dedi.</p>\n<p>Analiz: Fiyat kaynaklı kayıp en zor geri kazanma. Çünkü fiyat düşürmek değer algısını düşürür, düşürmemek müşteriyi geri getirmez. Ama gerçekten fiyat mı? Berna\'nın deneyimini hatırla: Müşteri "ucuz" diyor ama asıl sorun değer algısı — müşteri farkı görmüyordu. Rakip aynı işi yapıyorsa fark yok demek — o zaman fiyat tek kriter olur. Ama rakip farklı bir şey yapıyorsa ve sen farkını gösteremedin — sorun fiyat değil, konumlanma.</p>\n<p>Strateji: Önce kök neden analizi — gerçekten fiyat mı yoksa değer algısı mı? Müşteriye soramıyorsan (gitti zaten), benzer segmentteki diğer müşterilerden öğren. Fiyat gerçekten tek nedense: Geri kazanma zor — ama rakibin vaadi tutmadığında pencere açılır. Ucuz ürün genellikle ucuz servis getirir. 6 ay sonra kontrol: Müşteri memnun mu? Değilse, değer odaklı teklif sun — fiyat değil, değer farkını öne koy.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">FİYAT SAVAŞI KARAR AĞACI</div></div>\n<p>Rakip fiyat düşürdüğünde ne yaparsın? Bu karar ağacı seni sistematik düşünmeye zorluyor.</p>\n<p>Soru 1: Müşteri segmentinde fiyat tek kriter mi? Evet → Maliyet liderliği yapabiliyorsan fiyatla yarış. Yapamıyorsan bu segmentten çekil — kârsız satış uzun vadede sürdürülemez. Hayır → Soru 2\'ye geç.</p>\n<p>Soru 2: Müşteri farkını görüyor mu? Evet → Fiyatı değiştirme. Farkını somutlaştır: Vaka çalışması, ROI hesabı, referans. Müşteri farkı biliyorsa fiyat için değil, değer için ödüyor. Hayır → Soru 3\'e geç.</p>\n<p>Soru 3: Farkını gösterebilir misin? Evet → Konumlanma stratejisi: Berna\'nın öğrendiği gibi, feature war\'dan çık, müşterinin gerçek sorununa odaklan. Demo, pilot, deneme süresi gibi "dene ve gör" stratejileri işe yarar — Ariely\'nin IKEA etkisi. Hayır → Soru 4\'e geç.</p>\n<p>Soru 4: Gerçekten fark var mı? Evet ama gösteremiyorsun → İletişim ve sunum stratejini değiştir. Kısım 3 Bölüm 2\'deki sunum mimarisini yeniden kur — köprü formatı: "Bugünkü durum → bizim çözüm → yarınki sonuç." Hayır, gerçekten fark yok → Fark yarat. Kim-Mauborgne mavi okyanus stratejisi: Rakibin yapmadığı şeyi yap. Servis farklılaşması, müşteri deneyimi, hız, esneklik — fiyat dışı değer.</p>\n<p>Son test: Fiyat indirimi yaparsam ne olur? Marj kaybı kalıcı mı? (Thaler: Referans fiyat düştüğünde geri çıkmaz.) Tüm müşterilere mi yayılır? (Bir müşteriye indirim yapıp diğerine yapmamak bilgi sızarsa güven kırar.) Rakip de indirirse ne olur? (Fiyat savaşı spirali — kayıp-kayıp.)</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">4 HAFTALIK REKABET FİTNES PROGRAMI</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Rekabet Haritası Çıkarma</div></div>\n<p>En aktif 3 satışında rakibini tanımla — müşterinin gözünden. Her biri için: Rakip kim (firma, hiçbir şey yapmamak, iç kaynak)? Müşteri bizi ve rakibi nasıl konumlandırıyor? Karar kriterleri ne? Bu bilgiyi nereden edinebilirsin (müşteri görüşmesi, post-mortem, sektör istihbaratı)? Her rakip için tek sayfalık profil oluştur.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Konumlanma Testi</div></div>\n<p>Her aktif satışında şu testi yap: "Müşteriye rakipten bahsetmeden, kendi değerimi 2 cümlede anlatabilir miyim?" Yapabiliyorsan konumlanman net. Yapamıyorsan — 2 cümlelik değer önermesini yaz, test et, düzelt. Berna\'nın dönüm noktası buydu: 40 sayfayı 2 cümleye indirmek.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Win-Back Envanteri</div></div>\n<p>Son 12 ayda kaybettiğin müşterileri listele. Her biri için kayıp nedenini yaz (yetkinlik, iyi niyet, fiyat, yapısal). Hangisi geri kazanılabilir? Kim-Dirks tamir çerçevesini uygula. Geri kazanılabilir müşteriler için zamanlama planı yap: Ne zaman temas edilecek, hangi mesajla?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Fiyat Baskısı Hazırlığı</div></div>\n<p>En muhtemel fiyat baskısı senaryonu ne? Rakip indirim yaparsa ne yaparsın? Karar ağacını kendi sektörüne uyarla. Her soru için cevabını hazırla. Amaç: Fiyat baskısı geldiğinde panikle karar vermek yerine, hazır bir stratejin olsun.</p>\n<p>Kaynakça</p>\n<div class="ref-line">Anderson, E. &amp; Jap, S. (2005). The dark side of close relationships. MIT Sloan Management Review, 46(3), 75–82.</div>\n<h4 class="researcher">Cialdini, R. B. (2016). Pre-Suasion: A Revolutionary Way to Influence and Persuade. Random House.</h4>\n<div class="ref-line">Iyengar, S. S. &amp; Lepper, M. R. (2000). When choice is demotivating. JPSP, 79(6), 995–1006.</div>\n<div class="ref-line">Kim, W. C. &amp; Mauborgne, R. (2005). Blue Ocean Strategy. Harvard Business School Press.</div>\n<div class="ref-line">Porter, M. E. (1985). Competitive Advantage: Creating and Sustaining Superior Performance. Free Press.</div>\n<h4 class="researcher">Ries, A. &amp; Trout, J. (2001). Positioning: The Battle for Your Mind (20th ed.). McGraw-Hill.</h4>\n<div class="ref-line">Skowronski, J. J. et al. (1998). Spontaneous trait transference. JPSP, 74(4), 837–848.</div>\n<div class="ref-line">Thaler, R. H. (1999). Mental accounting matters. Journal of Behavioral Decision Making, 12(3), 183–206.</div>\n<div class="ref-line">Thorndike, E. L. (1920). A constant error in psychological ratings. Journal of Applied Psychology, 4, 25–29.</div>'},
'4-7':{b:'Bankacılık',d:'Nörofinans Atölyesi',c:5770,h:'<h4 class="section-title">BANKACILIK &amp; FİNANS</h4>\n<p>Bankacılık Atölyesi: Nörofinans, Portföy Simülasyonu, Tahsilat Diyalog Pratiği</p>\n<p>Ana bölümde bankacılığın üç katmanlı gerilimini, nörofinans kavramlarını, tahsilat psikolojisini ve dijital-şube dengesini gördün. Bu ek farklı: Burada nörofinansı derinleştirecek, portföy yönetimi simülasyonuna girecek, tahsilat diyalog atölyesi yapacak ve 4 haftalık finansal empati antrenmanına başlayacaksın.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">NÖROFİNANS — PARANIN BEYİNDEKİ HARİTASI</div></div>\n<p>Knutson ve Kuhnen\'in nörofinans çalışmasını ana bölümde kısa gördük. Şimdi derinleştirelim: Beyin finansal karar verirken 3 bölge arasında denge kuruyor. Nucleus accumbens: Ödül beklentisi — getiri vaadi bu bölgeyi aktive eder. Anterior insula: Kayıp korkusu — risk uyarısı bu bölgeyi aktive eder. Medial prefrontal cortex (mPFC): Değerlendirme ve karar — iki sinyali birleştirip sonuç çıkarır.</p>\n<p>Portföy yöneticisinin günlük işi bu 3 bölgeyi yönetmek: Müşteriye fırsat sunarken ödül merkezini aktive eder (heyecan), risk açıklarken insula\'yı aktive eder (korku), sonra ikisini dengeleyerek karar alanı açar (mPFC). Sorun: Çoğu portföy yöneticisi ya ödülü abartır (aşırı getiri vaadi) ya riski abartır (müşteriyi korkutur). Denge = güven.</p>\n<p>Pratik uygulama: Müşteriye yatırım sunarken 3 adım: Adım 1 — Fırsatı göster (ödül: nucleus accumbens). Adım 2 — Riski şeffaf açıkla (korku: insula). Adım 3 — Dengeyi göster: Bu fırsat şu riskle gelir, senin profiline uygun mu? (karar: mPFC). Bu 3 adım Sibel\'in etik çizgisiyle de uyumlu: Müşteriye gerçeği göster, kararı ona bırak.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">PORTFÖY SİMÜLASYONU — 3 MÜŞTERİ, 3 KARAR</div></div>\n<p>Sen portföy yöneticisisin. 3 müşteri seni bekliyor:</p>\n<p>Müşteri A: 55 yaşında emekli profesör, mevduatı yüksek, risk işt
