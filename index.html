pamadığımızda açıkça söyleriz" de.</p>\n<p>En etkili: B + C. Üst yönetimle müzakere — veriyle. "Piyasa yüzde 30 daraldı, hedefin yüzde 10 düşmesi yeterli değil, alternatif metrikler öneriyorum." Aynı zamanda ekiple şeffaf: "Hedef zorlayıcı. Birlikte strateji değiştirelim: Yeni müşteri yerine mevcut müşteri koruma. Küçük satışlar yerine değer paketleme." A seçeneği tükenme üretir — Maslach. D seçeneği gerçekçi ama pasif.</p>\n<p>Senaryo 3: Ekip İçi Kriz — Turnover Dalgası</p>\n<p>Durum: 2 hafta içinde 3 satışçı istifa etti. Kalan 5 kişi tedirgin. "Biz de mi gitsek" fısıltıları. Sen yöneticisin.</p>\n<p>A) Hiçbir şey söyleme — "normal iş" devam etsin.</p>\n<p>B) Toplu toplantı: "Gidenler gitti, biz devam ediyoruz."</p>\n<p>C) Her kalan satışçıyla birebir: "Sen nasılsın? Seni ne tutuyor, ne rahatsız ediyor?"</p>\n<p>D) Hemen yeni işe alım başlat, boşlukları doldur.</p>\n<p>En etkili: C → D. Önce birebir görüşmeler — her kişiye özel, samimi, dinleyerek. Kalanların endişelerini anla. Sonra yapısal müdahale: Neden ayrıldılar? Ortak neden varsa düzelt. Yeni işe alımı başlat — ama bu sefer B1\'deki yapılandırılmış mülakatla. A seçeneği felaket — sessizlik paniği büyütür. B seçeneği yüzeysel — "gidenler gitti" cümlesi kalanları küçümser.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">KRİZ İLETİŞİM ŞABLONU</div></div>\n<p>Her kriz iletişiminde 5 bileşen:</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Durum tespiti (ne biliyoruz). Olgu bazlı, spekülasyonsuz. "X müşteri rakibe geçti. Sebebi: Fiyat farkı ve servis gecikmesi."</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Duygu tanıma (nasıl hissediyoruz). "Bu haber zor. Endişelenmeniz normal." Empati, geçiştirme değil.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Plan (ne yapacağız). Somut, küçük adımlar. "Bu hafta: 1) Win-back planı hazırla. 2) Risk altındaki 5 müşteriyi tara. 3) Cuma günü durum değerlendirmesi."</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Destek (ne yapabilirim). "Bireysel endişeleriniz varsa kapım açık — gerçekten açık." Defne\'nin "bilmiyorum ama birlikte çözeceğiz" formülü.</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Zamanlama (ne zaman güncellenecek). "Cuma saat 14\'te durum değerlendirmesi. O zamana kadar bilgi gelirse hemen paylaşırım." Belirsizliğin en büyük düşmanı: Bir sonraki adımı bilmek.</span></div>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">KRİZ SONRASI TOPARLANMA PROTOKOLÜ</div></div>\n<p>Kriz geçtikten sonra çoğu yönetici "tamam, normale dönelim" der. Hata. Kriz sonrası retrospektif öğrenmenin en verimli anı — çünkü deneyim taze.</p>\n<p>Kriz sonrası 3 adım:</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Retrospektif toplantı (krizden 1 hafta sonra): "Ne oldu? Ne iyi gitti? Ne kötü gitti? Ne öğrendik?" Kolb döngüsünün yansıtma aşaması. Herkesi dinle — en sessiz kişi en değerli gözlemi yapabilir.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Sistem güncelleme: Krizin ortaya çıkardığı yapısal zayıflıkları düzelt. CRM eksikliği mi? Pipeline konsantrasyonu mu? İletişim kopukluğu mu? Her kriz bir sistem testi — test sonuçlarını kullan.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Dayanıklılık takibi: Krizden 30 gün sonra ekibi tara. Maslach sinyalleri var mı? Tükenmişlik başladı mı? Kriz bitti ama etkisi devam edebilir — özellikle uzun krizlerde (pandemi gibi).</span></div>\n<p>Kaynakça</p>\n<h4 class="researcher">Barsade, S. G. (2002). The ripple effect. ASQ, 47(4), 644–675.</h4>\n<div class="ref-line">Goleman, D. et al. (2002). Primal Leadership. HBR Press.</div>\n<div class="ref-line">Hatfield, E. et al. (1994). Emotional Contagion. Cambridge University Press.</div>\n<div class="ref-line">Heifetz, R. A. &amp; Linsky, M. (2002). Leadership on the Line. HBR Press.</div>\n<h4 class="researcher">Taleb, N. N. (2012). Antifragile. Random House.</h4>\n<h4 class="researcher">Weick, K. E. &amp; Sutcliffe, K. M. (2007). Managing the Unexpected. Jossey-Bass.</h4>'},
'5-7':{b:'Sistem',d:'CRM ve Kirkpatrick',c:5438,h:'<h4 class="section-title">SİSTEM</h4>\n<p>Sistem Mühendisliği: CRM Planı, Eğitim Tasarımı, AI Değerlendirme, Kirkpatrick Ölçümü</p>\n<p>Ana bölümde Tarık\'ın ayrılışıyla çöken bölgeyi, CRM kültür meselesini, pipeline yönetiminin sistem versiyonunu, eğitim-gelişim programı tasarımını ve AI çağında satış yönetimini gördün. Bu ek farklı: Burada CRM implementasyon planını adım adım oluşturacak, Kirkpatrick 4 seviye ölçüm aracını uygulayacak, AI araç değerlendirme matrisi yapacak ve kendi eğitim-gelişim döngüsünü tasarlayacaksın.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">CRM İMPLEMENTASYON PLANI — 6 ADIM</div></div>\n<p>CRM implementasyonu IT projesi değil, değişim projesi. Kotter\'ın 8 adımlı değişim modelinden uyarlanmış 6 adım:</p>\n<p>Adım 1: Aciliyet yaratma. Tarık hikayesini anlat. "Tarık gitti, bilgi gitti, bölge çöktü. CRM olsaydı çökmezdi." Soyut fayda değil, somut kayıp. Ekibin hissetmesi gereken: "Bu bize de olabilir."</p>\n<p>Adım 2: Şampiyon belirle. Ekipte CRM\'i seven — ya da en azından direnmeyeyen — 1-2 kişi. Onları "CRM şampiyonu" yap. Akran etkisi yönetici baskısından daha güçlü: "Ahmet kullanıyor, işine yarıyor" &gt; "müdür kullan diyor."</p>\n<p>Adım 3: Minimum anlamlı veri standardı. 3 bilgi kuralı: Her temastan sonra 1) Ne konuşuldu (2 cümle), 2) Müşteri duygu durumu, 3) Sonraki adım + tarih. Fazlası opsiyonel. Azı kabul edilemez. Bu standard herkesin yapabileceği düzeyde — ama anlamlı.</p>\n<p>Adım 4: Değer göster. CRM\'den ekibe geri dönen değer: "Bu müşteri 2 haftadır temasssız — hatırlat." "Pipeline\'da 3 fırsat 30+ gündür ilerleme yok — risk." "Geçen ay en etkili kanal: Referans — bu ay bunu artır." Satışçı CRM\'den değer aldığında direnç azalır.</p>\n<p>Adım 5: Tutarlı uygulama. Haftalık pipeline kontrolünde CRM verisini kullan — satışçı CRM dışı bilgi getirirse "CRM\'de göremiyorum" de. Nazik ama tutarlı. İstisna yapma — 1 istisna tüm sistemi bozar.</p>\n<p>Adım 6: Kutlama ve iterasyon. CRM sayesinde kurtarılan müşteriyi görünür kıl: "Ozan, CRM hatırlatması sayesinde bu müşteriye zamanında döndü — 50K TL korundu." Başarı hikayesi direnç kırar. Ve her çeyrekte sistemi gözden geçir: Hangi veri gereksiz, hangisi eksik?</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">KİRKPATRİCK 4 SEVİYE ÖLÇÜM ARACI</div></div>\n<p>Her eğitim programını 4 seviyede ölç:</p>\n<p>Seviye 1 — Tepki: Eğitimden hemen sonra anket. "Eğitim faydalıydı" (1-5), "Uygulanabilir" (1-5), "Eğitmen etkili" (1-5). Bu seviye minimum — ama tek başına yeterli değil. "Eğitim güzeldi" ≠ "davranış değişti."</p>\n<p>Seviye 2 — Öğrenme: Eğitimden 1 hafta sonra kısa test veya uygulama senaryosu. "Bu müşteri itiraz etti, ne yaparsın?" Bilgi girdi mi? Eğer girdiyse Seviye 3\'e geç. Girmediyse eğitim tasarımını sorgula.</p>\n<p>Seviye 3 — Davranış: Eğitimden 30-60 gün sonra saha gözlemi veya CRM veri analizi. Satışçılar öğrendiklerini uyguluyor mu? Değer bazlı takip artmış mı? Kapanış sorusu zamanlaması düzelmiş mi? Bu seviye en kritik — ve en zor. Koçluk seansları Seviye 3 verisinin ana kaynağı.</p>\n<p>Seviye 4 — Sonuç: 90 gün sonra iş metrikleri. Pipeline kalitesi arttı mı? Kapanış oranı değişti mi? Müşteri memnuniyeti yükseldi mi? Turnover düştü mü? Bu seviye eğitimin ROI\'sini gösterir — ama dikkat: Dış faktörler (piyasa, mevsim, rakip hamlesi) Seviye 4\'ü etkiler. İzolasyon zor. Bu yüzden Seviye 3 daha güvenilir veri sağlar.</p>\n<p>Pratik şablon: Her eğitim programı için 1 sayfa: Eğitim adı | Tarih | Seviye 1 skoru | Seviye 2 testi sonucu | Seviye 3 gözlemi (30 gün) | Seviye 4 metrik değişimi (90 gün). Bu sayfa zamanla eğitim portföyünün etki haritasını oluşturur.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">AI ARAÇ DEĞERLENDİRME MATRİSİ</div></div>\n<p>AI araçları satış dünyasına hızla giriyor. Her aracı 5 kriterde değerlendir (1-5):</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Somut fayda: Bu araç satışçının günlük işini kolaylaştırıyor mu? (Pipeline tahmini, müşteri segmentasyonu, temas zamanlaması...)</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Kullanım kolaylığı: Satışçı 1 günde öğrenebilir mi? (Davis\'in TAM modeli)</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Veri güvenliği: Müşteri verileri güvende mi? (Regülasyon uyumu, KVKK)</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Entegrasyon: Mevcut CRM ve araçlarla entegre mi?</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">İnsan desteği: AI sonuçlarını yorumlayacak insan kapasitesi var mı?</span></div>\n<p>Toplam 5-25. 20+: Hemen uygula. 13-19: Pilot başlat, sonuç gör. 5-12: Bekle veya alternatif ara.</p>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">kriter en çok ihmal edilen: AI aracı satın alırsın ama kimse yorumlayamaz. "AI şu müşterinin risk skoru yüksek diyor" — ne yapacaksın? Bu soru AI\'dan değil, satış becerisinden geliyor. K1-K4\'ün tüm araçları AI çağında da geçerli — AI veri verir, insan yorumlar.</span></div>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">EĞİTİM-GELİŞİM DÖNGÜSÜ TASARIMI</div></div>\n<p>Kendi ekibin için 12 aylık eğitim-gelişim döngüsü tasarla:</p>\n<p>Çeyrek 1: Temel beceriler. Ürün bilgisi güncelleme + CRM disiplini + pipeline yönetimi. Mikro öğrenme: Haftada 2 × 15 dakika LMS modülü.</p>\n<p>Çeyrek 2: İleri beceriler. İtiraz yönetimi + müzakere + koçluk alma becerisi. Sınıf eğitimi: Ayda 1 × 2 saat atölye + saha pratiği.</p>\n<p>Çeyrek 3: Sektörel derinlik. Rekabet analizi + kriz yönetimi + dijital satış. Akran öğrenmesi: Her hafta 1 satışçı saha dersi paylaşır.</p>\n<p>Çeyrek 4: Entegrasyon ve yansıtma. Yılın retrospektifi + kişisel gelişim planı + koçluk seansı yoğunlaştırma. Kolb döngüsü: Deneyim → yansıtma → kavramsallaştırma → uygulama.</p>\n<p>Her çeyreğin sonunda Kirkpatrick Seviye 1-2-3 ölçümü. Yıl sonunda Seviye 4 toplam etki değerlendirmesi.</p>\n<p>Kaynakça</p>\n<h4 class="researcher">Davis, F. D. (1989). Technology Acceptance Model. MIS Quarterly, 13(3), 319–340.</h4>\n<h4 class="researcher">Ebbinghaus, H. (1885). Über das Gedächtnis.</h4>\n<h4 class="researcher">Kirkpatrick, D. L. &amp; Kirkpatrick, J. D. (2006). Evaluating Training Programs. 3rd ed.</h4>\n<div class="ref-line">Kotter, J. P. (1996). Leading Change. HBR Press.</div>\n<h4 class="researcher">Phillips, J. J. (2003). Return on Investment. 2nd ed. Butterworth-Heinemann.</h4>'},
'5-8':{b:'Entegrasyon',d:'Liderlik Manifestosu',c:5633,h:'<h4 class="section-title">ENTEGRASYON</h4>\n<p>Liderlik Entegrasyonu: 48 Bölüm Kontrol Listesi, Skor Kartı, 12 Hafta Günlüğü</p>\n<p>Ana bölümde Defne ve Kerem\'in 6 aylık tam döngülerini, tüm karakterlerin liderlik perspektifinden son durumunu ve 90 günlük yönetici planını gördün. Bu ek farklı: Burada 48 bölümün tamamını tek bir kontrol listesinde toplayacak, kişisel liderlik skor kartı oluşturacak, 12 haftalık entegrasyon günlüğünü alacak ve Kolb\'un deneyimsel öğrenme döngüsüyle tüm kitabı kalıcı hale getireceksin.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">48 BÖLÜM KONTROL LİSTESİ — TEK SAYFADA TÜM KİTAP</div></div>\n<p>Her bölümden 1 temel kavram ve 1 uygulama sorusu. Yanına "Uyguladım" / "Biliyorum ama uygulamıyorum" / "Henüz öğrenmedim" işaretle.</p>\n<h4 class="section-title">KISIM 1 — İÇ OYUN:</h4>\n<p>B1 Kör nokta: Pronin biası — kendi biaslarımı görüyor muyum?</p>\n<p>B2 Korku: Eisenberger sosyal acı — reddedilme korkum ne düzeyde?</p>\n<p>B3 Beden: Arnsten PFC kapanımı — stres altında bedenimde ne değişir?</p>\n<p>B4 Motivasyon: Deci-Ryan özerklik-yetkinlik-bağlılık — motivasyon kaynağım ne?</p>\n<p>B5 Özyeterlilik: Bandura — "yapabilirim" inancım güçlü mü?</p>\n<p>B6 Çaresizlik: Seligman — "ne yaparsam yapayım" hissine kapılıyor muyum?</p>\n<p>B7 Karar: Baumeister karar yorgunluğu — günün sonunda kötü kararlar veriyor muyum?</p>\n<p>B8 Dayanıklılık: Maslach 6 faktör — tükenmişlik sinyallerimi tanıyor muyum?</p>\n<p>B9 Sabır: Mischel ertelenen tatmin — hemen sonuç isteme dürtümü kontrol edebiliyor muyum?</p>\n<p>B10 Etik: Sibel testi — müşterinin ihtiyacı yoksa satmıyor muyum?</p>\n<h4 class="section-title">KISIM 2 — MÜŞTERİYİ ANLAMAK:</h4>\n<p>B1 Beyin: Kahneman Sistem 1/2 — müşterinin hızlı vs yavaş kararını ayırt edebiliyor muyum?</p>\n<p>B2 Beden dili: Ekman mikro ifadeler — müşterinin söylemediğini okuyabiliyor muyum?</p>\n<p>B3 Güven: Mayer-Davis-Schoorman 3 bileşen — güven inşa stratejim var mı?</p>\n<p>B4 Motivasyon: Müşterinin satın alma motivasyonunu anlıyor muyum?</p>\n<p>B5 Kültür: Hofstede-Kağıtçıbaşı — kültürel kalibrasyon yapabiliyor muyum?</p>\n<p>B6 İhtiyaç: MI tekniği — dinleme vs söyleme oranım ne?</p>\n<p>B7 Karar: Webster-Wind karar birimleri — çoklu karar vericileri yönetebiliyor muyum?</p>\n<p>B8 Çerçeveleme: Thaler zihinsel muhasebe — sunumu nasıl çerçeveliyorum?</p>\n<p>B9 Sessizlik: Brehm reaktans — müşteriye alan bırakıyor muyum?</p>\n<p>B10 Yolculuk: Müşteri yolculuğunun her aşamasında doğru davranışı sergiliyor muyum?</p>\n<h4 class="section-title">KISIM 3 — İKNA MÜHENDİSLİĞİ:</h4>\n<p>B1-6 Cialdini ilkeleri + sunum + fiyat + itiraz + müzakere + kapanış — araç kutum dolu mu?</p>\n<p>B7 Hikaye: Satışta hikaye kullanabiliyor muyum?</p>\n<p>B8 Dijital: Online satış yetkinliğim var mı?</p>\n<p>B9 Etik çerçeve: İkna ile manipülasyon sınırını koruyabiliyor muyum?</p>\n<h4 class="section-title">KISIM 4 — SAHA STRATEJİLERİ:</h4>\n<p>B1 Prospecting: 3 filtre uyguluyor muyum?</p>\n<p>B2 Saha haritası: Kanallar arası geçiş yapabiliyor muyum?</p>\n<p>B3 Pipeline: 4 soru testiyle pipeline kalitesini kontrol ediyor muyum?</p>\n<p>B4 Takip: Değer bazlı mı, baskı bazlı mı takip ediyorum?</p>\n<p>B5 Key account: İlişki derinlik envanterimi güncelliyor muyum?</p>\n<p>B6 Rekabet: Rakipten bahsetmeme kuralını uygulayabiliyor muyum?</p>\n<p>B7-10 Bankacılık, kriz, dijital, entegrasyon — sektörel becerileri uyguluyor muyum?</p>\n<h4 class="section-title">KISIM 5 — SATIŞ LİDERLİĞİ:</h4>\n<p>B1 Seçim: Yapılandırılmış mülakat kullanıyor muyum?</p>\n<p>B2 Onboarding: 90 günlük yapılandırılmış program var mı?</p>\n<p>B3 Koçluk: Direktif-keşfettirici dengesini kurabilyor muyum?</p>\n<p>B4 Performans: Goodhart testini metriklerime uyguladım mı?</p>\n<p>B5 Kültür: Psikolojik güvenlik ölçümü yaptım mı?</p>\n<p>B6 Kriz: Kriz iletişim şablonum hazır mı?</p>\n<p>B7 Sistem: CRM + eğitim + AI sistemi kurulu mu?</p>\n<p>B8 Entegrasyon: 90 günlük planımı başlattım mı?</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">KİŞİSEL LİDERLİK SKOR KARTI</div></div>\n<p>5 boyutta kendini 1-10 arası puanla. Yılda 2 kez güncelle.</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Seçim ve Onboarding Kalitesi: İşe aldığım satışçıların 6 aylık tutma oranı ve performansı.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Koçluk Etkinliği: Ekibimin benden aldığı koçluktan memnuniyeti ve gelişim hızı.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Performans Sistemi Adaleti: Metriklerim doğru davranışı teşvik ediyor mu? Goodhart çalışmıyor mu?</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Kültür Sağlığı: Psikolojik güvenlik skoru, turnover oranı, ekip morali.</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Sistem Olgunluğu: Ben olmadan ekip çalışabilir mi? CRM veri kalitesi, eğitim döngüsü, süreç bağımsızlığı.</span></div>\n<p>Toplam 5-50. Bu skor mutlak değil — trendi izle. Her 6 ayda artış varsa doğru yöndesin. Düşüşe geçerse acil müdahale alanını belirle.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">12 HAFTALIK ENTEGRASYON GÜNLÜĞÜ</div></div>\n<p>Her hafta 3 soru cevapla. 5 dakika yeterli. Tutarlılık &gt; derinlik.</p>\n<p>Soru 1: Bu hafta hangi aracı uyguladım? (48 bölümden herhangi biri — prospecting filtresi mi, Gottman 5:1 mi, MI sorusu mu, CRM disiplini mi...)</p>\n<p>Soru 2: Nerede eski reflekse döndüm? (Stres altında PFC kapanımı, direktif koçluğa kaçış, Goodhart metriğe sığınma, "ben yaparım daha hızlı" dürtüsü...)</p>\n<p>Soru 3: Bir sonraki hafta neyi farklı deneyeceğim? (Kolb\'un aktif deneme aşaması — küçük, somut, ölçülebilir.)</p>\n<p>12 haftanın sonunda 36 cevabın oluşacak. Örüntüleri ara: En çok hangi araçları kullanıyorsun? Hangi alanlarda sürekli eski reflekse dönüyorsun? Hangi denemeler işe yaradı? Bu örüntü haritası kişisel gelişim planının hammaddesi.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">SON SÖZ YERİNE — BİR SORU</div></div>\n<p>Bu kitapta 48 bölüm, yüzlerce bilimsel referans, düzinelerce karakter ve onlarca sektörel vaka gördün. Her şeyi biliyorsun. Ama bilmek ile yapmak arasındaki uçurumu bu kitap kapatamaz — sen kapatacaksın.</p>\n<p>Sana son bir soru: Yarın sabah işe gittiğinde, bu kitaptan öğrendiğin tek bir şeyi uygulayacak olsan, ne olurdu?</p>\n<p>O tek şeyi yap. Küçük bir adım. Ama gerçek. Sonra bir sonraki haftanın sorusunu cevapla. Ve bir sonraki. İki ileri bir geri. Ama net yön ileri.</p>\n<p>Araçlar eline alındı. Ekibini inşa etme zamanı.</p>\n<p>Kaynakça</p>\n<h4 class="researcher">Kolb, D. A. (1984). Experiential Learning. Prentice-Hall.</h4>\n<h4 class="researcher">Moon, J. A. (2004). A Handbook of Reflective and Experiential Learning. RoutledgeFalmer.</h4>\n<h4 class="researcher">Schön, D. A. (1983). The Reflective Practitioner. Basic Books.</h4>'}};

<div style="width:8px;height:8px;border-radius:4px;background:${i.c};flex-shrink:0"></div>
<div><div style="font-size:14px;font-weight:600;color:var(--text)">${dd.d}</div>
<div style="font-size:12px;color:var(--muted);margin-top:2px">Kısım ${k}: ${i.t} · ${dd.b}</div></div></button>`;n++;}}
r.innerHTML=h?'<div class="sr-list">'+h+'</div>':'';
}

function renderKisim(a){
const k=CK,i=K[k];
let h=`<div style="padding:36px 0 80px" class="fi">
<button class="back-link" style="color:${i.c}" onclick="goHome()">← Tüm Kısımlar</button>
<div style="margin-bottom:36px"><div class="klbl" style="color:${i.c};margin-bottom:8px">KISIM ${k}</div>
<h2 style="font-family:'DM Serif Display',serif;font-size:clamp(28px,5vw,36px);color:var(--text);margin-bottom:10px;letter-spacing:-.02em">${i.t}</h2>
<p style="font-size:16px;color:var(--muted)">${i.s}</p></div>`;
for(let b=1;b<=i.n;b++){
const id=k+'-'+b,dd=D[id];if(!dd)continue;
const hasQuiz=!!QUIZZES[id];
h+=`<button class="bcard su" style="animation-delay:${(b-1)*.05}s;--kc:${i.c}" onclick="goDD('${id}')">
<div class="bnum" style="background:${i.c}">${b}</div>
<div style="flex:1"><div class="btit">Bölüm ${b}: ${dd.b}</div><div class="bdd">${dd.d}</div></div>
<div style="display:flex;align-items:center;gap:8px">
${hasQuiz?`<span class="ibadge" style="background:${i.c}12;color:${i.c}">🎯 İnteraktif</span>`:''}
<span class="badge">${Math.round(dd.c/1000)}K</span>
<span style="font-size:18px;color:var(--subtle)">→</span></div></button>`;}
a.innerHTML=h+'</div>';
}

function renderDD(a){
const id=CD,dd=D[id],k=id.split('-')[0],b=id.split('-')[1],i=K[k];
const pb=document.getElementById('pb');pb.style.background=i.c;pb.style.width='0%';
const up=()=>{const s=scrollY,d=document.documentElement.scrollHeight-innerHeight;pb.style.width=(d>0?(s/d)*100:0)+'%'};
window.onscroll=up;

const idx=BO.indexOf(id),prev=idx>0?BO[idx-1]:null,next=idx<BO.length-1?BO[idx+1]:null;
let nav='<div class="dd-nav">';
if(prev&&D[prev])nav+=`<button class="nav-btn" onclick="goDD('${prev}')"><div class="nav-lbl">← Önceki</div><div class="nav-tit">${D[prev].b}</div></button>`;
else nav+='<div></div>';
if(next&&D[next])nav+=`<button class="nav-btn" style="text-align:right" onclick="goDD('${next}')"><div class="nav-lbl">Sonraki →</div><div class="nav-tit">${D[next].b}</div></button>`;
else nav+='<div></div>';
nav+='</div>';

// Check for interactive quiz
let quizHtml='';
if(QUIZZES[id]){
quizHtml=`<div class="quiz-wrap" style="--kc:${i.c}" id="quizArea">
<div class="quiz-title">🎯 ${QUIZZES[id].title}</div>
<div class="quiz-intro">${QUIZZES[id].intro}</div>
<div id="quizBody"></div>
<button class="quiz-submit" id="quizBtn" disabled onclick="calcQuiz('${id}')">Sonuçları Gör</button>
<div id="quizResult"></div></div>`;
}

// Clean content: remove emdash separator paragraphs
let content = dd.h;
content = content.replace(/<p>\s*[—–-]{3,}\s*<\/p>/g, '');

a.innerHTML=`<div style="padding:36px 0 80px" class="fi"><div class="dc" style="--kc:${i.c}">
<button class="back-link" style="color:${i.c}" onclick="goKisim('${k}')">← Kısım ${k}: ${i.t}</button>
<div style="background:${i.c}08;color:${i.c};padding:14px 22px;border-radius:12px;margin-bottom:10px;font-size:12px;font-weight:700;letter-spacing:1.5px">DERİNE DAL — Kısım ${k} · Bölüm ${b}</div>
<h2 style="font-family:'DM Serif Display',serif;font-size:clamp(24px,5vw,32px);color:var(--text);margin:10px 0;letter-spacing:-.02em">${dd.d}</h2>
<div style="font-size:13px;color:var(--muted);margin-bottom:36px;display:flex;gap:16px;flex-wrap:wrap;align-items:center">
<span>${Math.round(dd.c/1000)}K karakter</span>
<span style="color:var(--border)">·</span>
<span>Bölüm: ${dd.b}</span>
${QUIZZES[id]?'<span style="color:var(--border)">·</span><span style="color:'+i.c+'">🎯 İnteraktif test mevcut</span>':''}
</div>
${quizHtml}
${content}
${nav}</div></div>`;

if(QUIZZES[id])initQuiz(id);
// Auto-linkify URLs (YouTube, TED, etc)
document.querySelectorAll('.dc p, .dc .hafta-desc, .dc .bilim-content').forEach(el=>{
el.innerHTML=el.innerHTML.replace(/(https?:\/\/[^\s<]+|(?:youtube\.com|ted\.com|youtu\.be)\/[^\s<]+)/g,(url)=>{
const full=url.startsWith('http')?url:'https://'+url;
return `<a href="${full}" target="_blank" rel="noopener" style="color:var(--kc);text-decoration:underline;text-underline-offset:2px;word-break:break-all">${url}</a>`;
});
});
}

function initQuiz(id){
const q=QUIZZES[id],body=document.getElementById('quizBody');
if(!body)return;
QA={};QR=null;let h='';
const kc=K[id.split('-')[0]].c;
let qIdx=0;
q.dims.forEach((dim,di)=>{
h+=`<div class="quiz-dim"><div class="quiz-dim-head">${dim.name}</div>
<div class="quiz-dim-desc">${dim.desc||''}</div>`;
const scale=dim.scale||5;
dim.qs.forEach((qt,qi)=>{
h+=`<div class="quiz-q"><div class="quiz-q-text">${qt}</div><div class="quiz-btns">`;
for(let v=1;v<=scale;v++){
h+=`<button class="quiz-btn" data-q="${qIdx}" data-v="${v}" onclick="setQA(${qIdx},${v},this)">${v}</button>`;
}
h+=`</div></div>`;qIdx++;
});
h+='</div>';
});
body.innerHTML=h;
window._totalQ=qIdx;
}

function setQA(qi,val,el){
QA[qi]=val;
el.parentElement.querySelectorAll('.quiz-btn').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
const btn=document.getElementById('quizBtn');
if(btn)btn.disabled=Object.keys(QA).length<window._totalQ;
}

function calcQuiz(id){
const q=QUIZZES[id],kc=K[id.split('-')[0]].c;
let results=[],qIdx=0;
q.dims.forEach(dim=>{
const scale=dim.scale||5;
let total=0,count=dim.qs.length;
dim.qs.forEach((qt,qi)=>{
let v=QA[qIdx]||0;
total+=v;qIdx++;
});
const avg=(total/count).toFixed(1);
const pct=(total/(count*scale))*100;
results.push({name:dim.name,avg,pct,total,max:count*scale,profiles:dim.profiles});
});

const overallPct=results.reduce((s,r)=>s+r.pct,0)/results.length;
const level=overallPct>=70?'high':overallPct>=40?'mid':'low';
const levelColor=overallPct>=70?'#27AE60':overallPct>=40?'#F39C12':'#E74C3C';
const levelLabel=overallPct>=70?'Güçlü Profil':overallPct>=40?'Gelişim Alanı Mevcut':'Öncelikli Çalışma Gerekli';
const levelIcon=overallPct>=70?'🏆':overallPct>=40?'📈':'🎯';
const levelDesc=overallPct>=70?'Çoğu alanda güçlü bir temelin var. İnce ayar yaparak mükemmelleştirebilirsin.':overallPct>=40?'Bazı alanlarda güçlüsün ama kritik gelişim noktaları var. En düşük puanlı boyuta odaklan.':'Birçok alanda sistematik çalışma gerekiyor. İyi haber: Farkındalık değişimin ilk adımı.';

let rh=`<div class="result-card" style="--rc:${levelColor};margin-top:24px;text-align:center">
<div style="font-size:52px;margin-bottom:12px">${levelIcon}</div>
<div class="result-label" style="color:${levelColor}">${levelLabel}</div>
<div class="result-title">Genel Skor: %${Math.round(overallPct)}</div>
<div style="font-size:15px;color:var(--body);line-height:1.8;margin-bottom:28px;text-align:left">${levelDesc}</div>
<div style="text-align:left">`;

results.forEach(r=>{
const dimColor=r.pct>=70?'#27AE60':r.pct>=40?'#F39C12':'#E74C3C';
rh+=`<div class="dim-result">
<div class="dim-result-head"><span class="dim-result-name">${r.name}</span>
<span class="dim-result-score" style="color:${dimColor}">${r.avg}/${r.max/r.total*r.avg>0?((r.max/(r.total/parseFloat(r.avg))).toFixed(0)):5}</span></div>
<div class="dim-bar"><div class="dim-fill" style="width:${r.pct}%;background:${kc}"></div></div>`;
if(r.profiles){
const p=r.pct>=70?r.profiles.high:r.pct>=40?r.profiles.mid:r.profiles.low;
if(p)rh+=`<div style="font-size:14px;color:var(--body);margin-top:8px;line-height:1.7">${p}</div>`;
}
rh+=`</div>`;
});

rh+=`</div><button style="margin-top:24px;padding:14px 32px;background:${kc};color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px color-mix(in srgb, ${kc} 25%, transparent);transition:all .25s" onmouseover="this.style.opacity='.9'" onmouseout="this.style.opacity='1'" onclick="QA={};QR=null;initQuiz('${id}');document.getElementById('quizResult').innerHTML='';document.getElementById('quizBtn').disabled=true">🔄 Testi Tekrarla</button></div>`;

document.getElementById('quizResult').innerHTML=rh;
document.getElementById('quizResult').scrollIntoView({behavior:'smooth',block:'start'});
}

handleHash();
render();

</script>
</body></html>
