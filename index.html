lganlığı göstermek zayıflık değil, bağlantı kurmanın tek yolu.</p>\n<div class="insight-box">💡 Satışçı için: Müşteriyle gerçek bağlantı kurmak mükemmel görünmek değil, insan olmmak gerektirir. Ve reddedilmekten korkmak o bağlantıyı engelliyor.</div>\n<p>Link: youtube.com/watch?v=iCvmsMzlF7o</p>\n<p>Guy Winch: Why We All Need to Practice Emotional First Aid</p>\n<p>TED Talk, 2014. 17 dakika. Winch klinik psikolog. Bu konuşmada duygusal yaralara neden fiziksel yaralar kadar önem vermediğimizi sorguluyor. Reddedilme bir duygusal yaradır — ve ilk yardım uygulamak (isimlendirme, 5:1 dengesi, rüminasyonu kırma) tıpkı fiziksel yarada pansuman yapmak gibi gerekli.</p>\n<p>Link: youtube.com/watch?v=F2hc2FLOdhI</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<div class="ref-line">Ayduk, O. &amp; Kross, E. (2010). From a distance: Implications of spontaneous self-distancing. JPSP, 98(5), 809-829.</div>\n<div class="ref-line">Baumeister, R. F. et al. (2001). Bad is stronger than good. Review of General Psychology, 5(4), 323-370.</div>\n<div class="ref-line">Beck, A. T. (1976). Cognitive Therapy and the Emotional Disorders. International Universities Press.</div>\n<h4 class="researcher">Gottman, J. M. (1994). What Predicts Divorce? Lawrence Erlbaum Associates.</h4>\n<h4 class="researcher">Kahneman, D. &amp; Tversky, A. (1979). Prospect Theory. Econometrica, 47(2), 263-291.</h4>\n<div class="ref-line">Kross, E. et al. (2014). Self-talk as a regulatory mechanism. JPSP, 106(2), 304-324.</div>\n<div class="ref-line">Lally, P. et al. (2010). How are habits formed: Modelling habit formation in the real world. European Journal of Social Psychology, 40(6), 998-1009.</div>\n<h4 class="researcher">Leary, M. R. &amp; Baumeister, R. F. (2000). The nature and function of self-esteem: Sociometer theory. AESP, 32, 1-62.</h4>\n<div class="ref-line">Nolen-Hoeksema, S. (1991). Responses to depression and their effects. Journal of Abnormal Psychology, 100(4), 569-582.</div>\n<p>Bu Derine Dal’ın sonuna geldin. 5 vakadam 5 farklı ders aldın. Otopsi şablonun hazır. 21 günlük antrenmanın başlamayı bekliyor. Hatırla: Her red bir yara ama her otopsi bir ders. Yarayı sarmazsan kanar. Otopsi yapmazsan aynı yarayı tekrar alrsın.</p>'},
'1-4':{b:'Motivasyon',d:'Yakıt Haritası',c:11107,h:'<h4 class="section-title">MOTİVASYON</h4>\n<p>Yakıt Haritası ve "Neden" Keşif Çalışması</p>\n<p>Bu Derine Dal’da ne test ne antrenman programı ne vaka otopsisi var. Bunun yerine yapılandırılmış bir keşif çalışması yapacaksın: Motivasyonunun yakıt haritasını çıkaracak, "neden" sorusunu derine kazacak ve haftalık bir ilerleme sistemi kuracaksın. Bu çalışma düşündeden daha uzun sürebilir — çünkü motivasyonun cevabı genellikle yüzeyde değil.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">MOTİVASYON BİLİMİNİN DERİN KATMANLARI</div></div>\n<p>Deci &amp; Ryan: Öz-Belirleme Teorisi’nin Tam Haritası</p>\n<p>Ana bölümde dışsal vs içsel ayrımını gördük. Ama Deci-Ryan bu kadar basit bırakmadı. Motivasyon bir spektrum — 5 kademe:</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Amotivasyon: Sıfır motivasyon. "Ne yaparsam yapayım fark etmez." Seligman’ın öğrenilmiş çaresizliğiyle kesişiyor. Satışçı bu kademede ise ciddi müdahale gerekiyor — belki rol değişikliği, belki profesyonel destek.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Dışsal regülasyon: "Patron kızar, yaparım." Tamamen dış baskı. En kırılgan kademe — baskı kalktığında motivasyon sıfırlanır.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">İçselleştirilmiş regülasyon: "Yapmazsam kendimden utanrrım." Dışsal kaynak ama içselleştirilmiş — suçluluk, utanma, "olması gerekiyor" hissi. Para değil ama hala dış kaynak. Türkiye’de yaygın: "Ealem ne der" motivasyonu.</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Tanımlanmış regülasyon: "Bu iş değerlerimle uyumlu, önemli görüyorum." Kişi hedefi benimsemiş — birileri emretmedi, kendisi önemli görüyor. Şule’nin "insanlara fayda" motivasyonu bu kademe.</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">İçsel motivasyon: "Bu işi yapmak başlı başına zevkli." En dayanıklı, en otonom, en performanslı. Ama en nadir — çünkü satışın her parçası zevkli değil. Raporlama, CRM güncellemee, bazı müşteriler — bunlar içsel motivasyonla yapılmaz.</span></div>\n<p>Gerçekçi hedef: 5. kademe değil, 4. kademe. Her şeyi severek yapmak mümkün değil. Ama yaptığın işi değerlerinle uyumlu görmek mümkün. Şule’nin dönüşümü 2. kademeden (prim) 4. kademeye (fayda + prim) geçişti. 5. kademeye değil.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<p>Deci, E. L. &amp; Ryan, R. M. (2000). The "what" and "why" of goal pursuits: Human needs and the self-determination of behavior. Psychological Inquiry, 11(4), 227-268. 5 kademeli motivasyon sürekliliği.</p>\n<h4 class="researcher">Pink: Drive — İş Dünyasına Çeviri (2009)</h4>\n<p>Daniel Pink, Deci-Ryan’ın akademik bulgularını iş dünyasına çevirdi. 3 element: Autonomy (kendi işini yönet), Mastery (gelişme hissi), Purpose (anlamlı bir hedef). Deci-Ryan’ın özerklik-yetkinlik-aidiyet üçlüsünün iş versiyonu.</p>\n<p>Pink’in en etkili argümanı: 20. yüzyılın "havuucc-sopa" motivasyonu (dışsal) 21. yüzyılda işe yaramıyor. Rutinn, tekrar eden işlerde dışsal motivasyon çalışır. Yaratıcı, karmaşık, problem çözme gerektiren işlerde içsel motivasyon gerekir. Satış hangisi? İkisi de — ama en önemli kısımlar (müşteri ilişkisi, çözüm geliştirme, itiraz yönetimi) karmaşık. Dışsal motivasyonla bunlar yapılmaz.</p>\n<h4 class="researcher">Dweck: Gelişim Zihniyeti (2006)</h4>\n<p>Carol Dweck, Stanford. İki zihniyet modeli: Sabit zihniyet ("yeteneğim doğuştan, değişmez") vs gelişim zihniyeti ("becerilerim çalışmayla gelişir"). Dweck’in verileri: Gelişim zihniyetine sahip insanlar başarısızlıktan daha hızlı topaarlanıyor, daha çok risk alıyor, daha uzun çalışıyor.</p>\n<p>Satışta: "Ben satışçı değilim" = sabit zihniyet. "Satış becerisi geliştirilebilir" = gelişim zihniyeti. Bu kitabın tamamı gelişim zihniyetiine dayalı: Korku yönetilebilir, özgüven inşa edilebilir, motivasyon keşfedilebilir. Eğer bunların değişmeyeceğine inanıyorsan, kitabı kapat — ama inanıyorsan devam et.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Pink, D. (2009). Drive: The Surprising Truth About What Motivates Us. Riverhead Books. + Dweck, C. S. (2006). Mindset: The New Psychology of Success. Random House.</div>\n<h4 class="researcher">Locke &amp; Latham: Hedef Belirleme Teorisi (1990)</h4>\n<p>Edwin Locke ve Gary Latham, 35 yıllık araştırmanın özeti: Spesifik ve zor hedefler, belirsiz hedeflerden yüzde 90 daha iyi performans üretiyor. "Elinden gelenin en iyisini yap" = en kötü hedef. "Bu hafta 5 yeni görüşme yap" = iyi hedef.</p>\n<p>Ama dikkat: Çok zor hedef motivasyonu artırır — ulaşılabilir göründüğü sürece. Ulaşılamaz göründüğü anda motivasyon çöker. "Bu ay 200K yap" motive edici olabilir — geçen ay 180K yaptıysan. Geçen ay 80K yaptıysan yıkıcı.</p>\n<p>Amabile + Locke birleşimi: Büyük hedefi koy (Locke) ama küçük adımlarla parralala (Amabile). 200K = haftalık 50K = günlük 10K = günde 3 görüşme. Her görüşme bitirildiğinde küçük kazanım, dopamin, devam.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<p>Locke, E. A. &amp; Latham, G. P. (1990). A Theory of Goal Setting and Task Performance. Prentice Hall. 35 yıllık meta-analiz. Spesifik + zor = %90 daha iyi.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">YAKIT HARİTAN</div></div>\n<p>Bu çalışma seni motivasyonunun derinliğine götürecek. Kağıt kalem al, düşün, yaz. Hızlı yapma — bazı soruların cevabı günler sürebilir.</p>\n<p>Bölüm A: Yakıt Türün Ne?</p>\n<div class="score-range">Aşağıdaki cümlelere 1-10 puan ver (1 = hiç değil, 10 = tam öyle):</div>\n<div class="fill-blank">"Bu işi prim almak için yapıyorum." ____</div>\n<div class="fill-blank">"Bu işi terfi etmek için yapıyorum." ____</div>\n<div class="fill-blank">"Bu işi yapmzsam kendimden utanrım / elalem ne der." ____</div>\n<div class="fill-blank">"Bu işi önemli buluyorum, değerlerimle uyumlu." ____</div>\n<div class="fill-blank">"Bu işi yapmak bana zevk veriyor." ____</div>\n<div class="fill-blank">İlk 3 cümle dışsal yakıt. Son 2 cümle içsel yakıt. Toplamları karşılaştır. Dışsal toplam ____ / 30. İçsel toplam ____ / 20. Eğer dışsal &gt;&gt; içsel: Yakıtın başkalarının elinde. Kesilebilir. Eğer içsel &gt;= dışsal: Sağlıklı denge. Kendi yakıtın var.</div>\n<p>Bölüm B: 3 Bacak Teşhisi</p>\n<div class="score-range">Deci-Ryan’ın 3 temel ihtiyacına 1-10 puan:</div>\n<div class="fill-blank">Özerklik: "Kendi günümü, stratejimi, müşteri seçimimi yönetiiyorum." ____</div>\n<div class="fill-blank">Yetkinlik: "Gelişiğimi hissediyorum, zorlanıyorum ama başarıyorum." ____</div>\n<div class="fill-blank">Aidiyet: "Bir ekibin parçasıyım, yalnız değilim." ____</div>\n<p>En düşük bacak = öncelikli müdahale alanın.</p>\n<p>Özerklik düşükse: Patronla konuş — "nasıl" kısmını bana bırak, "ne" kısmını sen belirle. Eğer patronun dinlemiyorsa: Kontrolündeki küçük özerklikleri bul — günün ilk 1 saatini kendi planladığın şekilde geçir.</p>\n<p>Yetkinlik düşükse: Ya çok kolay ya çok zor. Kolay = sıkıcı (benim eğitim hikayem). Zor = yıldırcı (yeni satışçı, uulaşılamaz hedef). Koalaysa: Kendine zor görev ver. Zorsa: Hedefi parçala.</p>\n<p>Aidiyet düşükse: Yalnız kurt değilsin, yalnız bırakılmış kurt olabilirsin. Bu hafta 1 meslektaşla kahve iç. 1 mentorla konuş. 1 ekip toplantısına katıl. Küçük adım, büyük etki.</p>\n<p>Bölüm C: "Neden" Keşif Çalışması</p>\n<p>Bu çalışma hızlı yapılmaz. Belki 1 oturmda cevap gelir, belki 1 haftada. Aceele etme.</p>\n<p>Soru 1: Bu işe neden başladın? İlk günü hatırla. Ne hissediyordun? Ne umuyordun? (Para cevabı yeterli değil — paranın ARKASIINDA ne var? Özgürlük? Ailene iyi bakmak? Kendini kanıtlamak? Bir hayali finanse etmek?)</p>\n<p>Soru 2: En iyi günü hatırla. Satışta yaşadığın en iyi gün hangisiydi? Ne olmuştu? Ne hisseetmiştin? O günü iyi yapan ne? Para mı? Başarı mı? Müşterinin yüzü mü? Ekibin tepkisi mi?</p>\n<p>Soru 3: Bırakmak istediğin anı hatırla. Ne olmuştu? Neden bırakmak istedin? Ve neden bırakmadın? Seni tutan ne? ("Başka iş bulamam" da bir cevap — dürüstlük şart.)</p>\n<p>Soru 4: Para’yı çıkar. Hayal et: Paran hiç sorun değil, istediğin kadar var. Bu işi yapar mıydın? Eğer evet: İçsel yakıtın var, şu an dışsalın altında gömülü. Eğer hayır: İçsel yakıt bu işte yok. Bu önemli bilgi — yargılama, sadece gör.</p>\n<div class="fill-blank">Soru 5: Cümleyi tamamla. "Ben bu işi yapıyorum çünkü ______." Paranın ötesinde. Eğer tamamlayamıyorsan: Normal. Ama aramaya devam et. Çünkü bu cümle Frankl’ın yakıtı — ve yakıtsız motor çalışmaz.</div>\n<h4 class="section-title">EĞER CEVAP "BİLMİYORUM" ISE</h4>\n<p>Bu da veri. "Bilmiyorum" demek "yokum" demek değil, "henüz bulmadım" demek. Şule 3 hafta aradı. Bazıları ayıları buluyor. Ve bazıları burada Hakan’ın cevabını buluyor: "Bu iş benim işim değil." Bu da değerli bir cevap.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">HAFTALIK İLERLEME SİSTEMİ</div></div>\n<p>Amabile’in 12.000 kaydı gösteriyor: Küçük ilerleme, büyük hedeften daha güçlü motive ediyor. Bu sistem o bulguyu uygulamaya döküyor.</p>\n<p>Her Pazartesi Sabahı (5 dakika):</p>\n<p>Bu hafta 3 şey başaracağım:</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">____ (spesifik, ölçülebilir, bu haftaya ait)</span></div>\n<div class="fill-blank">2. ____</div>\n<div class="fill-blank">3. ____</div>\n<p>Locke-Latham kuralı: "Elimden gelenin en iyisi" değil, somut hedef. "5 yeni görüşme yapacagım" iyi. "Daha çok arayacağım" kötü.</p>\n<p>Her Cuma Akşamı (10 dakika):</p>\n<p>Bu hafta ne başardım?</p>\n<div class="fill-blank">3 hedeften kaçını tuttum? ____/3</div>\n<div class="fill-blank">Beklenmediğk 1 olumlu şey ne oldu? ____</div>\n<div class="fill-blank">Bu haftanın en zor anı neydi? ____</div>\n<div class="fill-blank">Motivasyonum 1-10: Pazartesi ____ vs Cuma ____</div>\n<p>4 hafta üsst üste yap. 4. haftanın sonunda 4 cuma’nın kaydını oku: Trend göreceksin. Motivasyon yükseliyor mu, düşüyor mu, stabil mi? Hangi haftalarda yüksek, hangi haftalarda düşük? Düşük haftalarda ne oldu? Bu kalıp senin motivasyon DNA’n.</p>\n<h4 class="section-title">NEDEN CUMA AKSKAMII?</h4>\n<p>Hafta sonu girmeden önce kapanış yapmak Zeigarnik etkisini azaltıyor: Tamamlanmamış işler beyinde açık kalr ve enerji çeker. Cuma kaydı haftayı "kapatıyor" — hafta sonu gerçekten dinlenebilirsin.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">İZLEMEYE DEĞER</div></div>\n<p>Dan Pink: The Puzzle of Motivation</p>\n<p>TED Talk, 2009. 18 dakika. Pink Deci-Ryan’ın bulgularını iş dünyasında nasıl uygulayyacağını anlatıyor. "Mum problemi" deneyi: Dışsal ödül yaratıcı problem çözmeyi YAVALSLATIYOR. Satışta yaratıcı çözüm gerektiren durumlar için kritik.</p>\n<p>Link: youtube.com/watch?v=rrkrvAUbU9Y</p>\n<p>Carol Dweck: The Power of Believing You Can Improve</p>\n<p>TED Talk, 2014. 10 dakika. Dweck gelişim zihniyetini çok kısa ve etkili anlatıyor. "Not yet" (henüz değil) kavrramı — "başarısız oldum" yerine "henüz başaramadım" çerçevesi. Satışçı için güçlü bir perspektif değişikliği.</p>\n<p>Link: youtube.com/watch?v=_X0mgOOSpLU</p>\n<p>Daha Fazla İçin</p>\n<p>Motivasyon, şans, öğrenme kabiliyeti ve güven arasındaki bağlantıyı Şerif Kaynar’ın TEDx konuşmasından daha iyi özetleyen bir kaynak zor bulursun. Kaynar, Korn Ferry Türkiye Yönetim Kurulu Onursal Başkanı, Türkiye’nin en bilinen yönetici avcılarından biri. Turkcell ve Vodafone gibi şirketlere CEO atamaları yapmış, yani “doğru insanı bulmak” onun mesleği. “Başarının 12 Sihirli Anahtarı” konuşmasında sıfırdan başlayabilmek, şans füzelerini yakalayabilmek, öğrenme kabiliyeti gibi başlıkları işliyor ve hepsini tek kelimeyle özetliyor: Güven. Bu bölümde gördüğün “neden” sorusu, Kaynar’ın 12 anahtarıyla birleşince çok daha güçlü bir çerçeve oluşturuyor.</p>\n<p>TEDx: Şerif Kaynar, “Başarının 12 Sihirli Anahtarı”, TEDxBahcesehirUniversity (YouTube’da mevcut)</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<div class="ref-line">Amabile, T. M. &amp; Kramer, S. J. (2011). The Progress Principle. Harvard Business Review Press.</div>\n<div class="ref-line">Berridge, K. C. &amp; Robinson, T. E. (1998). What is the role of dopamine in reward? Brain Research Reviews, 28(3), 309-369.</div>\n<div class="ref-line">Csikszentmihalyi, M. (1990). Flow: The Psychology of Optimal Experience. Harper &amp; Row.</div>\n<div class="ref-line">Deci, E. L. (1971). Effects of externally mediated rewards on intrinsic motivation. JPSP, 18(1), 105-115.</div>\n<h4 class="researcher">Deci, E. L. &amp; Ryan, R. M. (2000). The "what" and "why" of goal pursuits. Psychological Inquiry, 11(4), 227-268.</h4>\n<div class="ref-line">Dweck, C. S. (2006). Mindset: The New Psychology of Success. Random House.</div>\n<p>Frankl, V. E. (1946/1984). Man’s Search for Meaning. Beacon Press.</p>\n<h4 class="researcher">Locke, E. A. &amp; Latham, G. P. (1990). A Theory of Goal Setting and Task Performance. Prentice Hall.</h4>\n<h4 class="researcher">Pink, D. (2009). Drive: The Surprising Truth About What Motivates Us. Riverhead Books.</h4>\n<p>Bu Derine Dal’ın sonuna geldin. Yakıt haritanı çıkardın, 3 bacağı teşhis ettin, "neden" sorusunu kazdın, haftalık sistemi kurdun. Şimdi bir şey kaldı: Başlamak. Pazartesi sabahı, 3 hedef yaz. Ve başla.</p>'},
'1-5':{b:'Özgüven',d:'Özyeterlilik Haritası',c:8574,h:'<h4 class="section-title">ÖZGÜVEN</h4>\n<p>Özyeterlilik Haritası ve Hazırlık Sistemi</p>\n<p>Bu Derine Dal’da Bandura’nın özyeterlilik ölçeğini satışa uyarlayacak, hangi alanlarda güçlü hangi alanlarda zayıf olduğunu görecek, Can’ın hazırlık sisteminin tam versiyonunu alacak ve 4 haftalık bir duruş-ses-hazırlık programına başlayacaksın.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">ÖZYETERLİLİK BİLİMİ</div></div>\n<p>Bandura: Özyeterlilik Nasıl Ölçülür?</p>\n<p>Bandura’nın orijinal ölçeği 3 boyutta ölçüyor: (1) Büyüklük (magnitude) — ne kadar zor görevleri başarabileceğine inanıyorsun? (2) Genellik (generality) — bu inanç ne kadar geniş alana yayılıyor? (3) Güç (strength) — bu inanç ne kadar sağlam?</p>\n<p>Satış için çevirirsek: Soğuk arama yapabileceğine inanıyor musun (magnitude)? Bu inanç tüm müşteri tiplerine mi yoksa sadece küçük firmalara mı geçerli (generality)? Ve zor bir günde bu inanç ayakta kalıyor mu yoksa ilk redde yıkılıyor mu (strength)?</p>\n<h4 class="researcher">Stajkovic &amp; Luthans: Özyeterlilik ve Performans (1998)</h4>\n<p>Meta-analiz: 114 çalışma, 21.616 katılımcı. Sonuç: Özyeterlilik ile iş performansı arasında 0.38 korelasyon. Bu sosyal bilimlerde güçlü bir etki büyüklüğü. Karşılaştırma: Hedef belirlemenin performansa etkisi 0.28, geribildirimin etkisi 0.26. Özyeterlilik ikisinden de güçlü.</p>\n<p>Yani: Özyeterlilik artırırsan, teknik bir şey değiştirmeden performans artar. Bu Can-Tolga farkının bilimsel kanıtı. Aynı teknik, farklı özyeterlilik, farklı sonuç.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Stajkovic, A. D. &amp; Luthans, F. (1998). Self-efficacy and work-related performance: A meta-analysis. Psychological Bulletin, 124(2), 240-261. 114 çalışma, r=.38.</div>\n<p>Dweck + Bandura: Gelişim Zihniyeti ve Özyeterlilik</p>\n<p>Carol Dweck’in gelişim zihniyeti (growth mindset) Bandura’nın özyeterliliğiyle birleşiyor: Eğer yeteneğin geliştirilebileceğine inanıyorsan (Dweck), başarı deneyimleri özyeterliliği artırır (Bandura). Eğer yeteneğin sabit olduğuna inanıyorsan, başarı bile özyeterliliği artırmaz — "bu sefer şanslıydım" dersin.</p>\n<p>Bu kombinasyon satışta kritik: "Ben soğuk arama yapamam" = sabit zihniyet + düşük özyeterlilik. "Soğuk arama becerisini geliştirebilirim" = gelişim zihniyeti + özyeterliliğe açık kapı.</p>\n<p>Seligman: Açıklama Tarzı ve Özyeterlilik</p>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">bölümün DD’sında Seligman’ın pessimist-optimist açıklama tarzını gördük. Özyeterlilikle bağlantısı: Pessimist açıklama tarzı ("şey kalıcı, yaygın, kişisel") özyeterliliği yiyor. Her başarısızlık "ben böyleyim" oluyor. Optimist açıklama ("geçici, sınırlı, durumsal") özyeterliliği koruyor: "Bu sefer olmadı, bir sonrakinde farklı yapacağım."</span></div>\n<p>Tolga pessimist açıklama tarzındaydı: Başarısızlıkları büyütüyor, başarıları küçültüyordu. Her red tuğla yiiyordu, her başarı "zaten kolay müşteriydi" oluyordu. Sonuç: Özyeterlilik sürekli erime halinde.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">SATIŞ ÖZYETERLİLİK HARİTAN</div></div>\n<div class="score-range">Bu harita Bandura’nın 3 boyutunu (büyüklük, genellik, güç) satışın 8 temel alanına uyguluyor. Her alana 1-10 puan ver: 1 = hiç güvenmiyorum, 10 = tam güveniyorum.</div>\n<p>Sütun 1 = Büyüklük (yapabilir misin?). Sütun 2 = Genellik (her durumda mı yoksa sadece kolay durumda mı?). Sütun 3 = Güç (zor günde de ayakta kalıyor mu?). 3. sütun en önemli — gerçek özyeterlilik zor günde görünür.</p>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">sütunda 5 altı olan alanlar = senin gerçek gelişim alanların. 1. ve 2. sütunda yüksek ama 3.’de düşük = "iyi günde iiyiyim ama krizde çökerim" profili. Bu Arnsten’in PFC kapanması — stres altında özyeterlilik buharlaşıyor. Bu alanlara özellikle hazırlık + nefes + kademeli maruz bırakma lazım.</span></div>\n<p>TOLGA vs CAN BU TABLODA</p>\n<p>Tolga’nın tablosu: 1. sütun 5-6 (orta), 2. sütun 3-4 (sadece kolay durumda), 3. sütun 2-3 (zor günde çöküş). Can’ın tablosu: 1. sütun 7-8, 2. sütun 6-7, 3. sütun 5-6 (zor günde bile ayakta). Fark: Can’ın 3. sütunu yüksek çünkü hazırlık sistemi var — zor günde bile hazırlıklı giriyor.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">HAZIRLIK SİSTEMİ</div></div>\n<p>Can’ın koçluktan aldığı ve 2 yıldır kullandığı sistem. 3 katmanlı: Görüşme öncesi, görüşme sırası, görüşme sonrası.</p>\n<p>Görüşmeden 1 Gün Önce (30-60 dk):</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Müşteriyi araştır: LinkedIn profili, şirket web sitesi, son haberler, sektörel gelişmeler. "Bu insan ne yaşıyor" sorusuna cevap bul.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Önceki notları oku: Daha önce görüştüysen ne konuşmuştunuz? Ne söz vermiştin? Müşteri ne istemişti?</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Hedef belirle: Bu görüşmeden ne çıkmasını istiyorsun? "Satış yapmak" değil, somut: "2. toplantı randevusu almak" veya "ihtiyaç haritasını çıkarmak" veya "fiyat sunumu yapmak."</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">3 itiraz + 3 cevap yaz: Bu müşteri muhtemelen ne diyecek? "Pahalı", "düşüneceğim", "rakip daha ucuz" — her birine hazırlıklı cevabın olsun.</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Açılış ve kapanış cümleni yaz: İlk 30 saniye ve son 30 saniye en kritik. Hazırla.</span></div>\n<p>Görüşmeden 10 Dakika Önce:</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Beden taraması (30 sn): Omuzlar, mide, nefes, eller — ne hissediyorsun?</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Nefes (30 sn): 4 sn al, 6 sn ver, 3 tekrar.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">İsimlendirme (30 sn): "Şu an ___ hissediyorum." Lieberman.</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Supron aktivasyonu (30 sn): "Bu görüşmede amacım ___. Ben hazırm."</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Fiyat cümlesini 3 kez sesli söyle (2 dk): Göz teması (aynayla veya duvara), ses düşmesin.</span></div>\n<p>Görüşme Sonrası (5 dk):</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Ne iyi gitti? (1 şey)</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Ne kötü gitti? (1 şey)</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Bir sonrakinde ne farklı yapacağım? (1 şey)</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Özyeterlilik skorum bu görüşmede kaçtı? (1-10)</span></div>\n<p>Bu 3 katmanlı sistem hazırlığı rutin haline getirir. İlk hafta 2 saat sürer. 4. haftada 45 dakikaya düşer — çünkü beyin sistemi öğrendi. Can bunu 2 yıldır yapıyor ve artık otomatik. Tolga hiç yapmadı. Fark bu.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">4 HAFTALIK DURUŞ VE SES ANTRENMANI</div></div>\n<p>Her gün 5 dakika. Aynanın karşısında. Basit ama tutarlılık şart.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Duruş Farkındalığı</div></div>\n<p>Her sabah 2 dakika aynanın karşısında dur. Omuzlar geri, göğüs açık, baş dük, eller yanda veya arkada. Bu duruşu 2 dakika koru. Rahatsız gelecek — çünkü beden alışk değil. Normal.</p>\n<p>Sonra 3 dakika: Fiyat cümleni 5 kez söyle. Her seferinde aynaya göz teması. Ses tonunu düşürme, savunma cümlesi ekleme.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Ses Kontrolu</div></div>\n<p>Bir sunumunu kaydet (telefon yeterli). Sessiz izle: Duruşun nasıl? Sonra sesli dinle: Ses tonun ne zaman değişiyor? Fiyat anında, itiraz anında, kapanışta?</p>\n<p>Fark ettiğin zayıf noktayı aynanın karşısında 5 kez tekrar et. Fiyat anında ses düşüyorsa: O cümleyi 10 kez, her seferinde aynı tonda söyle. Beyin tekrarla yeni normali öğreniyor.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Canlı Uygulama</div></div>\n<p>Bu hafta her görüşmede bilinçli duruş: Girişte omuzlar açık, tokalaşma güçlü, göz teması 3 saniye. Fiyat anında ses kontrolu. Görüşme sonrası not: "Duruşum nasıldı? Ses tonum değişti mi?"</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Ölçüm</div></div>\n<p>Özyeterlilik haritans tekrar doldur. 3. sütun (zor gün) değişti mi? Ses kaydını tekrar dinle: Fiyat anında ses hala düşüyor mu? Yöneticiden veya güvendiğin meslektaştan geribildirim iste: "Sunum tarzımda bir değişiklik fark ettin mi?"</p>\n<div class="mod-header"><div class="mod-num">5</div><div class="mod-title">İZLEMEYE DEĞER</div></div>\n<p>Amy Cuddy: Your Body Language May Shape Who You Are</p>\n<p>TED Talk, 2012. 21 dakika. Cuddy’nin power pose çalışması tartışmalı — hormonal bulgular replike edilemedi (Ranehill, 2015). AMA: Cuddy’nin 2018 meta-analizi gösteriyor ki açık duruş subjektif güç hissini ve risk alma eğilmini artırıyor. Hormonal mekanizma olmasa bile davranışsal etki var. Bu videoda Cuddy kendi özgüvensizlik hikayesini de anlatıyor — "fake it till you become it" mesajı güçlü.</p>\n<p>Link: youtube.com/watch?v=Ks-_Mh1QhMc</p>\n<p>Angela Duckworth: Grit — The Power of Passion and Perseverance</p>\n<p>TED Talk, 2013. 6 dakika. Kısa ama etkili. Duckworth öğretmenlik yaparken fark etti: En başarılı öğrenciler en yetenekli değil, en ısrarcı olanlar. "Grit" = tutku + sebır. Bandura’nın 1. kaynağıyla (mastery) bağlantılı: Tekrar tekrar deneyerek başarı deneyimi biriktirmek.</p>\n<p>Link: youtube.com/watch?v=H14bBuluwB8</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<div class="ref-line">Bandura, A. (1977). Self-efficacy: Toward a unifying theory of behavioral change. Psychological Review, 84(2), 191-215.</div>\n<h4 class="researcher">Bandura, A. (1997). Self-Efficacy: The Exercise of Control. W. H. Freeman.</h4>\n<div class="ref-line">Carney, D. R., Cuddy, A. J. C., &amp; Yap, A. J. (2010). Power posing. Psychological Science, 21(10), 1363-1368.</div>\n<h4 class="researcher">Duckworth, A. (2016). Grit: The Power of Passion and Perseverance. Scribner.</h4>\n<div class="ref-line">Dweck, C. S. (2006). Mindset: The New Psychology of Success. Random House.</div>\n<div class="ref-line">Ranehill, E. et al. (2015). Assessing the robustness of power posing. Psychological Science, 26(5), 653-656.</div>\n<h4 class="researcher">Seligman, M. E. P. (1990). Learned Optimism. Knopf.</h4>\n<div class="ref-line">Stajkovic, A. D. &amp; Luthans, F. (1998). Self-efficacy and work-related performance: A meta-analysis. Psychological Bulletin, 124(2), 240-261.</div>\n<div class="ref-line">Todorov, A. &amp; Willis, J. (2006). First impressions. Psychological Science, 17(7), 592-598.</div>\n<p>Bu Derine Dal’ın sonuna geldin. Özyeterlilik haritanı çıkardın, hazırlık sistemini aldın, 4 haftalık antrenmanın hazır. Artık "kendine güven" deme, "hazırlan" de. Ve hazırlan.</p>'},
'1-6':{b:'Zihin',d:'Yeniden Çerçeveleme',c:9400,h:'<p>ZİHİN</p>\n<p>Otomatik Düşünce Sözlüğü ve Yeniden Çerçeveleme Atlyesi</p>\n<p>Bu Derine Dal’da bir atölye yapacağız: Kendi otomatik düşünce sözlüğünü çıkaracak, her düşünceye Beck’in tekniğiyle müdahale edecek ve Seligman’ın açıklama tarzını kendi üzerinde test edeceksin. Test yok, antrenman programı yok — bunun yerine senaryo bazlı pratik var. Her senaryo bir saha durumu, her birinde farklı müdahale.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">DERİN BİLİM</div></div>\n<p>Beck’in 15 Bilişsel Çarpıtmasından Satışçıya Özel 8’i</p>\n<p>Ana bölümde 4 tanesini gördük. Beck aslında 15+ çarpıtma tanımladı. Satışta en sık karşılaştığım 8 tanesi:</p>\n<p>Bu tablo senin referans kartnn. Her otomatik düşünce yakaladığında tabloya bak: Hangisi? İsim koymak Lieberman etkisi — etiketlemek amigdalayı yavaşlatır.</p>\n<h4 class="researcher">Ellis: REBT ve "Şmalıcı" Düşünceler (1957)</h4>\n<p>Albert Ellis, Beck’ten önce benzer bir şey keşfetti: Rasyonel Duygusal Davranış Terapisi (REBT). Ellis’in farkı: "Şmalıcı" (must) düşüncelere odaklandı. "Başarmalıyım", "herkes beni beğenmeli", "işler istediğim gibi gitmeli" — bunlar mutlak beklentiler ve gerçek dünyayla çatışıyor.</p>\n<p>Satışta: "Her görüşme başarılı olmalı" = şemalıcı düşünce. Gerçek: Yüzde 30-40 kapanış oranı iyi sayılır. "Olmalı" ile "olsa iyi olur" arasındaki fark devasa — birincisi felce, ikincisi esnekliğe götürür.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Ellis, A. (1957). Rational psychotherapy and individual psychology. Journal of Individual Psychology, 13, 38-44. + Beck, A. T. (1976). Cognitive Therapy. IUP. Ellis "şemalıcı" düşüncelere, Beck "otomatik düşünce"ye odaklandı. Farklı giriş noktaları, benzer müdahale: Düşünceyi sorgula, değiştir.</div>\n<h4 class="researcher">Nolen-Hoeksema: Rüminasyonun Bedeli (1991)</h4>\n<p>Reddedilme DD’sında kısaca gördük. Burada derinleştiriyoruz: Susan Nolen-Hoeksema’nın bulgusu: Rüminasyon (aynı şeyi döndürüp durma) depresif duyguyu uzatır, problem çözme kapasitesini düşürür ve motivasyonu yok eder. Dikkat dağıtma veya yeniden çerçeveleme rüminasyonnu kırar.</p>\n<p>Satışta rüminasyon: Akşam yatağında bugünkü reddi düşünmek, "ne yanlış yaptım" sorusunu döndürp durmak, yarınki görüşmeye bu ruh haliyle girmek. 5 Dakika Kuralı (3. bölüm) rüminasyon kesici: 5 dakika işle, sonra geç. 5’ten fazlası döngü.</p>\n<h4 class="researcher">Watkins: Yapıcı vs Yıkıcı Düşünme (2008)</h4>\n<p>Edward Watkins, Exeter Üniversitesi. Rüminasyonnn tümü kötü değil — 2 tür var: (1) Soyut rüminasyon: "Neden hep böyle oluyor? Benimle ilgili sorun ne?" Yıkıcı — genelleştirir, umudu kırar. (2) Somut işleme: "Bu spesifik durumda ne oldu? Hangi adım yanlıştı? Bir sonrakinde ne farklı yapabilirim?" Yapıcı — öğrenmeye götürür.</p>\n<p>Ayrım basit ama güçlü: "Neden" sorusu = soyut, yıkıcı. "Ne" ve "nasıl" sorusu = somut, yapıcı. "Neden kaybettim" yerine "ne oldu ve ne yapabilirim" — tek kelime farkı, tamamen farklı beyin süreci.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Watkins, E. R. (2008). Constructive and unconstructive repetitive thought. Psychological Bulletin, 134(2), 163-206. + Nolen-Hoeksema, S. (1991). Responses to depression. Journal of Abnormal Psychology, 100(4), 569-582.</div>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">YENİDEN ÇERÇEVELEME ATÖLYESİ</div></div>\n<p>Aşağıda 6 gerçek satış durumu var. Her birinde otomatik düşünce, çarpıtma türü, sorgulama ve yeniden çerçeveleme var. İlk 3’ü tamamlanmış — oku ve mantığı kap. Son 3’ü sen dolduracaksın.</p>\n<p>Senaryo 1: "Bu Adam Almayacak" (Tamamlanmış)</p>\n<p>Durum: Müşteriyle ilk görüşme. Girişte müşteri yoğun görünüyor, saate bakıyor.</p>\n<p>Otomatik düşünce: "Almayacak, ilgisi yok, boşuna geldim."</p>\n<p>Çarpıtma: Zihin okuma (kanıtsız varsayım) + felaketsellik ("boşuna geldim").</p>\n<p>Sorgulama: Delil: Saate bakmak = ilgisizlik mi? Belki bir sonraki toplantısı var. Belki yoğun gün geçiriyor. Henüz bir şey söylemedi — "ilgisiz" nereden geldi?</p>\n<p>Yeniden çerçeve: "Müşteri meşgul görünüyor. Zamanına saygı göstereyim, kısa ve öz sunayım. İlgisi olup olmadığını sonuçtan anlayacağım, baştaki izlenimden değil."</p>\n<p>Senaryo 2: "Fiyat Pahalı Gelecek" (Tamamlanmış)</p>\n<p>Durum: Fiyat sunumu yaklaşıyor. Henüz söylememdin.</p>\n<p>Otomatik düşünce: "Pahalı bulacak. İndirim isteyecek. Kaybedeceğim."</p>\n<p>Çarpıtma: Projeksiyon (kendi "pahalı" algını müşteriye giydirme) + felaketsellik.</p>\n<p>Sorgulama: Müşterinin bütçesini biliyor musun? Hayır. Son 10 fiyat sunumunda kaçında "pahalı" denildi? Diyelim 4/10. Yani yüzde 60 "pahalı" demedi.</p>\n<p>Yeniden çerçeve: "Fiyatı bilmiyorum henuz. Söyleyeceğim, tepkiyi göreceğim. Eğer pahalı bulursa çerçeveleme yapacağım. Henüz bir şey olmadı."</p>\n<p>Senaryo 3: "Artık Bu İşi Yapamıyorum" (Tamamlanmış)</p>\n<p>Durum: 3. çeyrek, hedef tutmamış, 2 büyük müşteri kaybedilmiş.</p>\n<p>Otomatik düşünce: "Bu iş benim için değil. Herkes daha iyi yapıyor."</p>\n<p>Çarpıtma: Kişiselleştirme + aşırı genelleme + siyah-beyaz düşünce.</p>\n<p>Sorgulama: "Herkes" mi? Kaç kişi hedef tutturdu? Geçen çeyrekte sen de tutturmuştun. 2 müşteri neden gitti — senin hatan mı yoksa dış faktör mü? Kontrolündeki ne?</p>\n<p>Yeniden çerçeve: "Zor çeyrek geçirdim. Spesifik olarak 2 müşteri gitti — nedenlerini analiz edeceğim. Geçen çeyrek başarılıydım, kapasite bende var. Bu geçici."</p>\n<p>Dikkat: Eğer analiz sonrası gerçekten sistemik sorun varsa (hedef ulaşılamaz, ürün problemi, yönetim sorunu) — o zaman çerçeve değil, aksiyon gerek. Her şeyi kendine yıkma.</p>\n<p>Senaryo 4: SEN DOLDUR</p>\n<div class="fill-blank">Durum: _______________________________</div>\n<div class="fill-blank">Otomatik düşünce: _______________________________</div>\n<div class="fill-blank">Çarpıtma (tabloddan seç): _______________________________</div>\n<div class="fill-blank">Sorgulama (delil ne?): _______________________________</div>\n<div class="fill-blank">Yeniden çerçeve: _______________________________</div>\n<p>Senaryo 5: SEN DOLDUR</p>\n<div class="fill-blank">Durum: _______________________________</div>\n<div class="fill-blank">Otomatik düşünce: _______________________________</div>\n<div class="fill-blank">Çarpıtma: _______________________________</div>\n<div class="fill-blank">Sorgulama: _______________________________</div>\n<div class="fill-blank">Yeniden çerçeve: _______________________________</div>\n<p>Senaryo 6: SEN DOLDUR</p>\n<div class="fill-blank">Durum: _______________________________</div>\n<div class="fill-blank">Otomatik düşünce: _______________________________</div>\n<div class="fill-blank">Çarpıtma: _______________________________</div>\n<div class="fill-blank">Sorgulama: _______________________________</div>\n<div class="fill-blank">Yeniden çerçeve: _______________________________</div>\n<h4 class="section-title">ÖNEMLİ</h4>\n<p>4-5-6’yı kendi gerçek durumlarından doldur. Geçen haftayı hatırla: Bir an vardı ki kafanda olumsuz cümle geçti ve davranışını etkiledi. O anı yaz. Bu egzersiz kağıt üzerinde yapıldığında bile etkili — Pennebaker’in expressive writing bulgusu: Yazmak psikolojik sağlığı iyileştiriyor.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">AÇIKLAMA TARZIN</div></div>\n<p>Seligman’ın 3 boyutlu açıklama tarzını kendi üzerinde test et. Bu bir ölçek değil, bir farkındalık aracı.</p>\n<p>Son başarısızlığını düşün. Aşağıdaki 3 boyutta nereye düşüyorsun?</p>\n<p>3 boyutta da sol taraftaysan: Seligman’ın pessimist profili. Başarısızlığı kalıcı + yaygın + kişisel görüyorsun = öğrenilmiş çaresizlik riski. MetLife verileri: Bu profil yüzde 37 daha az saatıyor ve yüzde 50 işi bırakma oranı.</p>\n<p>3 boyutta da sağ taraftaysan: Optimist profil. Başarısızlığı geçici + sınırlı + durumsal görüyorsun = toparlnma hızlı. Ama dikkat: Aşırı optimizm de tehlikeli — her şeyi dış faktöre atarsan öğrenmezsin. 1. bölümdeki self-serving bias.</p>\n<p>Sağlıklı profil: Esnek. Spesifik duruma göre bazen iç bazen dış attribution. "Bu sefer bende sorun vardı" veya "bu sefer koşullar kötüyüdü" — duruma göre değişiyor, otomatik bir yana saplanmıyor.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">7 GÜNLÜK OTŞMATIK DÜŞÜNCE AVCIŞI</div></div>\n<p>Her gün 1 otomatik düşünce yakala. 7 gün boyunca. Bu kadar.</p>\n<p>Her gün akşam 5 dakika. 4 soruyu cevapla:</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Bugün satışla ilgili kafamda ne geçti? (Kelimesi kelimesine)</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Bu hangi çarpıtma? (Tablodann seç)</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Delilim ne? (Bu düşünce doğru mu?)</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Gerçekte ne oldu? (Düşünce vs sonuç)</span></div>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">gün: Kalıpları oku. Tekrar eden çarpıtma hangisi? En sık hangi durumda ortaya çıkıyor? Ve en önemlisi: Kaç tanesinde düşünce yanlış çıktı?</span></div>\n<p>Benim verilerim yüzde 73 yanlış diyordu. Senin verin ne diyecek — merak ediyorum. Ve bu merak, değişimin başlangıcı.</p>\n<div class="mod-header"><div class="mod-num">5</div><div class="mod-title">İZLEMEYE DEĞER</div></div>\n<p>Tim Ferriss: Why You Should Define Your Fears Instead of Your Goals</p>\n<p>TED Talk, 2017. 13 dakika. Ferriss stoaclk ve Beck’in bilişsel tekniğini birleştiren "fear-setting" egzersizini anlatıyor: Korktuğun şeyi yaz, en kötü senaryo ne, onleme ne, olursa onarma ne. Otomatik düşünceyi somutlaştırarak gücünü kırıyor.</p>\n<p>Link: youtube.com/watch?v=5J6jAC6XxAI</p>\n<p>Martin Seligman: The New Era of Positive Psychology</p>\n<p>TED Talk, 2004. 23 dakika. Seligman pozitif psikolojinin tarihçesini, öğrenilmiş çaresizliği ve optimizmi anlatıyor. Açıklama tarzının nasıl değiştirilebileceğini gösteriyor. Motivasyon bölümündeki Dweck ile birlikte izlenirse güçlü kombinasyon.</p>\n<p>Link: youtube.com/watch?v=9FBxfd7DL3E</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<div class="ref-line">Beck, A. T. (1976). Cognitive Therapy and the Emotional Disorders. International Universities Press.</div>\n<div class="ref-line">Burns, D. D. (1980). Feeling Good: The New Mood Therapy. HarperCollins.</div>\n<div class="ref-line">Ellis, A. (1957). Rational psychotherapy and individual psychology. Journal of Individual Psychology, 13, 38-44.</div>\n<div class="ref-line">Kross, E. et al. (2014). Self-talk as a regulatory mechanism. JPSP, 106(2), 304-324.</div>\n<div class="ref-line">Nolen-Hoeksema, S. (1991). Responses to depression. Journal of Abnormal Psychology, 100(4), 569-582.</div>\n<div class="ref-line">Pennebaker, J. W. (1997). Writing about emotional experiences as a therapeutic process. Psychological Science, 8(3), 162-166.</div>\n<h4 class="researcher">Seligman, M. E. P. (1990). Learned Optimism. Knopf.</h4>\n<div class="ref-line">Watkins, E. R. (2008). Constructive and unconstructive repetitive thought. Psychological Bulletin, 134(2), 163-206.</div>\n<p>Bu Derine Dal’ın sonuna geldin. 8 çarpıtma sözlüğün, 3 tamamlanmış + 3 boş senaryon, Seligman açıklama tarzı haritan ve 7 günlük avcılık görevin var. Kafandaki ses değişmeyecek — ama ona tepkin değişecek. Ve bu her şeyi değiştirir.</p>'},
'1-7':{b:'Beden',d:'Beden Farkındalık Antrenmanı',c:9719,h:'<p>BEDEN</p>\n<p>Enerji Haritası, Video Analiz Şablonu, 4 Haftalık Duruş Antrenmanı ve Görünüm Rehberi</p>\n<p>Bu Derine Dal pratik ağırlıklı: Beden biliminin derin temeli, kendi enerji haritanı çıkaracak, video analiz şablonuyla bedenini dışarıdan görecek, 4 haftalık duruş antrenmanı programn ve satışçının görünüm rehberini alacaksın.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">BEDEN BİLİMİ</div></div>\n<h4 class="researcher">Walker: Uykunun PFC’ye Etkisi (2017)</h4>\n<p>Matthew Walker, UC Berkeley. “Why We Sleep” kitabındaki en çarpıcı bulgular: 6 saatten az uyuyan kişide amigdala yüzde 60 daha aktif (fMRI ile ölçüldü). PFC-amigdala bağlantısı zayıflıyor — yani fren tutmuyor. Karar alma kapasitesi yüzde 30-40 düşüyor. Empati azalıyor — müşterinin duygusal sinyallerini okuma bozuluyor.</p>\n<div class="insight-box">💡 Satışçı için: Az uyuduğunda daha duygusal, daha gergin, daha kötü karar verici, daha az empatik — yani satış için en kötü kombinasyon. Ve bunu fark etmiyorsun çünkü uyku yoksunluğunun ilk kurbanı öz-farkındalık: Kafein uyanık tutuyor ama PFC’yi geri getirmiyor.</div>\n<p>Walker’ın 17.000 katılımcılık verileri: 7 saatten az uyuyanların bilişsel performansı, duygusal regülasyonu ve karar alma kalitesi ölçülebilir şekilde düşüyor. Sıkıcı ama hayati: Uyku en ucuz performans müdahalesi.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<p>Walker, M. (2017). Why We Sleep: Unlocking the Power of Sleep and Dreams. Scribner. UC Berkeley. fMRI verileri: Amigdala %60 daha aktif, PFC bağlantısı zayıf.</p>\n<h4 class="researcher">Ratey: Egzersiz ve Beyin (2008)</h4>\n<p>John Ratey, Harvard. “Spark” kitabı: Aerobik egzersiz BDNF (beyin türevi nörotrofik faktör) salgalatır — bu protein nöronlar arası bağlantıyı güçlendirir. 20-30 dakika hafif-orta aerobik (yürüyüş, merdiven, tempolu yürüme) PFC’yi 2-3 saat boyunca keskinleştiriyor.</p>\n<p>Görüşmeden önce 10-15 dakika yürüyüş: Bedavadır, yan etkisi yoktur, bilimsel olarak desteklenmiştir. Naperville okul deneyi: Sabah egzersiz yapan öğrenciler matematik ve okuduğunu anlamada yüzde 17 daha iyi performans gösterdi. Satışçı için aynı prensip: Görüşme öncesi 10 dakika yürüyüş = daha keskin PFC.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Ratey, J. (2008). Spark: The Revolutionary New Science of Exercise and the Brain. Little, Brown. Harvard. BDNF + Naperville deneyi.</div>\n<h4 class="researcher">Mehrabian: Tutarsız Mesajlarda Beden (1971)</h4>\n<p>Albert Mehrabian’ın sık yanlış alıntılanan çalışmasını düzeltmek lazım: “İletişimin yüzde 93’ü beden dili” klişesi yanlış. Mehrabian’ın gerçek bulgusu: TUTARSIZ mesajlarda (söz bir şey diyor, beden başka şey) beden ve ses tonu söze baskın çıkıyor. Tutarlı mesajlarda bu oran geçerli değil.</p>\n<div class="insight-box">💡 Satışçı için önemli olan: “Bu ürün mükemmel” derken gözün yerde, sesin düşük, omuzlar içerde = TUTARSIZ mesaj. Müşteri sözü değil bedeni okur. Problem tutarsızlık — ve tutarsızlık genellikle fiyat, itiraz ve kapanış anlarında oluyor. Tam da en kritik anlarda beden seni ele veriyor.</div>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<h4 class="researcher">Mehrabian, A. (1971). Silent Messages. Wadsworth. Dikkat: Sadece tutarsız mesajlar için geçerli.</h4>\n<p>Baumeister: Karar Yorgunluğu</p>\n<p>Roy Baumeister’in karar yorgunluğu (ego depletion) kavramı: İrade gücü sınırlı bir kaynak. Gün boyunca karar verdikçe tükeniyor. Sabah 10’da mantıklı karar veren beyin akşam 5’te tembel karar veriyor — ya varsıyalana dönüyor ya vazgeçiyor.</p>\n<p>Satışta: Müşteri de karar yorgunluğu yaşıyor. Öğleden sonra randevularında müşterinin “düşüneyim” deme olasılığı artar — çünkü karar vermeyi ertelemek beyni rahataltır. En önemli görüşmeleri sabaha al: Hem sen hem müşteri taze.</p>\n<p>Not: Ego depletion kavramı replikasyon krizi yaşadı (2016) ama etki tamamen reddedilmedi — etkinin büyüklüğü tartışmalı. Pratik sonucu hala geçerli: Gün içinde enerji düşüşü gerçek.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Baumeister, R. F. et al. (1998). Ego depletion: Is the active self a limited resource? JPSP, 74(5), 1252-1265. Not: Replikasyon tartışmalı (2016).</div>\n<p>Kronobiyoloji: Gün İçi Ritim</p>\n<p>Daniel Pink, “When” (2018): Gün içi bilişsel performans U-şeklinde değil, ters U-şeklinde: Sabah tepe, öğleden sonra erken dip, öğleden sonra geç toparlanma. Çoğu insan için (yüzde 75 “sabah kuşu” veya “orta tip”) analitik işler sabah, yaratıcı işler öğleden sonra geç daha iyi.</p>\n<div class="insight-box">💡 Satışçı için: Kritik görüşmeleri (kapanış, fiyat müzakeresi, CEO sunumu) sabah 9-11’e koy. Rutin işleri (CRM, raporlama, e-posta) öğleden sonra erken saatlere koy. Bu basit zamanlama değişikliği 7. bölümdeki satış müdürünün yüzde 25 kapanış artışının arkasındaki bilim.</div>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<p>Pink, D. H. (2018). When: The Scientific Secrets of Perfect Timing. Riverhead Books. + Wieth, M. B. &amp; Zacks, R. T. (2011). Time of day effects on problem solving. Thinking &amp; Reasoning, 17(4), 387-401.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">KİŞİSEL ENERJİ HARİTAN</div></div>\n<p>1 hafta boyunca her gün enerji kaydı tut. Gün içinde 3 noktada (sabah, öğle, akşam) enerjini 1-10 ölç.</p>\n<div class="fill-blank">Pazartesi: Sabah (9:00) __/10 | Öğle (13:00) __/10 | Akşam (17:00) __/10 | Not: ____</div>\n<div class="fill-blank">Salı: Sabah __/10 | Öğle __/10 | Akşam __/10 | Not: ____</div>\n<div class="fill-blank">Çarşamba: Sabah __/10 | Öğle __/10 | Akşam __/10 | Not: ____</div>\n<div class="fill-blank">Perşembe: Sabah __/10 | Öğle __/10 | Akşam __/10 | Not: ____</div>\n<div class="fill-blank">Cuma: Sabah __/10 | Öğle __/10 | Akşam __/10 | Not: ____</div>\n<p>1 hafta sonra kalıp gör: Hangi günlerde enerji yüksek? Hangi saatlerde düşük? Öğleden sonra düşüş herkeste var ama derecesi farklı. Bu fark uyku, beslenme ve hareket alışkanlıklarından geliyor. Enerji haritanı görünce takvimini ayarla: En yüksek enerji saatine en önemli görüşmeyi koy.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">VİDEO ANALİZ ŞABLONU</div></div>\n<p>Bir sunumunu kaydet (telefon yeterli). Sonra aşağıdaki şablonu doldur. İlk seferde şok edici olabilir — Serdar gibi. Normal.</p>\n<p>A. Sessiz İzle (Ses kapalı):</p>\n<div class="fill-blank">Duruş: Omuzlar açık mı yoksa içeri mi? ____</div>\n<div class="fill-blank">Baş pozisyonu: Dük mü, öne eğik mi? ____</div>\n<div class="fill-blank">Eller: Nerede? Açık mı, cepte mi, masada mı? ____</div>\n<div class="fill-blank">Göz teması: Müşteriye bakıyor musun, kaçıyor musun? ____</div>\n<div class="fill-blank">Fiyat anı: Beden küçülüyor mu, baş eğiliyor mu? ____</div>\n<div class="fill-blank">İtiraz anı: Geri çekiliyor musun, öne mi eğiliyorsun? ____</div>\n<div class="fill-blank">Genel izlenim: Bu kişi güvenilir görünüyor mu? ____</div>\n<p>B. Sesli Dinle (Resim kapalı):</p>\n<div class="fill-blank">Ses tonu: Güçlü mü, zayıf mı, monoton mu? ____</div>\n<div class="fill-blank">Hız: Çok hızlı mı, normal mi? ____</div>\n<div class="fill-blank">Fiyat anında ses: Düşüyor mu, hızlanıyor mu? ____</div>\n<div class="fill-blank">Savunma cümleleri: “Tabi biraz yüksek ama...” var mı? ____</div>\n<div class="fill-blank">Konuşma / dinleme oranı: Tahmini yüzde kaç konuşuyorsun? ____</div>\n<h4 class="section-title">UYARI: BU ŞABLONU AYDA 1 KEZ TEKRARLA</h4>\n<p>Beden dili alışkanlıkları geri döner — Serdar’ın değişimi 4 hafta sürdü ama 3. ayda eski kalıplar tekrar göründü. Aylık kontrol şart.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">4 HAFTALIK DURUŞ ANTRENMANI</div></div>\n<p>Her gün 5 dakika, aynanın karşısında. Serdar’ın programn:</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Farkındalık</div></div>\n<p>Günde 1 kez aynanın karşısında dur. Omuzlar nerede? Baş nerede? Eller nerede? Sadece gör. Düzeltme, sadece gör. Duval-Wicklund: Ayna farkındalık artırır.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Düzeltme</div></div>\n<p>Aynanın karşısında: Omuzlar geri, göğüs açık, baş dük, ayaklar omuz genişliğinde. 2 dakika bu duruşta kal. Sonra fiyat cümleni söyle: Ses aynı tonda, göz teması koru, savunma cümlesi ekleme. 5 kez tekrarla.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Hareket</div></div>\n<p>Aynanın karşısında sunum provasi: Giriş (tokalaşma, oturma), ana sunum (el hareketleri, göz teması), fiyat anı (ses tonu sabit), kapanış sorusu (sessizliğe dayan). Her birini 2 kez tekrarla.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Video Kontrol</div></div>\n<p>Gerçek bir sunumu kaydet. 3. modüldeşki şablonu doldur. Hafta 1’deki farkındalıkla kıyasla: Ne değişti? Bu karşılaştırma Bandura’nın mastery kaynağı: “Degiistim, görüyorum” = özyeterlilik artışı.</p>\n<p>4 haftadan sonra: Ayda 1 video kontrol. Alışkanlıklar geri döner — sürekli bakım gerekiyor.</p>\n<div class="mod-header"><div class="mod-num">5</div><div class="mod-title">SATIŞÇININ GÖRÜNÜM REHBERİ</div></div>\n<p>Bu bölüm teknik değil, pratik. Sahadan gözlemler.</p>\n<p>Giriş Anı (0-7 saniye):</p>\n<p>Kapıdan giriş: Adımlar emin, hız normal (ne koşar ne sürünür). Omuzlar açık, baş dük. Tokalaşma: Sağlam ama agresif değil, 2-3 saniye, göz temasıyla birlikte. İlk cümle: Hazırlanmış, net, kısa.</p>\n<p>Sunum Sırası:</p>\n<p>Oturma: Sandalyenin önüne otur, arkaya yaslanma. Hafif öne eğil = ilgi. Eller: Masa üstünde, görünür, hareketli ama kontrollü. Cebde veya kollar kavuşuk = kapalı sinyal. Göz teması: 3-5 saniye bloklar, sonra kısa mola. Sürekli bakma baskı, hiç bakmama güvensizlik.</p>\n<p>Fiyat Anı:</p>\n<p>Ses: Aynı tonda devam. Düşürme, hızlandırma, savunma cümlesi ekleme. Fiyatı söyle, dur, bekle. Sessizlik seni değil müşteriyi gerer — ilk konuşan kaybeder kuralı burada geçerli. Beden: Değişme. Aynı duruş, aynı göz teması.</p>\n<div class="mod-header"><div class="mod-num">6</div><div class="mod-title">İZLEMEYE DEĞER</div></div>\n<p>Vanessa Van Edwards: You Are Contagious</p>\n<p>TEDx Talk, 2017. 18 dakika. Van Edwards beden dili araştırmacısı. İlk izlenimin nasıl oluştuğunu, sıcaklık ve yetkinlik sinyallerinin dengesini anlatıyor. Satışçı için: Çok sıcak = zayıf. Çok yetkin = soğuk. Denge = güvenilir.</p>\n<p>Link: youtube.com/watch?v=cef35Fk7YD8</p>\n<p>Amy Cuddy: Your Body Language May Shape Who You Are</p>\n<p>TED Talk, 2012. 21 dakika. Power posing tartışmalı olsa da Cuddy’nin ana mesajı güçlü: Beden zihni etkiler. Hormonal bulgular replike edilmedi ama subjektif güç hissi doğrulandı. Satışçı için: Duruşun hissini değiştiriyor.</p>\n<p>Link: youtube.com/watch?v=Ks-_Mh1QhMc</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<div class="ref-line">Baumeister, R. F. et al. (1998). Ego depletion. JPSP, 74(5), 1252-1265.</div>\n<div class="ref-line">Loehr, J. &amp; Schwartz, T. (2003). The Power of Full Engagement. Free Press.</div>\n<h4 class="researcher">Mehrabian, A. (1971). Silent Messages. Wadsworth.</h4>\n<h4 class="researcher">Pink, D. H. (2018). When: The Scientific Secrets of Perfect Timing. Riverhead Books.</h4>\n<div class="ref-line">Ratey, J. (2008). Spark: The Revolutionary New Science of Exercise and the Brain. Little, Brown.</div>\n<div class="ref-line">Todorov, A. &amp; Willis, J. (2006). First impressions. Psychological Science, 17(7), 592-598.</div>\n<h4 class="researcher">Walker, M. (2017). Why We Sleep. Scribner.</h4>\n<h4 class="researcher">Wieth, M. B. &amp; Zacks, R. T. (2011). Time of day effects. Thinking &amp; Reasoning, 17(4), 387-401.</h4>\n<p>Bu Derine Dal’ın sonuna geldin. Enerji haritan hazır, video analiz şablonun hazır, 4 haftalık duruş antrenmanın programlanmış, görünüm rehberin cebinde. Şimdi tek gereken: 1 sunum kaydet ve şablonu doldur. Serdar gibi şok olacaksın — ama o şok değişimin başlangıcı.</p>'},
'1-8':{b:'Dayanıklılık',d:'Tükenmişlik Taraması',c:10711,h:'<h4 class="section-title">DAYANIKLILIK</h4>\n<p>Toparlanma Protokolü, Tükenmişlik Haritası ve Kriz Sonrası Büyüme Atlöyesi</p>\n<p>Geçen bölümde düşmenin kaçınılmaz olduğunu gördün. Şimdi pratik kısmı: Kalkma. Bu ekte önce bilimin derin katmanlarına ineceğiz — Maslach’ın 6 faktörünü teker teker satış departmanına çevireğiz, Bonanno’nun 4 yolunun yüzdeliklerini göreceğiz, Epictetus’un 2000 yıllık kontrol sorusunu öğreneceğiz. Sonra araclara geçeceğiz: Tükenmişlik taraması, kaynak haritası, günlük ritüel protokolü ve bir kriz büyüme atölyesi.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">DAYANIKLILIĞIN NÖROBİLİMİ VE SOSYAL TEMELLERİ</div></div>\n<p>Maslach: 6 İş Yeri Faktörü</p>\n<h4 class="researcher">Christina Maslach ve Michael Leiter (2016): Tükenmişliğin 6 kaynağı. Her birini satış departmanı bağlamında açalım:</h4>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Aşırı iş yükü: Gerçekçi olmayan hedefler, art arda şehir gezileri, 12 saatlik iş günleri. Beyin sürekli alarm modunda — Arnsten’in PFC kapatımı kronikleşiyor. Toparlanma süresi olmadan yükleme = tükenme. Loehr-Schwartz’ın enerji yönetimi (7. bölüm): Yükü azaltamazsan toparlanmayı artır.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Kontrol eksikliği: Mikromanajerlik, saatlik raporlama, “patron ne derse o” kültürü. Deci-Ryan’ın özerklik ihtiyacı eziliyor. Defne’nin (ana bölüm) hikayesi tam bu: 5 yıl özerke çalıştı, yıldız; kontrol geldi, çöktü.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Yetersiz ödül: Sadece prim bazlı ödül, takdir yok, “iyi yaptın” yok. Amabile’nin progress principle’ı: Küçük ilerlemelerin tanınması en güçlü motivatör. Ama çoğu satış departmanında sadece büyük kapanış kutlanır, aradaki emek görülmez.</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Topluluk çözülmesi: Rekabete dayalı sıralama, ekip içi kıyasalma, “en iyi satışçı” tablosu. Masten’ın 1 numaralı kaynağı ilişkiler — ama şirket iliksileri rekabete çevirdiğinde destek ağı çözülür.</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Adaletsizlik: Favori satışçıya farklı muamele, şeffaf olmayan prim hesaplaması, performans değerlendirmede keyfilik. Adalet duygusu temel insan ihtiyacı — iş yerinde adaletsizlik gören kişi duygusal olarak çekilir.</span></div>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">Değer çatışması: “Nasıl olursa olsun sat” baskısı vs kişisel etik sınırlar. 10. bölümün konusu. Schwartz’ın karşıt eksen çatışması kroniğe dönüşünce tükenme kaçınılmaz.</span></div>\n<p>Maslach’ın mesajı: Bireyi “düzeltmeye” çalışmak yetersiz. Bu 6 faktör iyileşmeli. Eğer tükenmişlik yaşıyorsan sorunu kendinde arama — önce bu 6 faktöre bak.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<p>Maslach, C. &amp; Leiter, M. P. (2016). Burnout. In Stress: Concepts, Cognition, Emotion and Behavior, Elsevier. | Maslach, C. (2003). Burnout: The Cost of Caring. Malor Books.</p>\n<h4 class="researcher">Bonanno: 4 Yolun Detayı (2004)</h4>\n<p>George Bonanno, Columbia: Travma sonrası 4 farklı yol. Ana bölümde kısaca gördük, burada derinleştiriyoruz:</p>\n<p>(1) Kronik disfonksiyon (yaklaşık yüzde 10-15): Toparlayamama, günlük işlevsellik bozulur. Profesyonel destek gerektirir. Satışta: Aylar sonra hala performans düşük, motivasyon sıfır, işe gelme bile zor. Bu kişiye “motive ol” demek işe yaramaz — klinik müdahale gerekebilir.</p>\n<p>(2) Gecikmiş tepki (yaklaşık yüzde 15-25): Önce iyi görünür, sonra çöküş. Tarkan’ın durumu. 6 ay iyi göründü, sonra sessiz çöküş. Bu yol en sinsi çünkü dışarıdan görünmüyor — KPI yeşil ama insan kırmızı.</p>\n<p>(3) Toparlanma (yaklaşık yüzde 15-25): Düşüş, mücadele, kademeli yükseliş. Çoğu satışçı burada. Volkan’ın yolu (1. bölüm): 1 yıl sürdü, iki ileri bir geri. Normal tempo.</p>\n<p>(4) Dayanıklılık (yaklaşık yüzde 35-55): Kısa düşüş, hızlı dönüş. Bonanno’nun şaşırtıcı bulgsu: Çoğunluk burada. İnsanlar sandıklarından dayanıklı. Ama kendi dayanıklılıklarını görmüyorlar çünkü “dayanıklılık = hiç yıkılmamak” sanıyorlar.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<p>Bonanno, G. A. (2004). Loss, trauma, and human resilience. American Psychologist, 59(1), 20-28. | Bonanno, G. A. (2009). The Other Side of Sadness. Basic Books.</p>\n<p>Tedeschi &amp; Calhoun: Travma Sonrası Büyümenin 5 Alanı</p>\n<p>Richard Tedeschi ve Lawrence Calhoun, 1996. Kriz sonrası büyüme 5 alanda gerçekleşiyor:</p>\n<p>(1) Kişisel güç keşfi: “Sandığımdan güçlüymüşüm.” Bandura’nın mastery kaynağıyla kesişiyor. Krizi atlattıysan özyeterliliğin arttı.</p>\n<p>(2) Yeni olanaklar: Kriz yeni kapılar açtı. Defne’nin şirket değiştirmesi buna örnek: Eski şirketteki kriz olmasaydı yeni fırsatı görmeyecekti.</p>\n<p>(3) İlişkilerin derinleşmesi: Kriz kimle gerçek dost olduğunu gösteriyor. Zor günde arayanlar vs uzaklaşanlar. Bu bilgi altın değerinde.</p>\n<p>(4) Yaşama değer verme: Küçük şeyler büyüyor. Başarılı bir görüşme, güzel bir müşteri geri bildirimi — krizden önce “normal” olan şeyler krizden sonra değerli.</p>\n<p>(5) Varoluşsal/ruhsal değişim: Anlam arayışı derinleşiyor. Frankl’ın “neden”i (4. bölüm) kriz sonrası daha güçlü hissediliyor.</p>\n<p>Önemli uyarı: Büyüme otomatik değil — bilinçli işleme gerektiriyor. Ve her krizden büyüme beklememek gerekiyor. Bazen kriz sadece krizdir. Büyümeyi zorlamamak da olgunluk.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Tedeschi, R. G. &amp; Calhoun, L. G. (1996). The Posttraumatic Growth Inventory. Journal of Traumatic Stress, 9(3), 455-471. | Tedeschi, R. G. &amp; Calhoun, L. G. (2004). Posttraumatic growth: Conceptual foundations and empirical evidence. Psychological Inquiry, 15(1), 1-18.</div>\n<p>Epictetus ve Stoik Felsefe: Kontrol Dikotomisi</p>\n<p>Epictetus, MS 50-135. Köle olarak doğdu, filozofa dönüştü. Temel öğretisi: Bazı şeyler kontrolümüzde, bazıları değil. Acının çoğu, kontrol edemediğimiz şeyleri kontrol etmeye çalışmaktan gelir.</p>\n<p>Satışta kontrolünde: Hazırlığın, tutumun, enerjin, takibin, öğrenme isteğin. Kontrol dışı: Ekonomi, müşteri bütçesi, rakip hamle, patron kararı, pandemi.</p>\n<p>Bu ayrım basit görünüyor ama pratikte zor. Cenk’in (ana bölüm) sabah ritüeli tam bu: “Bugün neyi kontrol edebilirim?” sorusu. Kontrol edemediklerini bırak — enerjiyi boşa harcama. Kontrol edebildiklerine odaklan — enerjiyi verimli kullan.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<p>Epictetus. Discourses and Selected Writings. (MS ~108). Çev: Robert Dobbin (2008). Penguin Classics. Kontrol dikotomisi: “Eph’ hēmin / ouk eph’ hēmin.”</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">TÜKENMİŞLİK TARAMASI</div></div>\n<div class="score-range">Maslach’ın 3 boyutuna 1-10 puan ver. Dürüst ol — kimse görmeyecek.</div>\n<div class="fill-blank">Duygusal tükenme (1-10): “Sabah kalkmak zor, her şey ağır, enerji sıfır.” ____</div>\n<div class="fill-blank">Kişisizleşme (1-10): “Müşteriler numara, empati duyamıyorum.” ____</div>\n<div class="fill-blank">Başarı düşüşü (1-10): “Ne yaparsam fark etmez, etkisizim.” ____</div>\n<div class="fill-blank">Toplam: ____ / 30</div>\n<p>10 altı: Normal stres. Toparlanma ritüeli yeterli. 10-20: Dikkat. 6 faktöre bak, hangisi seni etkiliyor? Değiştirebileceğini değiştir. 20+: Ciddi uyarı — profesyonel destek düşün. Bu sayı zayıflık değil, sistem uyumsuzluğu.</p>\n<p>Şimdi 6 faktörü değerlendir:</p>\n<div class="fill-blank">Aşırı yük (1-10): ____ | Kontrol eksikliği (1-10): ____ | Yetersiz ödül (1-10): ____</div>\n<div class="fill-blank">Topluluk kopukluğu (1-10): ____ | Adaletsizlik (1-10): ____ | Değer çatışması (1-10): ____</div>\n<p>En yüksek 2 faktör senin tükenmişlik kaynağın. Bunları değiştirebilir misin? Evet ise aksiyon al. Hayır ise daha büyük bir karar gerekiyor — 8. bölümdeki “sistemi değiştir veya çık” mesajı.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">DAYANIKLILIK KAYNAK HARİTAN</div></div>\n<p>Masten’ın 3 kaynağını kendi hayatında haritala:</p>\n<p>İlişkiler: Zor günde arayabileceğim 3 kişi:</p>\n<div class="fill-blank">(1) ____ | Neden: ____</div>\n<div class="fill-blank">(2) ____ | Neden: ____</div>\n<div class="fill-blank">(3) ____ | Neden: ____</div>\n<p>3 isim yazamadıysan: Bu hafta 1 bağlantı kur. Kahve iç, telefon aç, mesaj at. “Nasılsın gerçekten” sorusunu sor — ve kendin de cevap ver.</p>\n<p>Yetkinlik: Geçmişte atlattığım 3 kriz:</p>\n<div class="fill-blank">(1) ____ | Nasıl atlattım: ____</div>\n<div class="fill-blank">(2) ____ | Nasıl atlattım: ____</div>\n<div class="fill-blank">(3) ____ | Nasıl atlattım: ____</div>\n<p>Bu liste senin “daha önce de atlattım” kanıtın. Zor günde buna bak: O kapasite hala sende.</p>\n<div class="fill-blank">Anlam: “Bu işi yapıyorum çünkü ____”</div>\n<p>(4. bölümdeki Frankl cümlesi. Doldurmadıysan oraya geri dön.)</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">GÜNLÜK TOPARLANMA RİTÜELİ</div></div>\n<p>Cenk’in (ana bölüm) ritüell protokolü. 3 parça, toplam 15 dakika/gün + haftalık 1 saat:</p>\n<p>Sabah 5 dakika: Kontrol Sorusu</p>\n<p>“Bugün neyi kontrol edebilirim?” Bir kağıda veya telefona yaz. Sol sütun: Kontrolümde. Sağ sütun: Kontrol dışı. Sağ sütunu çiz. Sol sütuna odaklan. Bu 5 dakika günün geri kalanını şekillendiriyor.</p>\n<p>Akşam 5 dakika: İlerleme Sorusu</p>\n<p>“Bugün 1 şeyi iyi yaptım: ___” Küçük olabilir: Güzel bir arama, iyi bir hazırlık, zamaninda takip. Amabile’nin progress principle’ı: Küçük ilerleme büyük motivatör. Beyin negatif yanlılık nedeniyle (Baumeister) kötüyü büyütür — bilinçli 1 olumlu hatırlamak dengeyi kuruyor.</p>\n<p>Haftalık 1 saat: Bağlantı Saati</p>\n<p>Destek ağından biriyle konuş. İş değil, “nasılsın gerçekten” sorusu. Masten’ın 1 numarası. Bu saat eşle, arkadaşla, mentorla olabilir — önemli olan samimi konuşma.</p>\n<p>Kriz Sonrası (24 saat içinde): Büyüme Sorusu</p>\n<p>Tedeschi sorusu: “Bu kriz bana ne öğretti?” + 3. bölümdeki otopsi şablonu. Eğer “hiçbir şey” cevabı geliyorsa zorlamazın — bazen kriz sadece krizdir.</p>\n<div class="mod-header"><div class="mod-num">5</div><div class="mod-title">KRİZ SONRASI BÜYÜME ATÖLYESİ</div></div>\n<p>Son yaşadığın profesyonel krizi düşün. Kaybedilen büyük müşteri, tutturulamayan hedef, bırakan ekip üyesi, iptal edilen proje — her ne ise. Tedeschi’nin 5 alanını bu krize uygula:</p>\n<div class="fill-blank">Kriz: ____</div>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Kişisel güç keşfi: Bu krizde kendimle ilgili ne öğrendim? ____</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Yeni olanaklar: Bu kriz hangi kapıyı açtı? ____</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">İlişkiler: Kim yanımda kaldı, kim uzaklaştı? ____</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Değer verme: Krizden sonra neye daha çok değer veriyorum? ____</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Anlam: Bu deneyim hayatıma ne kattı? ____</span></div>\n<p>Her alanı doldurmak zorunda değilsin. Bazı krizlerde 1-2 alanı doldurmak yeterli. Önemli olan soruyu sormak — cevabı zorlamak değil.</p>\n<div class="mod-header"><div class="mod-num">6</div><div class="mod-title">İZLEMEYE DEĞER</div></div>\n<p>Lucy Hone: The Three Secrets of Resilient People</p>\n<p>TED Talk, 2019. 16 dakika. Hone dayanıklılık araştırmacısı ve kendi çocuğunu kaybetmiş. Kişisel ve bilimsel. 3 prensip: (1) Acı yaşamın parçası — “neden ben” yerine “bu da olabilir.” (2) İyi olana odaklan — kötüyü inkar etmek değil, iyiyi görmeyi unutmamak. (3) Her kararda sor: Bu bana iyi mi geliyor kötü mü?</p>\n<p>Link: youtube.com/watch?v=NWH8N-BvhAw</p>\n<p>Martin Seligman: The New Era of Positive Psychology</p>\n<p>TED Talk, 2004. 24 dakika. Seligman öğrenilmiş iyimserliği ve pozitif psikolojinin temellerini anlatıyor. Dayanıklılığın sadece “travmayı atlatmak” değil, “iyiye doğru gelişmek” olduğunu vurguluyor. MetLife çalışmasının arka planını anlatıyor.</p>\n<p>Link: youtube.com/watch?v=9FBxfd7DL3E</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<h4 class="researcher">Bonanno, G. A. (2004). Loss, trauma, and human resilience. American Psychologist, 59(1), 20-28.</h4>\n<h4 class="researcher">Bonanno, G. A. (2009). The Other Side of Sadness. Basic Books.</h4>\n<h4 class="researcher">Epictetus. Discourses and Selected Writings. Çev: Dobbin, R. (2008). Penguin Classics.</h4>\n<h4 class="researcher">Maslach, C. &amp; Leiter, M. P. (2016). Burnout. Elsevier.</h4>\n<h4 class="researcher">Masten, A. S. (2001). Ordinary magic. American Psychologist, 56(3), 227-238.</h4>\n<h4 class="researcher">Seligman, M. E. P. (1990). Learned Optimism. Knopf.</h4>\n<div class="ref-line">Tedeschi, R. G. &amp; Calhoun, L. G. (1996). The Posttraumatic Growth Inventory. Journal of Traumatic Stress, 9(3), 455-471.</div>\n<h4 class="researcher">Tedeschi, R. G. &amp; Calhoun, L. G. (2004). Posttraumatic growth. Psychological Inquiry, 15(1), 1-18.</h4>\n<p>Toparlanma ritüelin, tükenmişlik taraman ve büyüme atölyen hazır. Unutma: Dayanıklılık sıradışı değil, sıradan. Ve çoğu kez zaten yapıyorsun — sadece görmüyorsun.</p>'},
'1-9':{b:'Sabır',d:'Stratejik Sabır Takvimi',c:9584,h:'<p>SABIR</p>\n<p>Stratejik Sabır Takvimi, Pipeline Karar Matrisi ve Batık Maliyet Teşhisi</p>\n<p>Sabır hakkında bir paradoks var: “Sabırlı ol” demek sabrı öğretmiyor — tıpkı “motive ol” demenin motivasyonu öğretmemesi gibi. Mischel’in gizli bulgusu tam buradaydı: Sabır bir karakter özelliği değil, uygulanabilir stratejiler bütünü. Bu ekte o stratejilerin bilimsel temelli tam setini alacaksın. Ayrıca sabırla inadı birbirinden ayıran araçlar da var: Pipeline karar matrisi, batık maliyet teşhis aracı ve ROI hesabı.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">SABRIN NÖROEKONOMİSİ</div></div>\n<p>Mischel: Marshmallow’un Arkasındaki Gerçek Bilim</p>\n<p>Walter Mischel’in deneyi popüler kültürde “sabırlı çocuklar başarılı oldu” olarak biliniyor. Gerçek çok daha nüanslı:</p>\n<p>Bulgu 1 — Strateji: Bekleyebilenler doğuştan sabırlı değildi. Dikkat dağıtma stratejisi kullanıyorlardı: Marshmallow’a bakmama, başka şey düşünme, şarkı söyleme, oyun oynama. Uyaranın gücünü azaltıyorlardı. Bu bulgu sabırı kisilik özelliğinden öğrenilebilir beceriye çeviriyor.</p>\n<p>Bulgu 2 — Bilişsel yeniden çerçeveleme: Bekleyebilenlerden bir kısmı marshmallow’u “yiyecek” olarak değil “bulut” olarak hayal ediyordu. Uyaranı soyutlaştırmak onu güçsüzleştiriyor. Beck’in bilişsel yeniden çerçevelemesiyle (6. bölüm) kesişiyor: Olayı değil, olaya verdiğin anlamı değiştir.</p>\n<p>Bulgu 3 — Sıcak-soğuk sistem: Mischel “hot system” (duygusal, dürtüsel, amigdala odaklı) ve “cool system” (mantıksal, stratejik, PFC odaklı) ayrımı yaptı. Sabır sıcak sistemi baskılamak değil, soğuk sistemi aktive etmek. Stres sıcak sistemi güçlendirir, soğuk sistemi zayıflatır — Arnsten’in (2. bölüm) PFC kapanımıyla aynı mekanizma.</p>\n<p>Bulgu 4 — Çevre etkisi: 2012’de Kidd, Palmeri ve Aslin (Rochester) deneyı genisletti: Çocuklar önce güvenilmez bir yetişkinle etkileştirildiğinde (“söz verdi ama tutmadı”), marshmallow’u hemen yediler. Güvenilir yetişkinle etkileşince beklediler. Sabr, güvenin olduğu ortamda artar. Satışta: Müşteri şirkete güveniyorsa bekler, güvenmiyorsa çabuk karar verir — genellikle “hayır.”</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<p>Mischel, W. (2014). The Marshmallow Test. Little, Brown. | Mischel, W. &amp; Ayduk, O. (2004). Willpower in a cognitive-affective processing system. In Baumeister &amp; Vohs (Eds.), Handbook of Self-Regulation. | Kidd, C. et al. (2013). Rational snacking. Cognition, 126(1), 109-114.</p>\n<p>Temporal Discounting: Beyin Geleceği Neden İndirimliyor?</p>\n<p>Samuel McClure et al. (2004), Princeton: fMRI ile gösterdiler ki hemen ödül limbik sistemi (duygusal beyin) aktive ediyor, gecikmiş ödül PFC’yi (mantıksal beyin). İki farklı nöral sistem rekabet halinde.</p>\n<p>Karin Foerde et al. (2006), Columbia: Karar verirken dikkat dağınıksa (multitasking), beyin striatumu (alışkanlık merkezi) kullanıyor — daha dürtüsel, daha kısa vadeli kararlar. Odaklıysa hippocampus (bilinçli öğrenme) devrede — daha stratejik. Satışçı yoğun günde, 15 arama arasında, multitasking modunda: Beyin kısa vadeli dürtüsel karar veriyor. Büyük fırsatı bırakma kararı muhtemelen bu anda veriliyor.</p>\n<p>Pratik çıkarım: Pipeline kararlarını yoğun anın içinde verme. Haftalık sakin bir saatte, büyük resme bakarak ver. Soğuk sistem aktifken.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">McClure, S. M. et al. (2004). Separate neural systems value immediate and delayed monetary rewards. Science, 306, 503-507. | Foerde, K. et al. (2006). Modulation of competing memory systems by distraction. PNAS, 103(31), 11778-11783.</div>\n<p>Cialdini: Tutarlılık ve Küçük Evet’ler</p>\n<p>Robert Cialdini (2001): Tutarlılık prensibi — insanlar başladıkları yolda devam etme eğiliminde. Freedman ve Fraser’ın (1966) klasik deneyi: Küçük bir isteği kabul eden kişi (bahçeye küçük tabela), sonra büyük isteği de kabul ediyor (devasa tabela). Küçük “evet” büyük “evet”e zemin hazırlıyor.</p>\n<p>Stratejik sabır tam bunu kullanıyor: Her temas bir küçük “evet” fırsatı. Demet’in 8 haftalık takvimi (ana bölüm) her hafta bir değer sundu, müşteri her seferinde “evet” dedi (çünkü bilgi almak bedava), ve bu küçük “evet”ler büyük “evet”e zemin hazırladı.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Cialdini, R. B. (2001). Influence. Allyn &amp; Bacon. | Freedman, J. L. &amp; Fraser, S. C. (1966). Compliance without pressure: The foot-in-the-door technique. JPSP, 4(2), 195-202.</div>\n<h4 class="researcher">Arkes &amp; Blumer: Batık Maliyet Tuzagı (1985)</h4>\n<p>Ohio Üniversitesi. Tiyatro aboneliği deneyi: Tam fiyat ödeyenler indirimli alanlardan daha sık gitti — gösteriyi beğenmeseler bile. Harcanan para kararı etkiliyor, gelecekteki değer değil.</p>\n<p>Satışta: “Bu kadar emek verdim, bırakamam.” Geçmişteki yatırım (zaman, sunum, yemek, teklif) geleceği etkiliyor. Rasyonel değil ama çok güçlü bir dürtü.</p>\n<p>Teşhis sorusu: “Bu müşteriyle bugün tanışsam, geçmiş yatırımım olmasa, devam eder miydim?” Cevap hayırsa, batık maliyet seni tutuyor.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<h4 class="researcher">Arkes, H. R. &amp; Blumer, C. (1985). The psychology of sunk cost. OBHDP, 35(1), 124-140.</h4>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">STRATEJİK SABIR TAKVİMİ</div></div>\n<p>8 haftalık temas takvimi. Her temas değer katıyor — “bir gelişme var mı” asla değil. Bu takvimi her uzun süreçli müşteri için kişiselleştir.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Değer Sunumu</div></div>\n<p>Sektörel rapor veya haber paylaş. Kendi bakış açını ekle — “bunu neden paylaşıyorum” bir cümle. Forward etme değil, kişisel dokunsuş.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Sessizlik</div></div>\n<p>Temas yok. Alan bırak. Sürekli temas baskı yapar — sessizlik “peşinde koşmuyorum” mesajı verir.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Rekabet Bilgisi</div></div>\n<p>Rakip analizi veya pazar bilgisi. Müşterinin karar sürecinde ihtiyacı olan bilgi — senin ürününü satmıyor, müşterinin görüşünü genişletiyor. Cialdini’nin otoorite prensibi: Bilgi paylasan = uzman algısı.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Kısa İnsanî Temas</div></div>\n<p>“Nasıl gidiyor?” Satış değil, ilişki. Kısa, sıcak, baskısız. Türkiye’de ilişki önce gelir (Schwartz güvenlik değeri, 10. bölüm).</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 5</div><div class="hafta-desc">Sosyal Kanıt</div></div>\n<p>Referans müşteri hikayesi. “Benzer bir firma şunu yaşadı, biz şöyle çözdük.” Cialdini’nin sosyal kanıt prensibi: Başkaları yaptıysa güvenli.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 6</div><div class="hafta-desc">Sessizlik</div></div>\n<p>Yine alan bırak. 2 sessizlik haftası takvimde çok önemli — sürekli temas çiğneşme, ara vermek neşe getirir.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 7</div><div class="hafta-desc">Yeni Değer</div></div>\n<p>Yeni özellik, güncellenmiş çözüm, sektörel yenilik. “Bunu görmelisiniz” — merak uyandırıcı.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 8</div><div class="hafta-desc">Direkt Soru</div></div>\n<p>“Karar süreciniz nerede?” 7 haftada değer katarak direkt soru hakkını kazandın. Bu soruyı 1. haftada sormak baskı, 8. haftada doğal.</p>\n<p>8 haftada 6 temas — her biri değer, hiçbiri baskı. Bu takvimi CRM’ine yaz, hatırlatıcı koy, unut.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">PİPELİNE KARAR MATRİSİ</div></div>\n<p>Her uzun süreçli müşteri için 5 soru sor. Bu matris sabır ile inadı ayırıyor.</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Müşteri ilgili mi? (Son temasta soru sordu mu, bilgi istedi mi?) Evet / Hayır</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Rakibe gitti mi? Evet / Hayır / Bilmiyorum</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Karar verici kimle konuşuyorum? Doğru kişi / Yanlış kişi / Bilmiyorum</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Son 30 günde somut bir adım atıldı mı? Evet / Hayır</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Batık maliyet testi: Bugün sıfırdan başlasam devam eder miydim? Evet / Hayır</span></div>\n<p>5’i de olumlu = DEVAM. Stratejik sabır takvimini uygula. 2+ olumsuz = DEĞERLEDİR. Eksik ne? Düzeltilebilir mi? 3+ olumsuz = BIRAK. Enerjini başka yere harca.</p>\n<p>Bu basit matris Melis’in (ana bölüm) 40 müşterisini 12’ye düşüren mantık. Acıtır ama işe yarar.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">SABRIN ROI HESAPLAMA</div></div>\n<p>Pipeline’ındaki en uzun 3 müşteri için:</p>\n<div class="fill-blank">Müşteri 1: ____ | Potansiyel değer: ____ TL | Kaç aydır: ____ | Karar matrisi sonuç: DEVAM / BIRAK</div>\n<div class="fill-blank">Müşteri 2: ____ | Potansiyel değer: ____ TL | Kaç aydır: ____ | Karar matrisi sonuç: DEVAM / BIRAK</div>\n<div class="fill-blank">Müşteri 3: ____ | Potansiyel değer: ____ TL | Kaç aydır: ____ | Karar matrisi sonuç: DEVAM / BIRAK</div>\n<div class="fill-blank">Bıraksan toplam kayıp: ____ TL. Devam etsen potansiyel kazanım: ____ TL. Bu rakam sabırı somutlaştırıyor. Ve batık maliyet testinden geçmeyenler için: O enerjiyi yeni fırsatlara yönlendirsen potansiyel: ____ TL.</div>\n<div class="mod-header"><div class="mod-num">5</div><div class="mod-title">BATIK MALİYET TEŞHİS ARACI</div></div>\n<p>Son 6 ayda bıraktığın veya bırakamadığın 3 kararı düşün. Her biri için:</p>\n<div class="fill-blank">Karar 1: ____</div>\n<div class="fill-blank">Geçmiş yatırım (zaman/para/duygu): ____</div>\n<div class="fill-blank">Gelecekteki değer (rasyonel bakınca): ____</div>\n<p>Geçmiş yatırım kararımı etkiliyor mu? Evet / Hayır</p>\n<div class="fill-blank">Karar 2: ____</div>\n<div class="fill-blank">Geçmiş yatırım: ____</div>\n<div class="fill-blank">Gelecekteki değer: ____</div>\n<p>Geçmiş yatırım etkiliyor mu? Evet / Hayır</p>\n<div class="fill-blank">Karar 3: ____</div>\n<div class="fill-blank">Geçmiş yatırım: ____</div>\n<div class="fill-blank">Gelecekteki değer: ____</div>\n<p>Geçmiş yatırım etkiliyor mu? Evet / Hayır</p>\n<p>Eğer 2+ “Evet” varsa: Batık maliyet seni yönetiyor. Geçmişe değil, geleceğe bakarak karar ver.</p>\n<div class="mod-header"><div class="mod-num">6</div><div class="mod-title">İZLEMEYE DEĞER</div></div>\n<p>Daniel Kahneman: Thinking, Fast and Slow (Talks at Google)</p>\n<p>Google Talk, 2011. 60 dakika. Kahneman Sistem 1 ve Sistem 2’yi, temporal discounting’i ve karar verme yanılgılarını anlatıyor. Sabır konusuyla doğrudan bağlantılı.</p>\n<p>Link: youtube.com/watch?v=CjVQJdIrDJ0</p>\n<p>Walter Mischel: The Marshmallow Test (Talks at Google)</p>\n<p>Google Talk, 2014. 55 dakika. Mischel deneyin gerçek bulgularını, popüler yanlış anlamaları ve stratejik sabırı anlatıyor.</p>\n<p>Link: youtube.com/watch?v=_pHUKlV9C4U</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<h4 class="researcher">Arkes, H. R. &amp; Blumer, C. (1985). The psychology of sunk cost. OBHDP, 35(1), 124-140.</h4>\n<div class="ref-line">Cialdini, R. B. (2001). Influence: Science and Practice. Allyn &amp; Bacon.</div>\n<h4 class="researcher">Foerde, K. et al. (2006). Modulation of competing memory systems by distraction. PNAS, 103(31), 11778-11783.</h4>\n<div class="ref-line">Freedman, J. L. &amp; Fraser, S. C. (1966). Compliance without pressure. JPSP, 4(2), 195-202.</div>\n<div class="ref-line">Grupe, D. W. &amp; Nitschke, J. B. (2013). Uncertainty and anticipation in anxiety. Nature Reviews Neuroscience, 14(7), 488-501.</div>\n<h4 class="researcher">Kidd, C. et al. (2013). Rational snacking. Cognition, 126(1), 109-114.</h4>\n<div class="ref-line">McClure, S. M. et al. (2004). Separate neural systems. Science, 306, 503-507.</div>\n<h4 class="researcher">Mischel, W. (2014). The Marshmallow Test. Little, Brown.</h4>\n<p>Stratejik takvimin, karar matrisin, batık maliyet teşhisin ve ROI hesabın hazır. Sabır = beklemek değil, değer katarak ilerlemek. Ve bazen bırakmak da sabırın bir parçası.</p>'},
'1-10':{b:'Değerler',d:'Etik Pusula',c:9992,h:'<h4 class="section-title">DEĞERLER</h4>\n<p>Kişisel Manifesto, Değer Haritası ve Etik İkilem Atölyesi</p>\n<p>Kısım 1’in son eki. 9 bölüm boyunca korkuyla, reddle, motivasyonla, özgüvenle, iç sesle, bedenle, dayanıklılıkla, sabırla yüzleştin. Şimdi en temel soru: Tüm bunları neden yapıyorsun? Bu ek cevabı aramak için değil — cevabı inşa etmek için. Schwartz’ın değer haritasını dolduracak, Rokeach’ın amaç-araç ayrımını kendi hayatında test edecek, 5 etik ikilem senaryosuyla baskı altında ne yapacağını keşfedecek ve Kişisel Manifesto’nu yazacaksın.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">DEĞER PSİKOLOJİSİ VE KÜLTÜREL DİNAMİKLER</div></div>\n<p>Schwartz: Değerler Haritasının Tam Modeli</p>\n<p>Shalom Schwartz’ın 10 değeri ve 2 ekseni ana bölümde gördük. Burada her değerin satış bağlamındaki anlamını açıyoruz:</p>\n<p>Güç (statü, otorite, kaynak kontrolu): Satışta güç değeri yüksek olan kişi rekabeti sever, listeyi takip eder, sıralamada üstte olmak ister. Motivasyon kaynağı: Sıralama tablosu, ödül, tanınma. Tehlike: Etik sınırları zorlaıabilir çünkü “kazanmak” her şeyden önemli.</p>\n<p>Başarı (hırs, yetkinlik gösterme): Güçle benzer ama farkı var: Güç başkaları üzerinde, başarı standartlara göre. Başarı değeri yüksek satışçı hedeflerini sever, ölçülmeyi sever. Tehlike: Hedef takıntısı — rakamın arkasındaki insani boşluyu görmez.</p>\n<p>Hazcılık (keyif, konfor, öz-şımartma): “İşi zevkli yapmak istiyorum.” Hazcılık yüksek satışçı rutin işlerden kaçar, yenilik arar. Güçlü yan: Enerjiik, keyifli sunumlar. Zayıf yan: Zorlu süreçlerde sabrsız (9. bölüm bağlantısı).</p>\n<p>Uyarılma (yenilik, macera, risk): Yeni müşteriler, yeni sektörler, yeni ürünler — bunlar uyarılma değeri yüksek kişiyi motive eder. Monoton satış süreci bu kişiyi öldürür. Çözüm: Portfolyöyü çeşitlendir, farklı müşteri tipleriyle çalış.</p>\n<p>Özyönetim (bağımsızlık, yaratıcılık): Deci-Ryan’ın özerklik ihtiyacıyla bir
