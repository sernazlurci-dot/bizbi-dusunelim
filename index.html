p veriyor mu?</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Jargon oranım müşterinin anlayacağı seviyede mi?</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Müşterinin konuşması için planlanmış anlar var mı?</span></div>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">İlk 90 saniyede dikkat çekici bir açılışım var mı?</span></div>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">Odadaki her karar vericiye hitap eden bir bölüm var mı?</span></div>\n<div class="test-q"><span class="q-label">8</span><span class="q-text">Gerçek, doğrulanabilir bir müşteri hikayesi/referansı var mı?</span></div>\n<div class="test-q"><span class="q-label">9</span><span class="q-text">Kapanışta net bir sonraki adım teklifi var mı?</span></div>\n<div class="test-q"><span class="q-label">10</span><span class="q-text">Sunum 20 dakikadan kısa mı (diyalog hariç)?</span></div>\n<div class="score-box"><strong>📊 Puanlama:</strong> </div>\n<div class="score-range">40-50 puan: Sunumun güçlü. İnce ayar yap, temel yapıya dokunma. 25-39 puan: Orta alan. 2-3 kritik zayıflık var, düzelt. 10-24 puan: Sunumu sıfırdan yeniden tasarla. Modül 4\'teki protokolü kullan.</div>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">5 ADIMLI YENİDEN KURULUM PROTOKOLÜ</div></div>\n<p>Bu protokol mevcut sunumunu parçalayıp müşterinin beynine uygun şekilde yeniden kurmanı sağlıyor. Her adım 30 dakika — toplam 2.5 saat.</p>\n<p>Adım 1: Soyma (30 dk)</p>\n<p>Sunumundaki tüm slaytları yazdır veya ekranda sırala. Her slayta sor: "Bu slayt olmazsa müşteri ne kaybeder?" Cevap "hiçbir şey" ise — çıkar. Cevap "biraz" ise — birleştir veya küçült. Cevap "çok şey" ise — kalsın. Genellikle slaytların yüzde 40-60\'ı ilk turda çıkar.</p>\n<p>Adım 2: Müşteri Filtresi (30 dk)</p>\n<p>Kalan slaytları müşterinin gözünden oku. Kısım 2 Bölüm 6\'daki 3 katmanlı ihtiyacı düşün: Bu müşterinin söylenen ihtiyacı ne? Söylenmeyen? Farkında olmadığı? Her slayt bu 3 katmandan hangisine hitap ediyor? Hiçbirine hitap etmeyen kalan slaytları da çıkar.</p>\n<p>Adım 3: Mimari Seçimi (30 dk)</p>\n<p>Bu müşteri için hangi mimari uygun? Piramit mi (teknik karar verici), köprü mü (keşif aşaması), yolculuk mu (üst düzey vizyon)? Mimariye göre slaytları sırala. Karışık oda (farklı roller) ise slaytları rollerine göre etiketle.</p>\n<p>Adım 4: Dikkat Tasarımı (30 dk)</p>\n<p>İlk 90 saniyeyi tasarla. 3 seçenek dene: (a) Soru ile açılış, (b) hikaye ile açılış, (c) şaşırtıcı veri ile açılış. Hangisi bu müşteriye uygun? Sunumun ortasında 1 "dikkat yenileme" noktası koy — bir soru, kısa bir hikaye, diyalog anı. Bu, düşen dikkati yeniden toplayan bottom-up tetikleyici.</p>\n<p>Adım 5: Prova (30 dk)</p>\n<p>Sunumu sesli prova et — mümkünse bir meslektaşına. Zamanlama: 20 dakikayı geçiyorsa kes. Jargon kontrolü: Meslektaşın "bu ne demek" dediği her yeri düzelt. Kapanış kontrolü: Sunumun sonunda net bir sonraki adım var mı?</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<div class="ref-line">Miller, G. A. (1956). The magical number seven. Psychological Review, 63(2), 81-97.</div>\n<div class="ref-line">Cowan, N. (2001). The magical number 4. Behavioral and Brain Sciences, 24(1), 87-185.</div>\n<div class="ref-line">Sweller, J. (1988). Cognitive load during problem solving. Cognitive Science, 12(2), 257-285.</div>\n<h4 class="researcher">Desimone, R. &amp; Duncan, J. (1995). Neural mechanisms of selective visual attention. Ann Rev Neuroscience, 18, 193-222.</h4>\n<h4 class="researcher">Posner, M. I. &amp; Petersen, S. E. (1990). The attention system. Ann Rev Neuroscience, 13, 25-42.</h4>\n<div class="ref-line">Corbetta, M. &amp; Shulman, G. L. (2002). Control of attention in the brain. Nature Reviews Neuroscience, 3, 201-215.</div>\n<h4 class="researcher">Zak, P. J. (2015). Why inspiring stories make us react. Cerebrum, 2015, 2.</h4>\n<div class="ref-line">Green, M. C. &amp; Brock, T. C. (2000). Narrative transportation. JPSP, 79(5), 701-721.</div>\n<div class="ref-line">Hasson, U. et al. (2012). Brain-to-brain coupling. Trends in Cognitive Sciences, 16(2), 114-121.</div>\n<h4 class="researcher">Mayer, R. E. (2009). Multimedia Learning (2nd ed.). Cambridge UP.</h4>\n<h4 class="researcher">Duarte, N. (2010). Resonate. Wiley.</h4>\n<h4 class="researcher">Reynolds, G. (2008). Presentation Zen. New Riders.</h4>'},
'3-3':{b:'Fiyat',d:'Ödeme Acısının Psikofiziği',c:9886,h:'<p>FİYAT</p>\n<p>Fiyat Mühendisliği: Korkuyu Çöz, Çerçeveyi Kur, Sahada Test Et</p>\n<p>Ana bölümde fiyatın nörobiyolojisini, çıpalama stratejilerini, prospect theory\'nin saha uygulamasını ve zihinsel muhasebeyi gördün. Bu ek seni 3 katmanlı bir atölyeye alıyor: Önce kendi fiyat korkunu haritalayacak, sonra 4 farklı sektörde fiyat çerçeveleme vakalarını çözümleyecek, son olarak 6 adımlı bir fiyat optimizasyon protokolünü uygulayacaksın.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">ÖDEME ACISININ PSİKOFİZİĞİ</div></div>\n<p>Ana bölümde Knutson\'un insula bulgusunu gördük. Prelec ve Loewenstein\'ın (1998) "ödeme acısı" (pain of paying) kavramı bunu genişletiyor: Her ödeme anında beyin fiziksel acıya benzer bir sinyal üretiyor. Ama acının şiddeti ödemenin biçimine göre değişiyor.</p>\n<p>Nakit en çok acıtıyor — parayı fiziksel olarak elden çıkarmak, kaybı somutlaştırıyor. Kredi kartı daha az acıtıyor — ödeme gecikiyor, kayıp soyutlaşıyor. Abonelik en az acıtıyor — tek seferlik karar, sonra otomatik, her ödeme anında yeni karar gerekmiyor.</p>\n<p>Satışta uygulaması: Ödeme yapısını fiyat kadar önemli tut. "300.000 TL" tek seferlik ödeme bir insula patlaması. "Aylık 25.000 TL, 12 ay" daha düşük acı. "İlk 3 ay ücretsiz deneme, sonra aylık 25.000" en düşük acı — çünkü ilk karar sıfır maliyetle veriliyor ve tutarlılık ilkesi (Bölüm 1) devamını kolaylaştırıyor.</p>\n<p>Ama dikkat: Ödeme yapısını acıyı azaltmak için kullanmak etik sınırda. Müşteri toplam maliyeti görmüyorsa — 12 × 25.000 = 300.000 ama müşteri "sadece 25.000" diye algılıyorsa — bu gizleme, şeffaflık ihlali. Etik kullanım: Toplam maliyeti açıkça sun, ödeme yapısını kolaylık olarak öner — gizleme aracı olarak değil.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Prelec, D. &amp; Loewenstein, G. (1998). The red and the black. Marketing Science, 17(1), 4-28. | Soman, D. (2001). Effects of payment mechanism on spending behavior. JCR, 27(4), 460-474. Nakit vs kredi kartı harcama farkı. | Shah, A. M. et al. (2016). Paper or plastic? How we pay influences post-transaction connection. JCR, 42(5), 688-708. Ödeme yöntemi ve ürüne bağlanma.</div>\n<p>Weber-Fechner Yasası ve Fiyat Algısı</p>\n<p>Psikofizikten gelen Weber-Fechner yasası fiyat algısında kritik: İnsanlar mutlak farkı değil, oransal farkı algılıyor. 100 TL\'lik üründe 10 TL indirim (%10) büyük hissedilir. 10.000 TL\'lik üründe 10 TL indirim (%0.1) anlamsız. Ama 10.000 TL\'lik üründe 1.000 TL indirim (%10) yine büyük hissedilir.</p>\n<p>Pratik sonuç: Düşük fiyatlı ürünlerde yüzde vurgula ("yüzde 20 indirim"). Yüksek fiyatlı ürünlerde mutlak değer vurgula ("5.000 TL tasarruf"). Bu "100 kuralı" olarak biliniyor: 100 TL altında yüzde, 100 TL üstünde mutlak değer daha çarpıcı algılanıyor. Türkiye\'de enflasyonla birlikte bu eşik sürekli kayıyor — 2020\'de 100 TL eşikti, 2025\'te 1.000 TL olabilir.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">SEKTÖREL FİYAT ÇERÇEVELEMESİ — 4 VAKA</div></div>\n<p>Her vaka farklı sektörde, farklı fiyat sorunu. Amacımız: Aynı ürünü farklı çerçevelerle sunmanın fiyat algısını nasıl değiştirdiğini görmek.</p>\n<p>Vaka 1: Gayrimenkul — Bülent Bey\'in İntikamı</p>\n<p>Ana bölümde Bülent Bey vakasını hatırlattık — fiyat şoku, insula patlaması, kayıp. Şimdi aynı vakanın "doğru yapılmış" versiyonunu düşünelim.</p>\n<p>Danışman Bülent Bey\'e daireyi gezdirmeden önce: "Bu bölgedeki benzer daireler 8-12 milyon arasında. Sizin baktığınız özellikler — 3+1, deniz manzarası, yeni bina — üst banttan. 11 milyon civarı beklemenizi öneririm." Çıpa kuruldu. Daire gezildi, çocuklar odalarını seçti, duygusal yatırım yapıldı. Fiyat: 10.5 milyon. Bülent Bey\'in beyni: Çıpa 11\'di, fiyat 10.5 — insula değil nucleus accumbens aktif: "Beklediğimden ucuz." Aynı daire, aynı fiyat olabilirdi — fark, çıpanın olup olmamasında.</p>\n<p>Vaka 2: SaaS Yazılım — Aylık mı Yıllık mı?</p>\n<p>Durum: CRM yazılımı, KOBİ segmenti. Fiyat: Yıllık 120.000 TL veya aylık 12.000 TL. Yıllık yüzde 17 indirimli (yılda 100.000 TL). Müşterilerin yüzde 80\'i aylık seçiyor — daha pahalı olmasına rağmen.</p>\n<p>Zihinsel muhasebe analizi: Yıllık 120.000 tek seferde büyük kutudan çıkıyor — patron onayı, bütçe toplantısı, karar süreci uzuyor. Aylık 12.000 operasyonel harcama kutusundan çıkıyor — müdür kendi yetkisinde onaylayabiliyor. Ayrıca: Aylık ödeme "deneme" hissi veriyor, yıllık ödeme "taahhüt" hissi. Karar felci (Schwartz paradox of choice, Kısım 2 Bölüm 7) azalıyor çünkü "1 ay deneyip bırakabilirim" düşüncesi riski düşürüyor.</p>\n<p>Strateji: Aylık fiyatı ön plana koy (giriş kolaylığı), yıllık indirimini "sadakat ödülü" olarak konumlandır (tutarlılık ilkesi). "Başlayın, beğenirseniz yıllığa geçin, yüzde 17 tasarruf edin." Küçük evet → büyük evet.</p>\n<p>Vaka 3: Endüstriyel Ekipman — Patron ve Oğul</p>\n<p>Durum: CNC tezgahı, Kayseri aile şirketi. Fiyat: 2.8 milyon TL. Patron (60 yaş, X kuşağı) "çok pahalı" diyor. Oğul (32 yaş, Y kuşağı) "baba bu lazım" diyor. Eş (masada yok ama etkili) "bu kadar parayı nereye harcıyorsunuz" diye soruyor.</p>\n<p>Analiz: 3 farklı zihinsel kutu, 3 farklı acı eşiği. Patron "makine yatırımı" kutusunda düşünüyor — ama bu kutuda 2.8 milyon çok. Oğul "dijital dönüşüm" kutusunda düşünüyor — bu kutuda 2.8 milyon yatırım. Eş "aile tasarrufu" kutusunda — bu kutuda 2.8 milyon felaket.</p>\n<p>Strateji: Patrona kayıp çerçevesi: "Mevcut tezgahın fire oranı yüzde 4, yenisi yüzde 0.5. Yılda 350.000 TL fire tasarrufu. 8 yılda tezgah bedava." Oğula kazanç çerçevesi: "Bu tezgahla ihracat kalitesi tutturabilirsiniz — yeni pazar." Eşe? Eşle doğrudan konuşamazsın ama patrona ver: "Ailenizin geleceği için yatırım" — Türkiye\'de aile işletmelerinin en güçlü motivasyonu nesiller arası süreklilik.</p>\n<p>Vaka 4: Eğitim Hizmetleri — "Eğitime Para Verilir mi?"</p>\n<p>Durum: Liderlik gelişim programı, İstanbul holding. Fiyat: 250.000 TL. İK müdürü istiyor, CFO "eğitime bu kadar mı verilir" diyor. Tanıdık bir hikaye — benim yaşadığım 200 slayt felaketinin kökeni de buydu.</p>\n<p>Analiz: CFO\'nun zihinsel kutusunda "eğitim" = maliyet. "Eğitim" kelimesini duyduğunda beyin otomatik olarak "gider" kategorisine koyuyor. Ama aynı program "liderlik dönüşümü projesi" olarak sunulursa kutu değişiyor — "stratejik yatırım." Kelime değişikliği fiyat algısını değiştiriyor çünkü farklı kutu, farklı acı eşiği.</p>\n<p>Strateji: CFO\'ya merkez yol sunumu (ELM, Bölüm 1-2): ROI hesabı, turnover maliyeti tasarrufu, liderlik boşluğunun şirkete maliyeti — somut rakamlar. İK müdürüne: "CFO\'ya götürecek malzeme" ver — 1 sayfalık yatırım getirisini özet. Hakan\'ın eğitim odasındaki stratejisini hatırla: Doğru kişiye doğru çerçeve.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">FİYAT KORKUSU PROFİLİ</div></div>\n<p>Aşağıdaki 8 ifadeyi 1-5 arasında puanla.</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Fiyat söylerken ses tonum değişmiyor, göz temasımı koruyorum.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Fiyatı söyledikten sonra sessiz kalmayı başarabiliyorum (en az 5 saniye).</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Ürünümün fiyatının adil olduğuna inanıyorum.</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">"Biraz indirim yapar mısınız" sorusuna refleks olarak "evet" demiyorum.</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Fiyat itirazını kişisel almıyorum.</span></div>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">Müşteriye fiyatı sunmadan önce değer çerçevesi kuruyorum.</span></div>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">Farklı müşterilere farklı fiyat çerçevesi kullanabiliyorum (merkez/çevre yol).</span></div>\n<div class="test-q"><span class="q-label">8</span><span class="q-text">Çeyrek sonu baskısında marjı koruyabiliyorum.</span></div>\n<div class="score-box"><strong>📊 Puanlama:</strong> </div>\n<div class="score-range">32-40 puan: Fiyat ilişkin sağlıklı. İnce ayar yap. 20-31 puan: Orta — muhtemelen 2-3 kritik zayıflık var (genellikle sessizlik ve indirim refleksi). 8-19 puan: Fiyat korkusu aktif. Murat\'ın pratiğini hatırla: Ayna karşısında fiyatı 50 kez söyle, göz teması koru, ses tonunu düşürme. Ve Kısım 1 Bölüm 5\'teki (Özgüven) Bandura\'nın özyeterlilik kaynaklarına geri dön.</div>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">6 ADIMLI FİYAT OPTİMİZASYON PROTOKOLÜ</div></div>\n<p>Bu protokol mevcut fiyat sunumunu yeniden tasarlaman için. Her adım 20 dakika.</p>\n<p>Adım 1: Maliyet Haritası (20 dk)</p>\n<p>Müşterinin mevcut durumunun maliyetini hesapla. Manuel süreçler, zaman kaybı, fire, fırsat maliyeti. Bu sayı senin değer çıpan — fiyattan önce sunulacak.</p>\n<p>Adım 2: Çıpa Tasarımı (20 dk)</p>\n<p>3 alternatif çıpa hazırla: (a) Sektör ortalaması, (b) müşterinin mevcut maliyeti, (c) rakip fiyatı (biliyorsan). Hangisi bu müşteri için en etkili? Merkez yol müşterisine sektör ortalaması, çevre yol müşterisine değer çıpası daha uygun.</p>\n<p>Adım 3: Çerçeve Seçimi (20 dk)</p>\n<p>Fiyatı nasıl sunacaksın? Kayıp mı kazanç mı? Aylık mı günlük mü? Mutlak mı yüzde mi? Müşterinin enflasyon kaygısı varsa kazanç çerçevesi + bugünün fiyatı vurgusu. Risk kaygısı varsa kayıp çerçevesi + mevcut maliyetin görünür kılınması.</p>\n<p>Adım 4: Zihinsel Kutu Tespiti (20 dk)</p>\n<p>Bu ürün müşterinin hangi zihinsel kutusunda? "Maliyet" mi "yatırım" mı "operasyonel gider" mi "stratejik proje" mi? Kutu yanlışsa fiyat her zaman yüksek görünür. Kutuyu değiştirmek için ürünü nasıl konumlandırmalısın?</p>\n<p>Adım 5: İndirim Stratejisi (20 dk)</p>\n<p>Müşteri indirim isterse ne yapacaksın? 3 seçenek hazırla: (a) İndirim yok ama ek değer ("fiyat aynı ama 3 ay destek dahil"), (b) koşullu indirim ("yıllık sözleşmede yüzde 10"), (c) kısmi indirim + karşılık ("yüzde 5 indirim + referans izni"). Hangi koşulda hangisini kullanacaksın?</p>\n<p>Adım 6: Sessizlik Provası (20 dk)</p>\n<p>Fiyat cümlesini sesli söyle ve 5 saniye sus. Bunu 10 kez tekrarla. Her tekrarda şunu kontrol et: Ses tonum düştü mü? Göz temasın kaydı mı? Doldurmak için ek cümle söyledin mi? 10 tekrardan sonra refleks oturmaya başlar.</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<h4 class="researcher">Knutson, B. et al. (2007). Neural predictors of purchases. Neuron, 53(1), 147-156.</h4>\n<h4 class="researcher">Kahneman, D. &amp; Tversky, A. (1979). Prospect theory. Econometrica, 47(2), 263-292.</h4>\n<div class="ref-line">Tversky, A. &amp; Kahneman, D. (1974). Judgment under uncertainty. Science, 185(4157), 1124-1131.</div>\n<h4 class="researcher">Thaler, R. H. (1999). Mental accounting matters. JBDM, 12(3), 183-206.</h4>\n<div class="ref-line">Thaler, R. H. (1985). Mental accounting and consumer choice. Marketing Science, 4(3), 199-214.</div>\n<div class="ref-line">Prelec, D. &amp; Loewenstein, G. (1998). The red and the black. Marketing Science, 17(1), 4-28.</div>\n<h4 class="researcher">Ariely, D. et al. (2003). Coherent arbitrariness. QJE, 118(1), 73-106.</h4>\n<h4 class="researcher">Northcraft, G. D. &amp; Neale, M. A. (1987). Experts, amateurs, and real estate. OBHDP, 39(1), 84-97.</h4>\n<h4 class="researcher">Gourville, J. T. (1998). Pennies-a-day. JCR, 24(4), 395-408.</h4>\n<h4 class="researcher">Soman, D. (2001). Effects of payment mechanism. JCR, 27(4), 460-474.</h4>\n<h4 class="researcher">Shah, A. M. et al. (2016). Paper or plastic. JCR, 42(5), 688-708.</h4>'},
'3-4':{b:'İtiraz',d:'Direnç Simülasyonları',c:9986,h:'<h4 class="section-title">İTİRAZ</h4>\n<p>İtiraz Simülasyonu: Teşhis Et, Dans Et, Dönüştür</p>\n<p>Ana bölümde "hayır"ın 7 anlamını, psikolojik reaktansı, judo stratejisini ve "ama"nın ölümünü gördün. Bu ek seni simülasyona sokuyor: 5 gerçek itiraz vakasını judo yaklaşımıyla çözecek, kendi itiraz refleksini ölçecek ve 3 haftalık bir saha antrenmanıyla yeni refleksler inşa edeceksin. Ama önce direnç psikolojisinin bir katmanını daha açalım.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">DİRENCİN KÖKENLERİ — MÜŞTERI NEDEN DİRENİYOR?</div></div>\n<p>Ana bölümde Brehm\'in reaktansını gördük — özgürlük tehdidi dirence yol açıyor. Ama direncin sadece reaktans olmayan kökleri de var. Knowles ve Linn\'in (2004) "direnç modeli" 4 kaynak tanımlıyor:</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Reaktans — "Beni zorlama"</span></div>\n<p>Brehm\'in modeli. Özgürlük tehdidi. Baskılı satış, yapay aciliyet, "bu teklif bugün bitiyor" — hepsi reaktans tetikliyor. Çözüm biliniyor: Zorlamak yerine davet et, seçenek sun, özerkliği koru.</p>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Şüphe — "İnanmıyorum"</span></div>\n<p>Müşteri argümanın geçerliliğini sorguluyor. Mesajın içeriğine direnç. Bu sağlıklı bir direnç — Sistem 2 aktif, müşteri düşünüyor. Bu dirençle "dans etmek" demek müşterinin şüphesini ciddiye almak: "Haklısınız, bu iddiayı destekleyen veriyi göstereyim." Şüpheyi bastırmak değil, kanıtla cevaplamak. ELM\'in merkez yolu burada devrede.</p>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Atalet — "Mevcut durum yeterli"</span></div>\n<p>Samuelson ve Zeckhauser\'in (1988) status quo bias\'ı: İnsanlar mevcut durumu tercih ediyor — değişim riski taşıyor, kayıp potansiyeli var (prospect theory). Bu direnç duygusal değil, bilişsel — beyin "değiştirme maliyetini" abartıyor. Çözüm: Değişmemenin maliyetini görünür kıl. Bölüm 3\'teki kayıp çerçevelemesi burada devrede: "Mevcut sisteminiz size ayda şu kadara mal oluyor."</p>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">İnceleme — "Daha fazla bilgi lazım"</span></div>\n<p>Müşteri karar verememiyor çünkü bilgisi yetersiz. Bu itiraz değil, bilgi talebi. Ama satışçı çoğu zaman bunu itiraz olarak okuyor ve savunmaya geçiyor. Doğru cevap: Bilgiyi sun, zaman ver, takip et. Iyengar\'ın karar felcini hatırla (Kısım 2 Bölüm 7) — bazen müşteriye daha az seçenek sunmak, daha çok bilgi sunmaktan etkili.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Knowles, E. S. &amp; Linn, J. A. (2004). Resistance and Persuasion. Erlbaum. 4 kaynak modeli: reaktans, şüphe, atalet, inceleme. | Samuelson, W. &amp; Zeckhauser, R. (1988). Status quo bias in decision making. JRUF, 1(1), 7-59. | Jacks, J. Z. &amp; Cameron, K. A. (2003). Strategies for resisting persuasion. Basic and Applied Social Psychology, 25(2), 145-161. 7 direnç stratejisi taksonomisi.</div>\n<p>Grice ve İşbirliği İlkesi — Müşteri Neden Gerçeği Söylemiyor?</p>\n<p>Paul Grice\'ın konuşma işbirliği ilkesi (1975) itiraz okumada güçlü bir araç. Grice diyor ki: Normal konuşmada insanlar 4 kurala uyar — nicelik (yeterli bilgi ver), nitelik (doğru söyle), ilgi (konuyla ilgili söyle), tarz (açık söyle). Bu kurallar ihlal edildiğinde bir "sezdirim" (implicature) oluşuyor — söylenmeyeni anlamalısın.</p>\n<p>Satış itirazlarında Grice ihlalleri yaygın. Müşteri "fiyat yüksek" diyor — ama gerçek sorun güven eksikliği. Nitelik kuralını ihlal ediyor (söylediği tam doğru değil) çünkü gerçek sebebi söylemek ya zor (kültürel) ya riskli (güç kaybı). Satışçının görevi: Söylenenin arkasındaki sezdirimi oku. Nasıl? Soru sorarak: "Fiyat dışında sizi düşündüren başka bir şey var mı?" Bu soru Grice\'ın nitelik kuralını yeniden aktive ediyor — müşteriye "gerçeği söylemen güvenli" sinyali veriyor.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Grice, H. P. (1975). Logic and conversation. In Cole, P. &amp; Morgan, J. L. (Eds.), Syntax and Semantics, Vol. 3. Academic Press. 4 konuşma kuralı ve sezdirim. | Levinson, S. C. (2000). Presumptive Meanings: The Theory of Generalized Conversational Implicature. MIT Press.</div>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">İTİRAZ SİMÜLASYONLARI — 5 VAKA, 5 DANS</div></div>\n<p>Her vakada klasik yaklaşım vs judo yaklaşımı karşılaştırılıyor. Kendi cevabını düşün, sonra judo versiyonunu oku.</p>\n<p>Simülasyon 1: "Rakibiniz Daha Ucuz"</p>\n<p>Sektör: Yazılım. Müşteri: IT müdürü. İtiraz: "X firması aynı şeyi yüzde 30 daha ucuza sunuyor."</p>\n<p>Klasik: "Ama bizim kalitemiz daha yüksek, destek hizmetimiz daha iyi." Sonuç: Müşteri "onların desteği de iyi" diyor, pozisyon sertleşiyor.</p>\n<p>Judo: "X firmasını değerlendirmeniz doğal. Onları tercih etmenize neden olan ana kriter fiyat mı, yoksa başka bir faktör de var mı?" Bu sorunun gücü: Müşteri düşünüyor. Bazen cevap: "Aslında patron fiyata bakıyor." — 5. hayır (patron istemez) ortaya çıkıyor. Bazen: "Şey, bir de referansları güçlü." — gerçek endişe fiyat değil, güvenilirlik. Teşhis değişince tedavi değişiyor.</p>\n<p>Simülasyon 2: "Düşüneceğiz"</p>\n<p>Sektör: Eğitim hizmetleri. Müşteri: İK direktörü. İtiraz: "Çok güzel sunum, düşüneceğiz."</p>\n<p>Klasik: "Tabii, ne zaman dönebilirsiniz?" ve sonra haftalık takip aramaları. Müşteri kaçar.</p>\n<p>Judo: "Elbette. Düşünürken özellikle hangi konuya odaklanacaksınız — program içeriği mi, zamanlama mı, bütçe onayı mı?" Bu soru 3 şey yapıyor: (1) "Düşüneceğiz"in gerçek anlamını açığa çıkarıyor. (2) Müşteriye "konuşmanın bitmediği" sinyali veriyor — ama baskısız. (3) Sonraki adım için somut bir kancaya dönüşüyor: "Bütçe onayı" dediyse, CFO\'ya yönelik ROI materyali hazırlayabilirsin.</p>\n<p>Simülasyon 3: "Mevcut Tedarikçimizden Memnunuz"</p>\n<p>Sektör: Endüstriyel malzeme. Müşteri: Satın alma müdürü. İtiraz: "Mehmet Bey\'le 10 yıldır çalışıyoruz, memnunuz."</p>\n<p>Klasik: "Ama biz daha iyi fiyat/kalite sunabiliriz." Sonuç: Müşteri savunmaya geçer — çünkü 10 yıllık ilişkiyi sorgulamak kişisel saldırı gibi hissedilir.</p>\n<p>Judo: "10 yıllık ilişki çok değerli, bunu bozmak aklımdan geçmez. Merak ettiğim şu: Eğer Mehmet Bey\'in sunduğu çözümde bir şeyi değiştirebilseydiniz, ne olurdu?" Bu soru mevcut ilişkiye saygı gösteriyor (reaktans yok) ve müşterinin farkında bile olmadığı bir memnuniyetsizliği yüzeye çıkarıyor. Cevap "hiçbir şey" olabilir — o zaman gerçek hayır, kabul et. Ama çoğu zaman bir şey çıkıyor: "Şey, teslimat süreleri bazen sarkıyor." İşte giriş noktası — ama zorlamadan, not alarak, sonraki görüşmeye malzeme olarak.</p>\n<p>Simülasyon 4: "Bu Bizim İçin Çok Karmaşık"</p>\n<p>Sektör: Teknoloji. Müşteri: Genel müdür. İtiraz: "Ekibimiz buna hazır değil, çok karmaşık."</p>\n<p>Klasik: "Eğitim desteği veriyoruz, kolay adapte olurlar." Sonuç: Müşteri ikna olmaz çünkü korku mantıkla çözülmüyor.</p>\n<p>Judo: "Bu endişeyi çok duyuyoruz ve haklı bir endişe. Daha önce benzer endişesi olan bir müşterimiz vardı — ilk 2 ayda gerçekten zorlandılar. Sonra şu oldu..." Hikaye anlatımı (Bölüm 2, Zak oksitosin) + onaylama + gerçekçilik. "İlk 2 ayda zorlandılar" cümlesi kritik — Kısım 1 DNA\'sı: "İki ileri bir geri" gerçekçiliği. "Kolay olacak" demek güven kırar, "zor ama yapılabilir" demek güven kurar.</p>\n<p>Simülasyon 5: Sessiz İtiraz — Hiçbir Şey Söylemeyen Müşteri</p>\n<p>Sektör: Gayrimenkul danışmanlığı. Müşteri: Yatırımcı. İtiraz: Yok — müşteri kibar gülümsüyor, başını sallıyor, hiç soru sormuyor.</p>\n<p>Klasik: "Harika, demek ki her şey tamam!" ve kapanış sorusu. Müşteri: "Düşüneceğiz." Dönmez.</p>\n<p>Judo: Sessiz itirazı davet et. "Her şey çok sorunsuz görünüyor — ama deneyimlerim bana genellikle en az bir tereddüt noktası olduğunu gösteriyor. Sizi düşündüren bir şey var mı?" Bu soru cesaretli — çünkü satışçı kendi aleyhine bilgi istiyor. Ama bu cesaret güven üretiyor (Kısım 2 Bölüm 4, savunmasızlık bileşeni). Ve müşteri çoğu zaman açılıyor: "Aslında şu konu var..."</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">İTİRAZ REFLEKS TESTİ</div></div>\n<p>Aşağıdaki 10 ifadeyi 1-5 arasında puanla.</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">İtiraz geldiğinde hemen cevap vermek yerine önce soru sorarım.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">"Ama" kelimesini itiraz cevabında kullanmamaya dikkat ederim.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Müşterinin itirazını kişisel almıyorum.</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">"Hayır"ın arkasındaki gerçek sebebi anlamaya çalışırım.</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Müşteriye hak verebilirim — fiyatımız gerçekten yüksekse bunu kabul ederim.</span></div>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">İtiraz geldiğinde savunmaya geçmek yerine sessiz kalabiliyorum (3+ saniye).</span></div>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">Hiç itiraz etmeyen müşteriyi tehlike sinyali olarak okurum.</span></div>\n<div class="test-q"><span class="q-label">8</span><span class="q-text">Kaybettiğim satışlardan sonra müşteriyi arayıp geribildirim isterim.</span></div>\n<div class="test-q"><span class="q-label">9</span><span class="q-text">Müşterinin "bakarız" demesinin genellikle "hayır" anlamına geldiğini bilirim.</span></div>\n<div class="test-q"><span class="q-label">10</span><span class="q-text">İtirazı davet ederim — "sizi düşündüren bir şey var mı?" sorusunu sorarım.</span></div>\n<div class="score-box"><strong>📊 Puanlama:</strong> </div>\n<p>40-50: İtiraz refleksin güçlü — judo tarzında çalışıyorsun. 25-39: Orta — muhtemelen 2-3 kritik nokta var (genellikle sessizlik ve kişisel alma). 10-24: Klasik "empati + ama + çürütme" refleksi aktif. Bu modüldeki simülasyonları günde 1 tane sesli prova yap.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">3 HAFTALIK İTİRAZ ANTRENMAN PROGRAMI</div></div>\n<p>Her hafta 1 odak. Ana bölümdeki "7 hayır" çerçevesini saha pratiğine dönüştürüyoruz.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Teşhis Haftası</div></div>\n<p>Bu hafta her itiraz aldığında cevap vermeden önce 3 saniye sus ve kendine sor: "Bu 7 hayırdan hangisi?" Not al: İtiraz ne? Tahminin ne? Sonuç ne oldu? Hafta sonunda kalıpları gör — belki çoğu itirazın "henüz değil" hayırı olduğunu keşfedeceksin. Ya da çoğunun "güvenmiyorum" olduğunu.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Soru Haftası</div></div>\n<p>Bu hafta her itiraz geldiğinde cevap yerine soru sor. Tek bir soru: "Bu konuda sizi en çok endişelendiren ne?" veya "Neye göre yüksek/karmaşık/erken?" Her görüşmeden sonra not al: Soru sormak cevabı değiştirdi mi? Beklemediğin bilgi geldi mi?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Dans Haftası</div></div>\n<p>Bu hafta judo stratejilerini uygula: İtirazı soruya çevir, itirazı onaylayarak genişlet, "ama" yerine "ve" kullan. Her görüşmeden sonra kendine puan ver: Güreştim mi, dans ettim mi?</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<div class="ref-line">Brehm, J. W. (1966). A Theory of Psychological Reactance. Academic Press.</div>\n<h4 class="researcher">Miller, W. R. &amp; Rollnick, S. (2013). Motivational Interviewing (3rd ed.). Guilford.</h4>\n<h4 class="researcher">Knowles, E. S. &amp; Linn, J. A. (2004). Resistance and Persuasion. Erlbaum.</h4>\n<h4 class="researcher">Samuelson, W. &amp; Zeckhauser, R. (1988). Status quo bias. JRUF, 1(1), 7-59.</h4>\n<h4 class="researcher">Grice, H. P. (1975). Logic and conversation. Syntax and Semantics, Vol. 3.</h4>\n<h4 class="researcher">Jacks, J. Z. &amp; Cameron, K. A. (2003). Strategies for resisting persuasion. BASP, 25(2), 145-161.</h4>\n<h4 class="researcher">Dillard, J. P. &amp; Shen, L. (2005). Reactance and persuasive health communication. CM, 72(2), 144-168.</h4>\n<h4 class="researcher">Moyers, T. B. &amp; Rollnick, S. (2002). MI perspective on resistance. JCLP, 58(2), 185-193.</h4>\n<div class="ref-line">Eisenberger, N. I. et al. (2003). Does rejection hurt? Science, 302, 290-292.</div>\n<div class="ref-line">Levinson, S. C. (2000). Presumptive Meanings. MIT Press.</div>'},
'3-5':{b:'Müzakere',d:'Oyun Teorisi ve BATNA',c:9621,h:'<h4 class="section-title">MÜZAKERE</h4>\n<p>Müzakere Atölyesi: Stratejini Kur, Sahada Test Et, Ustalaş</p>\n<p>Ana bölümde Fisher-Ury çerçevesini, BATNA\'yı, dağıtımcı/bütünleştirici ayrımını ve Türkiye\'ye özgü müzakere dinamiklerini gördün. Bu ek seni atölyeye alıyor: 4 gerçek müzakere vakasını çözecek, BATNA güçlendirme planı hazırlayacak, kendi müzakere profilini çıkaracak ve 3 haftalık bir saha programıyla müzakere kasını geliştireceksin. Ama önce müzakere biliminin bir katmanını daha açalım.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">MÜZAKEREDE OYUN TEORİSİ — GÖRÜNMEYENLERİ GÖRMEK</div></div>\n<p>Fisher-Ury pratiğe yönelik bir çerçeve sunuyor. Ama altında oyun teorisi var — ve oyun teorisinin birkaç kavramı sahada çok işe yarıyor.</p>\n<p>Mahkum İkilemi ve Güven</p>\n<p>Klasik oyun teorisi senaryosu: İki tutuklunun her biri ya işbirliği yapacak ya ihanet edecek. İkisi de işbirliği yaparsa ikisi de kazanır. Biri ihanet ederse ihanet eden çok kazanır, diğeri çok kaybeder. İkisi de ihanet ederse ikisi de kaybeder.</p>\n<p>Satış müzakeresi bu ikilem üzerine kuruludur: Müşteri ve satışçı işbirliği yaparsa (bütünleştirici) ikisi de kazanır. Biri "ezme" yaparsa kısa vadede kazanır, uzun vadede ilişki ölür. İkisi de ezmeye çalışırsa anlaşma kopuyor.</p>\n<p>Axelrod\'un (1984) bilgisayar turnuvası bu ikileme bir cevap buldu: En başarılı strateji "tit-for-tat" — işbirliğiyle başla, karşı taraf ne yaparsa onu yap. Basit, şeffaf, bağışlayıcı. Satışta: İyi niyetle başla, müşteri işbirliği yaparsa sen de yap, müşteri ezmeye çalışırsa sınır koy. Ama ilk hamle her zaman işbirliği olsun — çünkü karşılıklılık (Bölüm 1) güçlü bir güdü ve ilk veren çoğu zaman geri alıyor.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Axelrod, R. (1984). The Evolution of Cooperation. Basic Books. Tit-for-tat stratejisi. | Nash, J. (1950). The bargaining problem. Econometrica, 18(2), 155-162. Nash denge noktası — müzakerenin matematiksel çerçevesi. | Rapoport, A. &amp; Chammah, A. M. (1965). Prisoner\'s Dilemma. University of Michigan Press. Mahkum ikilemi deneyleri.</div>\n<p>ZOPA — Anlaşma Alanı</p>\n<p>Zone of Possible Agreement (ZOPA): Senin minimum kabul edebileceğin ile müşterinin maksimum ödeyebileceği arasındaki alan. ZOPA yoksa anlaşma yok — matematik buna izin vermiyor. ZOPA varsa mesele o alanı nasıl paylaştığın.</p>\n<p>Dağıtımcı müzakerede ZOPA\'yı paylaşıyorsun — kim daha güçlüyse daha çok alıyor. Bütünleştirici müzakerede ZOPA\'yı büyütüyorsun — faz yapma, kapsam esnekliği, ödeme planı, ek hizmetler. ZOPA\'yı büyüten her yaratıcı çözüm, her iki tarafın da daha çok almasını sağlıyor.</p>\n<p>Sahada ZOPA\'yı nasıl bulursun? Müşterinin bütçesini (doğrudan veya dolaylı) öğren: "Bu proje için ayırdığınız bütçe aralığı nedir?" Çoğu satışçı bunu sormaktan korkuyor — ama cevap müzakerenin haritasını çiziyor. Bütçe 100K ve fiyatın 150K ise ZOPA yok — ya kapsamı daralt ya da çekil. Bütçe 120K ve fiyatın 100K ise ZOPA geniş — ek değer sunabilirsin.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">MÜZAKERE OTOPSİLERİ — 4 MASA, 4 SONUÇ</div></div>\n<p>Her vakada strateji seçimi ve sonuçları analiz ediyoruz.</p>\n<p>Vaka 1: Holding Faz Çözümü — Sernaz\'ın Hikayesi</p>\n<p>Ana bölümden: 6 modül, 12 ay, İK direktörü yüzde 30 indirim istiyor, gerçek çıkar CFO onayı. Faz çözümü uygulandı, toplam fiyat korundu.</p>\n<p>Müzakere analizi: Dağıtımcı tıkanmadan bütünleştirici çözüme geçiş. Anahtar an: "Bu indirime neden ihtiyacınız var?" sorusu — pozisyondan çıkara geçiş. ZOPA: Müşterinin toplam bütçesi yeterliydi ama tek seferlik onay sınırı düşüktü. Faz yapma ZOPA\'yı yeniden tanımladı — her faz kendi ZOPA\'sında.</p>\n<p>Vaka 2: KOBİ Patron Müzakeresi — Çay, Söz ve Güreş</p>\n<p>Durum: Endüstriyel otomasyon, Gaziantep KOBİ. Patron (Nejat Bey, 55 yaş) ile müzakere. 3 saat çay, 30 dakika iş konuşması. Patron: "Güzel ürün ama bu fiyata bize kaç set verirsin?" Satışçımız (Deniz — Kısım 2 DD1\'deki 4 kişilik toplantıdan farklı bir Deniz): "Fiyat sabit, indirim yapamam." Patron masadan kalktı. İş bitti.</p>\n<p>Analiz: Deniz dağıtımcı müzakereye katı pozisyonla girdi. Patron\'un kültürel beklentisi: Pazarlık olacak, biraz kırılacak, el sıkışılacak. "İndirim yapamam" demek Türk iş kültüründe "seninle iş yapmak istemiyorum" olarak okunabilir. Patron müzakere sürecinin kendisine değer veriyordu — sonuç kadar süreç önemli.</p>\n<p>Yapılması gereken: Fiyat kırmak yerine ek değer sun — "fiyat bu ama ilk yıl bakım ücretsiz" veya "eğitim paketi dahil" veya "2. siparişte yüzde 10 indirim." Patron "bir şey koparttım" hissi istiyor. Bu his bütünleştirici çözümle karşılanabilir — pasta büyür, patron mutlu, marj korunur.</p>\n<p>Vaka 3: Çok Taraflı Müzakere — 4 Departman, 4 Çıkar</p>\n<p>Durum: ERP satışı, orta ölçekli üretim şirketi. Masada: Genel müdür (stratejik vizyon), CFO (maliyet kontrolü), IT müdürü (teknik uyumluluk), üretim müdürü (operasyonel süreklilik). Kısım 2 Bölüm 7\'deki Selin senaryosunun müzakere versiyonu.</p>\n<p>Her departmanın BATNA\'sı farklı: GM\'nin BATNA\'sı rakip ERP. CFO\'nun BATNA\'sı hiçbir şey yapmama ("mevcut sistem çalışıyor"). IT\'nin BATNA\'sı iç geliştirme. Üretimin BATNA\'sı "beni rahat bırakın." 4 farklı BATNA = 4 farklı müzakere.</p>\n<p>Strateji: Her departmanla ayrı ön müzakere yap. GM\'ye vizyon sun. CFO\'ya ROI hesabı. IT\'ye teknik uyumluluk garantisi. Üretime pilot program teklifi ("önce sizin hattınızda deneyelim, beğenmezseniz geri alırız"). Toplantıya herkes kendi çıkarı karşılanmış olarak gelsin. Selin\'in intikamı (Bölüm 6 DD) — grup müzakeresi önceden hazırlanır.</p>\n<p>Vaka 4: "Ya Al Ya Bırak" — Güç Asimetrisi</p>\n<p>Durum: Büyük perakende zinciri, tedarikçi müzakeresi. Zincirin BATNA\'sı çok güçlü — 20 tedarikçi sırada. Tedarikçinin (bizim müşterimiz) BATNA\'sı zayıf — bu zincir cironun yüzde 40\'ı. Zincir diyor: "Ya fiyatı yüzde 25 düşür ya çık."</p>\n<p>Analiz: BATNA asimetrisi çok büyük. Bütünleştirici çözüm teklif etsen bile zincirin motivasyonu yok — neden pastayı büyütsün ki, küçük pastadan bile yetiyor. Bu "ezme" müzakeresi — ve bazen kaybedersin.</p>\n<p>Yapılması gereken: Kısa vadede hayatta kal, uzun vadede BATNA\'nı güçlendir. Yüzde 25\'i kabul edip yeni müşteriler bulmak. Ciro bağımlılığını yüzde 40\'tan yüzde 20\'ye düşürmek. 2 yıl sonra müzakereye daha güçlü BATNA\'yla dönmek. Bazen müzakerenin en iyi hamlesi masadan kalkmak değil, masadayken paralel hamle yapmak.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">MÜZAKERE PROFİLİ TESTİ</div></div>\n<p>10 ifadeyi 1-5 arası puanla.</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Müzakereye girmeden önce BATNA\'mı belirliyorum.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Müşterinin pozisyonunun arkasındaki çıkarı sormayı biliyorum.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Fiyat dışında müzakere araçlarım var (kapsam, vade, ek hizmet).</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Müzakerede duygularımı kontrol edebiliyorum (kızgınlık, korku).</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">"Hayır" diyebiliyorum — marj sınırımı koruyabiliyorum.</span></div>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">Masadan kalkabiliyorum — her anlaşma iyi anlaşma değil.</span></div>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">Müşterinin BATNA\'sını araştırıyorum.</span></div>\n<div class="test-q"><span class="q-label">8</span><span class="q-text">Bütünleştirici çözümler üretebiliyorum (pastayı büyütme).</span></div>\n<div class="test-q"><span class="q-label">9</span><span class="q-text">Türkiye\'de müzakerenin ilişkisel boyutunu yönetebiliyorum (çay, sohbet, sofra).</span></div>\n<div class="test-q"><span class="q-label">10</span><span class="q-text">Müzakere sonrası ilişkiyi koruyabiliyorum — kazansam da kaybetsem de.</span></div>\n<div class="score-box"><strong>📊 Puanlama:</strong> </div>\n<p>40-50: Güçlü müzakereci — stratejik düşünüyorsun. 25-39: Orta — muhtemelen BATNA hazırlığı ve bütünleştirici çözüm üretimi zayıf. 10-24: Müzakereye hazırlıksız giriyorsun. Bu modüldeki BATNA planını doldurmadan masaya oturma.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">3 HAFTALIK MÜZAKERE ANTRENMAN PROGRAMI</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">BATNA Haftası</div></div>\n<p>Bu hafta her müzakere öncesi 15 dakika ayır: Benim BATNA\'m ne? Müşterinin BATNA\'sı ne? ZOPA nerede? Bu 3 soruyu bir kağıda yaz. Müzakere sonrası not al: BATNA tahminim doğru muydu? ZOPA\'yı doğru mu tahmin ettim?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Çıkar Haftası</div></div>\n<p>Bu hafta her müzakerede en az 1 kez "neden" sorusu sor: "Bu size neden önemli?" veya "Bu talepteki asıl endişeniz ne?" Pozisyondan çıkara geçmeyi dene. Not al: Çıkar öğrendiğimde strateji değişti mi?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Yaratıcı Çözüm Haftası</div></div>\n<p>Bu hafta her tıkanan müzakerede 1 bütünleştirici çözüm teklif et: Faz yapma, kapsam esnekliği, ödeme planı, ek hizmet, garanti uzatma. "Fiyatı düşüremem ama şunu yapabilirim" formülü. Not al: Müşterinin tepkisi ne oldu? Pasta büyüdü mü?</p>\n<div class="mod-header"><div class="mod-num">5</div><div class="mod-title">BATNA GÜÇLENDİRME PLANI ŞABLONU</div></div>\n<p>Her müzakere öncesi bu şablonu doldur. 15 dakika yatırım, saatlerce avantaj.</p>\n<p>Müşteri adı ve müzakere konusu: (yaz)</p>\n<p>Benim minimum kabul edebileceğim koşullar (marj sınırı, kapsam sınırı): (yaz)</p>\n<p>Benim BATNA\'m — bu anlaşma olmazsa en iyi alternatifim: (yaz). BATNA\'m güçlü mü zayıf mı? Güçlendirmek için ne yapabilirim?</p>\n<p>Müşterinin tahmini BATNA\'sı — beni almazsa ne yapacak? (yaz). Bu BATNA\'yı nasıl öğrenebilirim — doğrudan sorabilir miyim?</p>\n<p>Müşterinin pozisyonu (ne istiyor): (yaz)</p>\n<p>Müşterinin olası çıkarı (neden istiyor): (yaz). Bu çıkarı karşılamanın fiyat dışında yolları var mı?</p>\n<p>ZOPA tahmini — minimum kabul edebileceğimle müşterinin max ödeyebileceği arasında alan var mı? (yaz). ZOPA yoksa ne yapacağım?</p>\n<p>Bütünleştirici çözüm seçenekleri — pastayı büyütmenin 3 yolu: (yaz). Faz yapma? Kapsam esnekliği? Ödeme planı? Ek hizmet? Garanti? Referans karşılığı?</p>\n<p>Bu şablonu müzakereden hemen önce doldur, müzakere sırasında yanında tut, müzakere sonrasında güncelle. 3 müzakere sonrasında kalıpları gör: Hangi sorular işe yaradı? BATNA tahminlerin ne kadar doğruydu? Bütünleştirici çözümler karşılık buldu mu?</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<h4 class="researcher">Fisher, R. &amp; Ury, W. (1981). Getting to Yes. Penguin.</h4>\n<h4 class="researcher">Fisher, R., Ury, W. &amp; Patton, B. (2011). Getting to Yes (3rd ed.). Penguin.</h4>\n<div class="ref-line">Raiffa, H. (1982). The Art and Science of Negotiation. Harvard UP.</div>\n<h4 class="researcher">Axelrod, R. (1984). The Evolution of Cooperation. Basic Books.</h4>\n<h4 class="researcher">Nash, J. (1950). The bargaining problem. Econometrica, 18(2), 155-162.</h4>\n<h4 class="researcher">Thompson, L. (2005). The Mind and Heart of the Negotiator (3rd ed.). Pearson.</h4>\n<div class="ref-line">Van Kleef, G. A. et al. (2004). Interpersonal effects of anger and happiness. JPSP, 86(1), 57-76.</div>\n<div class="ref-line">Lerner, J. S. &amp; Keltner, D. (2001). Fear, anger, and risk. JPSP, 81(1), 146-159.</div>\n<div class="ref-line">Bazerman, M. H. &amp; Neale, M. A. (1992). Negotiating Rationally. Free Press.</div>'},
'3-6':{b:'Kapanış',d:'Karar Anı Psikolojisi',c:9160,h:'<h4 class="section-title">KAPANIŞ</h4>\n<p>Kapanış Kliniği: Korkuyu Haritalandır, Anı Oku, Sahada Uygula</p>\n<p>Ana bölümde kapanış korkusunun anatomisini, sinyal okumayı, davet eden kapanışı ve mikro taahhüt merdivenini gördün. Bu ek seni kliniğe alıyor: Kapanış anlarını video otopsisiyle çözecek, kendi kapanış profilini çıkaracak ve 3 haftalık bir saha programıyla yeni refleksler inşa edeceksin. Ama önce kapanış psikolojisinin derinlerine inelim.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">KARAR ANI PSİKOLOJİSİ — EŞİK TEORİSİ</div></div>\n<p>Karar anı bir "an" mı yoksa bir "süreç" mi? Busemeyer ve Townsend\'in (1993) Decision Field Theory net bir cevap veriyor: Karar bir eşik. Beyin sürekli bilgi biriktiriyor — her görüşme, her sunum, her etkileşim delil biriktirme. Bir eşiğe ulaşılınca karar "oluyor" — düğmeye basılıyor.</p>\n<p>Satışta bu ne demek? Müşterinin beyninde bir "delil akümülatörü" çalışıyor. Her pozitif deneyim (güven, değer, uygunluk) akümülatörü "evet" eşiğine yaklaştırıyor. Her negatif deneyim (şüphe, korku, baskı) "hayır" eşiğine yaklaştırıyor. Kapanış sorusu bu akümülatörün o anda nerede olduğunu test ediyor.</p>\n<p>Bu yüzden zamanlama kritik: Akümülatör evet eşiğine yakınken sor — kolay evet. Ortadayken sor — "düşüneceğim" (kararsız). Hayır eşiğine yakınken sor — "hayır" ve reaktans (çünkü zorlanmış hissediyor). Sahiplenme sinyalleri akümülatörün evet eşiğine yaklaştığının göstergesi — ana bölümde gördük.</p>\n<p>Ve ilginç bir bulgu: Ariely ve Wertenbroch\'un (2002) çalışması gösterdi ki kendi koyduğu taahhütlere insanlar daha çok uyuyor — dışarıdan dayatılan taahhütlere değil. Kapanış sorusunu müşteri kendisi cevaplayınca (davet eden kapanış) karar daha kalıcı. "Bugün imzalayın" baskısıyla alınan karar Ariely\'nin dışsal taahhüdü — pişmanlık riski yüksek.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Busemeyer, J. R. &amp; Townsend, J. T. (1993). Decision field theory: A dynamic-cognitive approach to decision making. Psychological Review, 100(3), 432-459. | Ariely, D. &amp; Wertenbroch, K. (2002). Procrastination, deadlines, and performance. Psychological Science, 13(3), 219-224. İç vs dış taahhüt kalıcılığı. | Ratcliff, R. &amp; McKoon, G. (2008). The diffusion decision model. Neural Computation, 20(4), 873-922. Delil birikim modeli.</div>\n<p>Commitment ve Consistency — Kaldıraç mı Tuzak mı?</p>\n<p>Cialdini\'nin tutarlılık ilkesinin kapanıştaki kullanımı çift taraflı bir kılıç. Doğru kullanım: Mikro taahhüt merdiveni — müşteri kendi adımlarıyla ilerliyor, her adım öncekiyle tutarlı, büyük evet doğal geliyor. Yanlış kullanım: "Dediniz ki bize lazım, dediniz ki bütçe var, dediniz ki zamanlaması uygun — o zaman devam edelim" — bu müşterinin kendi sözlerini ona karşı kullanmak. Manipülasyon.</p>\n<p>Fark: Mikro taahhüt merdiveninde müşteri her adımda özgürce karar veriyor. "Sözlerinizi hatırlatma" kapanışında müşteri köşeye sıkıştırılıyor — ve köşeye sıkışan müşteri ya saldırır (kızar) ya kaçar ("düşüneceğiz" deyip kaybolur). Cialdini\'nin kendisi Pre-Suasion\'da "etik sınır" vurgusunu güçlendirdi: Tutarlılık silahı değil, zemin olmalı.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">KAPANIŞ OTOPSİLERİ — 5 AN, 5 KADER</div></div>\n<p>Her vakada kapanış anını frame-by-frame çözüyoruz: Sinyal ne? Satışçı ne yaptı? Ne yapmalıydı?</p>\n<p>Otopsi 1: Elif\'in Kaçışı</p>\n<p>Ana bölümden: 50 dakikalık mükemmel görüşme, müşteri sahiplenme sinyali veriyor, Elif kapanış sorusu yerine "teklif göndereceğim" diyor. Müşteri başkasından alıyor.</p>\n<p>Sinyal analizi: Elif\'in gördüğü — müşteri gülümsüyor, sorular soruyor. Elif\'in göremediği — kendi bedenindeki somatik alarm. Amigdala: "Eğer sorsam ve hayır derse 3 aylık emek boşa gider." PFC kapandı. Default tepki: Kaçış ("teklif göndereceğim" = kaçış).</p>\n<p>Yapılması gereken: "Konuştuklarımız sizin için uygun göründü, devam etmek ister misiniz?" Bu soruyu sormak 5 saniye sürüyor. O 5 saniye Elif\'in satışını kurtarabilirdi — veya en azından müşterinin "hayır" sebebini öğrenebilirdi. Her iki durumda da "teklif gönderip sessizliğe gömülme"den daha iyi.</p>\n<p>Otopsi 2: Erken Kapanış — Hamza\'nın Acelesі</p>\n<p>Durum: IT çözümleri, banka müşterisi. Hamza 1. görüşmenin 15. dakikasında: "Başlayalım mı?" Müşteri (IT direktörü): "Henüz detayları bile görmedik." Hamza: "Ama ihtiyacınız net, bizim çözüm uygun." Müşteri soğudu. 2. görüşme olmadı.</p>\n<p>Analiz: Hamza akümülatörün ortasında kapanış sorusu sordu — müşterinin delil birikimi yetersizdi. Daha kötüsü: Erken kapanış baskı olarak okundu, reaktans tetiklendi. "İhtiyacınız net" cümlesi müşterinin kendi ihtiyacını kendisinin belirlemesi gereken alanı ihlal etti — özerklik tehdidi.</p>\n<p>Yapılması gereken: 1. görüşmede kapanış sorusu değil, mikro taahhüt: "Size detaylı bir demo hazırlayalım mı?" Küçük evet → ikinci görüşme → daha büyük evet. Merdiven.</p>\n<p>Otopsi 3: Mükemmel Zamanlama — Kenan\'ın "Oğlumun Maçı" Anı</p>\n<p>Kısım 2 Bölüm 1\'den: Kenan "oğlumun maçı" bağlantısını kurdu, müşteri yumuşadı. Kenan ne yaptı? Sustu. 3 saniye. Müşteri: "Bu ürünü ne zaman kurabiliriz?" Sahiplenme sinyali. Kenan: "Pazartesi başlayabiliriz." Kapandı.</p>\n<p>Analiz: Kenan akümülatörün evet eşiğini okudu — "ne zaman kurabiliriz" sorusu eşiğin geçildiğinin teyidi. Ve Kenan kapanış sorusunu sormadı bile — müşteri kendi kapattı. Kenan\'ın yaptığı: Davet eden kapanışın en saf hali. Alan aç, müşteri kendi karar versin, kararı onayla.</p>\n<p>Otopsi 4: Sessiz Kapanış — Volkan\'ın Dönüşü</p>\n<p>Kısım 1 Bölüm 1\'den: Volkan, 15 yıllık satışçı, müşteriyi dinlemeyi öğrenmişti. 1 yıl sonra yeni bir beceri kazandı: Kapanış sessizliği. Müşteriye "ne düşünüyorsunuz" dedi ve bekledi. 7 saniye. Müşteri: "Yapalım." Volkan: Daha önce o 7 saniyede konuşmaya devam ediyordu — "şunu da ekleyeyim, bunu da düşünün" — ve kararı bozuyordu.</p>\n<p>Analiz: Kapanış sonrası sessizlik en zor ama en güçlü araç. Kısım 2 Bölüm 9\'un kapanış versiyonu. İlk konuşan taviz verir — ama bu manipülatif bir sessizlik değil. Müşteriye düşünme alanı verme. 7 saniye müşterinin PFC\'sinin çalışması için gereken süre.</p>\n<p>Otopsi 5: Grup Kapanışı — Selin\'in İntikamı</p>\n<p>Kısım 2 Bölüm 7\'den: Selin\'in 4 beyinli ERP toplantısında CFO veto etmişti. 6 ay sonra Selin geri döndü — bu sefer hazırlıklı. Toplantıdan önce herkesle ayrı konuştu. CFO\'ya ROI sunumu, IT müdürüne teknik doküman, üretim müdürüne vaka çalışması. Toplantıda herkes "biraz hazır" geldi — ve patron "yapalım" dedi.</p>\n<p>Analiz: Grup kapanışı bireysel kapanıştan farklı — Janis\'in groupthink mekanizması çalışıyor. Ama bu sefer Selin lehine: Her karar verici kendi akümülatörünü önceden doldurmuştu. Toplantı kapanış anı değil, onay anıydı. Gerçek kapanış 4 ayrı ön görüşmede olmuştu. Ders: Grup kapanışı toplantıda değil, toplantıdan önce yapılır.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">KAPANIŞ KORKU PROFİLİ</div></div>\n<p>8 ifadeyi 1-5 arası puanla.</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Kapanış sorusunu sormaktan rahatsızlık duymuyorum.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Müşterinin hazır olduğu anı okuyabiliyorum.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">"Teklif göndereceğim" demek yerine sahada kapanış sorusu soruyorum.</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Kapanış sorusundan sonra sessiz kalabiliyorum (5+ saniye).</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Müşteri "düşüneceğim" dediğinde neyi düşüneceğini soruyorum.</span></div>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">Mikro taahhüt merdivenini bilinçli kullanıyorum.</span></div>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">Müşterinin karar vericisini önceden tanımlıyorum.</span></div>\n<div class="test-q"><span class="q-label">8</span><span class="q-text">Kapanış baskısı yapılmadan doğal kapanış yakalayabiliyorum.</span></div>\n<div class="score-box"><strong>📊 Puanlama:</strong> </div>\n<p>32-40: Kapanış kas hafızan güçlü. 20-31: Orta — muhtemelen sessizlik ve zamanlama zayıf. 8-19: Kapanış korkusu aktif. Modül 4\'teki antrenmanı şiddetle öneriyorum — ve Kısım 1 Bölüm 2\'deki affect labeling\'i kapanış anı öncesi kullan.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">3 HAFTALIK KAPANIŞ ANTRENMAN PROGRAMI</div></div>\n<p>Her hafta 1 odak. Kapanış kası inşası.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Sinyal Avcısı</div></div>\n<p>Bu hafta her görüşmede tek bir şeyi izle: Sahiplenme sinyalleri. Müşteri ürünü kendi geleceğine koyuyor mu? Detay sorularının tonu planlama mı, itiraz mı? Beden dili gevşedi mi kapandı mı? Her görüşmeden sonra not al: Sinyal gördüm mü? Ne zaman? Kapanış sorusu sorduk mu?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Soru Haftası</div></div>\n<p>Bu hafta en az 3 görüşmede kapanış sorusu sor. Önerilen format: "Konuştuklarımız sizin için uygun göründü mü?" veya "Bir sonraki adım olarak ne yapalım?" Her sorudan sonra 5 saniye sus. Müşterinin cevabını not al. Kaç "evet"? Kaç "düşüneceğim"? Kaç "hayır"? Ve her "düşüneceğim"de sor: "Özellikle neyi düşüneceksiniz?"</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Merdiven Haftası</div></div>\n<p>Bu hafta her yeni müşteriye mikro taahhüt merdiveni uygula. İlk görüşmede küçük bir taahhüt iste (bilgi paylaşımı, demo kabul). İkinci görüşmede bir adım büyüt (pilot, deneme). Merdiveni kaydet: Kaç basamak attın? Hangi basamakta durdu? Neden?</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<div class="ref-line">LeDoux, J. (1996). The Emotional Brain. Simon &amp; Schuster.</div>\n<div class="ref-line">Arnsten, A. (2009). Stress signalling pathways. Nature Reviews Neuroscience, 10, 410-422.</div>\n<h4 class="researcher">Deci, E. L. &amp; Ryan, R. M. (2000). Self-determination theory. American Psychologist, 55(1), 68-78.</h4>\n<div class="ref-line">Busemeyer, J. R. &amp; Townsend, J. T. (1993). Decision field theory. Psychological Review, 100(3), 432-459.</div>\n<div class="ref-line">Ariely, D. &amp; Wertenbroch, K. (2002). Procrastination, deadlines, and performance. Psychological Science, 13(3), 219-224.</div>\n<h4 class="researcher">Ratcliff, R. &amp; McKoon, G. (2008). The diffusion decision model. Neural Computation, 20(4), 873-922.</h4>\n<div class="ref-line">Leotti, L. A. et al. (2010). Born to choose. Trends in Cognitive Sciences, 14(10), 457-463.</div>\n<div class="ref-line">Cialdini, R. B. (2016). Pre-Suasion. Simon &amp; Schuster.</div>\n<h4 class="researcher">Janis, I. L. (1972). Victims of Groupthink. Houghton Mifflin.</h4>\n<div class="ref-line">Lieberman, M. D. et al. (2007). Putting feelings into words. Psychological Science, 18(5), 421-428.</div>'},
'3-7':{b:'Hikâye',d:'Hikâye İnşa Protokolü',c:9483,h:'<h4 class="section-title">HİKAYE</h4>\n<p>Hikaye Atölyesi: İnşa Et, Prova Et, Sahada Yaşat</p>\n<p>Ana bölümde hikayenin nörobiyolojisini, anlatı yayını, 5 hikaye tipini ve Türk hikaye geleneğini gördün. Bu ek seni atölyeye alıyor: Hikaye inşa protokolünü uygulayacak, 3 sektörel hikaye vakasını çözecek, kendi hikaye envanterini çıkaracak ve hikaye anlatma pratiği yapacaksın. Ama önce hikaye biliminin bir katmanını daha açalım.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">HİKAYE VE HAFIZA — NEDEN HİKAYE KALICI?</div></div>\n<p>Slayt unutulur, hikaye kalır — ana bölümde gördük. Ama neden? Bower ve Clark\'ın (1969) klasik deneyi cevap veriyor: Katılımcılara rastgele kelime listeleri verildi. Bir grup kelimeleri ezberleyecek, diğer grup kelimelerden hikaye oluşturacak. Hemen sonraki testte iki grup arasında fark yok. Ama 1 hafta sonra: Hikaye grubu yüzde 93 hatırladı, ezberleme grubu yüzde 13. 7 kat fark.</p>\n<p>Neden? Beyin bilgiyi izole parçalar olarak değil, bağlam ağları olarak depoluyor. Hikaye bir bağlam ağı — karakterler, mekanlar, duygular, neden-sonuç ilişkileri birbirine bağlı. Tek bir ipucu ("Ahmet Bey\'in masasındaki 200 Excel") tüm ağı aktive ediyor. Slayttaki istatistik izole — hiçbir bağlam ağı yok, hiçbir ipucu aktive etmiyor.</p>\n<p>Satışta bunun karşılığı: Müşterine anlattığın hikaye, müşterinin beyninde bir ağ oluşturuyor. Bu ağ sadece senin ürününle değil, müşterinin kendi deneyimleriyle de bağlanıyor — "bizde de benzer bir şey yaşandı" anı. Hasson\'un nöral eşleşmesi budur: Hikaye anlatıcısının beyni müşterinin beyniyle aynı ağı aktive ediyor.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Bower, G. H. &amp; Clark, M. C. (1969). Narrative stories as mediators for serial learning. Psychonomic Science, 14(4), 181-182. %93 vs %13 hatırlama. | Schank, R. C. (1995). Tell Me a Story. Northwestern UP. Hafıza hikaye tabanlıdır — deneyimleri hikaye olarak kodlar ve hatırlar. | Mar, R. A. &amp; Oatley, K. (2008). The function of fiction is the abstraction and simulation of social experience. Perspectives on Psychological Science, 3(3), 173-192. Hikaye sosyal simülasyon.</div>\n<p>Lakoff ve Kavramsal Metafor — Dil Düşünceyi Şekillendirir</p>\n<p>Kısım 2 Bölüm 8\'de (Dil) Lakoff\'un kavramsal metafor teorisini gördük: "Zaman paradır", "hayat bir yolculuk", "argüman bir savaş." Bu metaforlar sadece dil değil, düşünce şekli. Satış hikayesinde doğru metafor seçimi mesajın beyinde nasıl işleneceğini belirliyor.</p>\n<p>"Bu yazılım bir araç" metaforu: Müşteri kontrol hisseder, kendi kullanır, yön belirler. "Bu yazılım bir partner" metaforu: Müşteri ilişki hisseder, birlikte çalışma, güven gerektirir. "Bu yazılım bir kalkan" metaforu: Müşteri koruma hisseder, risk azaltma, güvenlik. Her metafor farklı somatik işaretleyici tetikliyor — ve farklı karar mekanizması aktive ediyor. Müşterinin ihtiyacına (Kısım 2 Bölüm 6, 3 katman) uygun metafor seç.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">HİKAYE İNŞA PROTOKOLÜ — 7 ADIM</div></div>\n<p>Bu protokol bir satış hikayesini sıfırdan inşa etmeni sağlıyor. Her adım 10 dakika.</p>\n<p>Adım 1: Müşteri Seç (10 dk)</p>\n<p>Gerçek bir müşteri hikayesi seç — mümkünse sonuçları ölçülebilir olan. İzin al — isim ve firma kullanmak için müşterinin onayı şart. İzin vermezse anonim anlat ama sektör ve sonuçları koru.</p>\n<p>Adım 2: Anlatı Yayını Kur (10 dk)</p>\n<p>Durum → Sorun → Gerilim → Dönüm Noktası → Çözüm → Dönüşüm. Her aşamayı 1-2 cümleyle yaz. Toplam 2 dakikada anlatılabilecek uzunluk — daha fazlası hikayeyi öldürür.</p>\n<p>Adım 3: Kahramanı Somutlaştır (10 dk)</p>\n<p>"Bir müşterimiz" soyut. "Satış müdürü Ahmet Bey, 42 yaş, 15 yıllık deneyim, masasında 200 Excel" somut. İsim, rol, detay — beyin somut bilgiye bağlanır, soyuta bağlanmaz.</p>\n<p>Adım 4: Gerilimi Kirlet (10 dk)</p>\n<p>"Her şey sorunsuz oldu" → hikaye ölür. "İlk 2 ayda ekip direndi, Ahmet Bey bizi aradı, \'bu işe yaramayacak\' dedi" → hikaye yaşar. Zorluklar, geri dönüşler, "iki ileri bir geri" anları ekle. Bu kısım güven üretiyor.</p>\n<p>Adım 5: Sonucu Ölçülebilir Yap (10 dk)</p>\n<p>"İşler iyileşti" → zayıf. "Rapor süresi 3 saatten 20 dakikaya düştü" → güçlü. "Kapanış oranı yüzde 40 arttı" → güçlü. Sayı ver — ama dürüst sayı. Abartma müşterinin Sistem 1\'inde "bu doğru mu" sorusu yaratır.</p>\n<p>Adım 6: Duyguyu Ekle (10 dk)</p>\n<p>"Ahmet Bey geçen hafta aradı: \'Cuma akşamları artık mesaiye kalmıyorum.\'" Bu cümle tüm hikayenin duygusal zirvesi — Zak\'ın anlatı yayındaki çözüm anı. Duygu yapay olmamalı — gerçek bir an, gerçek bir cümle, gerçek bir değişim.</p>\n<p>Adım 7: Prova Et (10 dk)</p>\n<p>Hikayeyi sesli prova et. 2 dakikayı geçiyorsa kes. Jargon var mı — varsa çıkar. Bağlantı kopuyor mu — varsa basitleştir. Mümkünse bir meslektaşına anlat: "Bu hikaye sana ne hissettirdi?" sorusu en iyi kalite testi.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">SEKTÖREL HİKAYE ŞABLONLARİ — 3 VAKA</div></div>\n<p>Her vaka farklı sektörde, farklı hikaye tipiyle. Şablonu kendi müşterine adapte et.</p>\n<p>Şablon 1: SaaS — Müşteri Başarı Hikayesi</p>\n<p>"İstanbul\'da 45 kişilik bir e-ticaret firması vardı. Operasyon müdürü Zeynep Hanım\'ın günde 2 saati sipariş takibiyle geçiyordu — 5 farklı Excel, 3 farklı platform, sürekli copy-paste. Hata oranı yüzde 8. Sistemi kurduk. İlk hafta kaos — ekip alışamadı, Zeynep Hanım \'eski sisteme dönelim\' dedi. 3. haftada adaptasyon başladı. 2. ayda sipariş takip süresi 2 saatten 15 dakikaya düştü. Hata oranı yüzde 0.5. Zeynep Hanım geçen hafta: \'Artık operasyon yerine strateji düşünebiliyorum.\'"</p>\n<p>Şablon 2: Endüstriyel — Başarısızlık Hikayesi</p>\n<p>"Kayseri\'de bir gıda üreticisine otomasyon sistemi kurduk. Patron \'hızlı olsun\' dedi, biz 6 haftalık kurulumu 4 haftaya sıkıştırdık. Hata: Eğitimi kısalttık. Sonuç: Operatörler sistemi yanlış kullandı, 2 hafta üretim aksadı. Patron haklı olarak kızdı. Biz hata yaptığımızı kabul ettik, 2 hafta ek eğitim verdik — ücretsiz. 3. ayda sistem çalıştı. Ama o 2 haftalık aksaklığın maliyetini karşıladık. Şimdi her projede minimum 6 hafta kurulum süresi — acele etmiyoruz. O hata bize 200.000 TL\'ye mal oldu ama sonraki 50 projede sıfır aksaklık."</p>\n<p>Şablon 3: Hizmet — Vizyon Hikayesi</p>\n<p>"6 ay sonra ekibinizde şu değişecek: Pazartesi sabahı toplantıya geldiğinizde herkesin elinde aynı dashboard olacak — gerçek zamanlı, güvenilir, tartışmasız. \'Bu veri doğru mu\' sorusu bitmş olacak. Toplantı süresi 2 saatten 45 dakikaya düşecek — çünkü veri kavgası yerine karar konuşacaksınız. Ve siz — bunu hayal edin — o kurtarılmış 1 saat 15 dakikada gerçekten stratejik düşünme yapabileceksiniz."</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">HİKAYE ENVANTERİ</div></div>\n<p>Her satışçının minimum 5 hikayesi olmalı — farklı tipler, farklı sektörler, farklı durumlar. Envanterini çıkar:</p>\n<p>Hikaye 1: Köken hikayesi — "Neden bu işi yapıyoruz" (şirket veya kişisel)</p>\n<p>Hikaye 2: Müşteri başarı hikayesi #1 — en güçlü referansın</p>\n<p>Hikaye 3: Müşteri başarı hikayesi #2 — farklı sektör veya profil</p>\n<p>Hikaye 4: Başarısızlık/zorluk hikayesi — dürüstlük ve güven</p>\n<p>Hikaye 5: Vizyon hikayesi — müşterinin geleceği</p>\n<p>Her hikayeyi 7 adımlı protokolle inşa et, sesli prova et, 2 dakikaya sığdır. Bu envanter senin silah deposun — her müşteriye uygun hikayeyi seçip çıkarabilirsin.</p>\n<div class="mod-header"><div class="mod-num">5</div><div class="mod-title">HİKAYE HATALARI — 5 ÖLÜMCÜL TUZAK</div></div>\n<p>Her tuzak yaygın ve kolayca düşülüyor. Kendi hikaye pratiğinde bunları kontrol et.</p>\n<p>Tuzak 1: Mükemmel Hikaye</p>\n<p>"Müşterimiz aldı, her şey harika oldu, yüzde 50 büyüdü." Müşterinin Sistem 1\'i: "Bu gerçek değil." Çözüm: Zorlukları ekle. "İlk 2 ayda zorlandılar" cümlesi tüm hikayenin güvenilirliğini artırıyor. Kirli hikaye güven üretir — bu kitabın DNA\'sı.</p>\n<p>Tuzak 2: Uydurma Hikaye</p>\n<p>Var olmayan müşteriyi referans göstermek, sonuçları abartmak, detayları süslemek. Kısa vadede işe yarar — müşteri doğrulayamaz. Uzun vadede: Müşteri satın aldıktan sonra vaat edilen sonuçları göremeyince güven çöker. Ve dijital çağda her şey doğrulanabilir — LinkedIn\'de müşteriyi arar, sorar. Bölüm 1\'deki etik çizgi: Şeffaf, doğrulanabilir, karşı tarafın çıkarını gözeten.</p>\n<p>Tuzak 3: Çok Uzun Hikaye</p>\n<p>2 dakika altın standart. 5 dakikayı geçen hikaye müşterinin bilişsel yükünü artırıyor (Bölüm 2, Sweller) ve Sistem 2\'yi yoruyor. Müşteri hikayeyi dinlerken "bu ne zaman bitecek" düşüncesine geçiyorsa, narrative transportation kopmuş demektir. Çözüm: 7 adımlı protokolün 2. adımında (anlatı yayı) süreyi kontrol et.</p>\n<p>Tuzak 4: Yanlış Zamanda Hikaye</p>\n<p>CFO ROI istiyor, sen müşteri hikayesi anlatıyorsun. IT müdürü teknik detay istiyor, sen vizyon hikayesi anlatıyorsun. ELM (Bölüm 1-2): Merkez yoldaki müşteriye hikaye ikna etmez — veri ister. Çevre yoldaki müşteriye veri ikna etmez — hikaye ister. Doğru kişiye doğru hikaye, doğru zamanda.</p>\n<p>Tuzak 5: Tek Hikaye Sendromu</p>\n<p>Her müşteriye aynı hikayeyi anlatmak. Müşteri sektör etkinliğinde başka bir satışçıdan aynı hikayeyi duyduğunda: "Bu adam herkese aynı şeyi söylüyor." Çözüm: Minimum 5 hikaye envanteri. Her müşteriye durumuna en uygun olanı seç. Hikaye envanterini düzenli güncelle — yeni müşteri deneyimleri, yeni sonuçlar, yeni öğrenmeler.</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<div class="ref-line">Hasson, U. et al. (2012). Brain-to-brain coupling. Trends in Cognitive Sciences, 16(2), 114-121.</div>\n<h4 class="researcher">Zak, P. J. (2015). Why inspiring stories make us react. Cerebrum, 2015, 2.</h4>\n<div class="ref-line">Green, M. C. &amp; Brock, T. C. (2000). Narrative transportation. JPSP, 79(5), 701-721.</div>\n<h4 class="researcher">Stephens, G. J. et al. (2010). Speaker-listener neural coupling. PNAS, 107(32), 14425-14430.</h4>\n<div class="ref-line">Bower, G. H. &amp; Clark, M. C. (1969). Narrative stories as mediators. Psychonomic Science, 14(4), 181-182.</div>\n<h4 class="researcher">Schank, R. C. (1995). Tell Me a Story. Northwestern UP.</h4>\n<div class="ref-line">Mar, R. A. &amp; Oatley, K. (2008). The function of fiction. Perspectives on Psychological Science, 3(3), 173-192.</div>\n<div class="ref-line">Lakoff, G. &amp; Johnson, M. (1980). Metaphors We Live By. University of Chicago Press.</div>\n<h4 class="researcher">Campbell, J. (1949). The Hero with a Thousand Faces. Pantheon.</h4>\n<h4 class="researcher">Denning, S. (2011). The Leader\'s Guide to Storytelling. Jossey-Bass.</h4>'},
'3-8':{b:'Dijital',d:'Dijital İkna ve LinkedIn',c:9606,h:'<h4 class="section-title">DİJİTAL</h4>\n<p>Dijital Satış Laboratuvarı: Ekranı Fethet, Dijitali Tasarla</p>\n<p>Ana bölümde Zoom yorgunluğunu, video sunum kurallarını, e-posta ikna prensiplerini ve AI çağında satışçının rolünü gördün. Bu ek seni dijital laboratuvara alıyor: Video sunum tekniklerini prova edecek, e-posta şablonları oluşturacak, sosyal medya stratejini kuracak ve dijital satış profilini çıkaracaksın. Ama önce dijital iletişimin psikolojisine bir katman daha ekleyelim.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">DİJİTAL İLETİŞİMDE GÜVEN — EKRANDA NASIL İNŞA EDİLİR?</div></div>\n<p>Kısım 2 Bölüm 4\'teki Mayer-Davis-Schoorman güven modeli 3 bileşen tanımlıyordu: Yetkinlik, dürüstlük, iyiniyet. Yüz yüze bu 3 bileşen beden dili, ses tonu, göz teması ve enerji bulaşıcılığıyla iletiliyor. Dijitalde bu kanalların çoğu kısıtlı — o zaman güven nasıl inşa edilir?</p>\n<p>Walther\'in (1996) "hyperpersonal" modeli ilginç bir cevap veriyor: Online iletişimde insanlar daha seçici sinyal gönderip alıyor. Yüz yüzede kontrol edemediğin sinyaller var — terleme, kızarma, ayak hareketleri. Online\'da sadece seçtiğin sinyalleri gönderirsin. Bu hem avantaj (daha kontrollü izlenim) hem dezavantaj (daha az otantik).</p>\n<p>Dijitalde güven inşasının 5 kuralı: (1) Tutarlılık — her dijital temas noktası aynı mesajı vermeli (profil, e-posta, sunum, sosyal medya). (2) Hız — e-postaya hızlı yanıt güven üretir, geç yanıt "umursamıyor" sinyali. (3) Şeffaflık — dijitalde her şey kayıtlı, tutarsızlık anında tespit edilir. (4) Değer — her dijital temas müşteriye bir şey vermeli (bilgi, içgörü, çözüm). (5) Kişisellik — toplu mail "yok sayma", kişisel mesaj "ilgi" sinyali.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<p>Walther, J. B. (1996). Computer-mediated communication: Impersonal, interpersonal, and hyperpersonal interaction. Communication Research, 23(1), 3-43. | Bos, N. et al. (2002). Effects of four computer-mediated communications channels on trust development. CHI 2002, ACM. Video &gt; ses &gt; chat &gt; e-posta güven sıralaması. | Jarvenpaa, S. L. &amp; Leidner, D. E. (1999). Communication and trust in global virtual teams. JCMC, 3(4). Dijital güven "swift trust" — hızlı ama kırılgan.</p>\n<p>Dijital Beden Dili — Yeni Okuma Becerileri</p>\n<p>Ekrandan beden okuyamıyorsun ama yeni sinyaller var: Kamera açma/kapama (ilgi/kaçış), chat mesajları (soru = ilgi, sessizlik = kopuş), tepki emojileri (surface level ama veri), ekran paylaşımında fare hareketleri (nereye bakıyor). Ve ses: Ekranda ses tonu daha belirgin çünkü görsel ipuçları az — müşterinin ses tonundaki değişimler yüz yüzeden daha okunabilir.</p>\n<p>Scherer\'in vokal duygu çalışmalarını hatırla (Kısım 2 DD3): Ses tonu, hızı, yüksekliği duyguyu taşıyor. Ekranda bu kanal güçleniyor — çünkü diğer kanallar zayıflıyor. Müşterinin sesindeki tereddüt, heyecan, sıkılma — bunları yüz yüzeden daha iyi duyabilirsin. Kendi sesin için de geçerli: Murat\'ın fiyat anındaki ses düşüşü (Kısım 1 Bölüm 7) ekranda daha belirgin.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">E-POSTA İKNA ŞABLONLARI</div></div>\n<p>Her şablon farklı amaç için. Kendi sektörüne adapte et.</p>\n<p>Şablon 1: İlk Temas E-postası</p>\n<p>Subject: [Müşteri adı], [sektörel sorun] için 1 fikir</p>\n<p>"Merhaba [isim], [sektör/firma] hakkında [spesifik gözlem]. [Benzer firmada] şu sorunu çözdük — [1 cümle sonuç]. Sizin durumunuz için de geçerli olabilir. 15 dakikalık bir görüşme için müsait olur musunuz? [Takvim linki]."</p>\n<p>Neden çalışıyor: Kişisel (isim + firma), değer sunuyor (gözlem + sonuç), düşük taahhüt (15 dakika), tek CTA (takvim). Pre-suasion: Subject line sorunu çerçeveliyor, müşteri "benim sorunumu biliyor" hissiyle açıyor.</p>\n<p>Şablon 2: Takip E-postası (Cevap Gelmedi)</p>\n<p>Subject: Re: [önceki subject] — kısa güncelleme</p>\n<p>"Merhaba [isim], geçen haftaki mesajıma dönüş yapamamış olabilirsiniz — yoğunluk anlıyorum. Kısa bir güncelleme: [Sektörde yeni gelişme veya veri]. Bu sizin [spesifik alan] etkileyebilir. Hâlâ konuşmak isterseniz [takvim linki]."</p>\n<p>Neden çalışıyor: Baskı yok ("yoğunluk anlıyorum" — özerklik koruması), yeni değer (güncelleme), kaçış kolay ("isterseniz"). Kısım 2 Bölüm 9 sessizlik stratejisi dijitalde: Müşterinin sessizliğine saygı göster ama varlığını hatırlat.</p>\n<p>Şablon 3: Referans E-postası</p>\n<p>Subject: [Tanıdık isim] önerisiyle yazıyorum</p>\n<p>"Merhaba [isim], [ortak tanıdık] sizinle bağlantı kurmamı önerdi. [Ortak tanıdığın firmasında] birlikte [kısa hikaye — 1 cümle sorun, 1 cümle sonuç]. [Tanıdık] sizin de benzer bir konuda düşündüğünüzü söyledi. 15 dakika? [Takvim]."</p>\n<p>Neden çalışıyor: Sosyal kanıt (referans) + beğeni (ortak tanıdık) + hikaye (1 cümle). Granovetter\'in bağlar teorisi (Kısım 2 Bölüm 5): Türkiye\'de referans en güçlü giriş kapısı.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">DİJİTAL SATIŞ PROFİLİ TESTİ</div></div>\n<p>10 ifadeyi 1-5 arası puanla.</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Video toplantılarda kameraya bakarak konuşuyorum (ekrana değil).</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Video sunumlarımı 20 dakikayla sınırlıyorum.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">E-postalarımın subject line\'ı kişisel ve spesifik.</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Müşteriye 24 saat içinde yanıt veriyorum.</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">LinkedIn profilim güncel ve sektörel içerik paylaşıyorum.</span></div>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">Online toplantıda müşterinin dijital beden dilini okuyabiliyorum (kamera, chat, ses).</span></div>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">Video toplantı açılışımda müşteriye ne kazanacağını söylüyorum.</span></div>\n<div class="test-q"><span class="q-label">8</span><span class="q-text">E-postalarımda tek bir CTA var (birden fazla değil).</span></div>\n<div class="test-q"><span class="q-label">9</span><span class="q-text">AI araçlarını (ChatGPT vb.) satış sürecimde kullanıyorum.</span></div>\n<div class="test-q"><span class="q-label">10</span><span class="q-text">Online ve yüz yüze satış stratejimi farklılaştırıyorum.</span></div>\n<div class="score-box"><strong>📊 Puanlama:</strong> </div>\n<p>40-50: Dijital satışa adapte olmuşsun. 25-39: Orta — muhtemelen video toplantı ve e-posta optimizasyonu zayıf. 10-24: Dijital satışı yüz yüzenin kötü versiyonu olarak yapıyorsun. Bu modüldeki şablonları uygula.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">3 HAFTALIK DİJİTAL ANTRENMAN</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Video Haftası</div></div>\n<p>Bu hafta her video toplantında 3 kuralı uygula: Kamera göz hizasında, konuşurken kameraya bak, 20 dakika sınırı. Her toplantıdan sonra not al: Müşterinin dikkati ne kadardı? Kamera açık kaldı mı?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">E-posta Haftası</div></div>\n<p>Bu hafta 5 müşteriye kişiselleştirilmiş e-posta gönder — şablonları kullan ama her birini müşteriye özel yaz. Açılma oranını takip et (e-posta takip araçlarıyla). Hangi subject line çalıştı, hangisi çalışmadı?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Sosyal Medya Haftası</div></div>\n<p>Bu hafta LinkedIn\'de 3 sektörel paylaşım yap — kısa, değerli, görüşe dayalı. "Bu sektörde şu trend var ve şu anlama geliyor" formatı. Etkileşimi ölç: Kim beğendi, kim yorum yaptı, müşterilerinden biri tepki verdi mi?</p>\n<div class="mod-header"><div class="mod-num">5</div><div class="mod-title">LINKEDIN OTORİTE İNŞA PLANI</div></div>\n<p>LinkedIn B2B satışta pre-suasion aracı. Bu plan 4 haftalık bir otorite inşa süreci.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Profil Optimizasyonu</div></div>\n<p>Başlık: "Satış müdürü" yerine "[Sektör] firmalarına [sonuç] sağlayan [uzmanlık alanı] danışmanı" — müşterinin sorununu çözen birisi olarak konumlan, iş unvanını değil. Özet: İlk 2 cümle müşterinin sorununu tanımla, sonraki 2 cümle senin yaklaşımını anlat, son cümle CTA ("konuşalım"). Profil fotoğrafı: Profesyonel, gülümseyen, göz teması — Todorov ilk izlenim çalışması dijitalde de geçerli.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">İçerik Stratejisi</div></div>\n<p>Haftada 2-3 paylaşım. Format: (1) Sektörel gözlem + kendi yorumun ("Bu trend şu anlama geliyor çünkü..."), (2) Mini hikaye ("Geçen hafta bir müşterimde şu oldu — öğrendiğim ders..."), (3) Soru ("Sektörünüzde şu konuda ne düşünüyorsunuz?"). Paylaşma: Başkalarının haberlerini değil, kendi deneyimini. Otorite bilgiyi paylaşmaktan değil, bilgiyi yorumlamaktan gelir — AI çağında yorum insan işi.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Ağ Genişletme</div></div>\n<p>Her gün 3-5 hedef müşteriye bağlantı isteği gönder — kişiselleştirilmiş not ile ("[Ortak bağlantı] üzerinden gördüm, [sektörünüz] hakkında paylaşımlarınızı ilgiyle takip ediyorum"). Bağlantı kabul edildikten sonra hemen satış mesajı gönderme — 1 hafta bekle, içeriklerini beğen, yorum yap. Karşılıklılık ilkesi (Bölüm 1): Önce değer ver, sonra iste.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Dijital Sosyal Kanıt</div></div>\n<p>Müşteri testimonialleri paylaş (izinle). Başarı hikayelerini mini LinkedIn post formatına dönüştür. Sektörel etkinliklere katıl ve paylaş. "150 firma bizi kullanıyor" anonim sosyal kanıtı değil, "Ahmet Bey\'in firmasında şu oldu" somut, doğrulanabilir dijital sosyal kanıt. Cialdini\'nin sosyal kanıt ilkesi (Bölüm 1) dijitalde somut isim ve sonuçla güçleniyor.</p>\n<div class="mod-header"><div class="mod-num">6</div><div class="mod-title">VİDEO TOPLANTI KONTROL LİSTESİ</div></div>\n<p>Her video toplantı öncesi bu listeyi 2 dakikada kontrol et.</p>\n<p>Toplantı öncesi: Kamera göz hizasında mı? Arka plan düzenli mi (veya sanal arka plan profesyonel mi)? Işık yüzüne geliyor mu (pencere arkada = karanlık yüz)? İnternet bağlantısı stabil mi? Sunum hazır mı ve ekran paylaşımı test edildi mi? Müşterinin ismini ve firmasını doğru telaffuz edebiliyor musun? Toplantının amacını 1 cümleyle söyleyebiliyor musun?</p>\n<p>Toplantı sırasında: İlk 30 saniyede müşteriye ne kazanacağını söyle. Konuşurken kameraya bak — dinlerken ekrana bakabilirsin. Her 7-8 dakikada etkileşim: Soru sor, tepki iste, chat kullan. Müşterinin kamera durumunu izle — kapattıysa dikkat kaybolmuş olabilir. Ses tonundaki değişimleri dinle — Scherer\'in vokal duygu ipuçları ekranda daha belirgin. 20 dakika sunumdan sonra diyaloga geç.</p>\n<p>Toplantı sonrası: 1 saat içinde özet e-posta gönder — konuşulanlar, kararlar, sonraki adımlar. Tek CTA: "Bu doğru mu, eklemek istediğiniz bir şey var mı?" Bu e-posta tutarlılık ilkesini (Bölüm 1) dijitalde pekiştiriyor — müşteri özetle onay vererek mikro taahhüt yapıyor.</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<h4 class="researcher">Bailenson, J. N. (2021). Nonverbal overload. Technology, Mind, and Behavior, 2(1).</h4>\n<h4 class="researcher">Bos, N. et al. (2002). Effects of four CMC channels on trust. CHI 2002, ACM.</h4>\n<h4 class="researcher">Jarvenpaa, S. L. &amp; Leidner, D. E. (1999). Communication and trust in global virtual teams. JCMC, 3(4).</h4>\n<h4 class="researcher">Ferran, C. &amp; Watts, S. (2008). Videoconferencing in the field. JMIS, 25(1), 137-155.</h4>\n<h4 class="researcher">Kiesler, S. et al. (1984). Social psychological aspects of CMC. American Psychologist, 39(10), 1123-1134.</h4>\n<h4 class="researcher">Scherer, K. R. (2003). Vocal communication of emotion. Speech Communication, 40(1-2), 227-256.</h4>'},
'3-9':{b:'Etik',d:'Etik İkilem Senaryoları',c:9378,h:'<p>ETİK</p>\n<p>Etik Laboratuvarı: İkilemlerle Yüzleş, Pusulayı Kalibre Et</p>\n<p>Ana bölümde manipülasyon sınırını, 3 etik testi, dark patterns\'ı, "satmama" kararını ve etik erozyonu gördün. Bu ek seni laboratuvara alıyor: 6 etik ikilem senaryosunu çözecek, kendi etik erozyon haritanı çıkaracak ve bir etik karar çerçevesi inşa edeceksin.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">ETİK KARAR VERMENİN PSİKOLOJİSİ</div></div>\n<p>İnsanlar etik kararları nasıl veriyor? Jonathan Haidt\'ın (2001) "social intuitionist" modeli şaşırtıcı bir cevap veriyor: Çoğu etik karar önce duyguyla verilir (Sistem 1), sonra mantıkla gerekçelendirilir (Sistem 2). Yani "bu yanlış" hissi önce geliyor, "neden yanlış" analizi sonra. Kahneman\'ın karar çerçevesinin etik versiyonu.</p>\n<p>Satışta ne demek? Satışçı "bu müşteriye bu ürün lazım değil" hissini duyuyor (somatik işaretleyici, Kısım 1 Bölüm 1) ama sonra rasyonelleştiriyor: "Belki farkında olmadığı bir ihtiyacı vardır." "Patron sat dedi." "Herkes yapıyor." Bandura\'nın (1999) ahlaki bağlantısızlık mekanizmaları: Diffusion of responsibility ("patron söyledi"), dehumanization ("bu sadece bir müşteri numarası"), moral justification ("ben geçimimi sağlıyorum").</p>\n<p>Etik karar verme becerisi geliştirilebilir mi? Rest\'in (1986) 4 bileşenli modeli diyor ki evet: (1) Ahlaki farkındalık — durumda etik bir boyut olduğunu görmek. (2) Ahlaki yargı — doğru olanın ne olduğuna karar vermek. (3) Ahlaki motivasyon — doğru olanı yapmayı istemek. (4) Ahlaki karakter — doğru olanı baskıya rağmen yapmak. Sibel 4\'ünü de gösterdi. Çoğu satışçı 1\'de takılıyor — durumda etik boyut görmüyor çünkü "normal" kategorisine koymuş.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Haidt, J. (2001). The emotional dog and its rational tail. Psychological Review, 108(4), 814-834. | Bandura, A. (1999). Moral disengagement. PSPR, 3(3), 193-209. | Rest, J. R. (1986). Moral Development: Advances in Research and Theory. Praeger. 4 bileşenli model. | Greene, J. D. et al. (2001). An fMRI investigation of emotional engagement in moral judgment. Science, 293(5537), 2105-2108. Etik kararlarında duygu bölgeleri aktif.</div>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">ETİK İKİLEM SENARYOLARI — 6 VAKA</div></div>\n<p>Her senaryoda siyah-beyaz cevap yok — gri alan. 3 testi uygula (şeffaflık, doğrulanabilirlik, karşılıklı çıkar) ve kendi kararını ver. Sonra analizi oku.</p>\n<p>Senaryo 1: "Referans Süsleme"</p>\n<p>Durum: Müşteri referans soruyor. En güçlü referansın 2 yıl önceki bir proje — sonuçları iyi ama güncel değil. "Geçen yıl" dersen daha etkili.</p>\n<p>Analiz: Şeffaflık testi — müşteri 2 yıl önceki olduğunu bilse ne değişir? Belki hiçbir şey. Belki güveni azalır. Doğrulanabilirlik — müşteri projeyi doğrulasa tarih farkı ortaya çıkar. Karar: "2 yıl önce" de — tarih farkı önemsizse müşteri de önemsemez. Önemliyse, saklaman manipülasyon.</p>\n<p>Senaryo 2: "Rakip Bilgisi"</p>\n<p>Durum: Müşteri rakibinden teklif almış, sana fiyatını söylüyor. Rakibin fiyatı tahmininden düşük. Senin fiyatını rakibe göre ayarlayabilirsin — ama müşteri rakibin fiyatını abartmış olabilir mi?</p>\n<p>Analiz: Müşterinin söylediği bilgiyi doğrulayamazsın — ve müşteri de senin doğrulayamayacağını biliyor. Grice\'ın konuşma işbirliği ihlali (Bölüm 4 DD): Müşteri nicelik kuralını ihlal edebilir. Karar: Kendi fiyatını değer temelinde sun, rakip fiyatını referans al ama stratejiyi ona dayandırma. "Ben değerimize güveniyorum, fiyatımız bu" — dürüstlük güven üretir.</p>\n<p>Senaryo 3: "Çeyrek Sonu Baskısı"</p>\n<p>Durum: 3 gün sonra çeyrek bitiyor. 180K hedefin var, 140K\'dasın. Bir müşteri 50K\'lık teklifi "düşünüyor". Müşteriye "bu fiyat bu hafta geçerli" dersen muhtemelen kapanır — ama gerçek bir geçerlilik sınırı yok.</p>\n<p>Analiz: Şeffaflık testi — yapay ac
