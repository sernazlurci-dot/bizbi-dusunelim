<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biz Bi' Düşünelim — Derine Dal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAF8;
  --card: #FFFFFF;
  --text: #1A1A2E;
  --body: #3D3D5C;
  --muted: #8E8EA0;
  --subtle: #C8C8D4;
  --border: #EAEAF0;
  --hover-bg: #F5F5FA;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-lg: 24px;
  --shadow-sm: 0 1px 3px rgba(26,26,46,.04), 0 1px 2px rgba(26,26,46,.02);
  --shadow-md: 0 4px 16px rgba(26,26,46,.06), 0 2px 6px rgba(26,26,46,.03);
  --shadow-lg: 0 12px 40px rgba(26,26,46,.08), 0 4px 12px rgba(26,26,46,.04);
  --shadow-xl: 0 20px 60px rgba(26,26,46,.1), 0 8px 20px rgba(26,26,46,.05);
  --k1: #1B4965; --k1-soft: #E8F0F5; --k1-mid: #3A7CA5;
  --k2: #2D6A4F; --k2-soft: #E6F2EC; --k2-mid: #52B788;
  --k3: #7B2D8E; --k3-soft: #F3E8F7; --k3-mid: #A855C7;
  --k4: #C65102; --k4-soft: #FEF0E6; --k4-mid: #E87730;
  --k5: #6C0E23; --k5-soft: #F5E6EA; --k5-mid: #A62040;
  --transition: cubic-bezier(.4, 0, .2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::selection { background: var(--k1); color: #fff; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--body);
  background: var(--bg);
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

.ctn { max-width: 1080px; margin: 0 auto; padding: 0 24px; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }

/* ═══════════════ HEADER ═══════════════ */
.hdr {
  background: rgba(250,250,248,.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
  transition: box-shadow .3s var(--transition);
}
.hdr.scrolled { box-shadow: var(--shadow-sm); }
.hdr-in {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 4px 0;
  transition: opacity .2s;
}
.logo:hover { opacity: .8; }
.logo-mark {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--k1), var(--k2));
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: -.5px;
  box-shadow: 0 2px 8px rgba(27,73,101,.25);
}
.logo-name {
  font-family: 'DM Serif Display', serif;
  font-size: 17px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: -.01em;
}
.bbtn {
  font-size: 14px;
  color: var(--muted);
  font-weight: 500;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  display: none;
  transition: all .2s var(--transition);
}
.bbtn:hover { color: var(--text); background: var(--hover-bg); }

/* ═══════════════ PROGRESS ═══════════════ */
.prog {
  position: fixed;
  top: 64px;
  left: 0; right: 0;
  height: 3px;
  background: transparent;
  z-index: 99;
  display: none;
}
.prog-bar {
  height: 100%;
  border-radius: 0 2px 2px 0;
  transition: width .3s;
}

/* ═══════════════ HERO ═══════════════ */
.hero {
  padding: 80px 24px 64px;
  text-align: center;
  position: relative;
}
.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 400px;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(27,73,101,.04), transparent),
              radial-gradient(ellipse 60% 40% at 20% 20%, rgba(45,106,79,.03), transparent),
              radial-gradient(ellipse 50% 30% at 80% 10%, rgba(123,45,142,.03), transparent);
  pointer-events: none;
  z-index: -1;
}
.hero-eyebrow {
  display: inline-block;
  font-size: 12px;
  font-weight: 600;
  color: var(--k1);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 20px;
  padding: 6px 16px;
  background: var(--k1-soft);
  border-radius: 20px;
}
.hero h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(40px, 8vw, 64px);
  font-weight: 400;
  color: var(--text);
  line-height: 1.05;
  margin-bottom: 16px;
  letter-spacing: -.02em;
}
.hero-sub {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(17px, 2.5vw, 22px);
  font-weight: 400;
  color: var(--muted);
  font-style: italic;
  margin-bottom: 20px;
}
.hero p {
  font-size: 16px;
  color: var(--muted);
  max-width: 540px;
  margin: 0 auto;
  line-height: 1.8;
}
.hero-author {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-top: 28px;
  padding: 10px 20px;
  border-radius: 28px;
  background: var(--card);
  border: 1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  box-shadow: var(--shadow-sm);
  transition: all .3s var(--transition);
}
.hero-author:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.hero-author::before {
  content: '';
  width: 8px; height: 8px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--k1), var(--k2));
}

/* ═══════════════ SEARCH ═══════════════ */
.srch {
  max-width: 480px;
  margin: 0 auto 56px;
  position: relative;
}
.srch input {
  width: 100%;
  padding: 15px 20px 15px 48px;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  font-size: 15px;
  outline: none;
  background: var(--card);
  font-family: inherit;
  color: var(--text);
  transition: all .25s var(--transition);
  box-shadow: var(--shadow-sm);
}
.srch input:focus {
  border-color: var(--k1);
  box-shadow: 0 0 0 4px rgba(27,73,101,.08), var(--shadow-md);
}
.srch input::placeholder { color: var(--subtle); }
.srch::before {
  content: '⌕';
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
  color: var(--muted);
  pointer-events: none;
}
.sr-list {
  background: var(--card);
  border-radius: 14px;
  border: 1px solid var(--border);
  margin-top: 8px;
  overflow: hidden;
  box-shadow: var(--shadow-xl);
  position: absolute;
  width: 100%;
  z-index: 50;
}
.sr-item {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  padding: 14px 18px;
  text-align: left;
  font-family: inherit;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
}
.sr-item:last-child { border-bottom: none; }
.sr-item:hover { background: var(--hover-bg); }

/* ═══════════════ STATS ═══════════════ */
.stats {
  display: flex;
  justify-content: center;
  gap: 48px;
  margin-bottom: 64px;
  flex-wrap: wrap;
}
.stat { text-align: center; }
.st-n {
  font-family: 'DM Serif Display', serif;
  font-size: 36px;
  color: var(--text);
  letter-spacing: -.02em;
}
.st-l {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 4px;
  font-weight: 500;
}

/* ═══════════════ KIŞIM CARDS ═══════════════ */
.kcard {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 24px 28px;
  border-radius: var(--radius);
  background: var(--card);
  border: 1.5px solid var(--border);
  text-align: left;
  margin-bottom: 12px;
  transition: all .35s var(--transition);
  width: 100%;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.kcard::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--kc);
  opacity: 0;
  transition: opacity .35s var(--transition);
}
.kcard:hover {
  border-color: color-mix(in srgb, var(--kc) 30%, var(--border));
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}
.kcard:hover::before { opacity: 1; }
.kicon {
  width: 56px; height: 56px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  transition: transform .35s var(--transition);
}
.kcard:hover .kicon { transform: scale(1.1) rotate(-3deg); }
.klbl {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.ktit {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--text);
  letter-spacing: -.01em;
}
.kinf {
  font-size: 14px;
  color: var(--muted);
  margin-top: 2px;
}
.karrow {
  font-size: 20px;
  color: var(--subtle);
  transition: all .35s var(--transition);
  flex-shrink: 0;
}
.kcard:hover .karrow { transform: translateX(4px); color: var(--kc); }

/* ═══════════════ BÖLÜM CARDS ═══════════════ */
.bcard {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 22px;
  border-radius: 14px;
  background: var(--card);
  border: 1.5px solid var(--border);
  text-align: left;
  margin-bottom: 8px;
  transition: all .25s var(--transition);
  width: 100%;
  box-shadow: var(--shadow-sm);
}
.bcard:hover {
  border-color: color-mix(in srgb, var(--kc) 25%, var(--border));
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.bnum {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
}
.btit { font-size: 15px; font-weight: 600; color: var(--text); }
.bdd { font-size: 13px; color: var(--muted); margin-top: 2px; }
.badge {
  font-size: 11px;
  color: var(--muted);
  background: var(--hover-bg);
  padding: 4px 10px;
  border-radius: 8px;
  font-weight: 500;
}
.ibadge {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 8px;
  font-weight: 600;
}

/* ═══════════════ DD CONTENT ═══════════════ */
.dc { max-width: 720px; margin: 0 auto; }
.dc .mod-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 48px 0 24px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--border);
}
.dc .mod-num {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--kc, var(--k1));
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
}
.dc .mod-title {
  font-family: 'DM Serif Display', serif;
  font-size: 19px;
  color: var(--text);
  letter-spacing: -.01em;
}
.dc h4.section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--kc, var(--k1));
  margin: 36px 0 12px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
}
.dc h4.sub-header {
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: var(--text);
  margin: 28px 0 10px;
}
.dc h4.researcher {
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
  color: var(--text);
  margin: 32px 0 12px;
  padding: 16px 20px;
  background: var(--hover-bg);
  border-radius: 12px;
  border-left: 4px solid var(--kc, var(--k1));
}
.dc p {
  font-size: 16px;
  color: var(--body);
  margin-bottom: 18px;
  line-height: 1.85;
}
.dc .bilim-box {
  background: linear-gradient(135deg, #F0F7FC, #F5FAFF);
  border-radius: 14px;
  padding: 20px 24px;
  margin: 24px 0;
  border: 1px solid #D4E8F5;
}
.dc .bilim-header {
  font-size: 13px;
  font-weight: 700;
  color: #1B6B9A;
  margin-bottom: 8px;
  letter-spacing: .5px;
}
.dc .bilim-content { font-size: 14px; color: var(--body); line-height: 1.7; }
.dc .ref-line {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 4px;
  padding-left: 14px;
  border-left: 2px solid var(--border);
}
.dc .test-q {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  margin: 8px 0;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: all .2s var(--transition);
}
.dc .test-q:hover { border-color: color-mix(in srgb, var(--kc) 30%, var(--border)); box-shadow: var(--shadow-sm); }
.dc .q-label {
  background: var(--kc, var(--k1));
  color: #fff;
  border-radius: 7px;
  padding: 3px 10px;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 2px;
}
.dc .q-text { font-size: 14.5px; color: var(--body); line-height: 1.65; }
.dc .hafta-card {
  background: var(--hover-bg);
  border-radius: 12px;
  padding: 16px 20px;
  margin: 8px 0;
  display: flex;
  gap: 14px;
  align-items: center;
}
.dc .hafta-num { font-weight: 700; color: var(--kc); font-size: 14px; white-space: nowrap; }
.dc .hafta-desc { font-size: 14px; color: var(--body); }
.dc .fill-blank {
  background: #FAFAFA;
  border-radius: 10px;
  padding: 12px 16px;
  margin: 6px 0;
  font-size: 14px;
  color: var(--muted);
  border: 1.5px dashed var(--border);
}
.dc .warn-box {
  background: linear-gradient(135deg, #FEF9EE, #FFFCF5);
  border-radius: 12px;
  padding: 16px 20px;
  margin: 20px 0;
  border: 1px solid #F5E6C8;
  font-size: 14px;
  color: #92400E;
}
.dc .insight-box {
  background: linear-gradient(135deg, #FEF9EE, #FFFCF5);
  border-radius: 12px;
  padding: 18px 22px;
  margin: 20px 0;
  font-size: 14px;
  color: #92400E;
  border: 1px solid #F5E6C8;
  line-height: 1.75;
}
.dc .score-box {
  background: linear-gradient(135deg, #F0F7FC, #F5FAFF);
  border-radius: 12px;
  padding: 16px 20px;
  margin: 20px 0;
  font-size: 15px;
  color: var(--text);
  border: 1px solid #D4E8F5;
}
.dc .score-range {
  padding: 10px 16px;
  margin: 6px 0;
  font-size: 14px;
  color: var(--body);
  background: var(--hover-bg);
  border-radius: 10px;
  line-height: 1.7;
}

/* ═══════════════ QUIZ ═══════════════ */
.quiz-wrap {
  background: var(--card);
  border-radius: 20px;
  padding: 32px;
  margin: 36px 0;
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-md);
}
.quiz-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--text);
  margin-bottom: 8px;
}
.quiz-intro {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 24px;
  line-height: 1.8;
}
.quiz-dim { margin-bottom: 24px; }
.quiz-dim-head {
  font-size: 14px;
  font-weight: 700;
  color: var(--kc);
  margin-bottom: 4px;
}
.quiz-dim-desc {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 12px;
}
.quiz-q {
  background: var(--hover-bg);
  border-radius: 12px;
  padding: 14px 16px;
  margin: 6px 0;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.quiz-q-text {
  flex: 1;
  font-size: 14px;
  color: var(--body);
  min-width: 200px;
  line-height: 1.6;
}
.quiz-btns { display: flex; gap: 5px; flex-shrink: 0; }
.quiz-btn {
  width: 36px; height: 36px;
  border-radius: 9px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  transition: all .2s var(--transition);
}
.quiz-btn:hover { border-color: var(--kc); color: var(--kc); }
.quiz-btn.active {
  border-color: var(--kc);
  background: var(--kc);
  color: #fff;
  box-shadow: 0 2px 8px color-mix(in srgb, var(--kc) 30%, transparent);
}
.quiz-submit {
  width: 100%;
  padding: 15px;
  background: var(--kc);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  margin-top: 20px;
  transition: all .25s var(--transition);
  font-family: inherit;
  box-shadow: 0 4px 12px color-mix(in srgb, var(--kc) 25%, transparent);
}
.quiz-submit:hover { opacity: .92; transform: translateY(-1px); }
.quiz-submit:disabled { opacity: .3; cursor: default; transform: none; box-shadow: none; }
.result-card {
  background: var(--card);
  border-radius: 20px;
  padding: 32px;
  margin: 28px 0;
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-md);
}
.result-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  margin-bottom: 8px;
}
.result-title {
  font-family: 'DM Serif Display', serif;
  font-size: 24px;
  color: var(--text);
  margin-bottom: 16px;
}
.dim-result { margin-bottom: 20px; }
.dim-result-head { display: flex; justify-content: space-between; margin-bottom: 6px; }
.dim-result-name { font-size: 14px; font-weight: 600; color: var(--text); }
.dim-result-score { font-size: 14px; font-weight: 700; }
.dim-bar { height: 6px; background: var(--hover-bg); border-radius: 3px; overflow: hidden; }
.dim-fill { height: 100%; border-radius: 3px; transition: width .8s ease; }

/* ═══════════════ NAV ═══════════════ */
.dd-nav {
  display: flex;
  justify-content: space-between;
  margin-top: 56px;
  padding-top: 24px;
  border-top: 2px solid var(--border);
}
.nav-btn { padding: 0; font-family: inherit; }
.nav-btn:hover .nav-tit { color: var(--kc); }
.nav-lbl { font-size: 12px; color: var(--muted); }
.nav-tit {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  transition: color .2s;
}

/* ═══════════════ FOOTER ═══════════════ */
.ftr {
  padding: 48px 0;
  text-align: center;
  margin-top: 80px;
  border-top: 1px solid var(--border);
  background: linear-gradient(180deg, transparent, rgba(27,73,101,.015));
}
.ftr-t {
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
  color: var(--text);
}
.ftr-s {
  font-size: 13px;
  color: var(--muted);
  margin-top: 6px;
}
.ftr-c {
  font-size: 12px;
  color: var(--subtle);
  margin-top: 16px;
}

/* ═══════════════ ANIMATIONS ═══════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.fi { animation: fadeUp .5s var(--transition) both; }
.su { animation: fadeUp .5s var(--transition) both; }

/* ═══════════════ BACK LINK ═══════════════ */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
  font-size: 14px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  transition: all .2s var(--transition);
  margin-bottom: 28px;
}
.back-link:hover { background: color-mix(in srgb, var(--kc) 8%, transparent); }

const D={'1-1':{b:'Ayna',d:'Öz-Farkındalığın Bilimsel Haritası',c:22380,h:'<p>AYNA</p>\n<p>Öz-Farkındalığın Bilimsel Haritast</p>\n<p>Bu dijital ek, Ayna bölümünün bilimsel derinliğidir. Burada öz-farkındalık alanındaki temel araştırmaları, kendi kör noktalarını teşhis edecek bir değerlendirme aracını ve test sonuçlarına göre kişiye özel bir okuma rehberi bulacaksın. Amacımız seni teori ile boğmak değil, gerçekten nerede durduğunu göstermek.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">ÖZ-FARKINDALIK BİLİMİ</div></div>\n<p>Burada 6 farklı araştırma geleneğini göreceksin. Her biri öz-farkındalığın farklı bir yüzünü aydınlatıyor.</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Aynanın Önünde Ne Olur? (Duval &amp; Wicklund, 1972)</span></div>\n<p>Öz-farkındalığın ilk ciddi bilimsel çalışması Shelley Duval ve Robert Wicklund’dan geldi. "Objective Self-Awareness Theory" — basit ama güçlü bir keşif.</p>\n<p>Deney: Katılımcılara bir görev verildi. Bir grup normal odada yaptı, diğer grup aynanın karşısında yaptı. Ayna grubundaki insanlar kendilerini daha sert değerlendirdi, hata farkındalığı arttı, performans standartlarına uyum yükseldii.</p>\n<p>Sonuç: Dikkat kendine döndüğünde, öz-değerlendirme daha doğru oluyor. Ama bir bedeli var: Rahatsızlık. İnsanlar aynaya baktığında ideal benlikleriyle gerçek benlikleri arasındaki farkı görüyor ve bu rahatsız ediyor. Bu yüzden çoğu insan aynadan kaçar — mecazi olarak. Geribildirimden kaçar, öz-değerlendirmeden kaçar, kayıt dinlemekten kaçar.</p>\n<div class="insight-box">💡 Satışçı için anlamı: Ses kaydı bir aynadır. Video kaydı daha güçlü bir ayna. Müşteri anketi en güçlü ayna. Her biri rahatsız edecek — ama Duval-Wicklund’ın verileri gösteriyor ki bu rahatsızlık performansı artırıyor.</div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Başkalarının Yanlılığını Görürsün, Kendiniinkini Göremezsin (Pronin, 2002)</span></div>\n<p>Emily Pronin, Princeton Üniversitesi, 2002. Şaşırtıcı bir deney: Katılımcılara bilişsel yanlılıkları anlattı (teyit yanlılığı, halo etkisi, vb.). Sonra sordu: "Başkaları bu yanlılıklara ne kadar düşüyor?" Herkes "çok" dedi. "Peki siz?" Herkes "ben daha az" dedi.</p>\n<p>Pronin buna "Bias Blind Spot" (Yanlılık Kör Noktası) dedi. İnsanlar yanlılıkları başkalarında kolayca tespit ediyor ama kendilerinde görmüyor. Daha da kötüsü: Yanlılıklar hakkında ne kadar bilgi sahibi olursan ol, kendi yanlılığına karşı kör kalma eğilimin azalmıyor. Bilgi seni korumuyyor.</p>\n<p>Bu satışçı için sarşıcı bir bulgu: "Ben projeksyon yapiyorum" dediğinde bile projeksiyon yapmaya devam edebilirsin. Bilmek yetmiyor, sistematik kontrol gerekiyor — veri, kayıt, geribildirim. Pronin’in keşfi bize diyor ki: Öz-farkındalık bir kez kazanılıp bırakılan bir şey değil, sürekli pratik gerektiren bir disiplin.</p>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">İki Tür Farkındalık (Eurich, 2017)</span></div>\n<p>Tasha Eurich, örgütsel psikolog. 5.000 katılımcıyla yaptığı çalışmada şaşırtıcı bir bulgu: İnsanların yüzde 95’i kendini öz-farkındalığı yüksek sanıyor. Verilere göre gerçek oran: Yüzde 10-15. Dunning-Kruger’ın öz-farkındalık versiyonu.</p>\n<p>Eurich’in en önemli katkısı: Öz-farkındalığı ikiye ayırdı:</p>\n<p>İçsel öz-farkındalık: Kendi değerlerini, duygularını, düşüncelerini, güçlü ve zayıf yanlarını bilmek. "Ben kimim" sorusu.</p>\n<p>Dışsal öz-farkındalık: Başkalarının seni nasıl gördüğünü bilmek. "Başkaları beni nasıl görüyor" sorusu.</p>\n<p>İkisi farklı ve bağımsız. İçsel farkındalığın yüksek olabilir ama dışsal düşük — yani kendi değerlerini bilirsin ama başkalarının seni nasıl algıladığından habersizsin. Ya da tersi: Başkalarının fikirlerini çok önemsersin ama kendi iç dünyanı tanımazsın.</p>\n<p>Eurich’in verileri: En etkili liderler ve profesyoneller her ikisinde de yüksek. Ama çoğu insan birinde iyi, diğerinde kötü. Bu ikili yapı, aşağıdaki testin temelini oluşturuyor.</p>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Kendini Başkaları Kadar Tanımıyorsun (Vazire, 2010)</span></div>\n<p>Simine Vazire, UC Davis. SOKA modeli (Self-Other Knowledge Asymmetry): Bazı özelliklerini sen daha iyi bilirsin, bazılarını başkaları daha iyi bilir.</p>\n<p>Sen daha iyi bilirsin: İç dünyan, düşüncellerin, niyetlerin, duyguların. "Neden böyle hissediyorum" sorusunun cevabı sende.</p>\n<p>Başkaları daha iyi bilir: Dışa vuran davranışların. Ne kadar konuştuğun, ses tonun, beden dilin, başkaları üzerindeki etkin. "Nasıl görünüyorum" sorusunun cevabı başkalarında.</p>\n<div class="insight-box">💡 Satışçı için bomba: Kendi niiyetini biliyorsun ("yardımcı olmak istiyorum") ama müşterinin seni nasıl gördüğünü bilmiyorsun ("bu adam bana satış yapıyor"). Volkan’ın durumu tam bu: Niyeti iyiydi (dinlemek istiyordu) ama davranışı farklıydı (kesiyordu). Niyet-davranış uyuşmazlığı.</div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Beyin Seni Koruyor — Gerçekten Değil (Miller &amp; Ross, 1975)</span></div>\n<p>Dale Miller ve Michael Ross, 1975: Self-serving bias (kendine hizmet eden yanlılık). Başarıyı kendine, başarısızlığı dışa atma eğilimi.</p>\n<p>Satış kapandı = "Iyi sunum yaptım." Satış kaybedildi = "Müşterinin bütçesi yoktu." Dikkat et: Başarıda iç attribution (ben), başarısızlıkta dış attribution (müşteri, pazar, ekonomi). Beyin ego’yu korumak için hikayeyi böyle yazıyor.</p>\n<p>Bu yanlılık öğrenmeyi engelliyor. Başarısızlığı hep dışarı atıyorsan, düzeltecek bir şey bulamazsın — çünkü "sorun bende değil." Ama ana bölümde de söyledik: Bazen gerçekten dışarıdadır. Anahtar: Otomatik dış attribution’ı sorgula. Her seferinde "bende ne vardı" diye sor — cevap bazen "bir şey yoktu, gerçekten dış faktör" olabilir. Ama sormadan bilemezsin.</p>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">Bedenin Biliyor, Sen Bilmiyorsun (Damasio, 1994)</span></div>\n<p>Ana bölümde kısa değindik, şimdi derine inelim. Antonio Damasio’nun Somatik İşaretleyici Hipotezi öz-farkındalığın beden boyutunu açıyor.</p>\n<p>Iowa Kumar Testi detayı: 4 deste kart. 2 deste yüksek ödül / yüksek ceza (net kayıp). 2 deste düşük ödül / düşük ceza (net kazanç). Katılımcılar kart çekiyor, para kazanıp kaybediyor. Bilinçli olarak hangi destenin riskli olduğunu fark etmeleri ortalama 50. kart civarında. Ama el terlemesi (galvanik deri tepkisi) 10. karttan itibaren başlıyor. Beden 40 kart önce biliyor.</p>\n<p>Beynin ventromedial prefrontal korteks (vmPFC) bölgesi hasarlı olan hastalarda bu somatik sinyal oluşmuyor. Ve bu hastalar sürekli riskli desteden çekmeye devam ediyor — bilinçli olarak "bu deste kötü" deseler bile. Duygu olmadan karar alma bozuluyor.</p>\n<div class="insight-box">💡 Satışçı için pratiği: Bedensel sinyalleri oku. Görüşmeye girerken mide bulanıyorsam, eller soğuksa, nefes sığsa — bu "korkuyorum" değil, "bir şey yanlış" olabilir. Belki hazırlık yetersiz. Belki müşteriye güvenmiyorum. Belki ürüne inanmıyorum. Beden somut bir şey söylüyor — "ne" olduğunu sen bulmallısın.</div>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Duval, S. &amp; Wicklund, R. A. (1972). A Theory of Objective Self-Awareness. Academic Press. | Pronin, E. et al. (2002). The bias blind spot. JPSP, 83(2), 369-381. | Eurich, T. (2017). Insight. Crown Business. 5000 katılımcı, %95 vs %10-15. | Vazire, S. (2010). Who knows what about a person? JPSP, 98(2), 281-300. SOKA modeli. | Miller, D. T. &amp; Ross, M. (1975). Self-serving biases. Psychological Bulletin, 82(2), 213-225. | Damasio, A. (1994). Descartes\' Error. + Bechara et al. (1997). Science, 275(5304), 1293-1295.</div>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">SATIŞ ÖZ-FARKINDALIK PROFİL TESTİ</div></div>\n<p>Bu test seni 5 farklı öz-farkındalık boyutunda değerlendiriyor. Her boyut yukarıdaki bilimsel temele dayanıyor. Dürüst cevapla — doğru/yanlış yok, sadece görme var. Her soruya 1-5 arası puan ver: 1 = Hiç uymuyor, 5 = Tam uyuyor.</p>\n<h4 class="section-title">BOYUT A: İÇSEL FARKINDALIK</h4>\n<p>Kendi duygu, düşünce ve motivasyonlarını ne kadar tanıyorsun? (Eurich içsel boyut)</p>\n<div class="test-q" data-dim="A" data-num="1"><span class="q-label">A1</span><span class="q-text">Bir görüşmeden çıktığımda nasıl hissettiğimi net olarak tanımlayabiliirim.</span></div>\n<div class="test-q" data-dim="A" data-num="2"><span class="q-label">A2</span><span class="q-text">Fiyat söylerken içimde ne olduğunu (gerginlik, güven, korku) fark ederim.</span></div>\n<div class="test-q" data-dim="A" data-num="3"><span class="q-label">A3</span><span class="q-text">Satış yapmayı neden sevdiğimi (veya sevmediğimi) açıkça ifade edebilirim.</span></div>\n<div class="test-q" data-dim="A" data-num="4"><span class="q-label">A4</span><span class="q-text">Motivasyonumun düştüğü anları ve nedenlerini çoğunlukla bilirim.</span></div>\n<div class="test-q" data-dim="A" data-num="5"><span class="q-label">A5</span><span class="q-text">Hangi tür müşterilerde zorlandığımı ve bunun neden olduğunu bilirim.</span></div>\n<div class="test-q" data-dim="A" data-num="6"><span class="q-label">A6</span><span class="q-text">Stres altındayken bedenimde ne olduğunu (mide, nefes, kalp) fark ederim.</span></div>\n<div class="test-q" data-dim="A" data-num="7"><span class="q-label">A7</span><span class="q-text">Değerlerimin ne olduğunu ve satış tarzımla ne kadar uyumlu olduğunu bilirim.</span></div>\n<div class="test-q" data-dim="A" data-num="8"><span class="q-label">A8</span><span class="q-text">Bir görüşmede "otomatik pilotta" olduğum anları fark ederim.</span></div>\n<div class="fill-blank">BOYUT A TOPLAM: ____ / 40</div>\n<h4 class="section-title">BOYUT B: DIŞSAL FARKINDALIK</h4>\n<p>Başkalarının seni nasıl gördüğünü ne kadar biliyorsun? (Eurich dışsal boyut + Vazire SOKA)</p>\n<div class="test-q" data-dim="B" data-num="1"><span class="q-label">B1</span><span class="q-text">Müşterilerim beni nasıl tanımladığını biliyorum (3 sıfat söyleyebilirim).</span></div>\n<div class="test-q" data-dim="B" data-num="2"><span class="q-label">B2</span><span class="q-text">Ekip arkadaşlarımın benim hakkımdaki görüşünü biliyorum.</span></div>\n<div class="test-q" data-dim="B" data-num="3"><span class="q-label">B3</span><span class="q-text">Müşterilerimden düzenli geribildirim alırım (resmi veya gayri resmi).</span></div>\n<div class="test-q" data-dim="B" data-num="4"><span class="q-label">B4</span><span class="q-text">Sunum yaparken müşterinin beden dilinden tepkisini okuyabilirim.</span></div>\n<div class="test-q" data-dim="B" data-num="5"><span class="q-label">B5</span><span class="q-text">Sesimi kaydedip dinlediğimde başkalarının duyduğu şeyi duyabiliirim.</span></div>\n<div class="test-q" data-dim="B" data-num="6"><span class="q-label">B6</span><span class="q-text">Patronum veya yöneticim benim performansım hakkında ne düşündüğünü dürüstçe bilirim.</span></div>\n<div class="test-q" data-dim="B" data-num="7"><span class="q-label">B7</span><span class="q-text">"Güzel sunum" diyen müşterinin gerçekten memnun mu yoksa nazik mi olduğunu ayyrt edebilirim.</span></div>\n<div class="test-q" data-dim="B" data-num="8"><span class="q-label">B8</span><span class="q-text">Başkalarının beni nasıl gördüğü konusunda sürpriz yaşadığım nadir olur.</span></div>\n<div class="fill-blank">BOYUT B TOPLAM: ____ / 40</div>\n<h4 class="section-title">BOYUT C: PROJEKSIYON FARKINDALIG</h4>\n<p>Kendi iç dünyanı müşteriye ne kadar yansıtıyorsun? (Ross + Pronin)</p>\n<div class="test-q" data-dim="C" data-num="1"><span class="q-label">C1</span><span class="q-text">Fiyatı söylemeden önce müşterinin tepkisini tahmin ettiğimi fark ederim.</span></div>\n<div class="test-q" data-dim="C" data-num="2"><span class="q-label">C2</span><span class="q-text">"Bu müşteri almaz" diye düşündüğüm olur — müşteri henüz bir şey demeden.</span></div>\n<div class="test-q" data-dim="C" data-num="3"><span class="q-label">C3</span><span class="q-text">Bazı müşterileri dış görünüşlerine bakarak değerlendirdiğimi kabul edebilirim.</span></div>\n<div class="test-q" data-dim="C" data-num="4"><span class="q-label">C4</span><span class="q-text">Bazen müşterinin ihtiyacını sormadan bildiğimi düşünürüm.</span></div>\n<div class="test-q" data-dim="C" data-num="5"><span class="q-label">C5</span><span class="q-text">"Bu sektörde/bölgede satış zor" gibi genellemeler yaptığımı fark ederim.</span></div>\n<div class="test-q" data-dim="C" data-num="6"><span class="q-label">C6</span><span class="q-text">Bir müşteri reddetttiğinde sebebini müşteriye sormak yerine kendim açıkladığım olur.</span></div>\n<div class="test-q" data-dim="C" data-num="7"><span class="q-label">C7</span><span class="q-text">Kendi satın alma davranışımı müşterilerime genellediğimi düşünürüm ("ben alsaydım...").</span></div>\n<div class="test-q" data-dim="C" data-num="8"><span class="q-label">C8</span><span class="q-text">Müşterinin "hayır" demesini kişisel alırım.</span></div>\n<div class="fill-blank">BOYUT C TOPLAM: ____ / 40</div>\n<p>Dikkat: Boyut C’de yüksek puan projeksiyon farkındalığının yüksek olduğunu gösterir — bu iyi. Ama yüksek farkındalık "yapmam" demek değil, "fark ediyorum" demek. Fark etmek ilk adım.</p>\n<h4 class="section-title">BOYUT D: ATTRIBUTION TARZI</h4>\n<p>Başarı ve başarısızlığı neye bağlıyorsun? (Miller &amp; Ross + Seligman)</p>\n<div class="test-q" data-dim="D" data-num="1"><span class="q-label">D1</span><span class="q-text">Satış kapandığında bunun kendi beceriimden kaynaklandığını düşünürüm.</span></div>\n<div class="test-q" data-dim="D" data-num="2"><span class="q-label">D2</span><span class="q-text">Satış kaybettiğimde bunun dış faktörlerden (fiyat, pazar, müşteri) kaynaklandığını düşünürüm.</span></div>\n<div class="test-q" data-dim="D" data-num="3"><span class="q-label">D3</span><span class="q-text">Başarısızlıktan sonra "ben ne yapabilirdim" sorusunu sorarım.</span></div>\n<div class="test-q" data-dim="D" data-num="4"><span class="q-label">D4</span><span class="q-text">Başarıdan sonra "ne iyi gitti, tekrarlaanabilir mi" diye analiz ederim.</span></div>\n<div class="test-q" data-dim="D" data-num="5"><span class="q-label">D5</span><span class="q-text">"Her zaman böyle olur" gibi genellemeler yaptığımı fark ederiim.</span></div>\n<div class="test-q" data-dim="D" data-num="6"><span class="q-label">D6</span><span class="q-text">Başarısızlıktan sonra motivasyonum uzun süre düşük kalır.</span></div>\n<div class="test-q" data-dim="D" data-num="7"><span class="q-label">D7</span><span class="q-text">Dış faktörlerin gerçekten etkili olduğu durumları kendi hatam olan durumlardan ayırt edebiliirim.</span></div>\n<div class="test-q" data-dim="D" data-num="8"><span class="q-label">D8</span><span class="q-text">Ekip veya yöneticimle başarısızlık hakkında açıkça konuşabilirim.</span></div>\n<div class="fill-blank">BOYUT D TOPLAM: ____ / 40</div>\n<h4 class="section-title">BOYUT E: BEDENSEL FARKINDALIK</h4>\n<p>Somatik işaretleyicillerini ne kadar okuyorsun? (Damasio)</p>\n<div class="test-q" data-dim="E" data-num="1"><span class="q-label">E1</span><span class="q-text">Stresli bir görüşmede bedenimde ne olduğunu (eller, mide, nefes) fark ederim.</span></div>\n<div class="test-q" data-dim="E" data-num="2"><span class="q-label">E2</span><span class="q-text">Görüşmeye girerken "içgüdüsel" bir his duyarım ve bu his genellikle doğru çıkar.</span></div>\n<div class="test-q" data-dim="E" data-num="3"><span class="q-label">E3</span><span class="q-text">Fiyat söylerken bedenimde bir değişiklik olup olmadığını bilirim.</span></div>\n<div class="test-q" data-dim="E" data-num="4"><span class="q-label">E4</span><span class="q-text">Müşterinin bedensel sinyalllerini (omuz, göz, el) fark ederim.</span></div>\n<div class="test-q" data-dim="E" data-num="5"><span class="q-label">E5</span><span class="q-text">Enerjimin gün içinde ne zaman yüksek ne zaman düşük olduğunu bilirim.</span></div>\n<div class="test-q" data-dim="E" data-num="6"><span class="q-label">E6</span><span class="q-text">Karn, bedensel sinyallere göre strateji değiştirdiğim olur.</span></div>\n<div class="test-q" data-dim="E" data-num="7"><span class="q-label">E7</span><span class="q-text">Yorgunluk, açlık veya uyku eksikliğinin satış performansımı nasıl etkilediğini bilirim.</span></div>\n<div class="test-q" data-dim="E" data-num="8"><span class="q-label">E8</span><span class="q-text">Bir görüşmeden sonra bedeenimdeki gerilimi bilinçli olarak bırakabilirim.</span></div>\n<div class="fill-blank">BOYUT E TOPLAM: ____ / 40</div>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">SONUÇ ANALİZİ VE TEŞHİS</div></div>\n<p>Puanlarını aşağıya yaz ve her boyutun ne söylediğini oku. Önemli: Bu bir yargılama değil, bir harita. Haritanın zayıf bölgelerini bilmek seni zayıflatmaz, güçlendirir.</p>\n<p>Boyut A: İçsel Farkındalık Proflin</p>\n<div class="score-range">32-40 puan (Yüksek): Kendi iç dünyanı iyi tanıyorsun. Duygularını, motivasyonunu, değerlerini biliyorsun. Bu güçlü bir temel. Ama Pronin uyarısını hatırla: Öz-farkındalık illluüyonu en çok bu grupta görülür. "Kendimi iyi tanıyorum" demek bazen "sorgulamayı bıraktım" demek olabilir. Test sonucun yüksekse kendinden emin ol ama kör noktaların olmadığını düşünme.</div>\n<div class="score-range">20-31 puan (Orta): Bazı şeyleri biliyorsun, bazılarını kaçırıyorsun. En yaygın profil bu. Muhtemelen rahat anlarında farkındalsın ama stres altında otomatiğe geçiyorsun. Senin işin: Stres anlarındaki farkındalığı artırmak. Fiyat anı, itiraz anı, kapanış anı — tam bu anlarda içsel farkındalık düşer. Oraya odaklan.</div>\n<div class="score-range">8-19 puan (Düşük): Otomatik pilottasın. Görüşmelere girip çıkıyorsun ama içinde ne olduğunu issşlemiyorsun. Bu tehlikeli çünkü duyguların seni yönetiyor ama sen onların farkında değilsin. Projeksiyon burada en yüksek olur. İlk adım: Her görüşmeden sonra 2 dakika dur ve sor: "Ne hissettim?" Cevabı bilmiyorsan, normale ş: Öğreneceksin.</div>\n<p>Boyut B: Dışsal Farkındalık Proflin</p>\n<p>32-40 (Yüksek): Başkalarının seni nasıl gördüğünü biliyorsun. Bu nadir ve değerli. Muhtemelen geribildirim alıyorsun ve okuyyorsun. Riskin: Başkalarının görüşüne aşırı bağımlı olmak. "Herkes ne der" endişesi Türkiye’de zaten güçlü — bu boyut çok yüksekse kendi sesini kaybetme riski var.</p>\n<p>20-31 (Orta): Genel bir fikrin var ama sistematik değil. Bazı müşterilerden geribildirim alıyorsun ama hepsinden değil. Muhtemelen olumlu geribildirimi duyuyorsun, olumsuzu kaçırıyorsun — çünkü olumsuz gizli geliyor (Türkiye’de yüze söylenmez). Senin işin: Veri topla. Ses kaydı, müşteri anketi, 360 derece — kişiden değil sistemden geribildirim al.</p>\n<p>8-19 (Düşük): Başkalarının seni nasıl gördüğü hakkında karanlıktasın. Vazire’nin SOKA modeli diyor ki: Davranışlarını başkaları senden daha iyi görür. Sen niyetini biliyorsun ("yardımcı olmak istiyorum") ama dışarı nasıl yansıdığını bilmiyorsun. Volkan tam bu profil. Acil adım: 1 görüşmeni kaydet, dinle. Şok edici olacak ama gerekli.</p>\n<p>Boyut C: Projeksiyon Proflin</p>\n<p>32-40 (Yüksek farkındalık): Projeksiyon yapıp yapmadığını fark ediyorsun. Bu iyi. Ama Pronin’in uyarısı: Farkındalık projeksiyonu durdurmaz. Hala yapıyor olabilirsin — sadece fark ediyorsun. Fark etmek ile durdurmak arası pratiğe bağlı. "Fark ettim, yine de yapttım" normal — zamanla azalır.</p>\n<p>20-31 (Orta): Bazen fark ediyorsun, bazen otomatik. Muhtemelen bazı projeksiyon türleirnde iyi, başkalarında körsün. Örneğin: Fiyat projeksiyonunu fark ediyorsun ama "bu sektörde olmaz" genellemesini fark etmiyorsun. Hangi projeksiyon türü sana özel — soruları tekrar oku, en düşük puanlı sorular sana özel kör noktayı gösterir.</p>\n<p>8-19 (Düşük farkındalık): Projeksiyon yapıyorsun ama fark etmiyorsun. Yıldız profili: Kendi "pahalı" hissini müşteriye giydiriyor ama bunu görmüyor. Bu profilde en önemli egzersiz: 1 hafta boyunca her görüşme öncesi kafandaki tahmini yaz, sonra gerçekle karşılaştır. Yüzde 73 yanlış çıkmasını bekle — verilerim böyle diyor.</p>\n<p>Boyut D: Attribution Proflin</p>\n<p>D1 yüksek + D2 yüksek = Self-serving bias aktif. Başarıda kendini, başarısızlıkta dış faktörleri görüyorsun. Klasik koruma mekanizması. Ego’n güçlü ama öğrenme düşük. Senden beklenen: Her başarısızlıktan sonra "bende ne vardı" sorusunu ZORLAYARAK sor. Cevap bazen "bir şey yoktu" olabilir — ama sormadan bilemezsin.</p>\n<p>D3+D4 düşük = Öğrenme döngüsü kapalı. Ne başarıdan ne başarısızlıktan ders çıkarıyorsun. Her görüşme bittiğinde "tamam sonraki" deyip geçiyorsun. Bu hızlı görünür ama aslında aynı yerde daireler çiziyorsun. Senden beklenen: Her görüşmeden sonra 3 dakika: "Ne iyi gitti? Ne kötü gitti? Bir sonrakinde ne yapacağım?" Bu 3 soru öğrenme döngüsünü açar.</p>\n<p>D5+D6 yüksek = Seligman pessimist profili. "Her zaman böyle" + "motivasyonum uzun süre düşük" = öğrenilmiş çaresizlik riski. Başarısızlığı kalıcı, yaygın ve kişisel görüyorsun. Antidot: Her "her zaman" cümlesini yakala ve sorgula — "gerçekten her zaman mı? Son 10 görüşmede kaçında oldu?" Rakam seni genellemeden kurtarır.</p>\n<p>Boyut E: Bedensel Farkındalık Proflin</p>\n<p>32-40 (Yüksek): Bedenini okuyorsun. Damasio’nun somatik işaretleyicileri sende aktif ve farkındasın. Bu büyük avantaj — çoğu insan bedensel sinyalleri "heyecan" veya "stres" diye geçiştirir, sen okuyorsun. Geliştirme alanı: Bu sinyalleri sadece kendinde değil müşteride de oku — Kısım 2’de derinleşecek.</p>\n<p>20-31 (Orta): Bazen fark ediyorsun, genellikle geçiştiriyorsun. Muhtemelen çok yoğun anlarda (mide bulanması, kalp çarppması) fark ediyorsun ama ince sinyalleri (hafif gerginlik, enerji düşüşü) kaçırıyorsun. Geliştirme: Görüşmeden önce 30 saniye dur ve bedeni tara: Omuzlar, mide, nefes, eller. Bu 30 saniyelik tarama farkındalığı açar.</p>\n<p>8-19 (Düşük): "Kafadan" yaşıyorsun, beden yok. Bu modern iş dünyasının yaygın problemi: Masadan masaya, toplantıdan toplantıya, beden sadece taşıma aracı. Ama Damasio’nun verileri açık: Bedensel sinyal olmadan karar kalitesi düşer. Senden beklenen: Günde 3 kez dur (sabah, öğle, akşam), 1 dakika beden taraması yap: "Bedeenim şu an ne hissediyor?" Basit ama dönüştürücü.</p>\n<p>Profil Haritanı</p>\n<p>5 boyutunu aşağıya yerleştir:</p>\n<p>En düşük 2 boyut = öncelikli çalışma alanın. Hepsinde iyi olmak gerekmez. Ama en zayıf 2 boyut seni en çok sabote eden alanlardır. Önce oralara odaklan.</p>\n<p>Yaygın Profil Kombinasyonları</p>\n<p>Aşağıdakilerden hangisi sana benziyor?</p>\n<p>"Kendini Bilen Yalnız": A Yüksek, B Düşük</p>\n<p>Kendi iç dünyanı tanıyorsun ama başkalarının seni nasıl gördüğünü bilmiyorsun. "Ben iyi niyetliyim" diyorsun ama müşteri seni "ısrarcı" görüyor olabilir. Niyet-algı uyuşmazlığı. Eurich’in verilerine göre bu profil yöneticilerde yaygın: İçsel farkındalık yüksek ama "odamda kimse dürüst konuşmuyor" — dışsal veri gelmiyor.</p>\n<p>Öncelik: Dış veri topla. Ses kaydı dinle, müşteriye sor, meslektaştan geribildirim iste. Rahatsız edecek ama Duval-Wicklund’ın aynassı tam bu.</p>\n<p>"Kamuoyu Bağımlısı": A Düşük, B Yüksek</p>\n<p>Başkalarının seni nasıl gördüğünü çok önemsiyorsun ama kendini tanımıyorsun. Patron ne der, müşteri ne düşünür, ekip arkasından ne konuşur — bunlarla yaşıyorsun. Ama kendi değerlerin, motivasyonun, sınırların net değil. Başkasının aynassında yaşıyorsun, kendi aynan yok.</p>\n<p>Öncelik: "Ben ne istiyorum" sorusunu cevapla. Motivasyon bölümündeki Frankl sorusu: Neden bu işi yapıyorsun? Başkalarının cevabını değil, kendi cevabını bul.</p>\n<p>"Görünmez Projeksiyon": C Düşük + D1,D2 Yüksek</p>\n<p>Projeksiyon yapıyorsun ama fark etmiyorsun. Üsttrüne başarıyı kendine başarısızlığı dışarı atıyorsun. Bu kombinasyon öğrenmeyi en çok engelleyen profil. "Bende sorun yok, müşteride/pazarda" düşüncesi hem projeksiyon hem self-serving bias birlikte çalışıyor.</p>\n<p>Öncelik: Veri ile yüzleş. "Son 10 görüşmede kaçını kapattım" rakamı. "Aynı ürünle aynı bölgede en iyi satışçının oranı ne" karşılaştırması. Rakam yalan söylemez — his söyler.</p>\n<p>"Kafadan Yaşayan": E Düşük + A Orta</p>\n<p>Düşünce dünyasın yaşıyorsun ama bedeni görmüyorsun. Stresi "düşünce" olarak yaşıyorsun ("korkuyorum") ama bedensel sinyali okumuyorsun ("midem bulanıyor çünkü hazırlığım yetersiz"). Damasio’nun hastaası gibi — mantık var ama beden bilgisi eksik, karar kalitesi düşük.</p>\n<p>Öncelik: Beden tarama rutini kur. Günde 3 kez, 1 dakika: Omuzlar, mide, nefes, eller. "Ne hissediyorum" değil, "bedenim ne hissediyor" sor. Fark ince ama önemli.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">TEK GÖREV</div></div>\n<p>Sana 10 görev, 5 tablo, 3 program vermeyeceğim. 1 şey. Ama gerçekten çalışan 1 şey.</p>\n<p>7 Günlük Ayna Deneyi</p>\n<p>Görev basit: 7 gün boyunca her iş gününün sonunda 5 dakikayını ayır ve şu 3 soruyu yaz.</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Bugün bir satış etkileşiminde ne hissettim? (Boyut A — içsel) İçinde ne olduğunu yaz. "Gergin", "rahat", "sinirli", "heyecanlı", "kırgın" — ne olursa. Kelime bulamyorsan "bilmiyorum" yaz — bu da veri.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Bugün bir müşteri veya meslektaş beni nasıl gördü? (Boyut B — dışsal) Tahmin değil, kanıt. Ne dedi, nasıl baktı, nasıl tepki verdi? Kanıt yoksa: "bilmiyorum" yaz — bu da veri.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Bugün kafamda bir şeyi "bilen" an oldu mu? (Boyut C — projeksiyon) "Bu almaz", "bu pahalı bulur", "bu sektörde olmaz" gibi sorgusuz kabul ettiğin bir düşünce var mıydı? Varsa yaz. Gerçekte ne oldu?</span></div>\n<p>Hepsi bu. 3 soru, 5 dakika, 7 gün.</p>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">günün sonunda 7 kaydını oku. Kalıp göreceksin. Belki her gün "gergin" yazmışsın — kronik gerilim. Belki "bilmiyorum" çok çıkmış — farkındalık düşük. Belki "bu almaz" 5 kez yazmışsın ve 3’ü gerçekte almış — projeksiyon kanıtlanmış.</span></div>\n<p>Bu 7 günlük deney, 40 soruluk testten daha güçlü bilgi verecek. Çünkü test "ne düşünüyorsun" sorar, deney "ne yapıyorsun" gösterir. Ve Pronin’in bize öğrettiği şey: İnsanlar ne yaptıklarını, ne düşündüklerinden daha az biliiyor.</p>\n<h4 class="section-title">NEDEN BU ÇALIŞIYOR?</h4>\n<p>Bu görev 3 bilimsel mekanizmayı aynı anda aktive ediyor: (1) Duval-Wicklund: Dikkat kendine dönüyor = öz-farkındalık artıyor. (2) Lieberman affect labeling (2007, UCLA): Duyguyu isimlendirmek amigdala aktivasyonunu azaltıyor = duygusal tepkisellik düşüyor. (3) Pennebaker expressive writing (1997): Günlük yazmak psikolojik sağlığı iyileştiriyor = stres azalıyor, netlik artıyor. 3 mekanizma, 1 görev, 5 dakika.</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<div class="ref-line">Bechara, A., Damasio, A. R., Damasio, H., &amp; Anderson, S. W. (1997). Deciding advantageously before knowing the advantageous strategy. Science, 275(5304), 1293-1295.</div>\n<div class="ref-line">Damasio, A. R. (1994). Descartes\' Error: Emotion, Reason, and the Human Brain. G. P. Putnam\'s Sons.</div>\n<div class="ref-line">Duval, S., &amp; Wicklund, R. A. (1972). A Theory of Objective Self-Awareness. Academic Press.</div>\n<div class="ref-line">Eurich, T. (2017). Insight: The Surprising Truth About How Others See Us, How We See Ourselves, and Why the Answers Matter More Than We Think. Crown Business.</div>\n<div class="ref-line">Kruger, J., &amp; Dunning, D. (1999). Unskilled and unaware of it: How difficulties in recognizing one\'s own incompetence lead to inflated self-assessments. Journal of Personality and Social Psychology, 77(6), 1121-1134.</div>\n<div class="ref-line">Lieberman, M. D., Eisenberger, N. I., Crockett, M. J., Tom, S. M., Pfeifer, J. H., &amp; Way, B. M. (2007). Putting feelings into words: Affect labeling disrupts amygdala activity in response to affective stimuli. Psychological Science, 18(5), 421-428.</div>\n<p>Luft, J., &amp; Ingham, H. (1955). The Johari Window: A Graphic Model of Interpersonal Awareness. Proceedings of the Western Training Laboratory in Group Development. UCLA.</p>\n<div class="ref-line">Miller, D. T., &amp; Ross, M. (1975). Self-serving biases in the attribution of causality: Fact or fiction? Psychological Bulletin, 82(2), 213-225.</div>\n<div class="ref-line">Pennebaker, J. W. (1997). Writing about emotional experiences as a therapeutic process. Psychological Science, 8(3), 162-166.</div>\n<div class="ref-line">Pronin, E., Lin, D. Y., &amp; Ross, L. (2002). The bias blind spot: Perceptions of bias in self versus others. Personality and Social Psychology Bulletin, 28(3), 369-381.</div>\n<div class="ref-line">Ross, L., Greene, D., &amp; House, P. (1977). The false consensus effect: An egocentric bias in social perception and attribution processes. Journal of Experimental Social Psychology, 13(3), 279-301.</div>\n<div class="ref-line">Vazire, S. (2010). Who knows what about a person? The Self-Other Knowledge Asymmetry (SOKA) model. Journal of Personality and Social Psychology, 98(2), 281-300.</div>\n<p>Bu Derine Dal’ın sonuna geldin. 6 bilimsel gelenekten öz-farkındalığın haritasını çıkardın, 5 boyutta kendinii ölçtün, profilini okudun ve 7 günlük deneye başlayacaksın. Ayna rahatsız eder — ama göstermeden düzeltmek mümkün değil.</p>'},
'1-2':{b:'Korku',d:'Korku Haritası ve Antrenman',c:16359,h:'<p>KORKU</p>\n<p>Korku Haritası ve 4 Haftalık Antrenman Programı</p>\n<p>Bu Derine Dal’da test yok. Test sana "korku seviyenn şu" der — zaten biliyorsun. Bunun yerine sana 3 şey vereceğim: Birincisi, ana bölümden çok daha derin bilim — görmediğin araştırmalar. İkincisi, korkunu çözen bir harita aracı — neden, nerede, ne zaman, ne yoğunlukta. Üçüncüsü, 4 haftalık bir antrenman programı — test edildmi, işe yarayan, adım adım.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">KORKU BİLİMİNİN DERİN KATMANLARI</div></div>\n<p>Ana bölümde LeDoux, Eisenberger, Arnsten, Porges, Lieberman ve Raiport’u gördün. Şimdi onların görmediğin yüzlerini ve birkaç yeni ismi göreceksin.</p>\n<p>LeDoux’nun İkinci Keşfi: Korku Hafızası Silinmiyor</p>\n<p>Ana bölümde LeDoux’nun kısa yol / uzun yol ayrımını gördük. Ama LeDoux’nun asıl bombası bu değil. Asıl bomba: Amigdalada kodlanan korku hafızası muhtemelen hiçbir zaman tam olarak silinmiyor.</p>\n<p>LeDoux’nun fare deneyleri: Fare bir sese eşlik eden elektrik şokunu öğreniyor (korkuu koşullanması). Sonra sesi şoksuz tekrarlayarak "söndürme" (extinction) yapılıyor — fare artık sesten korkmuyor gibi görünüyor. Ama stres altında veya zaman geçtikten sonra korku geri dönüyor (spontaneous recovery). Orijinal şifreleme hala orada — üzerine yeni bir şifreleme yazılmış ama eski silinmemiş.</p>\n<div class="insight-box">💡 Satışçı için anlamı sert: 5 yıl önce aldığın o sert red, amigdalanda hala kayıtlı. Üzerini yazdın — 100 başarılı görüşmeyle. Ama yoğun stres anında eski kayıt geri gelebilir. Bu seni zayıf yapmaz — insan yapar. Ve bunu bilmek önemli: "Yine korkuyorum, demek ki gelişmemişim" düşüncesi yanlış. Gelişmişsindir ama eski kayıt stres altında aktive olmuştur. Normal. Geçici. Yönetilebilir.</div>\n<h4 class="researcher">Downey &amp; Feldman: Reddedilme Hassasiyeti (1996)</h4>\n<p>Geraldine Downey, Columbia Üniversitesi. Bazı insanlar reddedilmeye diğerlerinden çok daha hassas. Downey buna "rejection sensitivity" dedi ve ölçek geliştirdi. Yüksek reddedilme hassasiyetine sahip insanlar: (1) Reddedilmeyi daha sık bekliyor, (2) belirsiz durumları red olarak yorumluyor, (3) reddedilince daha şiddetli tepki veriyor.</p>\n<p>Deney: Katılımcılar bir gruptan dışlanma yaşadı. Yüksek hassasiyetli kişiler aynı durumu düşük hassasiyetlilere göre çok daha şiddetli yaşadı — aynı olay, farklı deneyim. Ve daha da önemlisi: Yüksek hassasiyetliler reddedilme gelmeden ÖNCE korkmaya başlıyor. Henüz bir şey olmamış ama beden çoktan alarm modunda.</p>\n<p>Bu bazı satışçıların neden diğerlerinden çok daha fazla zorlandığını açıklıyor. Aynı ekipte, aynı ürünle, aynı pazar koşullarında — biri günü rahat geçiriyor, diğeri her aramada savaş veriyor. Fark yetenek değil, hassasiyet eşiği. Ve bu eşik değiştirilebilir — ama önce var olduğunu bilmek lazım.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Downey, G. &amp; Feldman, S. I. (1996). Implications of rejection sensitivity for intimate relationships. Journal of Personality and Social Psychology, 70(6), 1327-1343. Columbia Üniversitesi. Rejection Sensitivity Questionnaire (RSQ) geliştirdi.</div>\n<h4 class="researcher">Gross: Duygu Regrülasyonu Stratejileri (1998)</h4>\n<p>James Gross, Stanford. Duyguları yönetmennin 5 stratejisini tanımladı. Hepsi korku için geçerli:</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Durum seçimi: Korkutuşu duruma girme. Satışta: Soğuk aramadan kaçınma. En yaygın strateji ama en kötüsü — kısa vadede rahatlatır, uzun vadede korkuyu güçlendirir.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Durum değiştirme: Durumu değiştir ki daha az korkutucu olsun. Satışta: Soğuk arama yerine referansla arama. Durumu yumuuuşatıyorsun ama tamamen kaçınmmıyorsun. Daha iyi.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Dikkat yönlendirme: Dikkatini korkutucu kısımdan başka yere çevir. Satışta: Fiyat söylerken müşterinin yüzüne değil notlarına bak. Geçici rahatlama ama kalıcı çözüm değil — ve müşteri tepkisini kaçırırsın.</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Bilişsel değiştirme (reappraisal): Duruma verdiğin anlamı değiştir. "Bu arama başarısız olacak" yerine "bu arama bir pratiik." Gross’un verilerine göre en etkili strateji. Amigdala aktivasyonunu düşürüyor, PFC’yi güçlendiriyor.</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Tepki modülasyonu: Duygu oluştuktan sonra tepkiyi değiştir. Nefes tekniği, kas gevşetme, yürüyüş. Porges’in vagal tonlaması bu kategoride. İşe yarar ama "yangın çıktıktan sonra söndürme" — yangını önlmek daha iyi.</span></div>\n<p>Gross’un altın kuralı: Erken müdahale geç müdahaleden etkili. Strateji 4 (reappraisal) &gt; Strateji 5 (tepki modülasyonu). Yani: Nefes tekniği iyidir ama öncesinde çerçeve değiştirme daha iyidir. İkisi birlikte: En iyi.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Gross, J. J. (1998). The emerging field of emotion regulation: An integrative review. Review of General Psychology, 2(3), 271-299. Stanford. + Gross, J. J. (2002). Emotion regulation: Affective, cognitive, and social consequences. Psychophysiology, 39, 281-291.</div>\n<p>Exposure Therapy: Altın Standart (Foa &amp; Kozak, 1986)</p>\n<p>Edna Foa, Pennsylvania Üniversitesi. Kademeli maruz bırakmanın (graduated exposure) neden işe yaradığının teorik temelini kurdu: Emotional Processing Theory. Ana fikir: Korku bir "korku yapısı" (fear structure) olarak hafızada depolanmış. Bu yapıyı değiştirmek için (1) aktive etmek (korkulan durumla karşılaşmak) ve (2) yapıyla çelişen bilgi almak (beklenen felaket gerçekleşmedi) gerekiyor.</p>\n<p>Soğuk arama korkusu örneği: Korku yapısı = "ararrsam reddediliirim, rezil olurum, patron kızar." Aktive etme = gerçekten aramak. Çelişen bilgi = aradın, bazıları reddettti ama dünya yıkılmadı, patron kızmadı, hatta biri ilgilendi. Her başarılı maruz kalma korku yapısına çelişen bilgi ekler — yapı yavaş yavaş zayıflar.</p>\n<p>Kritik detay: Maruz kalmanın işe yaraması için "kaçmama" şart. Eğer aramayı yapıp 10 saniyede kapatttırsan veya "aradım ama yoktu" diye kendini kandırırsan, maruz kalma tamamlanmamış oluyor. Korku yapısına çelişen bilgi girmemiş. Foa’nın termi: "Söndürme" (extinction) ancak tam maruz kalmayla olur.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Foa, E. B. &amp; Kozak, M. J. (1986). Emotional processing of fear: Exposure to corrective information. Psychological Bulletin, 99(1), 20-35. Pennsylvania Üniversitesi. + Foa, E. B. (2011). Prolonged exposure therapy: Past, present, and future. Depression and Anxiety, 28(12), 1043-1047.</div>\n<p>Vagal Tone: Ölçülebilir Dayanmıklılık</p>\n<p>Porges’in teorisini ana bölümde gördük. Burada bir ek: Vagal tone (vagus sinirinin tonusu) ölçülebilir — kalp atış hızı değişkenliği (Heart Rate Variability — HRV) ile. Yüksek HRV = güçlü vagal ton = strese daha hızlı uyum. Düşük HRV = zayıf vagal ton = stres altında çabuk çökme.</p>\n<p>Thayer ve Lane (2000): Yüksek HRV, daha iyi duygu regülasyonu, daha esnek dikkat ve daha iyi karar alma ile ilişkili. Düşük HRV, anksiyete, depresyon ve düşük performansla ilişkili.</p>\n<p>Vagal tone antrenmanla yükseltilebilir. Yavaş nefes egzersizleri (4-6 ritmi), düzenli aerobik egzersiz ve soğuk su maruziyeti HRV’yi artırıyor. Bu Raiport’un TOP’uyla birleşiyor: Fizyolojik eşiği yükseltmek sistematik antrenmanla mümkün.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Thayer, J. F. &amp; Lane, R. D. (2000). A model of neurovisceral integration in emotion regulation and dysregulation. Journal of Affective Disorders, 61(3), 201-216. + Laborde, S. et al. (2017). Heart rate variability and cardiac vagal tone in psychophysiological research. Frontiers in Psychology, 8, 213.</div>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">KİŞİSEL KORKU HARİTAN</div></div>\n<p>Test sana puan verir. Harita sana hikaye verir. Şu an satış hayatındaki korkularını aşağıdaki tabloya dök. Dürüstlük şart — kimse görmeyecek.</p>\n<p>Adım 1: Korku Envanteri</p>\n<p>Aşağıdaki satış durumlarından her birinin sende ne yoğunlukta korku yarattığını işaretle (0 = hiç, 10 = felce edici):</p>\n<p>7-10 alan durumlar = senin gerçek savaş alanların. Bunları yuvarlak içine al. Kaç tane? 1-2 tane normaldir. 5+ tane ciddi yoğunluk — aşağıdaki program sana çok iyi gelecek.</p>\n<p>Adım 2: Tetikleyici Analizi</p>\n<p>En yüksek puanlı 3 durumu seç ve her biri için şu soruları cevapla:</p>\n<div class="fill-blank">Korku 1: ________________________</div>\n<p>Ne zaman en şiddetli? (Günün hangi saati, hangi müşteri tipi, hangi ortam?)</p>\n<p>Bedeninde ne oluyor? (Eller, mide, nefes, ses — somut fiziksel belirti)</p>\n<p>Kafandaki cümle ne? (Bruton tam olarak ne diyor? Kelimesi kelimesine yaz)</p>\n<div class="fill-blank">Korkunun gerçekleşme oranı: Son 10 denemede kaçında korktuğun şey gerçekten oldu? ____/10</div>\n<p>Bu korkudan kaçınmak sana ne kaybettiriyor? (Somut: Para, müşteri, fırsat, zaman)</p>\n<div class="fill-blank">Korku 2: ________________________</div>\n<p>Ne zaman en şiddetli?</p>\n<p>Bedeninde ne oluyor?</p>\n<p>Kafandaki cümle ne?</p>\n<div class="fill-blank">Gerçekleşme oranı: ____/10</div>\n<p>Kaçınmanın maliyeti:</p>\n<div class="fill-blank">Korku 3: ________________________</div>\n<p>Ne zaman en şiddetli?</p>\n<p>Bedeninde ne oluyor?</p>\n<p>Kafandaki cümle ne?</p>\n<div class="fill-blank">Gerçekleşme oranı: ____/10</div>\n<p>Kaçınmanın maliyeti:</p>\n<h4 class="section-title">ŞU RAKAMI İYİ OKU</h4>\n<p>"Gerçekleşme oranı" sorusuna verdiğin cevaba bak. Çoğu insanda 2-3/10 çıkıyor. Yani korktuğun şey 10 denemeden 7-8’inde gerçekleşmiyyor. Beynin yüzde 70-80 olasılıkla yalan söylüyor — ve sen yıllardır inanıyorsun. Bu sayı tek başına dönüştürücü olabilir.</p>\n<p>Adım 3: Kaçınma Maliyetini Hesapla</p>\n<p>En yüksek korkun için somut hesap yap:</p>\n<div class="fill-blank">Bu korkudan kaçındığım için bu ay kaç arama/görüşme yapmadım? ____</div>\n<div class="fill-blank">Her görüşmenin ortalama değeri (kapanış oranı × ortalama satış): ____</div>\n<div class="fill-blank">Aylık kaçınma maliyeti = Yapmadığım görüşme × ortalama değer = ____</div>\n<div class="fill-blank">Yıllık kaçınma maliyeti = Aylık × 12 = ____</div>\n<p>Bu rakamı görünce çoğu satışçı şok oluyor. Koçlukta bunu yaptırdığımda bir satışçı hesapladı: Yılda 380.000 TL. Soğuk arama korkusu yüzründen yapmadığı görüşmelerin kaybetitirdiği potansiyel gelir. Korku bedava değil — faturası var.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">4 HAFTALIK KORKU ANTRENMAN PROGRAMI</div></div>\n<p>Bu program kademeli maruz bırakma (Foa), Bruton-Supron diyaloğu (Raiport), affect labeling (Lieberman), vagal tonlama (Porges) ve bilişsel reappraisal’ı (Gross) birleştiriyor. Her haftanın bir teması, bir günlük rutini ve bir haftalık hedefi var.</p>\n<p>HAFTA 1: Fark Et ve İsimlendir</p>\n<p>Tema: Korkuyu görmek. Henüz yüzleşmek değil, sadece fark etmek.</p>\n<p>Günlük ritüel (5 dakika, akşam): Bruton-Supron Günlüğü. Bugün satışla ilgili bir anda Bruton ne dedi? ("Aramam, reddeder", "Fiyat pahalı gelecek" vb.) Kelimesi kelimesine yaz. Sonra Supron ne deseydi? Onu da yaz. 2 sütun: Sol Bruton, sağ Supron.</p>\n<p>Haftalık hedef: 7 gün boyunca Bruton-Supron günlüğü tut. Henüz davranış değişikliği bekleme — sadece gözlem. Hafta sonunda kalıp göreceksin: Bruton genellikle aynı şeyleri söylüyor. Tekrar eden cümlelerin altını çiz — bunlar senin "korku senaryoların."</p>\n<p>Lieberman devrede: Korkuyu isimlendirmek amigdalayı yavaşlatıyor. 1 hafta boyunca her gün duyguyu yazma pratiigi PFC-amigdala dengesini değiştirmeye başlar.</p>\n<p>HAFTA 2: Bedeni Kullan</p>\n<p>Tema: Fizyolojik aracını öğren. Porges + vagal tonlama.</p>\n<p>Günlük ritüel (her görüşme öncesi, 2 dakika): (1) 30 saniye beden taraması: Omuzlar, mide, nefes, eller — ne hissediyorsun? (2) 30 saniye nefes: 4 sn al, 6 sn ver, 3 tekrar. (3) 30 saniye isimlendirme: "Bu an şu duyguyu hissediyorum: ___". (4) 30 saniye Supron aktivasyonu: "Bu görüşmede amacım ___".</p>\n<p>Haftalık hedef: Bu 2 dakikalık ritüeli haftada en az 5 görüşmede uygula. Not al: Ritüel yaptığın görüşmeler vs yapmadıkların — fark var mı? Çoğu insan 2. haftadan itibaren fark görmeye başlıyor.</p>\n<p>Bruton-Supron günlüğünü devam ettiir. Artık gözlem + müdahale birlikte çalışıyor.</p>\n<p>HAFTA 3: Yüzleş (Kademeli)</p>\n<p>Tema: Foa’nın graduated exposure’ı. Korku envanterindeki en yüksek puanlı duruma kademeli yaklaşma.</p>\n<p>Haftalık program (en yüksek korkun soğuk aramaysa):</p>\n<p>Pazartesi: 2 mevcut müşteriyi ara (sıcak). Her aramadan önce 2 dakika ritüel.</p>\n<p>Salı: 2 referansla gelen potansiyeli ara (ılık). Ritüel.</p>\n<p>Çarşamba: 1 referanslı, 1 soğuk küçük firma (serin). Ritüel.</p>\n<p>Perşembe: 2 soğuk küçük firma (serin-soğuk). Ritüel.</p>\n<p>Cuma: 1 gerçek hedef müşteri soğuk arama (buz). Ritüel.</p>\n<p>Eğer en yüksek korkun fiyat söylemekse:</p>\n<p>Pazartesi-Salı: Aynanın karşısında fiyatı 10’ar kez söyle.</p>\n<p>Çarşamba: Mevcut müşteriiye yeni bir teklif sun — güvenli ortam.</p>\n<p>Perşembe: Potansiyel müşteriye fiyat söyle — 30 saniye erken, savunma cümlesi yok.</p>\n<p>Cuma: En zor müşteriye fiyat sun — tam göz teması, dük ses, korkma.</p>\n<p>Foa’nın kuralı: Kaçma. Aramayı kısa kesme, "yoktu" deme, erteleme = maruz kalma iptal. Gerçek sonuç al — evet veya hayır. Her "hayır" korku yapısına çelişen bilgi ekler: "Reddedildim ama dünya yıkılmadı."</p>\n<p>HAFTA 4: Kalıcılaştır</p>\n<p>Tema: Yeni alışkanlığı rutine dönüştür. Sürdürülebilirlik.</p>\n<p>Günlük ritüel: 2 dakikalık görüşme öncesi ritüel artık otomatik olmalı. Olmuyorsa: Telefon alarmı kur.</p>\n<p>Haftalık: 3. haftadaki maruz bırakma programn devam. Ama şimdi kademeli artırım değil, korumaaa. Haftada en az 3 "korkutucu" arama yap. Kaçınma başladığı anda fark et — Bruton geri dönmüştür.</p>\n<p>Hafta sonu değerlendirme: Korku envanterin tekrar doldur. Aynı 10 durum, aynı 0-10 ölçek. 4 hafta öncekiyle karşılaştır. Puanlar düşmüşse: Eşiğin yükselmmiş (TOP). Düşmemişse: Normal — bazı korkular daha uzun zaman alır. Devam et.</p>\n<h4 class="section-title">DÜRÜSTLÜK NOTU</h4>\n<p>Bu program herkeste aynı hızda işlemez. Bazıları 2. haftada fark görür, bazıları 8. haftada. Bazıları bir adım atar geri döner, tekrar atar. Bu başarısızlık değil, gerçek tempo. Volkan’ın değişimi 1 yıl sürdü. Emre’ninki 4 hafta dedi ama gerçekte 3 ay. Kendi tempon sana ait. Önemli olan devam etmek.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">İZLEMEYE DEĞER</div></div>\n<p>Aşağıdaki videolar bu bölümün konularıyla doğrudan bağlantılı. Eğitimlerimde de kullanıyorum.</p>\n<p>Kelly McGonigal: How to Make Stress Your Friend</p>\n<p>TED Talk, 2013. 14 dakika. McGonigal Stanford’da sağlık psikoloğu. Bu konuşmada stresi düşman değil müttefik olarak görmeyi öğretiyor. Harvard çalışmasını anlatıyor: Stresi "zararlı" olarak gören insanlarda sağlık riskleri artıyor. Stresi "faydalı" olarak görenlerde artmıyor — stres seviyesi aynı olsa bile. Algı farkı somut sağlık sonuçları yaratıyor.</p>\n<div class="insight-box">💡 Satışçı için: O sabahki mide bulanması, elin titremesi — bunlar "korkuyorum başarısız olacağım" değil, "bedenim beni hazırlıyor" olarak okunabilir. Gross’un reappraisal’ı buna deniyor. McGonigal onu izleyerek anlatıyor.</div>\n<p>Link: youtube.com/watch?v=RcGyVTAoXEU</p>\n<p>Jia Jiang: What I Learned From 100 Days of Rejection</p>\n<p>TED Talk, 2015. 15 dakika. Ana bölümde kısaca bahsettik. Jiang 100 gün boyunca bilerek reddedilmeye gitti. Videoda en ilginç kısmı: Bazı "imkansız" istekleri kabul ettiler. Krispy Kreme olimpiyat halkassı şeklinde donut yaptı. Birçok kez "hayır" beklediğinde "evet" duydu — çünkü insanların çoğu sandığımız kadar katı değil.</p>\n<p>Bu video korku envnterindeki "gerçekleşme oranı" sorusunun canlı kanıtı: Korktuğun şey çoğunlukla gerçekleşmiyor.</p>\n<p>Link: youtube.com/watch?v=zpNgsU5aNGk</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<div class="ref-line">Arnsten, A. (2009). Stress signalling pathways that impair prefrontal cortex structure and function. Nature Reviews Neuroscience, 10, 410-422.</div>\n<div class="ref-line">DeWall, C. N., MacDonald, G., Webster, G. D., et al. (2010). Acetaminophen reduces social pain: Behavioral and neural evidence. Psychological Science, 21(7), 931-937.</div>\n<div class="ref-line">Downey, G. &amp; Feldman, S. I. (1996). Implications of rejection sensitivity for intimate relationships. JPSP, 70(6), 1327-1343.</div>\n<div class="ref-line">Eisenberger, N. I., Lieberman, M. D., &amp; Williams, K. D. (2003). Does rejection hurt? An fMRI study of social exclusion. Science, 302(5643), 290-292.</div>\n<div class="ref-line">Foa, E. B. &amp; Kozak, M. J. (1986). Emotional processing of fear: Exposure to corrective information. Psychological Bulletin, 99(1), 20-35.</div>\n<div class="ref-line">Gross, J. J. (1998). The emerging field of emotion regulation: An integrative review. Review of General Psychology, 2(3), 271-299.</div>\n<div class="ref-line">Jiang, J. (2015). Rejection Proof: How I Beat Fear and Became Invincible Through 100 Days of Rejection. Harmony Books.</div>\n<div class="ref-line">Laborde, S., Mosley, E., &amp; Thayer, J. F. (2017). Heart rate variability and cardiac vagal tone in psychophysiological research. Frontiers in Psychology, 8, 213.</div>\n<div class="ref-line">LeDoux, J. E. (1996). The Emotional Brain: The Mysterious Underpinnings of Emotional Life. Simon &amp; Schuster.</div>\n<div class="ref-line">Lieberman, M. D. et al. (2007). Putting feelings into words: Affect labeling disrupts amygdala activity. Psychological Science, 18(5), 421-428.</div>\n<div class="ref-line">Porges, S. W. (2011). The Polyvagal Theory. W. W. Norton.</div>\n<h4 class="researcher">Raiport, G. (1988). Red Gold: Peak Performance Techniques of the Russian and East German Olympic Victors. Jeremy P. Tarcher.</h4>\n<div class="ref-line">Thayer, J. F. &amp; Lane, R. D. (2000). A model of neurovisceral integration in emotion regulation and dysregulation. Journal of Affective Disorders, 61(3), 201-216.</div>\n<div class="ref-line">Yerkes, R. M. &amp; Dodson, J. D. (1908). The relation of strength of stimulus to rapidity of habit-formation. Journal of Comparative Neurology and Psychology, 18, 459-482.</div>\n<p>Bu Derine Dal’ın sonuna geldin. Korkunu haritaladın, kaçınma maliyetini hesapladın, 4 haftalık programın var. Şimdi tek gereken başlamak. Pazartesi sabahı. Bruton bağıracak — biliyorsun. Supron fısıldayacak — onu duy.</p>'},
'1-3':{b:'Reddedilme',d:'Sosyal Acı Protokolü',c:12313,h:'<h4 class="section-title">REDDDEDİLME</h4>\n<p>Otopsi Masası: 5 Gerçek Vaka, 5 Ders</p>\n<p>Bu Derine Dal’da test yok, antrenman programı yok. Bunun yerine 5 gerçek reddedilme vakasının otopsisini yapacağız — ne oldu, neden oldu, ne öğretii, satışçı ne yaptı ne yapmalıydı. Sonra sana kendi redlerini analiz edecek bir şablon ve toparlanma antrenmanı vereceğim.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">REDDDEDİLMENİN DERİN BİLİMİ</div></div>\n<h4 class="researcher">Baumeister: "Kötü" Neden Kazanıyor? (2001)</h4>\n<p>Ana bölümde "Bad Is Stronger Than Good" başlığını ve 3-5x etkiyi gördük. Şimdi derine inelim: Baumeister 4 farklı alanı analiz etti — ilişkiler, duygular, öğrenme, günlük olaylar. Hepsinde aynı sonuç.</p>\n<p>İlişkilerde: Tek bir ihanet yılların güvenini yıkar. Satışta: Müşteriye 1 kez yanlış bilgi vermek 20 doğru bilgiyi siler.</p>\n<p>Duygularda: Kötü ruh hali daha yoğun, daha uzun sürüyor. Satışta: Sabah aldığın red günü zehirler, öğleden sonraki 4 görüşmeye bulaassır.</p>\n<p>Öğrenmede: Cezadan kaçınma, ödüle yaklaşmadan güçlü. Satışta: "Prim almak" motivasyonundan "hedef tutturamamak"tan kaçınma motivasyonu daha güçlü.</p>\n<p>Günlük olaylarda: Kötü gün iyi günden daha fazla hatırlanır. Satışta: Çeyrek sonu değerlendirmede en çok kaybedilen satışlar konuşulur, kazanılanlar "normal" sayılır.</p>\n<p>Baumeister’in önerisi: Kötüyü yok edemezsin ama dengeyi bilinçli kurarsn. Gottman’ın 5:1 oranı bir çerçeve. Her red aldığında o gün içinde 5 olumlu deneyim yarat veya hatırla. Bilinçli denge.</p>\n<h4 class="researcher">Leary: Sosyometre Teorisi (1999)</h4>\n<p>Mark Leary, Duke Üniversitesi. Reddedilme acısınn neden bu kadar şiddetli olduğuna evrimsel bir açıklama getirdi: Sosyometre Teorisi. Öz saygı (self-esteem) aslında bir sosyal kabulj ölçeği — bir "sosyometre." Öz saygının düşmesi = "gruptan dışlanma riski" alarmı.</p>\n<p>Evrimsel olarak: Gruptan dışlanmak = ölüm. Avcı-toplayıcı dönemde yalnız insan hayatta kalammazdı. Beyin bu yüzden reddedilmeyi "ölüm tehdidi" gibi kodluyor. Orantssız tepki değil, evrimsel uyum.</p>\n<div class="insight-box">💡 Satışçı için: Müşteri "hayır" dediğinde öz saygın düşüyorsa, sosyometre alarm çalıyor demek: "Gruptan dışlanandın!" Gerçekte müşteri sadece ürüne hayır demiş olabilir. Ama beyin farkı görmüyor — ürüne red = bana red. Bu ayırımmı bilinçli yapmak gerekiyor: "Müşteri beni değil, bu teklifi reddetti."</div>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Leary, M. R. &amp; Baumeister, R. F. (2000). The nature and function of self-esteem: Sociometer theory. Advances in Experimental Social Psychology, 32, 1-62. Duke Üniversitesi.</div>\n<h4 class="researcher">Kross: Duygusal Mesafe Yaratma (2014)</h4>\n<p>Ethan Kross, Michigan. Korku bölümünn DD’sında Gross’un duygu regülasyonunu gördük. Kross bir adım ileri gidiyor: Duygusal mesafe yaratmanın en kolay yolu kendine 3. şahısta hitap etmek.</p>\n<p>Deney: Stresli durum öncesi grup 1: "Ben bunu yapabilirim" (1. şahıs). Grup 2: "[Kendi adın] bunu yapabilir" (3. şahıs). Sonuç: 3. şahıs grubu daha düşük stres, daha yüksek performans gösterdi.</p>\n<p>Red aldıktan sonra uygula: "Sernaz, bu 1 red. 100 görüşmeden 1’i. Gerçeğe bak." Bu kendıni 3. şahısla çağırma PFC’yi aktive eder, duygusal mesafe yaratır, rüminasyonu kırar.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Kross, E. et al. (2014). Self-talk as a regulatory mechanism. JPSP, 106(2), 304-324. + Ayduk, O. &amp; Kross, E. (2010). From a distance: Implications of spontaneous self-distancing for adaptive self-reflection. JPSP, 98(5), 809-829.</div>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">5 GERÇEK VAKA — OTOPSİ MASASI</div></div>\n<p>Her vaka gerçek satış koçluğinden. İsimler değiştirildi. Her birinde: Ne oldu, satışçı ne hissetti, hangi çarpıtma devreye girdi, gerçek ne, ve ne yapmalydı.</p>\n<p>Vaka 1: "6 Ay Boyunca Kapıda Bekleyen Adam"</p>\n<p>Ne oldu: Sinan, ilaç mümessili. Bir doktora 6 ay boyunca haftalık gitti. Sekreter her seferinde "doktor müsait değil" dedi. 6. ayda sekreter: "Kardeşim, doktor seni hiç kabul etmeyecek. Anlamıyor musun?"</p>\n<p>Sinan ne hissetti: "Yer yarılsa içine girecektim." 2 hafta boyunca hiç ziyaret yapamadı. Motivasyon sıfır.</p>\n<p>Çarpıtma: Kişiselleştirme ("Beni istemiyor") + Aşırı genelleme ("Doktorrlar zaten mümessilleri sevmez"). Aslında: O doktor kimseyi kabul etmiyordu — başka 3 firmayı da görmüyordu. Kişisel değildi.</p>\n<p>Ne yapmalıydı: 3. ayda sorgulamalıydı: "Bu doktor başka firmaları görüyor mu?" Cevap hayrrsa — kişisel değil, bırak. 6 ay boyunca emek ve motivasyon kaybetti — ve bu kaybın sorumlusu doktor değil, Sinan’ın sorgulamamması.</p>\n<p>Ders: Her "hayır"da sor: Kişisel mi, genel mi? Bu soruyu sormak 6 ayı kurtarabilir.</p>\n<p>Vaka 2: "Pipeline’ı Ölülerle Dolu"</p>\n<p>Ne oldu: Melis, yazılım satışçısı. 3 aydır hedef tutturamyıor. Pipeline’ına baktık: 40 "aktif" müşteri. Tek tek inceledik. 28’i "bakacağız" veya "sizi ararız" aşamasındaydı — ana bölümdeki tabloya göre yüzde 75-90 ölü.</p>\n<p>Melis ne hissetti: Ağladı. "Ben 3 aydır 40 müşteriyle uğraşıyorum sanıyordum." Gerçek pipeline: 12.</p>\n<p>Çarpıtma: Reddi tanıyamama. Melis "bakacağız" cümlesini olumlu sayayor, pipeline’ı şişiriyordu. Bu bir çarpıtma değil aslında — bir okuma hatası. Örtülü reddi açık red sanmıyor.</p>\n<p>Ne yaptı: 28’ini kapattı (acıydı ama gerekliydi). 12’sine odaklandı. Ay sonunda 12’den 5’ini kapattı. 40’ın peşinden koşarken yapamadığını 12’ye odaklanarak yaptı.</p>\n<p>Ama dürüst olalım: 5/12 kapandı — 12/12 değil. Ve 3 ay sonra Melis yine benzer birikme yapmaya başladı. Alışkanlık direnişli. Pipeline temizliği tek seferlik değil, aylık rutin olmalı.</p>\n<p>Ders: Pipeline’ındaki "ölüleri" düzenli temizle. Örtülü red = red. Acrı ama kurtarcı.</p>\n<p>Vaka 3: "Yüzde 85 Ama Mutsuz"</p>\n<p>Ne oldu: Satış müdürü Tarik. Çeyrek sonu: Yüzde 85 hedef tutturmuş. Iyi performans. Ama motivasyon düşük. Neden? 3 ay önce kaybettiği BÜYÜK müşteriyi unutamıyor.</p>\n<p>Çarpıtma: Baumeister’in negatif yanlılığı tam iş başında. Yüzde 85 başarı yok, yüzde 15 başarısızlık var kafasında. Kötü 3-5x güçlü — o 1 kayıp, 4-5 kazanmış satışı gölgeliyor.</p>\n<p>Müdahale: Tarık’la Gottman 5:1’i konuştuk. Her hafta bilinçli olarak 5 olumlu deneyim yaratmasını önerdim: Eski müşteriyi ara (memnuniyet sinyali), ekibe teşekkür et, başarılı satışı kutla, bir meslektaştan olumlu geribildirim al, yeni bir beceri dene. 1 ay sonra: "O müşteriyi hala düşünüyorum ama artık günümü zehirlemiyor."</p>\n<p>Ders: Negatif yanlılık otomatik — pozitif dengeyi bilinçli kurman lazım.</p>\n<p>Vaka 4: "Sistem Kırılmış"</p>\n<p>Ne oldu: Gülcan, endüstriyel satış. 2 çeyrektir hedef tutturamyor. Koçlukta inceledik: Ürün fiyatı pazar ortalamasının yüzde 35 üzeinrde. Destek ekibi yetersiz — teklif hazırlamak 2 hafta sürüyor. Prim sistemi sadece yeni müşteriiyi ödüllündiriyor, mevcut müşteri büyümesi sıfır prim.</p>\n<p>Gülcan ne hissetti: "Ben yetersizim, başkaları yapyor ben yapamıyorum." Kişiselleştirme.</p>\n<p>Gerçek: Sorun Gülcan’da değildi. Fiyat gerçekten yüksekti, destek ekibi gerçekten yavaştı, prim sistemi gerçekten çarpıktı. Eğer Gülcan’a "kendine ayna tut, bilişsel çarpıtmalarını sorgula" deseydiim, haksızlık olurdu.</p>\n<p>Ne yaptık: Gülcan’la birlikte ayırdık: Kontroldündeki ne? (Sunum kalitesi, ilişki yönetimi, müşteri seçimi.) Kontrolü dışındaki ne? (Fiyat, destek hızı, prim sistemi.) Kontrolündekini düzelttti. Kontrolü dışındakini yönetime raporladm. 6 ay sonra destek ekibine 1 kişi eklendi. Fiyat değişmedi ama Gülcan artık kendini suçlamıyordu.</p>\n<p>Ders: Her başarısızlığı içeri alma. Bazen sistem kırık. Ve kırık sistemi düzeltmek veya o sistemden çıkmak da bir seçenek.</p>\n<p>Vaka 5: "Dönüşüm"</p>\n<p>Ne oldu: Hakan, sigorta satışçısı. 2 yıldır motivasyon düşük, performans orta, sürekli "bırakssam mı" düşüncesi. Koçlukta derine kazınca: Hakan satış yapmayı sevmiyordu. Zorunluluktan yapıyordu.</p>\n<p>Gerçek: Bu bir çarpıtma değildi. Hakan gerçekten yanlış işteydi. Değerler bölümündeki Naz gibi — ama Naz çerçeveyi değiştirerek çözdü. Hakan için çerçeve değişikliği yetmedi.</p>\n<p>Ne oldu: Hakan 6 ay sonra satıştan operasyona geçti. Aynı şirket, farklı rol. Daha mutlu, daha başarılı.</p>\n<p>Ders: Bazen cevap "daha iyi sat" değil, "başka bir şey yap." Bu kitap satışçılar için yazıldr ama satışçı olmak istemiyorsan, en doğru hamle gitmek olabilir. Bu zayıflık değil, öz-farkındalık. İlk bölümün konusu.</p>\n<p>5 VAKANIN ORTAK DERSİ</p>\n<p>Her vakada farklı bir şey öne çıkıyor: Sinan — sorgulamamış. Melis — reddi tanıyamamış. Tarık — negatif yanlılığa yenik düşmüş. Gülcan — sistemi kendine yıkmış. Hakan — yanlış işteyimiş. Tek bir reçete yok. Her reddin kendi hikayesi var. O yüzden otopsi şart.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">REDDDEDİLME OTOPSİ ŞABLONU</div></div>\n<p>Her kaybettiğin satıştan sonra bu şablonu doldur. 10 dakika sürer. O 10 dakika seni 6 ayı boşa harcamaktan kurtarabilir (Sinan’ın hikayesi).</p>\n<p>Bu şablon Beck’in ABC modeli + Stoik "kontrolündeki vs dışındaki" ayrımı + Foa’nın "çelişen bilgi" prensibini birleştiriyor. Her dolduruşunda korku yapısına çelişen bilgi ekliyorsun.</p>\n<p>Kural: Doldurmayı 24 saat içinde yap. Daha sonraya bırakırsan beyin hikayeyi yeniden yazar — çarpıtmalar pekişir, gerçek bulanıklaşır.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">21 GÜNLÜK TOPARLANMA ANTRENMANI</div></div>\n<p>Bu antrenman toparlanma hızını artırmaya odaklı. 21 gün — her gün 5 dakika, çok basit, ama tutarlılık şart.</p>\n<p>Her Gün (5 dakika, akşam):</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Bugün bir red aldım mı? (Açık veya örtülü — "bakacağız" da sayılır.) Evet/Hayır.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Red aldıysam: Toparlanma sürem ne kaddı? Red ile bir sonraki aksiyonn arasında kaç dakika/saat geçti? Rakam yaz.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Red aldıysam: 3. şahıs tekniğini kullandım mı? Kross: "[Adın], bu 1 red. Devam et." Evet/Hayır.</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Bugünkü 5:1 dengem: Kaç olumsuz, kaç olumlu deneyim yaşadım? Oran ne?</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Yarına 1 cümle: "Yarın şu 1 şeyi yapacağım: ____"</span></div>\n<p>Haftalık Değerlendirme (Cuma, 10 dakika):</p>\n<p>Toparlanma süresi trendi: 7 günlük sürelere bak. Azalıyor mu? 1. haftada ortalama 2 saat, 2. haftada 1.5 saat, 3. haftada 45 dakika — bu olmalı. Azalmıyorsa: 5 Dakika Kuralı’nı uyguluyor msun? Lieberman isimlendirme yapıyor msun?</p>\n<p>5:1 trendi: Haftalık ortallama oran bak. 5:1’in altındaysa: Bilinçli pozitif deneyim eklemelisin. Üstündeyse: Denge kurulmuş.</p>\n<p>Otopsi sayısı: Bu hafta kaç red için otopsi şablonu doldurdun? Hedef: Her önemli red için 1.</p>\n<p>21 GÜN NEDEN?</p>\n<p>21 günlük alışkanlık miti — "21 günde alışkanlık oluşur" — aslında bilimsel olarak kesin değil. Lally et al. (2010, European Journal of Social Psychology) gösterdi ki ortalama 66 gün, kişiye ve davranışa göre 18-254 gün arasında değişiyor. Ama 21 gün başlangıç için yeterli — trendi görürsün, motivasyonu hissedersin, devamına karar verirsin. Mükkemmeliyeti değil tutarlılığı hedefle: 21 günde 15 gün yapabilirsen iyi gidiyorsun.</p>\n<div class="mod-header"><div class="mod-num">5</div><div class="mod-title">İZLEMEYE DEĞER</div></div>\n<p>Brene Brown: The Power of Vulnerability</p>\n<p>TED Talk, 2010. 20 dakika. Brown Houston Üniversitesi’nde utanc ve kırılganlığı araştırıyor. Bu konuşmada reddedilmenin ve kırılganlığın gücünü anlatıyor: Kırı
