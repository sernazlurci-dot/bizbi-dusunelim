e bir örtüşüyor (4. bölüm). Özyönetim yüksek satışçı mikromanajerlikten nefret eder — Defne’nin (8. bölüm) durumu. Kendi planı, kendi temposu, kendi yöntemi olmalı.</p>\n<p>Evrenselcilik (adalet, eşitlik, doğa): Geniş perspektif, herkese eşit muamele. Satışta: Bu kişi müşterinin gerçek ihtiyacını önemser, “ihtiyacı olmayan şeyi satmam” der. Etik pusula güçlü.</p>\n<p>İyilikseverlik (yardım, sadakat, dürüstlük): Naz’ın (ana bölüm) değeri. İnsanlara yardım etmek temel motivasyon. Satışı “yardım” olarak çerçevelemek bu kişiyi güçlendirir.</p>\n<p>Geleneksellik (kültür, din, saygı): Kurallara uyma, ötöriteye saygı. Türkiye’de yüksek (Hofstede). Satışta: “Patron ne derse o” eğilimi. Güçlü yan: Sadakat, güvenilirlik. Zayıf yan: Kendi sesini duymakta zorluk (1. bölüm).</p>\n<p>Uyum (sosyal düzeni bozmama): Çatışmadan kaçınma. Satışta: Müşteriyle tartışmaktan kaçınma, fiyat savunmada zorluk, “rahatsız etmem” korkusu (2. bölüm). Geri bildirim almakta da zorluk.</p>\n<p>Güvenlik (istikrar, sağlık, düzen): Risk almaktan kaçınma. Soğuk arama = risk. Yeni müşteri = belirsizlik. Bu kişi bildiği müşterilerle çalışmayı tercih eder. Uzun süreli ilişkiilerde güçlü, yeni açılımlarda zayıf.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Schwartz, S. H. (1992). Universals in the content and structure of values. AESP, 25, 1-65. | Schwartz, S. H. (2012). An overview of the Schwartz theory of basic values. Online Readings in Psychology and Culture, 2(1).</div>\n<h4 class="researcher">Rokeach: Araçsal vs Amaçsal Değerler (1973)</h4>\n<p>Milton Rokeach, Schwartz’tan önce: İki değer türü: Amaçsal (terminal) = istediğin yaşam — özgürlük, eşitlik, mutluluk, huzur. Araçsal (instrumental) = oraya nasıl ulaşırsın — dürüstlük, çalışkanlık, cesaret, yardımseverlik.</p>\n<div class="insight-box">💡 Satışçı için: “Para kazanmak” amaçsal. “Dürüstçe para kazanmak” araçsal değer ekleniyor. Amaç ve aracın çatışması = etik ikilem. Kerem’in (ana bölüm) hikayesi: Amaç (para) aracı (dürüstlük) ezdi. Kısa vadede kazandı, uzun vadede kaybetti.</div>\n<p>Rokeach’ın testi: Amaçsal değerlerini sırala, sonra araçsal değerlerini sırala. Uyumlu mu? Amaçın “maddi güvenlik” ama aracın “dürüstlük” ise: Pazar zor olduğunda hangisi kazanacak? Baskı altında aracı değil amaç kazanır — çünkü amigdala (PFC kapandığında) hayatta kalmayı önceliklendirir.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Rokeach, M. (1973). The Nature of Human Values. Free Press. 18 amaçsal + 18 araçsal değer.</div>\n<p>Schwartz + Hofstede: Kültürel Değerler</p>\n<p>Türkiye’nin kültürel değer profili satışı doğrudan etkiliyor. Schwartz ve Hofstede verilerinin kesişimi:</p>\n<p>Güvenlik yüksek + belirsizlikten kaçınma yüksek (Hofstede: 85/100): Müşteri risk almak istemez. Referans, garanti, “başka firmalar da kullanıyor” bilgisi çok önemli. Satışçı için: Sosyal kanıt ve güven inşası Batı’dan daha kritik.</p>\n<p>Güç mesafesi yüksek (66/100): Otorite figurü önemli. Satışçının şirket içindeki pozisyonu müşteriyi etkiler. “Genel müdürümüz ilgileniyor” cümlesi güç mesafesi yüksek kültürde güçlü sinyal.</p>\n<p>Bireycilik düşük (37/100): Kolektif karar mekanizması. “Komiteye soracağım” = normal sürec, sabırla yaklaş (9. bölüm). İlişki önce gelir — işlem sonra.</p>\n<p>Ama dikkat: İstanbul tech firması ile Konya aile şirketi aynı kalıba sığmaz. Kültürel değerler eğilimdir, birey değil. Karşındaki insanı oku.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<p>Schwartz, S. H. (2006). Comparative Sociology, 5(2-3). | Hofstede, G. (2001). Culture’s Consequences. Sage. Türkiye: PDI 66, IDV 37, UAI 85, MAS 45, LTO 46.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">DEĞER HARİTAN</div></div>\n<div class="score-range">Schwartz’ın 10 değerine 1-10 puan ver. Dürüst ol — “olması gereken” değil, gerçekten hissettiğin.</div>\n<div class="fill-blank">Güç (statü, otorite): ____ /10</div>\n<div class="fill-blank">Başarı (hırs, rekabet): ____ /10</div>\n<div class="fill-blank">Hazcılık (keyif, konfor): ____ /10</div>\n<div class="fill-blank">Uyarılma (yenilik, macera): ____ /10</div>\n<div class="fill-blank">Özyönetim (bağımsızlık): ____ /10</div>\n<div class="fill-blank">Evrenselcilik (adalet, eşitlik): ____ /10</div>\n<div class="fill-blank">İyilikseverlik (yardım): ____ /10</div>\n<div class="fill-blank">Geleneksellik (kültür, din): ____ /10</div>\n<div class="fill-blank">Uyum (saygI, kurallar): ____ /10</div>\n<div class="fill-blank">Güvenlik (istikrar): ____ /10</div>\n<p>En yüksek 3 = pusalan. İşin bu 3’le uyumlu mu? Uyumsuzsa: Çerçeveyi değiştir (Naz) veya işi değiştir (Hakan). Karşıt eksenlerde yüksek puanların varsa (örn: hem iyilikseverlik hem güç) iç çatışma yaşıyor olabilirsin.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">ETİK İKİLEM ATÖLYESİ</div></div>\n<p>5 senaryo. Doğru/yanlış yok — seçim ve sonuç var. Her senaryo farklı bir değer çatışmasını test ediyor.</p>\n<p>Senaryo 1: Abartma Baskısı</p>\n<div class="fill-blank">Patron: “Ürünün şu özelliğini vurgula, biraz abartsan olur.” Özellik var ama müşterinin ihtiyacıyla tam uyumlu değil. Hedef tutturulmalı. A: Abart — hedef tutturulur ama müşteri sonra hayal kırıklığı yaşar. B: Doğru anlat — belki bu satış kaybedilir ama güven korunur. C: Patronla konuş — “abartmak yerine şunu vurgulayabilirim” önerisi. Sen: ____ Neden: ____</div>\n<p>Senaryo 2: Rakibi Kötüleme</p>\n<div class="fill-blank">Müşteri: “Rakibiniz de teklif verdi.” Rakibin zayıf noktasını biliyorsun. A: Söyle — kısa vadede avantaj, uzun vadede “başkalarını kötüler” algısı. B: Kendi gücünü vurgula — pozitif çerçeve, rakipten bahsetme. C: “Bizim farkımız şu” de — kıyasla ama kötüleme. Sen: ____ Neden: ____</div>\n<p>Senaryo 3: İhtiyacı Olmayan Müşteri</p>\n<div class="fill-blank">Fark ediyorsun: Müşterinin ihtiyacı yok ama ikna edebilirsin. Hedef baskısı var, çeyrek sonu yakın. A: Sat — rakam tutturulur, müşteri sonra pişman olabilir. B: Dürüst söyle — “şu an bu ürün size uygun değil”. Rakam kaybı ama güven kazanımı (Sibel’in hikayesi). C: Alternatif öner — daha küçük bir çözüm, gerçek ihtiyaca uygun. Sen: ____ Neden: ____</div>\n<p>Senaryo 4: Bilgi Gizleme</p>\n<div class="fill-blank">Ürünün bilinen bir sorunu var — belirli koşullarda performans düşüyor. Müşteri sormadı. A: Söyleme — sormadı, senin sorunun değil. B: Proaktif bilgilendir — “şu koşullarda dikkat edin”. C: Sorunu çözüm önerisiyle birlikte sun — “şu durum var ama biz şöyle çözüyoruz.” Sen: ____ Neden: ____</div>\n<p>Senaryo 5: Ekip İçi Etik</p>\n<div class="fill-blank">Ekip arkadaşın müşteriye yanlış bilgi veriyor — abartarak satıyor. Patron görmüyor çünkü rakamlar iyi. A: Karışma — onun sorunu, senin değil. B: Arkadaşınla konuş — “bunu yapma, uzun vadede zarar verir.” C: Yöneticiye bildir — risk ama doğru. Sen: ____ Neden: ____</div>\n<p>Her seçimin bedeli var. Değerlerini biliyorsan baskı altında karar kolaylaşır. 10. bölümdeki “Satışta asla şunu yapmam” cümlesi bu senaryolara hazırlık.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">KİŞİSEL MANİFESTO</div></div>\n<p>7 cümleyi tamamla. Telefonuna kaydet. Baskı anında oku. 6 ayda bir güncelle — değerler sabit değil, yaşamınla birlikte evriliyor.</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Bu işi yapıyorum çünkü: ____</span></div>\n<p>(4. bölümdeki Frankl cümlesi. “Para” diyebilirsin — ama “sadece para” mı?)</p>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Satışta asla yapmayacağım şey: ____</span></div>\n<p>(10. bölümün son görevi. Bu cümle PFC’nin yerine geçen dış fren.)</p>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Müşterilerim için en önemli değerim: ____</span></div>\n<p>(Dürüstlük? Güvenilirlik? Çözüm odaklılık? Sabr? Empati?)</p>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Zor günde beni ayakta tutan: ____</span></div>\n<p>(8. bölümdeki dayanıklılık kaynağın.)</p>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">5 yıl sonra hatırlanmak istediğim şey: ____</span></div>\n<p>(Rakamlar mı yoksa ilişkiler mi? İkisi birlikte olabilir.)</p>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">Bu işte en çok keyif aldığım an: ____</span></div>\n<p>(Csikszentmihalyi’nin flow’u nerede oluyor? O anı çoğalt.)</p>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">Eğer bu işi bıraksam özleyeceğim şey: ____</span></div>\n<p>(Cevap “hiçbir şey” ise ciddi bir soru sor: Doğru yerde misin?)</p>\n<p>Bu 7 cümle senin manifeston. Kısım 1’in özeti senin sözlerinle.</p>\n<div class="mod-header"><div class="mod-num">5</div><div class="mod-title">İZLEMEYE DEĞER</div></div>\n<p>Simon Sinek: How Great Leaders Inspire Action</p>\n<p>TED Talk, 2009. 18 dakika. “Start With Why” — Frankl’ın logoterapisi iş dünyasına taşınmış hali. “Ne” satıyorsun herkes bilir. “Neden” satıyorsun — bunu bilen kazanır.</p>\n<p>Link: youtube.com/watch?v=qp0HIF3SfI4</p>\n<p>Brené Brown: The Power of Vulnerability</p>\n<p>TED Talk, 2010. 20 dakika. Brown kırılganlık ve değerlere sadık yaşamanın cesaretini anlatıyor. Satışta kırılganlık = dürüstlük. “Bilmiyorum ama öğrenip döneceğim” demek cesaret ister ama güven inşa eder.</p>\n<p>Link: youtube.com/watch?v=iCvmsMzlF7o</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<h4 class="researcher">Hofstede, G. (2001). Culture’s Consequences. Sage.</h4>\n<div class="ref-line">Rokeach, M. (1973). The Nature of Human Values. Free Press.</div>\n<h4 class="researcher">Schwartz, S. H. (1992). Universals in the content and structure of values. AESP, 25, 1-65.</h4>\n<h4 class="researcher">Schwartz, S. H. (2006). A theory of cultural value orientations. Comparative Sociology, 5(2-3), 137-182.</h4>\n<div class="ref-line">Schwartz, S. H. (2012). An overview of the Schwartz theory. Online Readings in Psychology and Culture, 2(1).</div>\n<h4 class="researcher">Sinek, S. (2009). Start With Why. Portfolio.</h4>\n<p>Kısım 1’in son Derine Dalı. Değer haritan, ikilemlerin, manifeston hazır. Kendini tanıdın — şimdi karşındakini tanı. Kısım 2: Müşteriyi Okumak.</p>'},
'2-1':{b:'Beyin',d:'Karar Vermenin Nöral Maliyeti',c:13689,h:'<p>BEYİN</p>\n<p>Karar Laboratuvarı: Müşterinin Beynini Sahada Okumak</p>\n<p>Ana bölümde müşterinin beyninin nasıl karar verdiğini gördün — Sistem 1/2, somatik işaretleyiciler, sezgisel kısayollar. Bu ek farklı: Burada sahaya çıkacaksın. Üç haftalık bir gözlem programı, gerçek vaka otopsileri ve bir karar anatomisi çalışma kağıdı seni bekliyor. Ama önce bilimin bir katman daha derinine inelim.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">BEYNİN EKONOMİSİ — KARAR VERMENİN NÖRAL MALİYETİ</div></div>\n<p>Ana bölümde Kahneman\'ın ikili süreç teorisini gördük. Şimdi altına iniyoruz: Beyin neden Sistem 1\'i tercih ediyor? Cevap biyoenerjetik.</p>\n<p>İnsan beyni vücut ağırlığının yüzde 2\'si ama toplam enerjinin yüzde 20\'sini tüketiyor. Bu devasa metabolik maliyet beynin en temel tasarım ilkesini belirlemiş: Enerji tasarrufu. Sistem 1 düşük maliyetli — otomatik süreçler, kalıp eşleştirme, hızlı değerlendirme. Sistem 2 pahalı — aktif çalışma belleği, bilinçli hesaplama, dikkat yönetimi.</p>\n<p>Beyin Sistem 2\'yi mümkün olduğunca az kullanmak istiyor. Bu tembelllik değil, evrimsel tasarım. Savana\'da her kalori hayati — ve beyin "gereksiz yere düşünmek" için kalori harcamayı reddediyor. Modern dünyada bu, müşterinin karmaşık teklifini Sistem 2\'yle analiz etmek yerine Sistem 1\'in hızlı "evet/hayır" yargısıyla geçiştirmesi demek.</p>\n<p>Matthew Lieberman\'ın sosyal nörobilim çalışmaları (2013) bunu destekliyor: Beynin "default mode network"ü (DMN) — boşta kalınca otomatik aktive olan ağ — sosyal değerlendirme yapıyor. Yani müşteri senin sunumunu dinlerken bile DMN arka planda çalışıyor: "Bu adama güvenebilir miyim? Statüsü ne? Benim grubumdan mı?" Bu sosyal hesaplama Sistem 1 hızında ve her an devrede.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Raichle, M. E. &amp; Gusnard, D. A. (2002). Appraising the brain\'s energy budget. PNAS, 99(16), 10237-10239. Beyin: %2 kütle, %20 enerji. | Lieberman, M. D. (2013). Social: Why Our Brains Are Wired to Connect. Crown. DMN ve sosyal değerlendirme. | Kahneman, D. (2011). Thinking, Fast and Slow. Bilişsel çaba (cognitive effort) ve pupil genişlemesi deneyleri.</div>\n<p>Prospect Theory: Kayıptan Kaçınmanın Nöroanatomisi</p>\n<p>Kısım 1, Bölüm 3\'te (Reddedilme) kayıptan kaçınmayı kendimiz için gördük. Şimdi müşteride: Kahneman ve Tversky\'nin prospect theory\'si, kayıpların kazançlardan yaklaşık 2 kat daha güçlü hissedildiğini gösterdi. Bu asimetri nöral temelli — Tom ve arkadaşları (2007) fMRI ile gösterdi ki kayıp beklentisi amigdala ve insula aktivasyonuyla ilişkili, kazanç beklentisi ventral striatum ile.</p>\n<p>Satışta somut karşılığı: Müşteri "bu ürünle ne kazanacağım" sorusundan çok "bunu almazsam ne kaybedeceğim" sorusuna duyarlı. AMA — ve bu çok önemli — bunu manipülatif kullanmak kolay ve tehlikeli. "Bu teklifi kaçırırsanız..." tarzı korku satışı prospect theory\'yi silah olarak kullanıyor. Uzun vadede müşteri bunu hissediyor ve güven kırılıyor.</p>\n<p>Doğru kullanım: Müşterinin zaten hissettiği kaybı görünür kılmak. "Şu anda bu süreci manuel yapıyorsunuz — haftada kaç saat kaybediyorsunuz?" Bu bir manipülasyon değil, farkındalık. Müşterinin kendi kaybını görmesine yardım ediyorsun. Aradaki fark: Yapay kayıp yaratmak vs mevcut kaybı aydınlatmak.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Kahneman, D. &amp; Tversky, A. (1979). Prospect theory. Econometrica, 47(2), 263-292. | Tom, S. M. et al. (2007). The neural basis of loss aversion in decision-making under risk. Science, 315(5811), 515-518. Kayıp: amigdala + insula. Kazanç: ventral striatum.</div>\n<p>Duygu-Mantık Entegrasyonu: Bechara Modeli</p>\n<h4 class="researcher">Ana bölümde Damasio\'yu gördük. Bechara ve arkadaşlarının (2005) genişletilmiş modeli daha detaylı bir resim çiziyor:</h4>\n<p>İki paralel yol: (1) Amigdala yolu — anlık duygusal tepki, hızlı, kaba. "Bu tehlikeli/güvenli" sinyali. (2) vmPFC yolu — birikimli duygusal öğrenme, daha rafine, deneyime dayalı. "Geçmişte bu tarz durumlar nasıl sonuçlandı" sinyali.</p>\n<p>Sağlıklı karar: İki yol birlikte çalışıyor. Amigdala hızlı alarm veriyor, vmPFC rafine ediyor. Ama stres altında amigdala baskın çıkıyor (Arnsten, Kısım 1 Bölüm 2) — ve müşteri de stres altında "kaba" sinyallerle karar veriyor. Bu yüzden baskılı satış ortamı müşterinin rafine karar mekanizmasını devre dışı bırakıyor.</p>\n<p>Pratik sonuç: Müşterinin iyi karar vermesini istiyorsan, stresini azalt. Paradoks gibi görünüyor — "müşteri rahat olursa almaz" korkusu var. Tam tersi: Rahat müşteri vmPFC\'yle karar verir, bu da daha tutarlı ve geri dönüşü düşük karar demek. Baskılı müşteri amigdalayla karar verir, alır ama ertesi gün pişman olur — iade, şikayet, bir daha gelmeme.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<p>Bechara, A. (2005). Decision making, impulse control and loss of willpower to resist drugs. Nature Neuroscience, 8(11), 1458-1463. | Bechara, A. &amp; Damasio, A. R. (2005). The somatic marker hypothesis. Games and Economic Behavior, 52(2), 336-372.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">VAKA OTOPSİLERİ — 3 SATIŞ, 3 BEYİN</div></div>\n<p>Her vakanın altında bir "Nöral Okuma" yapacağız: Müşterinin beyninde muhtemelen ne oldu?</p>\n<p>Vaka 1: "Çok Mantıklı, Düşüneceğim" — ve Düşünmedi</p>\n<p>Durum: Orta ölçekli bir üretim şirketi, ERP yazılımı satışı. Satışçı (Emre — Kısım 1\'den hatırlayacaksın, telefon kaldıramayan eller) artık telefon kaldırabiliyor, güzel sunum yapıyor. 45 dakikalık kusursuz teknik sunum. Müşteri sürekli başını salladı: "Evet, bize lazım. Çok mantıklı." Toplantı bitti. "Hafta içi döneyim" dedi. Dönmedi. 3 hafta takip — cevap yok. 5. haftada Emre öğrendi: Rakipten almışlar.</p>\n<p>Nöral okuma: Müşterinin Sistem 2\'si "mantıklı" dedi. Ama Sistem 1\'i ne dedi? Toplantıyı düşün: 45 dakika teknik sunum = Sistem 2\'ye konuştun. Müşterinin Sistem 1\'i ise Emre\'yi tarıyordu: Güvenilir mi? Sektörümü anlıyor mu? Bu iş bana risk mi? Emre teknik olarak mükemmeldi ama duygusal bağlantı kurmamıştı. Müşterinin "düşüneceğim"i Sistem 2\'nin Sistem 1\'i ikna edemediğinin işareti. "Mantıklı ama bir şey eksik" hissi — müşteri bunu ifade edemez çünkü kendisi de bilmiyor.</p>\n<p>Ders: "Müşteri mantıklı buldu" yeterli değil. Somatik işaretleyici olumlu mu — bunu okumalısın. İpuçları: Beden dili gevşek mi gergin mi? Sorular teknik mi kişisel mi? "Bu bize ne kazandırır" mı soruyor yoksa "bu nasıl çalışır" mı?</p>\n<p>Vaka 2: Fiyat Şoku — Insula Patlaması</p>\n<p>Durum: Gayrimenkul danışmanlığı, yüksek segment. Müşteri (Bülent Bey) daireden çok etkilenmiş, eşiyle gelmişler, iki saat gezdiler, çocuklar odalarını seçti bile. Fiyat geldi: Beklentinin yüzde 30 üstü. Bülent Bey\'in yüzü değişti — anlık. Sustu. 10 saniye sessizlik. Sonra: "Biz bir düşünelim." Bir daha dönmedi.</p>\n<p>Nöral okuma: Knutson\'un çalışmasını hatırla — fiyat insudayı aktive ediyor, beyin fiyatı fiziksel acı gibi işliyor. Bülent Bey\'in beyninde olan: Nucleus accumbens 2 saat boyunca ateş etti (ödül, heyecan, "bu ev bizim"). Fiyat geldi — insula patladı. Ağrı sinyali. 10 saniyelik sessizlik prefrontal korteksin çöküşü: Ödül sistemi ve ağrı sistemi çatıştı, PFC karar veremedi. Default tepki: Kaçış. "Düşünelim" = kaçış kararı.</p>\n<p>Ne yapılabilirdi? Fiyat çıpalaması. Geziye başlamadan önce fiyat aralığını paylaş. "Bu bölgedeki daireler 8 ile 12 milyon arasında, sizin baktığınız özellikler üst banttan" — böylece insula hazırlıklı. Sürpriz fiyat en tehlikeli fiyat çünkü çıpa olmadan insula tepkisi orantısız.</p>\n<p>Vaka 3: Patronun Bakışı — Sosyal Beyin Devrede</p>\n<p>Durum: B2B satış, 4 kişilik toplantı. Satın alma müdürü Zehra Hanım, teknik müdür, CFO ve genel müdür. Zehra Hanım ürünü beğeniyor, teknik müdür onaylamış. Sunum başladı. Satışçımız (Deniz) Zehra Hanım\'a konuşuyor — çünkü Zehra Hanım muhatap. Ama fark etmediği bir şey var: Zehra Hanım her kritik noktada genel müdüre bakıyor. Genel müdür yüzünü buruşturduğunda Zehra Hanım geri çekiliyor. Genel müdür not aldığında Zehra Hanım öne eğiliyor.</p>\n<p>Nöral okuma: Lieberman\'ın DMN çalışması burada devrede. Zehra Hanım\'ın "default mode"u sosyal hiyerarşi okuması. Sistem 1\'i sürekli genel müdürü tarıyor: "O ne düşünüyor?" Bu kolektif karar mekanizması — bireysel karar modelleri bunu yakalamıyor. Deniz, Zehra Hanım\'ın Sistem 2\'sine konuşuyordu ama kararı veren Zehra Hanım\'ın Sistem 1\'inin okuduğu sosyal sinyaldi.</p>\n<p>Ders: Odadaki karar vericiyi değil, karar etkileşimini oku. Kim kime bakıyor? Kim not alınca kim duraksıyor? Grup dinamiği bireysel beyinlerin toplamından farklı çalışıyor. Bu konuyu 7. bölümde (Karar) derinleştireceğiz.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">3 HAFTALIK SAHA GÖZLEM PROGRAMI</div></div>\n<p>Bu program seni "nöral okuma" konusunda eğitmeyecek — gözlem kasını geliştirecek. 3 hafta, haftada 1 odak.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Sistem Dedektörü</div></div>\n<p>Bu hafta her müşteri görüşmesinde tek bir soruyu takip et: Müşteri şu anda Sistem 1\'de mi, Sistem 2\'de mi?</p>\n<p>İpuçları — Sistem 1 aktif: Hızlı cevaplar, sezgisel tepkiler, "bunu zaten biliyorum" havası, beden dili rahat veya savunmacı (ikisi de Sistem 1), duygusal ifadeler. Sistem 2 aktif: Yavaş cevaplar, düşünme süreleri, sorular (özellikle detay soruları), kaş çatma, gözlerin yukarı kayması (görsel çalışma belleği), "bir dakika" deme.</p>\n<p>Her görüşmeden sonra not al:</p>\n<p>Hafta sonunda: Hangi anlarda Sistem 1 baskındı? Hangi anlarda Sistem 2 devreye girdi? Bir kalıp var mı?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Duygu Haritacısı</div></div>\n<p>Bu hafta odağı değiştir: Müşterinin duygusal sinyallerini oku. Damasio\'nun somatik işaretleyicileri — ama dışarıdan gözlemleyebildiğin kadarıyla.</p>\n<p>Gözlem listesi: Ses tonu değişimleri (özellikle fiyat ve itiraz anlarında), beden dili geçişleri (açık → kapalı veya tersi), yüz ifadesi mikro değişimleri (kaş çatma, dudak sıkma, göz kırpma hızı), nefes değişimi (sığ → derin veya tersi), sessizlik anları (ne zaman, ne kadar, sonra ne oldu).</p>\n<p>Her görüşmeden sonra not al:</p>\n<p>Hafta sonunda: Hangi sinyalleri okuyabildin? Hangilerini kaçırdın? Tahminlerin ne kadar tuttu?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Kısayol Avcısı</div></div>\n<p>Bu hafta Kahneman\'ın üç kısayolunu sahada ara: Çıpalama, temsil, bulunabilirlik.</p>\n<p>Her görüşmede sor: Müşteri bir çıpaya mı tutunuyor? (İlk duyduğu fiyat, rakibin teklifi, "geçen yılki fiyat") Bir kalıp eşleştirmesi mi yapıyor? ("Sizin gibi firmalarla daha önce kötü deneyimim oldu") Akla kolay gelen bir anıya mı dayanıyor? ("Geçen hafta X markasının sorunu haberlere çıktı")</p>\n<p>Kısayolu tespit ettiğinde soru sor — ama "yanlış düşünüyorsun" deme. Yerine: "Bu izleniminiz hangi deneyimden geliyor?" ya da "Hangi kriterlere bakarak bu sonuca vardınız?" Amacın müşteriyi Sistem 1\'den Sistem 2\'ye davet etmek — zorlamadan.</p>\n<p>Hafta sonunda: Hangi kısayol en sık çıktı? Müşterinin kısayolunu fark ettiğin an ne değişti?</p>\n<div class="warn-box">⚠ ÖNEMLİ NOT: Gözlem, Yargı Değil</div>\n<p>Bu programın amacı müşteriyi "analiz etmek" veya "manipüle etmek" değil. Amacı senin gözlem kasını geliştirmek. Müşteriyi etiketleme ("bu adam Sistem 1\'de takılmış"). Gözlemle, not al, kalıpları gör. Eylem aşaması kitabın ilerleyen kısımlarında gelecek.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">KARAR ANATOMİSİ ÇALIŞMA KAĞIDI</div></div>\n<p>Her önemli satış görüşmesinden sonra bu kağıdı doldur. Zamanla kendi müşteri okuma veritabanını oluşturacaksın.</p>\n<div class="fill-blank">Müşteri / Şirket: _______________     Tarih: _______________</div>\n<div class="fill-blank">Görüşme süresi: _______________     Sonuç: _______________</div>\n<p>A. İlk 60 Saniye (Todorov + Sistem 1)</p>\n<p>Müşterinin ilk tepkisi neydi? (Beden dili, ses tonu, ilk cümlesi)</p>\n<p>Senin ilk izlenimin ne? (Dürüst ol — sonra kontrol edeceğiz)</p>\n<p>İlk 60 saniyede güven sinyali var mıydı, yoksa savunma mı?</p>\n<p>B. Sistem Geçişleri</p>\n<p>Müşteri hangi anlarda Sistem 1\'deydi? (Hızlı, sezgisel, duygusal)</p>\n<p>Hangi anlarda Sistem 2\'ye geçti? (Yavaşladı, sordu, düşündü)</p>\n<p>Ne tetikledi geçişi? (Fiyat? Teknik detay? Bir soru? Bir itiraz?)</p>\n<p>C. Somatik Sinyaller</p>\n<p>Fiyat anında ne oldu? (Ses, yüz, beden)</p>\n<p>İtiraz anında ne oldu?</p>\n<p>Kapanış sorusunda ne oldu?</p>\n<p>D. Kısayollar</p>\n<p>Çıpalama gördün mü? (Referans fiyat, rakip karşılaştırma)</p>\n<p>Temsil kısayolu gördün mü? (Kalıp eşleştirme, stereotip)</p>\n<p>Bulunabilirlik gördün mü? (Yakın zamanlı anı, haber, deneyim)</p>\n<p>E. Post-Mortem</p>\n<p>Final karar: Sistem 1 mi verdi, Sistem 2 mi?</p>\n<p>Ben hangi sisteme konuştum?</p>\n<p>Bir dahaki sefere neyi farklı yaparım?</p>\n<h4 class="section-title">İZLE VE DERİNLEŞ</h4>\n<p>Daniel Kahneman — "The riddle of experience vs. memory" (TED, 2010, 20 dk). Deneyimleyen ben vs hatırlayan ben ayrımı. Müşterinin hatırladığı deneyim, yaşadığı deneyimden farklı — ve satın alma kararını hatırlayan veriyor.</p>\n<p>Dan Ariely — "Are we in control of our own decisions?" (TED, 2008, 17 dk). Seçim mimarisi ve irrasyonel karar vermenin somut örnekleri. Ariely\'nin organ bağışı örneği kısayolları mükemmel anlatıyor.</p>\n<p>Antonio Damasio — "The quest to understand consciousness" (TED, 2011, 18 dk). Duygu-bilinç-karar ilişkisi Damasio\'nun kendi ağzından. Biraz teknik ama derinlik istiyorsan bu konuşma temel.</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<h4 class="researcher">Bechara, A. (2005). Decision making, impulse control and loss of willpower to resist drugs. Nature Neuroscience, 8(11), 1458-1463.</h4>\n<h4 class="researcher">Bechara, A. &amp; Damasio, A. R. (2005). The somatic marker hypothesis. Games and Economic Behavior, 52(2), 336-372.</h4>\n<div class="ref-line">Bechara, A. et al. (1997). Deciding advantageously before knowing the advantageous strategy. Science, 275(5304), 1293-1295.</div>\n<div class="ref-line">Damasio, A. (1994). Descartes\' Error: Emotion, Reason, and the Human Brain. Putnam.</div>\n<h4 class="researcher">Kahneman, D. (2011). Thinking, Fast and Slow. Farrar, Straus and Giroux.</h4>\n<h4 class="researcher">Kahneman, D. &amp; Tversky, A. (1979). Prospect theory: An analysis of decision under risk. Econometrica, 47(2), 263-292.</h4>\n<h4 class="researcher">Knutson, B. et al. (2007). Neural predictors of purchases. Neuron, 53(1), 147-156.</h4>\n<div class="ref-line">Lieberman, M. D. (2013). Social: Why Our Brains Are Wired to Connect. Crown.</div>\n<h4 class="researcher">Raichle, M. E. &amp; Gusnard, D. A. (2002). Appraising the brain\'s energy budget. PNAS, 99(16), 10237-10239.</h4>\n<div class="ref-line">Todorov, A. et al. (2005). Inferences of competence from faces predict election outcomes. Science, 308(5728), 1623-1625.</div>\n<div class="ref-line">Tom, S. M. et al. (2007). The neural basis of loss aversion in decision-making under risk. Science, 315(5811), 515-518.</div>\n<div class="ref-line">Tversky, A. &amp; Kahneman, D. (1974). Judgment under uncertainty: Heuristics and biases. Science, 185(4157), 1124-1131.</div>'},
'2-2':{b:'Arketip',d:'Müşteri Okuma Şablonu',c:14918,h:'<h4 class="section-title">ARKETİP</h4>\n<p>Senaryo Atölyesi: Müşteriyi Okumanın 4 Provası</p>\n<p>Bu ek bir test değil, bir atölye. 4 farklı müşteri senaryosu okuyacaksın. Her birinde önce kendi okumalarını yapacak, sonra "koçun notu" ile karşılaştıracaksın. Amaç doğru cevap bulmak değil — kendi okuma kalıplarını keşfetmek. Ama önce, ana bölümdeki bilimi bir katman daha derinleştirelim.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">KİŞİLİĞİ ÖLÇMEK — BİLİM NE DİYOR, SAHA NE YAPIYOR</div></div>\n<p>Big Five: Akademinin Altın Standardı</p>\n<p>Costa ve McCrae\'nin Beş Faktör Modeli (1992) kişilik psikolojisinde en sağlam çerçeve. 5 boyut: Openness (deneyime açıklık), Conscientiousness (sorumluluk), Extraversion (dışadönüklük), Agreeableness (uyumluluk), Neuroticism (duygusal kararsızlık). Her boyut sürekli bir spektrum — yüksek, orta, düşük. Binlerce çalışmayla doğrulanmış, kültürler arası geçerliliği güçlü.</p>\n<p>Satış sahasında neden az kullanılıyor? Çünkü 5 boyut × 3 seviye = 243 olası kombinasyon. Pratikte işe yaramaz. Satışçı müşteriyle 2 dakika konuştuktan sonra "orta extraversion, yüksek conscientiousness, düşük openness" diyemez — ve dese bile bundan strateji çıkarmak zor.</p>\n<p>Ama Big Five\'ın satışçıya dolaylı bir hediyesi var: Kişiliğin tek boyutlu olmadığını gösteriyor. DISC\'in 4 kutusu ile Big Five\'ın 5 spektrumu arasındaki fark, siyah-beyaz fotoğraf ile renkli fotoğraf arasındaki fark gibi. Gerçek daha karmaşık — ve karmaşıklığı kabul etmek ilk adım.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<p>Costa, P. T. &amp; McCrae, R. R. (1992). NEO PI-R Professional Manual. | John, O. P. &amp; Srivastava, S. (1999). The Big Five trait taxonomy. Handbook of Personality, Guilford. | Furnham, A. (2008). Personality and intelligence at work. Big Five iş performansıyla korelasyon gösteriyor (özellikle Conscientiousness). DISC\'in akademik geçerliliği çok daha zayıf ama pratik kullanılabilirliği daha yüksek.</p>\n<p>Mischel-Shoda: CAPS Modeli</p>\n<p>Ana bölümde Mischel\'in if-then kalıplarından bahsettik. Burada biraz daha derinleşelim. Mischel ve Shoda\'nın CAPS modeli (Cognitive-Affective Processing System, 1995) kişiliği "sabit özellikler" yerine "bilişsel-duygusal işleme sistemi" olarak tanımlıyor.</p>\n<p>Basitleştirelim: İnsan bir termostat gibi değil (sabit ayar), daha çok bir adaptif sistem gibi (duruma göre kalibrasyon). Aynı müşteri aynı gün içinde farklı "kişiliklere" kayabilir — patron yanındayken farklı, yalnız kaldığında farklı, fiyat duyduğunda farklı, çay içerken farklı.</p>\n<p>CAPS modelinin satışçıya pratik katkısı: Müşteriyi izlerken "bu kim" yerine "bu durumda bu kişi nasıl" sorusunu sor. Durumu değiştirdiğinde müşteri de değişebilir. Ortamı rahatlatırsan, konuşma yerini değiştirirsen, toplantıdaki kişi sayısını azaltırsan — farklı bir müşteri görebilirsin.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Mischel, W. &amp; Shoda, Y. (1995). A cognitive-affective system theory of personality: Reconceptualizing situations, dispositions, dynamics, and invariance in personality structure. Psychological Review, 102(2), 246-268. | Shoda, Y., Mischel, W. &amp; Wright, J. C. (1994). Intraindividual stability in the organization and patterning of behavior. JPSP, 67(4), 674-687. Aynı çocuklar farklı durumlarda tutarlı kalıplar gösteriyor — ama bu kalıplar "tip" değil, durumsal profiller.</div>\n<p>Kültürel Kişilik: Markus ve Kitayama</p>\n<p>Hazel Markus ve Shinobu Kitayama\'nın 1991 çalışması kişilik psikolojisine kültürel bomba attı: Benlik kavramı kültüre göre değişiyor. Bireyci kültürlerde "independent self" (bağımsız benlik) — ben ayrı bir birimim, tercihlerim beni tanımlar. Kolektif kültürlerde "interdependent self" (karşılıklı bağımlı benlik) — ben ilişkilerim içinde varım, rollerim beni tanımlar.</p>\n<p>Türkiye bu iki kutbun arasında — ve içinde ikisi de var. Aynı müşteri iş bağlamında bireyci, aile bağlamında kolektivist olabiliyor. Kadıköy\'deki startup kurucusu ile Gaziantep\'teki aile şirketi patronu farklı benlik yapılarına sahip olabilir — ama ikisi de Türk. "Kültürel tip" en tehlikeli etiketlerden biri.</p>\n<p>Pratik sonuç: Müşteriyle konuşurken dikkat et — kararını "ben" diliyle mi anlatıyor, "biz" diliyle mi? "Ben böyle düşünüyorum" diyen müşteri ile "biz bir değerlendirelim" diyen müşteri farklı karar mekanizmalarını kullanıyor olabilir. Dil ipucu verir — ama kesin teşhis değil, hipotez.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Markus, H. R. &amp; Kitayama, S. (1991). Culture and the self: Implications for cognition, emotion, and motivation. Psychological Review, 98(2), 224-253. 10.000+ atıf, kültürel psikolojinin temel taşı. | Hofstede, G. (2001). Culture\'s Consequences. 2nd ed. Sage. Türkiye: Orta bireycilik (37/100), yüksek güç mesafesi (66/100), yüksek belirsizlikten kaçınma (85/100).</div>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">4 SENARYO, 4 PROVA</div></div>\n<p>Her senaryoyu oku. Okuduktan sonra DURMA — 3 soruyu kendi başına cevapla. Sonra "Koçun Notu"nu oku. Doğru/yanlış yok — ama kendi okuma kalıplarını göreceksin.</p>\n<p>Senaryo 1: "Bana Rapor Gönderin"</p>\n<p>Durum: Orta ölçekli bir gıda firması, üretim müdürü Haluk Bey ile ilk toplantı. 55 yaş, 30 yıllık sektör deneyimi. Toplantıya dakik geldi, el sıkışması güçlü. İlk 5 dakika sektör sohbeti — çok bilgili, kendi deneyimlerinden örnekler veriyor. Sunuma geçtiğinde dikkatle dinledi, soru sormadı. Sunum bittikten sonra: "Güzel. Bana teknik raporu mail atın, incelerim." Sesinde ne heyecan ne ret vardı. Yüz ifadesi nötr. Tokalaştı, çıktı.</p>\n<p>Senin okumaların (yazarak yap):</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Bu müşteriyi hangi "tipe" koymak istiyorsun? (Dürüst ol — ilk dürtü)</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">3 katmanlı okuma: Varsayılan eğilim? Durumsal ipuçları? Bağlam bilgin var mı?</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">"Rapor gönderin" ne anlama geliyor? En az 3 olasılık yaz.</span></div>\n<p>Koçun Notu — Senaryo 1:</p>\n<p>Çoğu satışçı Haluk Bey\'i "C tipi — analitik, detaycı" kodlar. Soru sormadı, rapor istedi, nötr kaldı. Ama düşün: 30 yıllık sektör deneyimi olan biri neden soru sormasın? Belki sunumun ona yeni bir şey söylemedi. Belki ürünü zaten tanıyor ve karşılaştırmak için rapor istiyor. Belki toplantıda karar yetkisi yok ve patrona rapor götürecek. Belki de ilgisiz ve kibar reddetme bu.</p>\n<p>İpucu: "Soru sormamak" birden fazla anlama gelir. DISC bu durumda seni "C tipi stratejisi uygula: detaylı rapor gönder, sabırla bekle" diye yönlendirir. Ama eğer Haluk Bey aslında ilgisizse, detaylı rapor boşuna emek. Doğru hamle: Raporu göndermeden önce 1 soru sor — "Hangi bölümlere özellikle bakmak istersiniz?" Bu sorunun cevabı sana 3 katmanlı okuma verecek.</p>\n<p>Senaryo 2: "Eşime Sormalıyım"</p>\n<p>Durum: Sigorta satışı, bireysel. Yıldız Hanım, 38 yaş, avukat. İlk görüşme ofisinde. Çok sordu — detaylı, hukuki açıdan. Poliçe şartlarını satıcıdan iyi biliyor. 40 dakika boyunca aktif, enerjik, kontrol onda. Son 5 dakikada: "Her şey çok net, beğendim. Ama eşimle konuşmam lazım." Ses tonu değişmedi, beden dili açık kaldı, gülümsedi.</p>\n<p>Senin okumaların:</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">İlk dürtün: Gerçekten eşine mi soracak?</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">40 dakika kontrol Yıldız Hanım\'daydı — bu ne söylüyor?</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">"Eşimle konuşmam lazım" — Mischel\'in if-then kalıbıyla oku: Hangi durum bu davranışı tetiklemiş olabilir?</span></div>\n<p>Koçun Notu — Senaryo 2:</p>\n<p>Tuzak: Çoğu satışçı "bahane" diye kodlar. "Eşime sormalıyım = satın almak istemiyor." Bazen doğru — ama burada dikkat: Yıldız Hanım 40 dakika aktifti, detaylı sordu, beğendiğini söyledi, beden dili olumlu kaldı. Eğer ilgisiz olsaydı, 40 dakika neden harcasın?</p>\n<p>Olasılıklar: (a) Gerçekten eşine soracak — çünkü aile bütçesini etkiliyor ve bu ailelerde ortak karar verme normu. Markus-Kitayama\'nın "interdependent self" yapısı. (b) Son dakika belirsizlik — tüm bilgiyi aldı, Sistem 2 tatmin oldu, ama Sistem 1 henüz "evet" demedi. Bir gece yatması lazım. (c) Fiyatla ilgili iç hesaplama — eşini kalkan olarak kullanıyor çünkü "pahalı" demek istemedi.</p>\n<p>3 katmanlı okuma: Katman 1 (eğilim) net — analitik, kontrollü, bilgili. Katman 2 (durumsal kayma) — son 5 dakikadaki değişimi gör: Kontrolden "bekleme"ye geçti. Ne tetikledi? Muhtemelen karar anı. Katman 3 (bağlam) — bilmiyorsun. "Eşinizle birlikte konuşmak ister misiniz, ben de katılayım?" sorusu hem bağlamı açar hem takibi güçlendirir.</p>\n<p>Senaryo 3: "Siz Bilirsiniz"</p>\n<p>Durum: B2B yazılım satışı. 4 kişilik toplantı: İK müdürü Sevgi Hanım (muhatap), IT müdürü, genel müdür yardımcısı, bir de stajyer (not tutuyor). Sevgi Hanım sunumu dikkatle dinliyor ama her soruyu genel müdür yardımcısına yönlendiriyor: "Siz ne dersiniz?" GMY genellikle kısa cevaplar veriyor: "Uygun", "olabilir." IT müdürü teknik sorular soruyor ama Sevgi Hanım\'ın onayını aldıktan sonra. Toplantı sonunda Sevgi Hanım: "Biz içeride değerlendirelim, size döneriz."</p>\n<p>Senin okumaların:</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Odadaki gerçek karar verici kim?</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Sevgi Hanım\'ın "siz ne dersiniz" kalıbı ne söylüyor?</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Stajyerin rolü ne? (Ciddiye al bu soruyu.)</span></div>\n<p>Koçun Notu — Senaryo 3:</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">bölümdeki (Beyin) Deniz vakasını hatırla — odadaki sosyal beyin dinamiği. Sevgi Hanım muhatap ama karar verici değil. GMY\'nin kısa cevapları yeterlilik değil, güç ifadesi — "onayım yeter" mesajı. Sevgi Hanım\'ın sürekli GMY\'ye bakması Lieberman\'ın DMN sosyal hiyerarşi okuması.</span></div>\n<p>Stajyer sorusu çoğu satışçıyı şaşırtıyor. Ama düşün: Stajyer not tutuyor. O notlar GMY\'nin masasına gidecek. Ve stajyerler genellikle "patron ne duymak istiyor" filtresinden geçiriyor. Eğer senin sunumun stajyerin notlarında iyi görünmüyorsa, GMY\'nin masasında da iyi görünmeyecek. Odadaki en güçsüz kişi bazen en güçlü filtre.</p>\n<p>DISC bu durumda ne der? Sevgi Hanım\'ı "S tipi" kodlarsın belki — uyumlu, karar almaktan kaçınan. Ama belki Sevgi Hanım farklı bir bağlamda çok kararlı — burada durumsal olarak yetki sınırlarını biliyor ve buna göre davranıyor. Etiket değil, dinamik oku.</p>\n<p>Senaryo 4: Öfkeli Müşteri</p>\n<p>Durum: Mobilya sektörü, kurumsal satış. Ahmet Bey, inşaat firması satın alma müdürü. İlk toplantının ilk 3 dakikasında: "Sizin sektörünüzü biliyorum, herkes aynı şeyi söylüyor. Fiyat verin, gerisi hikaye." Ses tonu sert, beden dili kapalı — kollar kavuşuk, sandalyeye yaslanmış. Yüz ifadesi somurtkan.</p>\n<p>Senin okumaların:</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Sistem 1 mi konuşuyor, Sistem 2 mi?</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">"Herkes aynı şeyi söylüyor" — burada hangi sezgisel kısayol çalışıyor?</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Bu öfke sana mı, yoksa senden önceki 10 satışçıya mı?</span></div>\n<p>Koçun Notu — Senaryo 4:</p>\n<p>Ahmet Bey\'in davranışı Sistem 1 — hızlı, duygusal, kalıp eşleştirmesi. "Herkes aynı" = temsil kısayolu (representativeness). Geçmiş deneyimleriyle seni eşleştiriyor — seni tanımadan. Bulunabilirlik de devrede olabilir: Son kötü deneyim taze, tüm sektörü o lensle görüyor.</p>\n<p>En yaygın hata: Ahmet Bey\'i "D tipi — zor müşteri" kodlamak ve ya geri çekilmek ya sertleşmek. İkisi de Sistem 1 tepkisi — senin Sistem 1\'in onun Sistem 1\'ine cevap veriyor. Sonuç: İki Sistem 1 çarpışır, kimse kazanmaz.</p>\n<p>Daha iyi yaklaşım: Ahmet Bey\'in öfkesi sana değil. Onun geçmiş deneyimine. Bunu kabul et: "Ahmet Bey, sizin sektörde çok satıcıyla muhatap olduğunuz belli. Kötü deneyimleriniz olmuş olabilir. Ben de aynı sunumu yapıp fiyat söylemek yerine, 5 dakika size soru sormak istiyorum — çünkü gerçekten ihtiyacınızın ne olduğunu anlamadan fiyat vermek benim işime de yaramaz." Bu cümle ne yapıyor? Ahmet Bey\'in Sistem 1\'ini doğruluyor ("evet, kötü deneyimim var"), sonra Sistem 2\'ye davet ediyor ("5 dakika soru sormak istiyorum"). Zorlama yok, saygı var.</p>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">katman eksik: Ahmet Bey neden bu kadar savunmacı? Belki patron baskısı var, belki bütçe çok kısıtlı, belki son tedarikçi fiyasko yaşattı. Bunu bilmeden doğru strateji belirleyemezsin.</span></div>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">OKUMA KALİBİN NEREYİ KAPATIYOR?</div></div>\n<p>4 senaryoyu tamamladıysan, şimdi kendi okuma kalıplarına bak. Bu tablo seni yönlendirsin:</p>\n<p>Eğer 4\'te 3\'ünde DISC etiketi koyduysan: Normal. Beyin bunu yapıyor. Ama farkındalık ilk adım — Kısım 1 Bölüm 1\'deki (Ayna) Duval-Wicklund\'u hatırla: Dikkat kendine döndüğünde değerlendirme daha doğru oluyor.</p>\n<p>Eğer 3. katmanı hiç düşünmediysen: Çoğu satışçı düşünmüyor. Çünkü 3. katman bilgi gerektiriyor — ve bilgi soru sormayı gerektiriyor. 6. bölümde (İhtiyaç) soru sormanın bilimini göreceğiz.</p>\n<p>Eğer stajyer sorusunu geçtiysen: Statü körlüğü. Odadaki en düşük statülü kişiyi görmezden gelme eğilimi. Ama bilgi akışı her zaman hiyerarşiye paralel değil.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">3 KATMANLI MÜŞTERİ OKUMA ŞABLONU</div></div>\n<p>Her önemli müşteri için bu şablonu kullan. İlk görüşmeden sonra doldur, her yeni görüşmede güncelle.</p>\n<div class="fill-blank">Müşteri: _______________     Sektör: _______________     Tarih: _______________</div>\n<p>Katman 1: Varsayılan Eğilim</p>\n<p>İletişim hızı: (Hızlı / Orta / Yavaş)</p>\n<p>Detay tercihi: (Büyük resim / Detaycı / Duruma göre değişiyor)</p>\n<p>Karar stili: (Sezgisel / Analitik / Karışık)</p>\n<p>Enerji: (Dışadönük-enerjik / İçedönük-sakin / Değişken)</p>\n<div class="fill-blank">İlk izlenim notu: _______________</div>\n<p>DİKKAT: Bu bir HİPOTEZ. Kanıt topladıkça güncelle.</p>\n<p>Katman 2: Durumsal Kaymalar (Mischel If-Then)</p>\n<div class="fill-blank">Fiyat duyduğunda: _______________</div>\n<div class="fill-blank">İtiraz ettiğinde: _______________</div>\n<div class="fill-blank">Karar anında: _______________</div>\n<div class="fill-blank">Patron/ekip yanındayken: _______________</div>\n<div class="fill-blank">Yalnız kaldığında: _______________</div>\n<div class="fill-blank">Son görüşmedeki şaşırtıcı an: _______________</div>\n<p>Katman 3: Biricik Bağlam</p>\n<div class="fill-blank">Şirketin şu anki durumu: _______________</div>\n<div class="fill-blank">Müşterinin pozisyonundaki değişiklikler: _______________</div>\n<div class="fill-blank">Bütçe durumu/baskıları: _______________</div>\n<div class="fill-blank">Son tedarikçi deneyimi: _______________</div>\n<div class="fill-blank">Karar sürecinde başka kim var? _______________</div>\n<div class="fill-blank">Bilmediğin ama öğrenmen gereken şey: _______________</div>\n<h4 class="section-title">İZLE VE DERİNLEŞ</h4>\n<p>Walter Mischel — "The Marshmallow Test" (RSA Animate, 10 dk). Marshmallow deneyinden çok daha fazlası — kişiliğin durumsal doğasını anlatıyor. Satışçı olarak izlerken müşteriyi düşün.</p>\n<p>Malcolm Gladwell — "The strange tale of the Norden bombsight" (TED, 2011, 15 dk). Kalıplara güvenmenin tehlikesi — çok farklı bir bağlamda ama ders aynı: Model gerçekliğin yerini alamaz.</p>\n<p>Philip Zimbardo — "The psychology of time" (TED, 2009, 6 dk). İnsanların zaman perspektifinin kararlarını nasıl şekillendirdiği — müşterinin "acil" ya da "sabırlı" olmasının arkasındaki psikoloji.</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<h4 class="researcher">Costa, P. T. &amp; McCrae, R. R. (1992). NEO PI-R Professional Manual. Psychological Assessment Resources.</h4>\n<h4 class="researcher">Furnham, A. (2008). Personality and Intelligence at Work. Routledge.</h4>\n<h4 class="researcher">Hofstede, G. (2001). Culture\'s Consequences: Comparing Values, Behaviors, Institutions and Organizations Across Nations. 2nd ed. Sage.</h4>\n<h4 class="researcher">John, O. P. &amp; Srivastava, S. (1999). The Big Five trait taxonomy. In Pervin, L. A. &amp; John, O. P. (Eds.), Handbook of Personality. Guilford.</h4>\n<h4 class="researcher">Jung, C. G. (1968). The Archetypes and the Collective Unconscious. Collected Works, Vol. 9. Princeton UP.</h4>\n<div class="ref-line">Markus, H. R. &amp; Kitayama, S. (1991). Culture and the self. Psychological Review, 98(2), 224-253.</div>\n<h4 class="researcher">Marston, W. M. (1928). Emotions of Normal People. Kegan Paul.</h4>\n<h4 class="researcher">Mischel, W. (1968). Personality and Assessment. Wiley.</h4>\n<div class="ref-line">Mischel, W. &amp; Shoda, Y. (1995). A cognitive-affective system theory of personality. Psychological Review, 102(2), 246-268.</div>\n<div class="ref-line">Pittenger, D. J. (2005). Cautionary comments regarding the Myers-Briggs. Consulting Psychology Journal, 57(3), 210-221.</div>\n<h4 class="researcher">Rosch, E. (1978). Principles of Categorization. In Rosch, E. &amp; Lloyd, B. B. (Eds.), Cognition and Categorization. Erlbaum.</h4>\n<div class="ref-line">Shoda, Y., Mischel, W. &amp; Wright, J. C. (1994). Intraindividual stability. JPSP, 67(4), 674-687.</div>'},
'2-3':{b:'Beden Dili',d:'Sessiz Gözlemci Antrenmanı',c:12000,h:'<p>BEDEN</p>\n<p>Sessiz Gözlemci Antrenman Programı</p>\n<p>Bu ek bir okuma değil, bir antrenman. 4 haftalık bir program boyunca beden dili gözlem kasını sistematik olarak geliştireceksin. Her hafta farklı bir odak, her odakta bilimsel temel + saha egzersizi. Ama önce: Ana bölümde başladığımız bilimin birkaç katman daha altına inelim.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">SÖZEL OLMAYAN İLETİŞİMİN NÖROBİLİMİ</div></div>\n<p>Ayna Nöronlar: Empati mi, Mit mi?</p>\n<p>1990\'larda Rizzolatti ve ekibi makak maymunlarında ilginç bir keşif yaptı: Belirli nöronlar hem maymun bir hareketi yaparken hem de başka bir maymunun aynı hareketi yaptığını izlerken ateşleniyor. "Ayna nöronlar" dendi ve medya patladı: "Empati nöronları bulundu!" "İnsanlar birbirini bu yüzden anlıyor!"</p>\n<p>Gerçek daha karmaşık. İnsanlarda ayna nöron sistemi var — ama "empati nöronları" demek aşırı basitleştirme. Hickok (2014) kapsamlı bir eleştiride gösterdi ki ayna nöronlar dil anlama, empati ve taklit için gerekli ama yeterli değil. Empati çok daha karmaşık bir süreç — ayna nöronlar sadece bir parça.</p>\n<p>Satışçıya ne söylüyor? Karşındakinin hareketlerini otomatik olarak içsel olarak simüle ediyorsun. Müşteri öne eğildiğinde senin beynin de "öne eğilme" kalıbını ateşliyor. Bu taklit bilinçsiz — ve Hatfield\'ın duygu bulaşıcılığının nöral temeli. Pratik sonuç: Sen farkında olmasan da müşterinin duruşu senin duruşunu, müşterinin enerjisi senin enerjini etkiliyor. Farkında olmak kontrolün ilk adımı.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Rizzolatti, G. &amp; Craighero, L. (2004). The mirror-neuron system. Annual Review of Neuroscience, 27, 169-192. | Hickok, G. (2014). The Myth of Mirror Neurons. Norton. Kapsamlı eleştiri — ayna nöronlar var ama "empati nöronları" değil. | Iacoboni, M. (2008). Mirroring People. Farrar, Straus and Giroux. Popüler ama eleştirel oku.</div>\n<p>Prozodik İpuçları: Ses Tonunun Bilimi</p>\n<p>Scherer\'in (2003) ses duygusu araştırmaları gösteriyor ki ses tonu duyguyu 5 boyutta taşıyor: Pitch (ses yüksekliği), loudness (ses şiddeti), tempo (hız), timbre (ses kalitesi) ve pauses (duraklamalar). Her duygu farklı bir prozodik profil oluşturuyor.</p>\n<p>Öfke: Yüksek pitch, yüksek şiddet, hızlı tempo. Korku: Yüksek pitch, düşük şiddet, hızlı tempo, düzensiz duraklamalar. Üzüntü: Düşük pitch, düşük şiddet, yavaş tempo. Güven: Orta pitch, istikrarlı şiddet, orta tempo, düzenli duraklamalar.</p>\n<p>Satışta en kritik an: Ses tonu değişimi. Kısım 1 Bölüm 7\'de (Beden) Murat\'ın fiyat anındaki ses düşüşünü gördük — kendi sesimiz için. Şimdi müşteride aynısını oku: Müşteri bir konuyu anlatırken ses tonu değişirse, o an duygusal bir geçiş oluyor. Ses yükseliyorsa — önem, heyecan veya öfke. Ses düşüyorsa — belirsizlik, çekinme veya teslim olma. Tempo artıyorsa — kaçınma veya heyecan. Duraksıyorsa — düşünme veya karar anı.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Scherer, K. R. (2003). Vocal communication of emotion: A review of research paradigms. Speech Communication, 40(1-2), 99-117. | Juslin, P. N. &amp; Laukka, P. (2003). Communication of emotions in vocal expression and music performance. Psychological Bulletin, 129(5), 770-814. Ses-duygu ilişkisi kültürler arası tutarlı ama ifade şiddeti kültürel.</div>\n<p>Rapport ve Senkronizasyon</p>\n<p>Chartrand ve Bargh\'ın (1999) "bukalemun etkisi" çalışması: İnsanlar otomatik olarak muhataplarının duruşunu, jestlerini ve yüz ifadelerini taklit ediyor. Ve taklit edilen kişi, taklit edeni daha çok seviyor — farkında olmadan. Rapport\'un (uyum) nöral temeli bu.</p>\n<p>Bernieri ve Rosenthal (1991) senkronizasyonu daha detaylı inceledi: Etkileşim senkronizasyonu (interactional synchrony) — iki kişinin beden hareketlerinin, konuşma ritimlerinin ve nefes kalıplarının zamanla uyumlanması. Yüksek senkronizasyon = yüksek rapport = daha olumlu değerlendirme.</p>\n<p>NLP dünyası bunu "mirroring" diye pazarlıyor ve "müşterinin duruşunu bilinçli olarak taklit et" diyor. Bilimsel gerçek daha nüanslı: Bilinçli taklit bazen fark ediliyor ve itici oluyor. Doğal senkronizasyon fark edilmiyor ve bağ kuruyor. Fark: Teknik uygulama vs gerçek ilgi. Müşteriyle gerçekten ilgilendiğinde senkronizasyon doğal oluyor. İlgilenmediğinde en iyi teknik sahte kalıyor.</p>\n<div class="test-q"><span class="q-label">8</span><span class="q-text">bölümde (Dil) aktif dinlemenin bilimini göreceğiz — ve orada senkronizasyonun dilsel boyutu devreye girecek.</span></div>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Chartrand, T. L. &amp; Bargh, J. A. (1999). The chameleon effect. JPSP, 76(6), 893-910. Otomatik taklit ve sempati ilişkisi. | Bernieri, F. J. &amp; Rosenthal, R. (1991). Interpersonal coordination. In Feldman, R. S. &amp; Rimé, B. (Eds.), Fundamentals of Nonverbal Behavior. Cambridge UP.</div>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">4 HAFTALIK SESSİZ GÖZLEMCİ ANTRENMAN PROGRAMI</div></div>\n<p>Her hafta 1 odak. Her odakta: Bilimsel temel (yukarıda), saha egzersizi (aşağıda) ve hafta sonu değerlendirme. Programa başlamadan bir kural: Bu antrenman müşteriye uygulanmadan önce, güvenli ortamlarda pratik yapılacak.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Sessiz Film — Görüntüyü Oku</div></div>\n<p>Amaç: Görsel gözlem kasını izole etmek. Ses olmadan beden dilini okumayı pratik etmek.</p>\n<p>Egzersiz 1A — Kahve Gözlemi (Günde 15 dk): Bir kafede otur. İnsanları izle — ama konuşmalarını duyma. Sadece beden dilini gözlemle. Her gün 3 kişi seç ve not al: Oturma pozisyonu, el hareketleri, yüz ifadesi değişimleri. Tahmin et: Bu kişi ne hissediyor? Sohbet iyi mi gidiyor kötü mü?</p>\n<p>Egzersiz 1B — Sessiz Video (Haftada 2 kez): Bir TED konuşmasını veya haber röportajını sesi kapalı izle. 3 dakika sonra duraklat. Not al: Konuşmacı güvenli mi gergin mi? Dinleyiciler ilgili mi sıkılmış mı? Sonra sesli izle — tahminlerini kontrol et.</p>\n<p>Egzersiz 1C — Kendi Videonu İzle (1 kez): Bir müşteri görüşmeni kaydet (izin alarak) veya bir iç toplantı kaydını kullan. Sesi kapat, sadece kendini izle. Kısım 1 Bölüm 7\'deki Serdar deneyimi — ama bu sefer sadece görüntü.</p>\n<p>Hafta sonu değerlendirme:</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Ses Haritası — Sesi Oku</div></div>\n<p>Amaç: Prozodik ipuçlarını izole etmek. Görüntü olmadan sadece sesi okumak.</p>\n<p>Egzersiz 2A — Sesli Kitap Analizi (Günde 10 dk): Bir sesli kitap veya podcast dinle. Konuşmacının ses tonu değişimlerini not al: Nerede hızlandı? Nerede yavaşladı? Nerede ses yükseldi? Her değişimde tahmin et: Duygusal geçiş neydi?</p>\n<p>Egzersiz 2B — Görüntüsüz Görüşme (Haftada 1 kez): Bir telefon görüşmesi veya online toplantıyı kamerasız dinle. Sadece ses. Not al: Ses tonu değişim anları, duraklama süreleri, tempo kaymaları. Özellikle fiyat veya karar anlarında ne oldu?</p>\n<p>Egzersiz 2C — Murat Egzersizi (1 kez): Kısım 1 Bölüm 7\'den. Kendi bir sunumunu veya görüşmeni sadece sesli dinle — görüntü kapalı. Sesin fiyat anında, itiraz anında, kapanış anında ne yapıyor?</p>\n<p>Hafta sonu değerlendirme:</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Küme Okuma — Bütünü Gör</div></div>\n<p>Amaç: Tek jestler yerine davranış kümelerini okumak. Harrigan\'ın bulgusunu pratiğe çevirmek.</p>\n<p>Egzersiz 3A — Küme Günlüğü (Her görüşmede): Bu hafta her müşteri görüşmesinde tek jestleri değil, kümeleri not al. Format: "An: [ne oldu] → Küme: [görsel + ses + pozisyon] → Tahmin: [duygu/niyet]"</p>\n<p>Egzersiz 3B — Değişim Dedektörü (Her görüşmede): Görüşme boyunca 1 şeye odaklan: Değişim anları. Müşterinin beden dili ne zaman değişti? Ne tetikledi? Öncesi ve sonrası arasındaki fark ne?</p>\n<p>Egzersiz 3C — Uyumsuzluk Avcısı (Haftada 2 kez): Mehrabian\'ın gerçek bulgusu — tutarsız mesajlar. Müşterinin sözleriyle bedeni uyumlu mu? "Çok güzel" diyor ama kolları kapanıyorsa, "ilginç" diyor ama saatine bakıyorsa — bu uyumsuzlukları yakala.</p>\n<p>Hafta sonu değerlendirme:</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Çift Yönlü Farkındalık — Kendini de Oku</div></div>\n<p>Amaç: Duygu bulaşıcılığını fark etmek ve yönetmek. Kendi bedeninin müşteriye ne söylediğini kontrol etmek.</p>\n<p>Egzersiz 4A — Bulaşma Günlüğü (Her görüşmede): Her görüşmeden sonra sor: Ben bu görüşmeye nasıl girdim (enerji, duygu)? Görüşme sırasında ne değişti? Müşterinin enerjisi beni etkiledi mi? Ben müşteriyi etkiledim mi?</p>\n<p>Egzersiz 4B — Bilinçli Kalibrasyon (Haftada 2 kez): Görüşmeden 5 dakika önce bedenini kalibre et. Omuzlar geri, nefes derin, yüz gevşek. Görüşme boyunca 10 dakikada bir bedenini kontrol et: Gerildim mi? Öne mi eğildim, geri mi çekildim? Nefesim sığlaştı mı?</p>\n<p>Egzersiz 4C — Ayna Deney (1 kez): Bir meslektaşınla 10 dakika sohbet et — ama bilinçli olarak onun enerji seviyesinin tersini uygula. O hızlıysa sen yavaş, o gergeinse sen sakin. Ne olduğunu gözlemle: Karşı taraf senin enerjine doğru mu kaydı? Hatfield\'ın duygu bulaşıcılığı ne kadar güçlü?</p>\n<p>Hafta sonu değerlendirme:</p>\n<div class="warn-box">⚠ ÖNEMLİ NOT: Antrenman Sınırları</div>\n<p>Bu program seni beden dili "uzmanı" yapmayacak — gözlem kasını güçlendirecek. Profesyonel beden dili analizi yıllar süren eğitim gerektirir. Amacımız: Daha iyi görmek, daha az varsaymak, daha çok fark etmek. Müşteriyi "okudun" sanıp yanlış strateji uygulamak, hiç okumamaktan daha tehlikeli.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">EKRANDA BEDEN DİLİ — ONLINE SATIŞ İÇİN UYARLAMA</div></div>\n<p>Ana bölümde online satışın beden dili okumasını kısıtladığını söyledik. Ama tamamen kaybetmek zorunda değilsin. Ekranda okunabilecek ipuçları:</p>\n<p>Yüz: Mikro ifadeler ekranda da var — ama çözünürlük ve kare hızı azaltıyor. İyi ışık, iyi kamera ve tam yüz görünürlüğü fark yaratır. Müşterinin kamerasını açmasını iste — nazikçe: "Yüzünüzü görsem daha iyi iletişim kurarız."</p>\n<p>Ses: Online\'da en güçlü kanal ses — çünkü kayıp en az burada. Scherer\'in prozodik ipuçları aynen geçerli. Hatta online\'da ses daha da kritik çünkü beden dili bilgisi eksik — beyin telafi için sese daha çok yükleniyor.</p>\n<p>Katılım sinyalleri: Ekranda beden dili kısıtlı ama dijital davranış ipuçları var. Müşteri kamerayı kapattıysa — neden? Sessize aldıysa — ne yapıyor? Chat\'e yazıyorsa — sözelleştiremediği bir şey mi var? Ekranını paylaşmaya istekliyse — güven sinyali. Toplantı süresini kısa tutmak istiyorsa — ilgi düşük veya zaman baskısı.</p>\n<p>En kritik online beceri: Duraklama kullanımı. Yüz yüzede beden dili konuşma arasını dolduruyor. Online\'da sessizlik daha rahatsız ediyor — ama aynı zamanda daha güçlü. Bir soru sorduktan sonra 3-5 saniye sus. Müşterinin düşünme süreci sesinden belli olacak.</p>\n<h4 class="section-title">İZLE VE DERİNLEŞ</h4>\n<p>Amy Cuddy — "Your body language may shape who you are" (TED, 2012, 21 dk). Tartışmalı ama provoke edici. Güç pozu bilimi eleştiriyle izle — ama "beden zihni etkiler" mesajı geçerli.</p>\n<p>Joe Navarro — "The power of nonverbal communication" (YouTube, 2013, 45 dk). FBI eski ajanı, beden dili konusunda en pratik kaynaklardan. Akademik değil ama saha deneyimi çok güçlü. Eleştirisi: Tek jeste çok anlam yüklüyor.</p>\n<p>Paul Ekman — "Emotions Revealed" (kitap, 2003). Kitap olarak okunabilir, video kaynağı olarak Ekman Group\'un YouTube kanalında kısa eğitim videoları var — mikro ifade tanıma pratikleri.</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<p>Bernieri, F. J. &amp; Rosenthal, R. (1991). Interpersonal coordination. In Feldman, R. S. &amp; Rimé, B. (Eds.), Fundamentals of Nonverbal Behavior. Cambridge UP.</p>\n<div class="ref-line">Chartrand, T. L. &amp; Bargh, J. A. (1999). The chameleon effect. JPSP, 76(6), 893-910.</div>\n<div class="ref-line">DePaulo, B. M. et al. (2003). Cues to deception. Psychological Bulletin, 129(1), 74-118.</div>\n<h4 class="researcher">Ekman, P. (1972). Universals and cultural differences in facial expressions. Nebraska Symposium on Motivation, 19, 207-283.</h4>\n<h4 class="researcher">Ekman, P. (2003). Emotions Revealed. Times Books.</h4>\n<div class="ref-line">Ekman, P. &amp; Friesen, W. V. (1978). Facial Action Coding System (FACS). Consulting Psychologists Press.</div>\n<h4 class="researcher">Hall, E. T. (1966). The Hidden Dimension. Doubleday.</h4>\n<h4 class="researcher">Harrigan, J. A., Rosenthal, R. &amp; Scherer, K. R. (Eds.) (2005). The New Handbook of Methods in Nonverbal Behavior Research. Oxford UP.</h4>\n<div class="ref-line">Hatfield, E., Cacioppo, J. T. &amp; Rapson, R. L. (1993). Emotional contagion. Current Directions in Psychological Science, 2(3), 96-100.</div>\n<div class="ref-line">Hickok, G. (2014). The Myth of Mirror Neurons. Norton.</div>\n<h4 class="researcher">Iacoboni, M. (2008). Mirroring People. Farrar, Straus and Giroux.</h4>\n<div class="ref-line">Juslin, P. N. &amp; Laukka, P. (2003). Communication of emotions. Psychological Bulletin, 129(5), 770-814.</div>\n<h4 class="researcher">Matsumoto, D. &amp; Hwang, H. C. (2011). Evidence for training microexpressions. Motivation and Emotion, 35(2), 181-191.</h4>\n<div class="ref-line">Porges, S. W. (2011). The Polyvagal Theory. Norton.</div>\n<div class="ref-line">Rizzolatti, G. &amp; Craighero, L. (2004). The mirror-neuron system. Annual Review of Neuroscience, 27, 169-192.</div>\n<h4 class="researcher">Scherer, K. R. (2003). Vocal communication of emotion. Speech Communication, 40(1-2), 99-117.</h4>'},
'2-4':{b:'Güven',d:'Güven Denetim Aracı',c:12966,h:'<p>GÜVEN</p>\n<p>Güven Haritası, Tamir Protokolü ve Kriz Simülasyonu</p>\n<p>Ana bölümde güvenin 3 bileşenini, asimetrik doğasını ve kültürel katmanlarını gördün. Bu ek seni sahaya çıkarıyor: Güven denetimi yapacak, tamir senaryolarıyla pratik edecek ve en zoru — güvenin onarılamaz olduğu anı tanımayı öğreneceksin. Ama önce bilimi bir katman daha derinleştirelim.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">GÜVENİN NÖROBİLİMİ VE EVRİMSEL KÖKLERİ</div></div>\n<p>Oksitosin: Güven Molekülü mü, Klişe mi?</p>\n<p>Paul Zak\'ın "güven hormonu" olarak popülerleştirdiği oksitosin hikayesi karmaşık. Kosfeld ve arkadaşları (2005) Nature\'da yayımlanan çalışmada gösterdi ki intranazal oksitosin (burundan spray) güven oyunlarında para transferini artırıyor. Medya patladı: "Güven hormonu bulundu!"</p>\n<p>Gerçek daha nüanslı. De Dreu ve arkadaşları (2010) gösterdi ki oksitosin sadece "iç gruba" güveni artırıyor — dış gruba güveni azaltıyor. Yani oksitosin "güven hormonu" değil, "biz vs onlar" hormonu. Satışta ne demek? Müşteri seni "biz" grubuna aldığında güven hızla yükseliyor. "Onlar" grubunda kaldığında — ne yaparsan yap — güven sınırlı. Referansla gitmenin nörokimyasal temeli bu: Referans seni "biz" grubuna sokuyor.</p>\n<p>Bir başka komplikasyon: Zak\'ın sonraki çalışmaları gösterdi ki yüz yüze etkileşim, göz teması ve fiziksel dokunma oksitosin salgılatıyor. Online etkileşim? Çok daha az. 3. bölümde (Beden) online satışın sınırlarını gördük — nörokimyasal açıdan da bu sınır gerçek. Ekran üzerinden güven inşası biyolojik olarak daha zor.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Kosfeld, M. et al. (2005). Oxytocin increases trust in humans. Nature, 435, 673-676. | De Dreu, C. K. W. et al. (2010). The neuropeptide oxytocin regulates parochial altruism in intergroup conflict among humans. Science, 328(5984), 1408-1411. | Zak, P. J. (2012). The Moral Molecule. Dutton. Popüler ama eleştirel oku — over-simplification riski yüksek.</div>\n<p>Güven ve Risk: Nöral Denge</p>\n<p>Güven bir risk kararıdır. Müşteri sana güvendiğinde risk alıyor — paranı alıp kaçabilirsin, ürün bozuk çıkabilir, söz tutmayabilirsin. Dimoka (2010) fMRI çalışmasında gösterdi ki güven kararı sırasında caudate nucleus (ödül beklentisi) ve parahippocampal gyrus (belirsizlik değerlendirmesi) birlikte çalışıyor. Güven = ödül beklentisinin belirsizlik algısını aşması.</p>\n<p>Bu denklem satışçı için çok somut: Müşterinin "ödül beklentisini" artırmak (ürün değeri, fayda, çözüm) tek başına yetmiyor. Aynı zamanda "belirsizlik algısını" düşürmen gerekiyor. Garanti, referans, pilot uygulama, deneme süresi — bunlar belirsizlik düşürücüler. Ve güven hesabındaki yatırımlar da belirsizlik düşürücü: "Bu adam daha önce söylediğini yaptı → muhtemelen yine yapacak" = azalmış belirsizlik.</p>\n<p>Prospect theory burada da devrede: Belirsizlik altında kayıptan kaçınma daha güçlü. Yani müşteri "ya bu ürün kötü çıkarsa" korkusunu, "bu ürün harika olabilir" umudundan daha ağır tartıyor. Güven inşası temelde bu asimetriyi dengeleme çabası.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<p>Dimoka, A. (2010). What does the brain tell us about trust and distrust? MIS Quarterly, 34(2), 373-396. fMRI ve güven kararı. | Krueger, F. et al. (2007). Neural correlates of trust. PNAS, 104(50), 20084-20089. Caudate nucleus + medial PFC.</p>\n<p>Kırılmış Güvenin Psikolojisi: Lewicki ve Bunker</p>\n<h4 class="researcher">Lewicki ve Bunker (1996) güvenin 3 aşamalı gelişim modelini çizdi:</h4>\n<p>Aşama 1 — Hesap temelli güven (calculus-based): "Sana güveniyorum çünkü güvenmemek daha pahalı." En kırılgan güven türü. Alternatif çıktığında biter. Çoğu yeni satış ilişkisi burada başlıyor.</p>\n<p>Aşama 2 — Bilgi temelli güven (knowledge-based): "Sana güveniyorum çünkü seni tanıyorum, davranışlarını tahmin edebiliyorum." Zaman ve tutarlılıkla oluşuyor. Mischel\'in if-then kalıpları burada da geçerli: Müşteri senin kalıplarını öğreniyor.</p>\n<p>Aşama 3 — Özdeşleşme temelli güven (identification-based): "Sana güveniyorum çünkü değerlerimiz örtüşüyor, senin benim çıkarımı düşündüğünü biliyorum." En güçlü ve en nadir güven türü. Yıllar alır. Ve yıkıldığında en acı veren — çünkü kişisel hissedilir.</p>\n<p>Cengiz-Burak ilişkisi muhtemelen 2. aşamadaydı — belki 3\'e geçiş aşamasında. 2. aşamadan 1\'e düşmek hızlı: Tek bir ihlal "seni tanıyordum" duygusunu "yanılmışım" duygusuna çeviriyor. Ve 1. aşamaya düşen ilişkide müşteri "hesap yapıyor" — rakip daha iyi teklif verdiğinde gidiyor.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Lewicki, R. J. &amp; Bunker, B. B. (1996). Developing and maintaining trust in work relationships. In Kramer, R. M. &amp; Tyler, T. R. (Eds.), Trust in Organizations. Sage. | Lewicki, R. J., McAllister, D. J. &amp; Bies, R. J. (1998). Trust and distrust: New relationships and realities. Academy of Management Review, 23(3), 438-458.</div>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">GÜVEN DENETİM ARACI — MÜŞTERİ BAZINDA ANALİZ</div></div>\n<p>Her önemli müşteri için bu aracı kullan. Dürüstçe doldur — kendin için, müşteriye göstermek için değil.</p>\n<div class="fill-blank">Müşteri: _______________     İlişki süresi: _______________</div>\n<p>Bölüm A: 3 Bileşen Değerlendirmesi (1-10)</p>\n<p>Toplam güven skoru: ___ /30</p>\n<p>25-30: Güçlü güven — koruma modunda ol, kayıp yapma.</p>\n<p>15-24: Orta güven — aktif yatırım gerekiyor, hangi bileşen düşükse oraya odaklan.</p>\n<p>1-14: Zayıf güven — yapısal müdahale gerekiyor, belki ilişkiyi yeniden başlatmak.</p>\n<p>Bölüm B: Güven Hesabı (Son 6 Ay)</p>\n<div class="fill-blank">Net bakiye tahmini: _______________</div>\n<p>Kritik soru: Müşterinin bildiği ama senin fark etmediğin bir çekim var mı? Cengiz\'in 2 günlük gecikmesi gibi — Burak fark etmemişti, Cengiz unutmamıştı.</p>\n<p>Bölüm C: Lewicki-Bunker Aşaması</p>\n<p>Bu müşteri hangi güven aşamasında?</p>\n<p>Aşama 1 (Hesap temelli): Müşteri daha iyi teklif bulsa gider. İlişki transaksiyonel.</p>\n<p>Aşama 2 (Bilgi temelli): Müşteri beni tanıyor, davranışlarımı tahmin ediyor. Güven var ama koşullu.</p>\n<p>Aşama 3 (Özdeşleşme temelli): Müşteri benim değerlerime güveniyor. İlişki kişisel.</p>\n<p>Şu anki aşama: ___     Hedef aşama: ___     Bu geçiş için ne gerekiyor: ___</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">GÜVEN TAMİRİ — 3 SENARYO, 3 STRATEJİ</div></div>\n<p>Her senaryoyu oku, kendi tamir stratejini yaz, sonra "koçun notu"nu oku.</p>\n<p>Senaryo 1: Yetkinlik İhlali — "Yanlış Bilgi Verdin"</p>\n<p>Durum: Yazılım satışı. Müşteriye sunumda "entegrasyon 2 haftada tamamlanır" dedin. Teknik ekip başladı — 6 hafta sürdü. Müşteri (Hakan Bey) öfkeli: "Bana yanlış bilgi verdin. 2 hafta dedin, 6 hafta oldu. Biz buna göre plan yaptık, proje gecikti." Hakan Bey şimdi sana güvenmiyor — ama şirketten ayrılmıyor çünkü ürün işe yarıyor.</p>\n<div class="fill-blank">Senin tamir planın (yaz): _______________</div>\n<p>Koçun Notu — Senaryo 1:</p>\n<p>Bu bir yetkinlik ihlali — Kim\'in çerçevesinde tamir edilebilir. Ama nasıl? Sıralama önemli: (1) Özür — ama doğru özür. "Kusura bakmayın" değil, "Size yanlış bilgi verdim, bunu kabul ediyorum. Proje gecikmenizin doğrudan sebebi benim hatam." Spesifik, sahiplenilmiş, somut. (2) Açıklama — savunma değil, şeffaflık. "Teknik ekiple yeterince doğrulama yapmadan süre verdim. Bu benim süreç hatam." (3) Telafi — somut, ölçülebilir. "Bir sonraki modülün entegrasyonunu öncelikli yaptıracağım ve süreyi teknik ekiple birlikte doğrulayıp size ileteceğim." (4) Yapısal değişiklik — bir daha olmaması için. "Bundan sonra size teknik süre vermeden önce mühendislik ekibiyle yazılı onay alacağım."</p>\n<p>Neden bu sıralama? Özür olmadan açıklama savunma gibi gelir. Açıklama olmadan telafi "konuyu kapatma" gibi gelir. Yapısal değişiklik olmadan hepsi boş vaat gibi gelir.</p>\n<p>Senaryo 2: İyiniyet İhlali — "Sen Beni Düşünmüyorsun"</p>\n<p>Durum: Sigorta sektörü. 4 yıllık müşteri Elif Hanım, poliçe yenileme zamanı. Rakip firma Elif Hanım\'a daha kapsamlı bir teklif sunmuş — aynı fiyata daha geniş kapsam. Elif Hanım sana sordu: "Sen neden bunu bana hiç söylemedin? 4 yıldır aynı poliçeyi yeniliyoruz, piyasada daha iyisi varmış ve sen bana haber vermedin." Ses tonu sakin ama hayal kırıklığı belli.</p>\n<div class="fill-blank">Senin tamir planın (yaz): _______________</div>\n<p>Koçun Notu — Senaryo 2:</p>\n<p>Bu bir iyiniyet ihlali — ve yetkinlikten daha zor. Elif Hanım\'ın mesajı: "Sen benim çıkarımı düşünmüyorsun, kendi komisyonunu düşünüyorsun." Bunu söylemese bile hissediyor. Mayer\'in iyiniyet bileşeni çatladı.</p>\n<p>Tamir: (1) Elif Hanım\'ın haklı olduğunu kabul et — savunma yapma. "Haklısınız, ben sizin poliçenizi proaktif olarak gözden geçirmediydim. Bunu yapmalıydım." (2) Açıkla — ama bahane değil. "Yenileme dönemlerinde kapsamı otomatik olarak aynı tutuyordum. Bu bir ihmal." (3) Hemen değer kat — şimdi, yarın değil. "Şu anda oturup sizin ihtiyaçlarınıza göre 3 farklı seçenek hazırlayabilirim — rakibin teklifini de dahil ederek." (4) Uzun vadeli: "Bundan sonra her yenileme döneminden 2 ay önce sizin için piyasa taraması yapacağım."</p>\n<p>Kritik nüans: Elif Hanım rakibin teklifini almayabilir — ama senin tamir girişimin samimi olmalı. "Kalın lütfen" değil, "gerçekten sizin için en iyisini bulalım" — ve en iyisi rakip olsa bile bunu söylemek. Paradoks: Müşteriyi göndermeye hazır olmak güveni geri getirir. Sibel\'in Kısım 1 Bölüm 10 hikayesi.</p>\n<p>Senaryo 3: Dürüstlük İhlali — "Bana Yalan Söyledin"</p>\n<p>Durum: B2B endüstriyel satış. Müşteri (Osman Bey) senden yıllardır malzeme alıyor. Geçen ay bir parti malzemenin kalitesi düşüktü — müşteri fark etti, aradı. Sen sorunu biliyordun ama söylememiştin — "belki fark etmez" diye düşünmüştün. Osman Bey: "Sen bunu biliyordun. Ve bana söylemedin. Ben sana güveniyordum."</p>\n<div class="fill-blank">Senin tamir planın (yaz): _______________</div>\n<p>Koçun Notu — Senaryo 3:</p>\n<p>Bu en zor senaryo — dürüstlük ihlali. Kim\'in araştırması diyor ki yetkinlik ihlalinden çok daha zor tamir ediliyor. Çünkü soru artık "yapabilir mi" değil, "güvenilir mi" — ve bu bir karakter sorusu.</p>\n<p>Dürüst gerçek: Bu ilişki kurtarılamayabilir. Ve eğer kurtarılırsa, aylar-yıllar alır. İlk adımlar: (1) Tam sahiplenme — hiçbir "ama" olmadan. "Biliyordum ve söylemedim. Bu yanlıştı." (2) Neden — açıklama değil, iç gözlem. "Kendime \'belki fark etmez\' dedim. Bu bencilceydi." (3) Somut tazminat — maddi zararı karşıla, sormadan. (4) Uzun vade: Sabır. Osman Bey güvenmeye başlayana kadar her seferinde söylediğini yap. Ve bunun aylar süreceğini kabul et.</p>\n<p>Ve en önemli ders: Bu senaryoyu yaşamak istemiyorsan, kalite sorunu bildiğin an söyle. Kısa vadede zor konuşma, uzun vadede güven yatırımı. Dürüstlük bileşeni proaktif şeffaflıkla korunur, kriz yönetimiyle değil.</p>\n<div class="warn-box">⚠ UYARI: Güvenin Onarılamaz Olduğu An</div>\n<p>Her güven ihlali tamir edilemez. Eğer: (a) İhlal tekrarlandıysa — aynı hata ikinci kez, (b) ihlal kasıtlı ve sistematikse — tek seferlik değil yapısal, (c) müşteri duygusal olarak kapandıysa — artık sana "öfke" bile hissetmiyorsa, sadece kayıtsızlık — o zaman tamir muhtemelen mümkün değil. Kayıtsızlık öfkeden daha kötü bir sinyal: Öfke hâlâ duygusal yatırım, kayıtsızlık çekilme. Bunu tanı ve enerjiyi başka müşterilere yönlendir.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">MÜŞTERİNİN GÜVEN KÜLTÜRÜNÜ HARİTALA</div></div>\n<p>Her müşterinin güven dinamiği farklı. Bu harita bağlamsal güveni anlamana yardım eder.</p>\n<div class="fill-blank">Müşteri: _______________     Sektör: _______________</div>\n<p>Bu haritayı ilk görüşmeden sonra başlat, her etkileşimde güncelle. Zamanla müşterinin güven profilini öğreneceksin — DISC\'ten çok daha değerli bir bilgi.</p>\n<h4 class="section-title">İZLE VE DERİNLEŞ</h4>\n<p>Brené Brown — "The power of vulnerability" (TED, 2010, 20 dk). Savunmasızlık ve güven ilişkisi. Akademik eleştirisi var ama temel mesajı güçlü: Güven savunmasızlık gerektirir ve savunmasızlık cesaret gerektirir.</p>\n<p>Simon Sinek — "Why good leaders make you feel safe" (TED, 2014, 12 dk). Liderlik bağlamında güven — ama satış ilişkisine doğrudan uyarlanabilir. "Circle of safety" kavramı müşteri ilişkisine de uygulanabilir.</p>\n<p>Rachel Botsman — "We\'ve stopped trusting institutions and started trusting strangers" (TED, 2016, 17 dk). Dijital çağda güven mimarisinin nasıl değiştiği. Uber, Airbnb gibi platformlarda güven mekanizmaları satış ilişkisine de ışık tutuyor.</p>\n<h4 class="section-title">KAYNAKÇA</h4>\n<div class="ref-line">Colquitt, J. A., Scott, B. A. &amp; LePine, J. A. (2007). Trust, trustworthiness, and trust propensity. Journal of Applied Psychology, 92(4), 909-927.</div>\n<div class="ref-line">De Dreu, C. K. W. et al. (2010). The neuropeptide oxytocin regulates parochial altruism. Science, 328(5984), 1408-1411.</div>\n<div class="ref-line">Delhey, J. &amp; Newton, K. (2005). Predicting cross-national levels of social trust. European Sociological Review, 21(4), 311-327.</div>\n<h4 class="researcher">Dimoka, A. (2010). What does the brain tell us about trust and distrust? MIS Quarterly, 34(2), 373-396.</h4>\n<div class="ref-line">Kim, P. H., Dirks, K. T. &amp; Cooper, C. D. (2006). The repair of trust. Academy of Management Review, 31(4), 941-961.</div>\n<h4 class="researcher">Kosfeld, M. et al. (2005). Oxytocin increases trust in humans. Nature, 435, 673-676.</h4>\n<h4 class="researcher">Krueger, F. et al. (2007). Neural correlates of trust. PNAS, 104(50), 20084-20089.</h4>\n<h4 class="researcher">Lewicki, R. J. &amp; Bunker, B. B. (1996). Developing and maintaining trust. In Kramer, R. M. &amp; Tyler, T. R. (Eds.), Trust in Organizations. Sage.</h4>\n<div class="ref-line">Lewicki, R. J., McAllister, D. J. &amp; Bies, R. J. (1998). Trust and distrust: New relationships and realities. Academy of Management Review, 23(3), 438-458.</div>\n<div class="ref-line">Mayer, R. C., Davis, J. H. &amp; Schoorman, F. D. (1995). An integrative model of organizational trust. Academy of Management Review, 20(3), 709-734.</div>\n<p>World Values Survey (2017-2022). Wave 7 Results. worldvaluessurvey.org.</p>\n<h4 class="researcher">Zak, P. J. (2012). The Moral Molecule. Dutton.</h4>'},
'2-5':{b:'Kültür',d:'Kültür ve Güç Atlası',c:11644,h:'<p>BÖLGE</p>\n<p>Saha Keşif Haritası: Türkiye\'nin Satış Coğrafyası</p>\n<p>Bu ek bir rehber değil, bir keşif aracı. Ana bölümde makro çerçeveyi gördün — Hofstede, Hall, Mardin, Kağıtçıbaşı. Burada mikro düzeye iniyoruz: Türkiye\'nin farklı iş dünyası ekosistemlerinin sosyolojik haritası, patron tipolojileri, güç ritüelleri ve en önemlisi — satışçının bu haritayı kendi sahası için nasıl çizeceği. Ama önce bilimin derin katmanına.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">KÜLTÜR, GÜÇ VE TİCARET — SOSYOLOJİK DERİNLİK</div></div>\n<p>Bourdieu: Sermaye Türleri ve Satış</p>\n<p>Pierre Bourdieu\'nün sermaye teorisi Türkiye\'nin iş dünyasını anlamak için altın çerçeve. Bourdieu 3 sermaye türü tanımlıyor: Ekonomik sermaye (para, mülk), kültürel sermaye (eğitim, bilgi, beğeni, konuşma biçimi), sosyal sermaye (ilişkiler, ağlar, "kimi tanıyorsun").</p>\n<p>Türkiye\'de satışta bu 3 sermaye farklı ağırlıklarda çalışıyor. İstanbul finans sektöründe kültürel sermaye ağır basıyor — doğru üniversite, doğru dil, doğru giyim kodu. Anadolu OSB\'lerinde sosyal sermaye belirleyici — "kimin adamısın", "kim referans verdi", "hangi odaya üyesin". Her yerde ekonomik sermaye temel — ama tek başına yetmiyor.</p>\n<p>Satışçı olarak sermaye türlerini oku: Müşterin hangi sermayeye değer veriyor? Senden hangi sermayeyi görmeyi bekliyor? Ve senin hangi sermaye türün güçlü, hangisi zayıf? Kayseri\'deki sanayi odasında sosyal sermayesi olmayan bir satışçının en iyi sunumu boşa gidebilir. İstanbul Maslak\'taki ofiste kültürel sermayesi düşük bir satışçı ciddiye alınmayabilir. Adil mi? Hayır. Gerçek mi? Evet.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<p>Bourdieu, P. (1986). The Forms of Capital. In Richardson, J. (Ed.), Handbook of Theory and Research for the Sociology of Education. Greenwood. | Bourdieu, P. (1984). Distinction: A Social Critique of the Judgement of Taste. Harvard UP. Habitus: Sınıfsal konumun beden dilini, konuşma biçimini, beğeniyi nasıl şekillendirdiği.</p>\n<p>Granovetter: Zayıf Bağların Gücü</p>\n<p>Mark Granovetter\'in 1973 çalışması sosyolojinin en ünlü makalelerinden biri: "The Strength of Weak Ties." Temel bulgu: İnsanlar iş bulurken, bilgiye ulaşırken en çok yakın arkadaşlarından değil, "zayıf bağlardan" — tanıdık ama yakın olmayan kişilerden — faydalanıyor. Çünkü yakın çevren senin zaten bildiğin bilgiyi biliyor. Yeni bilgi farklı ağlardan geliyor.</p>\n<p>Türkiye\'nin iş ağları bu teoriyi güzel yansıtıyor: OSB\'ler, sanayi odaları, sektörel dernekler, hemşehri ağları — bunlar "zayıf bağ" platformları. Patron A seni patrona B\'ye yönlendiriyor, patron B patron C\'ye. Referans zinciri. Ve her halka zayıf bağ — ama o zayıf bağ güçlü bir güven transferi taşıyor (4. bölüm).</p>\n<div class="insight-box">💡 Satışçı için pratik: Sadece müşterinle değil, müşterinin ağıyla ilişki kur. OSB\'de bir patron seni 3 patrona daha bağlayabilir. Sanayi odasında bir akşam yemeği 10 müşteri adayı üretebilir. Ama dikkat: Bu ağlarda "satışçı" kimliği değil, "sektör insanı" kimliği geçer. Gelip satış yapan adam değil, sektörü bilen ve değer katan insan olarak konumlan.</div>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Granovetter, M. S. (1973). The strength of weak ties. American Journal of Sociology, 78(6), 1360-1380. | Granovetter, M. (1985). Economic action and social structure: The problem of embeddedness. American Journal of Sociology, 91(3), 481-510. Ekonomik eylem sosyal yapıya gömülüdür — Türkiye\'de özellikle geçerli.</div>\n<p>Putnam: Sosyal Sermaye ve Güven Çölleri</p>\n<div class="ref-line">Robert Putnam\'ın "Bowling Alone" (2000) tezi: Sosyal sermaye — güven, ağlar, normlar — azalıyor. ABD için yazıldı ama Türkiye\'de farklı bir versiyonu yaşanıyor.</div>\n<p>Türkiye\'de geleneksel sosyal sermaye (mahalle, akrabalık, hemşehrilik ağları) hâlâ güçlü — özellikle Anadolu\'da. Ama modern sosyal sermaye (kurumsal güven, sivil toplum, şeffaf iş ilişkileri) zayıf. Sonuç: İş dünyasında güven kişisel ağlarla taşınıyor, kurumsal mekanizmalarla değil. Bu satışçıyı kişisel ilişkiye bağımlı kılıyor — ve kişisel ilişki kırılgan.</p>\n<p>Kentleşme bu dengeyi sarsıyor: İstanbul\'a göç eden patron hemşehri ağını kısmen kaybediyor, yeni ağlar kuruyor ama bunlar daha gevşek. "Güven çölü" ortaya çıkabiliyor — ve bu çölde satışçı güveni sıfırdan inşa etmek zorunda. 4. bölümdeki (Güven) Lewicki-Bunker\'ın hesap temelli güveni burada başlangıç noktası.</p>\n<div class="bilim-box"><div class="bilim-header">📚 BİLİM KUTUSU</div><div class="bilim-content">\n<div class="ref-line">Putnam, R. D. (2000). Bowling Alone: The Collapse and Revival of American Community. Simon &amp; Schuster. | Kalaycıoğlu, E. (2002). Civil Society in Turkey. In Sajoo, A. B. (Ed.), Civil Society in the Muslim World. IB Tauris. Türkiye\'de sivil toplum ve sosyal sermaye.</div>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">5 EKOSİSTEM, 5 DÜNYA</div></div>\n<p>Aşağıdaki 5 ekosistem Türkiye\'nin iş dünyasını anlamak için bir çerçeve. Stereotip değil, eğilim haritası. Her ekosistemde istisnalar var — ve istisnalar en değerli müşteriler olabilir.</p>\n<p>Ekosistem 1: İstanbul Kurumsal</p>\n<p>Profil: Çok uluslu şirketler, holdingler, büyük yerli kurumlar. Levent, Maslak, Ataşehir. Karar yapısı: Komite, süreç, onay katmanları. İletişim: Düşük bağlam, doğrudan, veri odaklı. Güven temeli: Kurumsal itibar, referans müşteriler, case study. Zaman algısı: Hızlı — ama bürokrasi yavaşlatır. Ritüeller: Profesyonel randevu sistemi, ajanda belli, küçük konuşma kısa. Tehlike: "Sadece fiyata bakıyorlar" sanmak — aslında değer arıyorlar ama bunu spreadsheet diliyle ifade ediyorlar.</p>\n<p>Ekosistem 2: Anadolu Aile Şirketi</p>\n<p>Profil: 2. veya 3. kuşak aile şirketleri, OSB\'ler, geleneksel sektörler. Karar yapısı: Patron.
