ahı düşük. "Paramı koruyun" diyor. Sen ne sunarsın? Getiri vaadi mi, güvenlik mi? Nörofinans perspektifi: Bu müşterinin insula\'sı baskın — kayıp korkusu yüksek. Ödül merkezi ikincil. Strateji: Güvenlik çerçevesi, düşük riskli enstrümanlar, şeffaf maliyet.</p>\n<p>Müşteri B: 32 yaşında teknoloji girişimcisi, nakit akışı düzensiz, risk iştahı yüksek. "Parama en iyi getiriyi verin" diyor. Nörofinans: Nucleus accumbens baskın. Ama düzensiz nakit akışı = likidite riski. Strateji: Getiri fırsatı göster AMA likidite uyarısı yap — müşterinin mPFC\'sine alan aç.</p>\n<p>Müşteri C: 45 yaşında aile şirketi patronu, kararları ailenin etkisinde. "Oğlum kripto istiyor, ben bilmiyorum" diyor. Nörofinans + kültürel dinamik: Patron kendi insula\'sıyla (korku) oğlunun nucleus accumbens\'ı (heyecan) arasında sıkışmış. Strateji: Aile dinamiğini anla, her ikisine de hitap eden dengeli portföy öner.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">TAHSİLAT DİYALOG ATÖLYESİ</div></div>\n<p>3 tahsilat senaryosu, 3 diyalog pratiği. Her senaryoda yanlış ve doğru yaklaşım:</p>\n<p>Senaryo 1 — Utanan müşteri: Yanlış: "Ödemeniz 45 gün gecikti." Doğru: "Merhaba, nasılsınız? Bir durumunuz olduğunu tahmin ediyorum, birlikte bakalım." Neden: Utanma = sosyal acı (Eisenberger). Yargılamak acıyı artırır, empati azaltır.</p>\n<p>Senaryo 2 — Kızgın müşteri: Yanlış: "Sakin olun lütfen." (Baskılamak reaktans yaratır — Brehm.) Doğru: "Haklısınız, bu durum sinir bozucu. Birlikte bir çözüm bulalım." Neden: Kızgınlığı kabul et, sonra yönlendir — MI tekniği.</p>\n<p>Senaryo 3 — Çaresiz müşteri: Yanlış: "Ödeme yapmanız gerekiyor." (Zaten biliyor, söylemek işe yaramaz.) Doğru: "Durumunuzu anlatalım, yapılandırma seçeneklerimiz var." Neden: Çaresizlik = kontrol kaybı (Seligman). Seçenek sunmak kontrol hissi verir.</p>\n<p>Her senaryo aynı ilkeye dayanıyor: Müşterinin duygusal durumunu oku, ona göre ton seç. Porges\'in polivagal teorisi rehber: Ventral vagal aktivasyonu (güvenli ton) = müşteri açılır, konuşur, çözüme katılır. Dorsal vagal (tehdit tonu) = müşteri kapanır, kaçar, donar. İlk 10 saniyede hangi vagal duruma soktuğun, görüşmenin tamamını belirler.</p>\n<p>Tahsilat diyaloğunun en zor kısmı: Kendi duygularını yönetmek. Tahsilatçı da stres altında — hedef baskısı, müşterinin kızgınlığı, yönetici baskısı. Arnsten\'in PFC kapanımı tahsilatçıda da geçerli: Stres altında empati kapasitesi düşer, otomatik tepki (tehdit, baskı) artar. Çözüm: Her görüşme öncesi 3 nefes — Porges\'in vagal fren tekniği. 10 saniye bile yeterli.</p>\n<p>Tahsilat sonrası ilişki yönetimi bankacılığın en ihmal edilen alanı. Müşteri borcu ödedi — şimdi ne? Çoğu bankada hiçbir şey. Müşteri tekrar \'normal\' portföye döner, sanki hiçbir şey olmamış gibi. Ama müşteri unutmaz: Zor anında nasıl muamele gördüğünü hatırlar. Gottman\'ın 5:1 oranı burada rehber: Tahsilat 1 olumsuz deneyim. Sonrasında 5 olumlu temas gerekir — proaktif bilgilendirme, küçük jest, doğum günü mesajı. Banka bu 5 olumluyu sistematik yaparsa, tahsilat geçirmiş müşteri en sadık müşteri olabilir — çünkü zor anında yanında olunduğunu bilir.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">4 HAFTALIK FİNANSAL EMPATİ ANTRENMAN</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Nörofinans Gözlem</div></div>\n<p>Bu hafta 3 müşteri görüşmesinde gözlem yap: Müşterinin ödül merkezi mi aktif (heyecanlı, getiri odaklı) yoksa korku merkezi mi (tedirgin, risk odaklı)? Sinyalleri not et: Ses tonu, beden dili, soruların içeriği.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Diyalog Pratiği</div></div>\n<p>Tahsilat görüşmesi yapıyorsan: MI tekniğini dene. Yapmıyorsan: Zor bir müşteri görüşmesinde empati + çerçeveleme pratiği yap.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Portföy Segmentasyonu</div></div>\n<p>Müşterilerini risk profiline göre segmente et. Her segment için iletişim stratejisi belirle.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Retrospektif</div></div>\n<p>3 haftanın verisini topla. Hangi yaklaşım işe yaradı? Nörofinans gözlemlerin doğru muydu? Tahsilat diyaloğu pratiği fark yarattı mı?</p>\n<p>Kaynakça</p>\n<h4 class="researcher">Knutson, B. et al. (2007). Neural predictors of purchases. Neuron, 53(1), 147–156.</h4>\n<h4 class="researcher">Kuhnen, C. M. &amp; Knutson, B. (2005). The neural basis of financial risk taking. Neuron, 47(5), 763–770.</h4>\n<div class="ref-line">Loewenstein, G. et al. (2001). Risk as feelings. Psychological Bulletin, 127(2), 267–286.</div>\n<div class="ref-line">Porges, S. W. (2011). The Polyvagal Theory. W. W. Norton.</div>'},
'4-8':{b:'Kriz',d:'Antifragile Profil',c:5284,h:'<p>KRİZ</p>\n<p>Kriz Protokolü: Antifragile Profil, Sektörel Senaryolar, Dayanıklılık Antrenmanı</p>\n<p>Ana bölümde kriz döneminde satışçının, müşterinin ve sektörün psikolojisini gördün. Bu ek farklı: Burada kriz bilimini derinleştirecek, antifragile profil testi yapacak, 3 sektörel kriz senaryosu simüle edecek ve 4 haftalık dayanıklılık antrenmanına gireceksin.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">KRİZ BİLİMİ — KIRILGANLIKTAN ANTİFRAGİLE\'A</div></div>\n<p>Bonanno\'nun (2004) dayanıklılık araştırması 4 yol gösteriyor: Kronik bozulma (yüzde 10-15) — kriz kalıcı hasar verir. Gecikmiş toparlanma (yüzde 15-25) — kriz vurur, aylar sonra toparlanma. Dayanıklılık (yüzde 35-55) — kriz vurur, hızla normale döner. İyileşme üstü gelişim (yüzde 10-15) — kriz sonrası öncekinden güçlü. Taleb\'in antifragile\'ı bu 4. yol: Krizden güçlenerek çıkmak.</p>\n<p>Satışçıya uyarlama: Pandemi sonrası satışçılar bu 4 yoldan birine düştü. Kronik bozulma: Motivasyon kaybı, sektör değiştirme, tükenmişlik. Gecikmiş toparlanma: 6-12 ay zorluk, sonra eski seviyeye dönüş. Dayanıklılık: Hızla adapte, yeni kanallara geçiş. Antifragile: Dijital beceri, yeni pazar, genişlemiş araç kutusu — pandemi öncesinden güçlü.</p>\n<p>Sen hangi yoldasın? Antifragile olmak bir kişilik özelliği değil — bir strateji. Çeşitlendirme (tek kanala, tek sektöre, tek müşteriye bağımlı olmamak), öğrenme çevikliği (yeni araçları hızla benimsemek), ve psikolojik esneklik (stres altında PFC\'yi açık tutabilmek). Her biri geliştirilebilir.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">ANTİFRAGİLE PROFİL TESTİ</div></div>\n<p>5 boyutta kendini 1-5 arası puanla:</p>\n<p>Kanal çeşitliliği (1-5): Tek kanala mı bağımlısın yoksa 3+ kanal mı kullanıyorsun? Müşteri çeşitliliği (1-5): Gelirin tek müşteriye mi bağlı yoksa dağıtılmış mı? Beceri esnekliği (1-5): Yeni araçları ne kadar hızlı öğrenirsin? Psikolojik esneklik (1-5): Stres altında stratejik düşünebilir misin? Finansal tampon (1-5): Kriz döneminde ne kadar süre dayanabilirsin?</p>\n<div class="score-box"><strong>📊 Puanlama:</strong>  5-12 = Kırılgan. Kriz seni vuracak ve toparlanma uzun sürecek. Acil önlem: En düşük puanlı boyutta bu hafta 1 adım at. 13-17 = Dayanıklı. Kriz vurur ama toparlanırsın. Gelişim alanı: Çeşitlendirme ve beceri esnekliği. 18-21 = Güçlü dayanıklı. Kriz seni çok etkilemez. Hedef: Antifragile\'a geçiş. 22-25 = Antifragile. Krizden güçlenerek çıkarsın. Model: Bu profili koru ve ekibinle paylaş.</div>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">SEKTÖREL KRİZ SENARYOLARI</div></div>\n<p>Senaryo 1: Gayrimenkul — Faiz Şoku</p>\n<p>Merkez bankası faizi 5 puan artırdı. Konut kredisi maliyeti 2 katına çıktı. Showroom ziyaretleri yüzde 60 düştü. Sen Aslı\'sın. Ne yaparsın? Pipeline\'daki mevcut müşterilerle iletişim stratejisi, fiyat paketleme, dijital kanal güçlendirme, referans programı — her adımı planla.</p>\n<p>Senaryo 2: Bankacılık — Mevduat Kaçışı</p>\n<p>Ekonomik belirsizlik arttı, müşteriler mevduatını çekiyor. Portföyünden 2 haftada yüzde 15 çıkış oldu. Sen Taner\'sin. Ne yaparsın? Proaktif temas mı, bekle-gör mü? Hangi müşteriye önce ulaşırsın? Risk iletişimi nasıl yaparsın?</p>\n<p>Senaryo 3: SaaS — Bütçe Dondurma</p>\n<p>En büyük müşterin bütçe dondurma ilan etti. Pipeline\'daki 3 fırsat askıya alındı. Sen Berna\'sın. Ne yaparsın? ROI mesajı, maliyet düşürme çerçevesi, esnek ödeme planı, alternatif paketler — hangi strateji hangi müşteriye?</p>\n<p>Her senaryo farklı bir kriz türünü simüle ediyor — ama ortak bir ilke var: Kriz döneminde yapılacak en kötü şey hiçbir şey yapmamak. Donma (Seligman) pipeline\'ı öldürür. Panik satışı (Thaler) marjı öldürür. Agresif satış (Brehm) ilişkiyi öldürür. Doğru yol: Stratejik sabır — bilgilendirilmiş, ölçülü, empati bazlı eylem.</p>\n<p>Kriz döneminde satışçının en değerli kaynağı güven sermayesi. Kim-Dirks\'in güven modelini (Kısım 2 Bölüm 4) kriz bağlamında düşün: Kriz öncesi inşa ettiğin güven, krizde para birimi olarak çalışır. Taner\'ın tahsilat görüşmelerinde MI kullanabilmesinin nedeni: Müşteri Taner\'a zaten güveniyordu. Güvensiz ilişkide MI bile işe yaramaz — müşteri \'bunlar lafta kalır\' düşünür. Kriz hazırlığının en önemli boyutu: Kriz gelmeden güven inşa etmek.</p>\n<p>Antifragile olmak bireysel değil, sistematik de olabilir: Şirket düzeyinde antifragile satış organizasyonu nasıl kurulur? Çeşitlendirilmiş müşteri portföyü (tek sektöre bağımlılık yok), çoklu kanal yetkinliği (dijital + fiziksel), esnek fiyat stratejisi (kriz fiyat paketleri hazır), ve psikolojik destek sistemi (satışçı tükenmişliğini izleme). Bu konular Kısım 5\'te daha derinleşecek — ama bireysel hazırlık şimdi başlamalı.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">4 HAFTALIK DAYANIKLILIK ANTRENMAN</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Kriz Stres Testi</div></div>\n<p>Antifragile profil testini doldur. En zayıf boyutunu belirle. Bu hafta o boyutta 1 somut adım at.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Senaryo Planlama</div></div>\n<p>Sektörüne en muhtemel 1 kriz senaryosu yaz. O senaryoda ne yaparsın? Adım adım plan oluştur.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Psikolojik Esneklik</div></div>\n<p>Bu hafta stresli bir durumda PFC açık tutma pratiği yap: 3. şahıs mesafe tekniği (Kross), nefes egzersizi, 5 saniyelik duraklama — hangisi sana uyar?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Retrospektif</div></div>\n<p>3 haftanın deneyimini değerlendir. Kriz hazırlığın ne kadar iyileşti? Hangi boyut hâlâ zayıf?</p>\n<p>Kaynakça</p>\n<h4 class="researcher">Bonanno, G. A. (2004). Loss, trauma, and human resilience. American Psychologist, 59(1), 20–28.</h4>\n<h4 class="researcher">Masten, A. S. (2001). Ordinary magic. American Psychologist, 56(3), 227–238.</h4>\n<h4 class="researcher">Taleb, N. N. (2012). Antifragile. Random House.</h4>\n<h4 class="researcher">Tedeschi, R. G. &amp; Calhoun, L. G. (2004). Posttraumatic growth. Psychological Inquiry, 15(1), 1–18.</h4>'},
'4-9':{b:'Dijital Saha',d:'Omnichannel Strateji',c:5477,h:'<h4 class="section-title">DİJİTAL SAHA</h4>\n<p>Dijital Saha Kontrol Listesi: Bilişsel Yük, Platform Şablonları, Omnichannel Haritası</p>\n<p>Ana bölümde dijital ilk izlenimi, social commerce\'i, omnichannel stratejisini ve AI çağında satışçı rolünü gördün. Bu ek farklı: Burada bilişsel yük teorisini inceleyecek, platform bazlı takip şablonları oluşturacak, omnichannel haritası çizecek ve 4 haftalık dijital saha antrenmanına gireceksin.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">BİLİŞSEL YÜK VE DİJİTAL SATIŞ</div></div>\n<p>Sweller\'ın bilişsel yük teorisi (1988) dijital satışta hayati: İnsan çalışan belleği sınırlı — aynı anda 3-5 bilgi parçasını işleyebilir. Dijital ortamda bilgi bombardımanı bilişsel yükü artırır — karar kalitesi düşer. Miller\'ın 7±2 kuralı dijitalde 3±1\'e düşüyor: Ekranda dikkat süresi kısalır, rakip 1 tık uzakta.</p>\n<p>Pratik sonuç: E-postada 3 ana mesaj, LinkedIn mesajında 1 teklif, WhatsApp\'ta 2 cümle. Daha fazlası okunmaz — bilişsel yük taşar. Berna\'nın 40 sayfalık karşılaştırma dosyası bilişsel yükün fiziksel versiyonuydu — dijitalde daha da hızlı taşar.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">PLATFORM BAZLI TAKİP ŞABLONLARI</div></div>\n<p>LinkedIn şablonu: Bağlantı isteği: 1 cümle kişiselleştirme + 1 cümle değer. Takip mesajı: 1 sektörel içgörü paylaşımı + 1 soru. İçerik paylaşımı: Haftada 1-2, sektörel değer, kişisel görüş. Kural: Asla ilk mesajda satış teklifi.</p>\n<p>WhatsApp şablonu: İlk temas: Kısa, kişisel, izin bazlı. Takip: Değer bazlı — görsel, video, kısa bilgi. Kural: Grup mesajı = spam. Her temas bireysel. Sesli mesaj: Kısa (30 saniye max), profesyonel ton. Video mesaj: Showroom, ürün demo — güçlü ama aşırı kullanma.</p>\n<p>E-posta şablonu: Konu satırı: 5-7 kelime, merak uyandıran. Gövde: 3 paragraf max — sorun, çözüm, sonraki adım. CTA: 1 tane, net. Kural: Ek dosya ilk e-postada gönderme — ilişki kurmadan detay boğar.</p>\n<p>Video görüşme şablonu: İlk 30 saniye: Enerji, göz kontağı, gülümseme — Bailenson\'un nonverbal overload araştırması: Ekranda yüz çok büyük, beden dili kısıtlı. Sunum: Ekran paylaşımı 10 dakikayı geçmesin. Etkileşim: Her 5 dakikada soru sor — dijital dikkat süresi kısa.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">OMNICHANNEL MÜŞTERİ HARİTASI</div></div>\n<p>Her müşteri için omnichannel haritası çiz: Farkındalık kanalı (müşteri seni ilk nerede gördü?), araştırma kanalı (müşteri seni nerede araştırdı?), ilk temas kanalı (ilk konuşma nerede oldu?), takip kanalı (devam eden iletişim nerede?), karar kanalı (kapanış nerede gerçekleşti?).</p>\n<p>Mert\'in 3 şehri bu haritanın canlı örneği: Levent müşterisi LinkedIn\'de fark etti → web sitesini araştırdı → e-postayla ilk temas → video demo → yüz yüze kapanış. Kayseri müşterisi referansla duydu → telefon → yüz yüze çay → yüz yüze kapanış. Trabzon bayisi saha ziyaretinde tanıştı → telefon takip → yüz yüze haftalık → yüz yüze sipariş.</p>\n<p>Kendi müşterilerinde bu haritayı çıkar: Hangi kanalda güçlüsün? Hangi geçiş noktasında müşteri kaybediyorsun? Farkındalıktan kapanışa kadar kopukluk var mı?</p>\n<p>AI araçlarının dijital sahaya etkisi hızla artıyor. ChatGPT ve benzeri araçlarla e-posta kişiselleştirme, müşteri araştırması, içerik üretimi hızlanıyor. Ama AI aracı, stratejiyi değiştirmez: AI ile yazılmış ama değer katmayan e-posta hâlâ spam. AI\'ın doğru kullanımı: Araştırma hızlandırma (müşteri hakkında 5 dakikada bilgi toplama), içerik kişiselleştirme (her müşteriye özel mesaj), takip optimizasyonu (en iyi zamanlama ve kanal önerisi). AI\'ın yanlış kullanımı: Toplu otomatik mesaj gönderme (dijital spam\'in otomatik hali), kişiselleştirme olmadan şablon tekrarı, AI çıktısını okumadan gönderme.</p>\n<p>Video içerik dijital sahada giderek daha önemli. Bailenson\'un Zoom yorgunluğu araştırması canlı video için geçerli — ama kayıtlı kısa videolar farklı dinamikte. 60 saniyelik ürün demo videosu, 3 sayfalık e-postadan daha etkili — çünkü bilişsel yük düşük, görsel işleme hızlı. Aslı\'nın WhatsApp video mesajı deneyi (gün batımında daire) bunun canlı kanıtı. Platform bazlı video stratejisi: LinkedIn\'de 1-2 dakikalık sektörel içgörü videoları. WhatsApp\'ta 30 saniyelik kişisel mesaj. Instagram\'da 15-30 saniyelik ürün/deneyim hikayeleri. Her platformun video dili farklı.</p>\n<p>Dijital sahada en büyük tuzak: Metrik yanılsaması. Dijital araçlar her şeyi ölçüyor — açılma oranı, tıklama oranı, etkileşim, izlenme. Ama metrikler sonuç değil, sinyal. 1000 LinkedIn görüntülenme = sıfır satış olabilir. 10 görüntülenme = 1 sıcak fırsat olabilir. Goodhart yasasının dijital versiyonu: Metrik hedef olunca anlam kaybeder. \'Haftada 3 post\' hedefi kaliteyi düşürür — tıpkı Gülşen\'in \'247 arama\' hedefinin prospecting kalitesini düşürmesi gibi. Doğru ölçüt: Dijital temas → anlamlı sohbet → pipeline\'a giriş. Aradaki metrikleri izle ama hedef yapma.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">4 HAFTALIK DİJİTAL SAHA ANTRENMAN</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Dijital Varlık Taraması</div></div>\n<p>LinkedIn profilini güncelle, Google\'da kendini ara, WhatsApp iş profilini kontrol et. Dijital ilk izlenimin ne?</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">İçerik Üretimi</div></div>\n<p>Haftada 1 LinkedIn içeriği paylaş: Sektörel içgörü, müşteri başarı hikayesi, veya kısa ipucu. Bilişsel yük kuralı: Kısa, net, 1 mesaj.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Platform Şablonları Uygulama</div></div>\n<p>Her platformda en az 3 temas yap — şablonları kullanarak. Sonuçları karşılaştır.</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Omnichannel Haritası</div></div>\n<p>En aktif 5 müşterin için omnichannel haritası çiz. Kopukluk noktalarını tespit et. 1 kopukluğu düzelt.</p>\n<p>Kaynakça</p>\n<h4 class="researcher">Bailenson, J. N. (2021). Nonverbal overload. Technology, Mind, and Behavior, 2(1).</h4>\n<div class="ref-line">Miller, G. A. (1956). The magical number seven. Psychological Review, 63(2), 81–97.</div>\n<div class="ref-line">Sweller, J. (1988). Cognitive load during problem solving. Cognitive Science, 12(2), 257–285.</div>'},
'4-10':{b:'Entegrasyon',d:'40 Bölüm Kontrol Listesi',c:5410,h:'<h4 class="section-title">ENTEGRASYON</h4>\n<p>Entegre Plan: Deneyimsel Öğrenme, Kontrol Listesi, Skor Kartı, Günlük</p>\n<p>Ana bölümde Taner ve Aslı\'nın 6 aylık tam yolculuklarını, tüm karakterlerin son durumunu ve 90 günlük saha planını gördün. Bu ek farklı: Burada Kolb\'un deneyimsel öğrenme döngüsünü inceleyecek, 40 bölümün tek sayfa kontrol listesini oluşturacak, kişisel satış skor kartı kuracak ve 12 haftalık entegrasyon günlüğüne başlayacaksın.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">DENEYİMSEL ÖĞRENME — BİLMEKTEN YAPMAYA</div></div>\n<p>David Kolb\'un deneyimsel öğrenme döngüsü (1984) 4 aşamadan oluşur: Somut deneyim (yap), yansıtıcı gözlem (düşün), soyut kavramsallaştırma (anla), aktif deneme (tekrar yap). Bu kitap sana 3 aşamayı verdi: Bilim kutuları = soyut kavramsallaştırma. Vakalar = somut deneyim (başkasının). Antrenman programları = aktif deneme. Eksik olan: Senin kendi somut deneyimin ve yansıtıcı gözlemin.</p>\n<p>Okumak Kolb döngüsünün sadece 1 aşaması. Kalıcı öğrenme için 4 aşamanın tamamı gerekiyor. Bu modül senin döngünü tamamlıyor: Yap (antrenman), düşün (günlük), anla (bilimle bağla), tekrar yap (kalibre et).</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">40 BÖLÜMÜN TEK SAYFA KONTROL LİSTESİ</div></div>\n<p>Kısım 1 — İç Oyun: Kör noktalarımı biliyor muyum? Motivasyon kaynağım ne? Stres altında PFC\'mi açık tutabilir miyim? Tükenmişlik sinyallerimi tanır mıyım? Etik çizgim net mi?</p>\n<p>Kısım 2 — Müşteriyi Anlamak: Müşterinin 3 katmanlı ihtiyacını keşfedebilir miyim? Beden dilini okuyabilir miyim? Güven modelinin 3 bileşenini yönetebilir miyim? Sessizliği yorumlayabilir miyim? Kültürel kodları okuyabilir miyim?</p>\n<p>Kısım 3 — İkna Mühendisliği: Cialdini\'nin 6 ilkesini bağlama uygun kullanabilir miyim? Sunum mimarisini müşteriye göre adapte edebilir miyim? Fiyat çerçevesini yönetebilir miyim? İtirazı dansa çevirebilir miyim? Etik sınırı koruyabilir miyim?</p>\n<p>Kısım 4 — Saha Stratejileri: Pipeline\'ımı 4 soru testiyle temiz tutabiliyor muyum? Takipte değer bazlı temas yapabiliyor muyum? Key account\'larımda çoklu temas noktası var mı? Rakipten bahsetmeden konumlanabiliyor muyum? Kriz döneminde stratejik sabır gösterebiliyor muyum? Dijital ve fiziksel kanalları entegre edebiliyor muyum?</p>\n<p>Bu listeyi yazdır, masana as. Her hafta 1 maddeye odaklan.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">KİŞİSEL SATIŞ SKOR KARTI</div></div>\n<p>Her ay kendini 5 boyutta puanla (1-10):</p>\n<p>Pipeline sağlığı: Gerçek fırsat oranı yüzde kaç? Hayalet oranı düştü mü? Takip kalitesi: Değer bazlı temas oranı ne? Ghost müşteri sayısı ne? Key account derinliği: İlişki envanteri ortalaması ne? Yeni temas noktası kuruldu mu? Rekabet bilinci: Rakibi müşterinin gözünden tanıyor musun? Konumlanman net mi? Dijital entegrasyon: Her kanalda aktif misin? Omnichannel tutarlılığın var mı?</p>\n<p>Her ayın skor kartını bir önceki ayla karşılaştır. Trend önemli — tek bir ayın puanı değil. Üst üste 3 ay düşen boyut = alarm.</p>\n<p>Skor kartını tek başına kullanmak faydalı — ama bir koçla veya bir akranla birlikte kullanmak 3 kat daha etkili. Neden? Pronin\'in kör noktası (Kısım 1 Bölüm 1): Kendi biaslarını görmek zor. Bir başkası senin pipeline sağlığını, takip kaliteni, key account derinliğini daha nesnel değerlendirebilir. Pratik: Her ay 1 meslektaşınla skor kartlarını karşılıklı değerlendirin. Birbirinize dürüst geri bildirim verin. Bu \'peer coaching\' formatı şirketlerde giderek yaygınlaşıyor — ve Kolb döngüsünün yansıtıcı gözlem aşamasını güçlendiriyor.</p>\n<p>Skor kartının bir de \'erken uyarı\' fonksiyonu var: Herhangi bir boyut üst üste 3 ay düşüyorsa — bu alarm. Pipeline sağlığı düşüyorsa prospecting\'e dön (Bölüm 1). Takip kalitesi düşüyorsa değer bazlı temas pratiği yap (Bölüm 4). Key account derinliği düşüyorsa ilişki envanterini güncelle (Bölüm 5). Dijital entegrasyon düşüyorsa platform şablonlarına geri dön (Bölüm 9). Her düşüş belirli bir bölümün antrenman programına yönlendirir — kitap bir referans kaynağı olarak yaşamaya devam eder.</p>\n<p>Son olarak: Bu skor kartı performans değerlendirmesi değil — öz farkındalık aracı. Yöneticine göstermek zorunda değilsin. Amaç: Kendi gelişim trendini görmek, güçlü ve zayıf yanlarını bilmek, bilinçli pratik alanlarını belirlemek. Ericsson\'un bilinçli pratik araştırması açık: Uzmanlar daha çok çalışmaz — daha bilinçli çalışır. Skor kartı bilinçli çalışmanın haritası.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">12 HAFTALIK ENTEGRASYON GÜNLÜĞÜ</div></div>\n<p>90 günlük saha planının günlük versiyonu. Her gün 5 dakika — sabah veya akşam:</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 1-4 (Teşhis dönemi)</div><div class="hafta-desc">Her gün 1 soru: Bugün hangi aracı kullandım? Hangisini kullanamadım? Neden? Hafta sonu: Haftanın en büyük öğrenme anı ne? Nerede eski reflekse döndüm?</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 5-8 (Uygulama dönemi)</div><div class="hafta-desc">Her gün 1 soru: Bugün 1 yeni şey denedim mi? Müşteri tepkisi ne oldu? Hafta sonu: Hangi yeni uygulama kalıcı olacak? Hangisi işe yaramadı?</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 9-12 (Kalibrasyon dönemi)</div><div class="hafta-desc">Her gün 1 soru: Bugün müşterime gerçekten değer kattım mı? Hafta sonu: Skor kartımda trend ne yönde? 12. haftanın sonunda: Büyük retrospektif. 12 haftalık günlüğü baştan oku. Ne değişti? Ne değişmedi? Sonraki 12 haftanın odağı ne?</div></div>\n<p>Bu günlük sıkıcı görünebilir — ama Kolb\'un döngüsündeki yansıtıcı gözlem aşaması budur. Ericsson\'un bilinçli pratik araştırmasının özü: Uzmanlar sadece çok çalışmaz — çalışmalarını bilinçli olarak değerlendirir. 5 dakikalık günlük, senin bilinçli değerlendirme aracın.</p>\n<p>Kaynakça</p>\n<div class="ref-line">Ericsson, K. A. et al. (1993). The role of deliberate practice. Psychological Review, 100(3), 363–406.</div>\n<h4 class="researcher">Kolb, D. A. (1984). Experiential Learning. Prentice-Hall.</h4>\n<h4 class="researcher">Schön, D. A. (1983). The Reflective Practitioner. Basic Books.</h4>'},
'5-1':{b:'Satışçı Seçimi',d:'Mülakat Bias Envanteri',c:8851,h:'<h4 class="section-title">SATIŞÇI SEÇİMİ</h4>\n<p>Seçim Laboratuvarı: Bias Ölçümü, Sektörel Profil Matrisi, Mülakat Şablonu</p>\n<p>Ana bölümde Kerem\'in 4 dakikalık mülakat kararını, 5 mülakat biasını, "iyi satışçı" profili mitini, motivasyon DNA\'sını ve yapılandırılmış mülakat temellerini gördün. Bu ek farklı: Burada mülakat biasını ölçecek bir envanter dolduracak, sektörel profil matrisini kendi rolüne göre oluşturacak, yapılandırılmış mülakat şablonunu adım adım inşa edecek ve 3 gerçek işe alım vakasını otopsi edeceksin.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">MÜLAKAT BİAS ENVANTERİ — KENDİNİ TANI</div></div>\n<p>Ana bölümde 5 hayaleti gördük: Benzerlik biası, halo etkisi, doğrulama biası, kontrast etkisi, ilk izlenim çıpası. Şimdi bunları ölçeceğiz — çünkü farkındalık değişimin ilk adımı. Pronin\'in kör nokta araştırmasını hatırla: Kendi biaslarımızı görmek en zor iş. Bu envanter aynayı tutuyor.</p>\n<p>Aşağıdaki 15 ifadeyi 1-5 arası puanla (1: Hiç katılmıyorum, 5: Tamamen katılıyorum). Dürüstlük kritik — kimse görmeyecek.</p>\n<p>Benzerlik Biası (3 soru):</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Mülakatta kendime benzeyen adaylara doğal olarak daha sıcak yaklaşıyorum.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Aday benimle aynı üniversiteden veya benzer sektörden geliyorsa olumlu bir önyargım oluyor.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Ekibime aldığım son 3 kişiyi düşündüğümde çoğunun benzer profile sahip olduğunu görüyorum.</span></div>\n<p>Halo Etkisi (3 soru):</p>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Güçlü bir ilk izlenim bırakan aday hakkında geri kalan sorularda daha esnek olabiliyorum.</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Bir aday sunumunu çok iyi yapıyorsa diğer yetkinliklerini de güçlü varsayıyorum.</span></div>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">Adayın dış görünüşü (giyim, duruş, göz teması) değerlendirmemi fark etmeden etkiler.</span></div>\n<p>Doğrulama Biası (3 soru):</p>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">İlk 5 dakikada olumlu izlenim edinirsem geri kalan sorularımı bu izlenimi destekleyecek şekilde sorarım.</span></div>\n<div class="test-q"><span class="q-label">8</span><span class="q-text">Adayın "rekabetçi misin" veya "hedef odaklı mısın" gibi cevabı belli sorular sorduğumu fark ediyorum.</span></div>\n<div class="test-q"><span class="q-label">9</span><span class="q-text">Karar verdikten sonra kararımı destekleyen bilgileri öne çıkarır, çelişen bilgileri küçümserim.</span></div>\n<p>Kontrast Etkisi (3 soru):</p>\n<div class="test-q"><span class="q-label">10</span><span class="q-text">Üst üste zayıf adaylardan sonra gelen ortalama bir adayı olduğundan iyi değerlendirdiğimi düşünüyorum.</span></div>\n<div class="test-q"><span class="q-label">11</span><span class="q-text">Güçlü bir adaydan hemen sonra gelen aday bana yetersiz gelebiliyor.</span></div>\n<div class="test-q"><span class="q-label">12</span><span class="q-text">Mülakat sırasının değerlendirmelerimi etkilediğini kabul edebilirim.</span></div>\n<p>İlk İzlenim Çıpası (3 soru):</p>\n<div class="test-q"><span class="q-label">13</span><span class="q-text">El sıkışması, giriş anı ve ilk cümle benim için çok belirleyici.</span></div>\n<div class="test-q"><span class="q-label">14</span><span class="q-text">Mülakatın ilk 5 dakikasında genellikle kararımı veriyorum, sonrası doğrulama.</span></div>\n<div class="test-q"><span class="q-label">15</span><span class="q-text">Güçlü CV\'si olan adaya mülakatta daha pozitif yaklaşıyorum.</span></div>\n<div class="score-box"><strong>📊 Puanlama:</strong>  Her bias kategorisinde toplam puanın 3-15 arası. 10 ve üzeri: Yüksek risk — bu bias aktif çalışıyor. 7-9: Orta risk — farkındalık var ama kontrol zayıf. 3-6: Düşük risk — ama dikkat: Pronin\'in araştırması düşük farkındalığın da bir bias olabileceğini söylüyor. "Bende bias yok" en tehlikeli bias.</div>\n<p>Toplam puanın (15-75): 45 üzeri ciddi risk, yapılandırılmış mülakat zorunlu. 30-44 orta risk, sistemle destekle. 15-29 düşük risk — ama yine de yapılandırılmış mülakatı kullan çünkü bias herkes için geçerli.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">SEKTÖREL PROFİL MATRİSİ — DOĞRU PROFİLİ BELİRLE</div></div>\n<p>Ana bölümde 7 sektörde farklı profillerin gerektiğini gördük. Şimdi kendi sektörün ve rolün için ideal profili çıkaracaksın.</p>\n<p>Aşağıdaki 10 yetkinliği kendi satış rolün için 1-5 arası önemle puanla (1: Düşük öncelik, 5: Kritik):</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Saha dayanıklılığı — fiziksel ve zihinsel. Haftada 20+ ziyaret yapabilme.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Analitik derinlik — veri okuma, strateji kurma, çoklu paydaş yönetimi.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Empati ve dinleme — müşterinin söylemediğini duyma, MI yetkinliği.</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Enerji ve ikna — ilk 30 saniyede etki bırakma, sunum gücü.</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">İlişki sürekliliği — uzun vadeli bağ kurma, güven inşası, sabır.</span></div>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">Teknik bilgi — ürün/hizmet uzmanlığı, demo kapasitesi.</span></div>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">Dijital yetkinlik — LinkedIn, CRM, dijital içerik, social selling.</span></div>\n<div class="test-q"><span class="q-label">8</span><span class="q-text">Kriz yönetimi — baskı altında soğukkanlılık, problem çözme.</span></div>\n<div class="test-q"><span class="q-label">9</span><span class="q-text">Etik duyarlılık — ihtiyacı olmayan müşteriye satmama bilinci, Sibel testi.</span></div>\n<div class="test-q"><span class="q-label">10</span><span class="q-text">Öğrenme çevikliği — yeni bilgiyi hızla uygulama, geri bildirime açıklık.</span></div>\n<p>En yüksek puanlı 3 yetkinlik senin "olmazsa olmaz" listesi. Mülakatta bu 3 yetkinliği test eden davranışsal sorular sor. Geri kalan 7 yetkinlik "iyi olur" listesi — eğitimle geliştirilebilir.</p>\n<p>Sektörel kıyaslama (örnek referans puanları):</p>\n<p>FMCG: Saha dayanıklılığı 5, İlişki sürekliliği 5, Enerji 4. Analitik 2.</p>\n<p>SaaS enterprise: Analitik 5, Teknik bilgi 5, Sabır 4. Saha dayanıklılığı 2.</p>\n<p>Bankacılık: Empati 5, Etik 5, İlişki 4. Enerji 3.</p>\n<p>Gayrimenkul: Empati 5, Enerji 4, Dijital 4. Analitik 2.</p>\n<p>Sigorta: İlişki 5, Etik 5, Kriz yönetimi 4. Teknik 3.</p>\n<p>Eğitim hizmetleri: Empati 5, Teknik bilgi 5, Dinleme 5. Saha dayanıklılığı 2.</p>\n<p>Sağlık: Etik 5, Teknik 5, İlişki 5. Enerji 2.</p>\n<p>Senin profilin kıyaslama değerlerinden farklıysa sorun değil — kıyaslama ortalamayı gösterir, senin rolünün özgün ihtiyaçları farklı olabilir.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">YAPILANDIRILMIŞ MÜLAKAT ŞABLONU</div></div>\n<p>Bu şablon her adayla aynı soruları, aynı sırayla, aynı puanlama kriteriyle uygulamanı sağlar. 6 adımlık yapı:</p>\n<p>Adım 1: Isınma (5 dk). Aday rahatlasın — ama değerlendirme burada başlamaz. "Bize nasıl ulaştınız? Yolda sorun olmadı mı?" Basit, stres düşürücü.</p>\n<p>Adım 2: Motivasyon soruları (10 dk). "Satış kariyerinde seni en çok ne motive ediyor?" (Para/ustalık/amaç testi). "En son bir başarıdan sonra seni en çok ne mutlu etti — sonuç mu, süreç mi, etki mi?" "5 yıl sonra kendini nerede görüyorsun — ve neden orada?"</p>\n<p>Adım 3: Davranışsal sorular (15 dk). STAR formatı: Durum-Görev-Eylem-Sonuç. "Bana en zor müşteri deneyimini anlat. Ne oldu, ne yaptın, sonucu ne oldu?" "Hiç bir satışı kaybettiğinde arkasından \'şunu farklı yapsaydım\' dediğin bir durum oldu mu?" "Bir kez reddedildiğinde ne hissettin ve ne yaptın?" Her soruya puanlama: 1 (belirsiz/yüzeysel) — 3 (somut ama tek boyutlu) — 5 (derinlik, yansıtma, öğrenme gösterir).</p>\n<p>Adım 4: Rol senaryosu (10 dk). Gerçek müşteri senaryosu ver: "Bu müşteri 3 haftadır cevap vermiyor. Ne yaparsın?" Cevap Gülşen tipi mi ("tekrar ararım") yoksa Ozan tipi mi ("neden cevap vermediğini araştırırım")? Senaryoyu kendi sektörüne göre uyarla.</p>\n<p>Adım 5: Adayın soruları (5 dk). Adayın sana sorduğu sorular da veri. "Maaş ne kadar" diyen aday para motivasyonlu. "Eğitim programınız nasıl" diyen ustalık motivasyonlu. "Müşterileriniz ne düşünüyor" diyen amaç motivasyonlu. Genellemek tehlikeli — ama sinyaller değerli.</p>\n<p>Adım 6: Değerlendirme (mülakattan SONRA). Tüm puanları topla. 2 mülakatçı varsa puanları bağımsız ver, sonra karşılaştır. Fark büyükse tartış — kim neyi farklı gördü? Bu tartışma biasları ortaya çıkarır.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">3 VAKA OTOPSİSİ — YANLIŞ SEÇİM, DOĞRU DERS</div></div>\n<p>Vaka 1: Cem — Mükemmel Mülakat, Başarısız Saha</p>\n<p>Ana bölümde gördük: Göz teması güçlü, enerji yüksek, basketbol kaptanı. Kerem 4 dakikada karar verdi. 3 ay sonra ekibin en düşüğü. Otopsi: Hangi biaslar çalıştı? Benzerlik (Kerem de sporcu), halo (göz teması → her şey iyi), ilk izlenim çıpası (el sıkışması → karar). Yapılandırılmış mülakatta ne değişirdi? Davranışsal sorular Cem\'in dinleme eksikliğini ortaya çıkarırdı. Rol senaryosu baskıcı satış refleksini gösterirdi. Gülşen-Ozan sorusu: "Yeni pazara girsen ilk ne yaparsın?" — Cem muhtemelen "hemen aramaya başlarım" derdi.</p>\n<p>Vaka 2: "Sessiz" Aday — Reddedilen Yıldız</p>\n<p>Kerem 10 dakikada eledi: "Çok sessiz." 6 ay sonra rakipte yılın satışçısı. Otopsi: Hangi biaslar çalıştı? Ters halo (sessizlik → zayıf → satamaz), stereotip (satışçı = dışa dönük). Yapılandırılmış mülakatta ne değişirdi? Davranışsal sorularda bu adayın derinlikli cevaplar verdiği görülürdü. MI yetkinliği doğal olan bir profil — Berna gibi. Grant\'ın ambivert araştırması: Sessizlik dezavantaj değil, danışmanlık satışında avantaj.</p>\n<p>Vaka 3: Defne\'nin Klonu — Yanlış Çoğaltma</p>\n<p>Defne 6 ay içinde 4 kişi aldı. Dördü de yeni mezun, enerjik, hevesli — Defne\'nin gençlik versiyonları. Ekip homojen: Herkes konuşuyor, kimse dinlemiyor. Müşteri şikayetleri arttı. Otopsi: Benzerlik biası + kontrol eksikliği (Defne "onları ben yetiştiririm" diyerek potansiyel seçti ama yetiştirme kapasitesi yoktu). Profil matrisi kullanılsaydı ne değişirdi? Ekibin eksik yetkinliği "empati ve dinleme" idi — matris bunu gösterirdi. 4. aday yerine deneyimli, dinleme ağırlıklı bir profil alınırdı.</p>\n<p>Kaynakça</p>\n<div class="ref-line">Byrne, D. (1971). The Attraction Paradigm. Academic Press.</div>\n<h4 class="researcher">Fischhoff, B. (1982). Debiasing. In D. Kahneman, P. Slovic, A. Tversky (Eds.), Judgment Under Uncertainty.</h4>\n<div class="ref-line">Grant, A. M. (2013). Rethinking the extraverted sales ideal. Psychological Science, 24(6), 1024–1030.</div>\n<div class="ref-line">Huffcutt, A. I. &amp; Arthur, W. (1994). Interview validity. Journal of Applied Psychology, 79(2), 184–190.</div>\n<div class="ref-line">Levashina, J. et al. (2014). The structured employment interview. Personnel Psychology, 67(1), 241–293.</div>\n<h4 class="researcher">Pronin, E. et al. (2002). The bias blind spot. PSPB, 28(3), 369–381.</h4>\n<div class="ref-line">Schmidt, F. L. &amp; Hunter, J. E. (1998). Selection methods. Psychological Bulletin, 124(2), 262–274.</div>\n<div class="ref-line">Thorndike, E. L. (1920). A constant error in psychological ratings. Journal of Applied Psychology, 4(1), 25–29.</div>'},
'5-2':{b:'Onboarding',d:'90 Günlük Plan',c:8329,h:'<h4 class="section-title">ONBOARDING</h4>\n<p>Onboarding Mühendisliği: Kolb 90 Günlük Plan, Sektörel Şablonlar, İlk Red Protokolü</p>\n<p>Ana bölümde Defne\'nin 120 sayfalık dosya sahnesi, "kıdemlinin yanına koy" mitinin sınırları, Kolb\'un deneyimsel öğrenme döngüsü, ilk reddin nörolojisi ve sektörel onboarding farkları gördün. Bu ek farklı: Burada Kolb döngüsünü 90 günlük somut plana dönüştürecek, 4 sektörel onboarding şablonunu inceleyecek, ilk red protokolünü adım adım oluşturacak ve 3 onboarding başarısızlık vakasını otopsi edeceksin.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">KOLB DÖNGÜSÜ — 90 GÜNLÜK YAPILANDIRILMIŞ PLAN</div></div>\n<p>Kolb\'un döngüsü haftalık ritmde tekrarlanmalı demiştik. Şimdi bunu somut programa çevirelim. Her haftanın 4 bileşeni var:</p>\n<p>Pazartesi: Hazırlık + Hedef. Haftalık öğrenme hedefi belirlenir. Gün 1-30\'da hedefler beceri bazlı: "Bu hafta 3 saha ziyaretinde gözlem yap." Gün 31-60\'ta hedefler uygulama bazlı: "Bu hafta 2 müşteriye tek başına sun." Gün 61-90\'da hedefler kalibrasyon bazlı: "Bu hafta kendi tarzını dene ve sonuçları not et."</p>\n<p>Salı-Perşembe: Deneyim (Somut Deneyim). Saha, müşteri görüşmesi, rol yapma, demo — duruma göre. Her deneyim not edilir: Ne oldu? Ne bekleniyordu? Ne farklı çıktı? Bu notlar Cuma seansının hammaddesi.</p>\n<p>Cuma: Yansıtma Seansı (Yansıtıcı Gözlem + Soyut Kavramsallaştırma). Yöneticiyle 30-45 dakika. Soru formatı: "Bu hafta en anlamlı anın neydi? Neden? Müşterinin tepkisi seni şaşırtan bir şey var mıydı? Farklı ne yapabilirdin? Hangi ilke burada çalışıyor?" Son soru kavramsallaştırma aşaması — deneyimi teoriye bağla. Arnsten\'ın PFC kapanımı, Cialdini\'nin karşılıklılığı, Brehm\'in reaktansı — K1-K4\'ün araçlarını sahaya bağla.</p>\n<p>Bir sonraki Pazartesi: Aktif Deneme. Cuma seansında çıkan öğrenmeyi yeni haftanın hedefine çevir. Döngü kapanır, yenisi başlar.</p>\n<p>90 günlük kilometre taşları:</p>\n<p>Gün 15: İlk mini değerlendirme. "Şirkete uyum, temel bilgi, motivasyon seviyesi." Sorun varsa erken müdahale — 90. günde çok geç.</p>\n<p>Gün 30: Temel yetkinlik değerlendirmesi. Ürün bilgisi testi (pratik, teorik değil), CRM kullanım kontrolü, ilk saha gözlem raporu. Mentor ve yönetici birlikte değerlendirir.</p>\n<p>Gün 60: Uygulama değerlendirmesi. İlk müşteri görüşmelerinin analizi, pipeline oluşturma hızı, red yönetimi gözlemi. Kritik soru: Satışçı bağımsız çalışmaya hazır mı? Hayırsa — 30 gün daha yapılandırılmış destek.</p>\n<p>Gün 90: Kapanış değerlendirmesi. Sayısal hedefler değil, öğrenme hedefleri: Kolb döngüsünü bağımsız uygulayabiliyor mu? Yansıtma kapasitesi var mı? İlk redlerle başa çıkma kapasitesi gelişti mi?</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">İLK RED PROTOKOLÜ — NÖROLOJİK GERÇEKLİK</div></div>\n<p>İlk redler yeni satışçının en kırılgan anı. Eisenberger\'ın araştırması (2003, 2012): Sosyal reddedilme fiziksel acıyla aynı beyin bölgelerini aktive ediyor. Yeni satışçıda habituasyon oluşmamış — acı çiğ ve yoğun. Bu protokol yöneticinin ilk red anında ne yapacağını adım adım tanımlıyor.</p>\n<p>Adım 1: Önceden hazırla (red yaşanmadan ÖNCE). Onboarding\'in ilk haftasında konuş: "Bu işte reddedilme kaçınılmaz. Beyniniz gerçekten acı sinyali üretecek — hayal değil, nörolojik gerçek. Bu normal. Ve her seferinde biraz azalacak." Normalleştirmeyi red yaşanmadan yap — yaşandıktan sonra "normal" demek geçiştirme gibi algılanır.</p>\n<p>Adım 2: Red anında — empati, yargı değil. Satışçı ilk redden döndüğünde: "Ne oldu, anlat." Dinle. Yargılama. "Neden kaçırdın" sorusunu ertele — şu an PFC kapalı, limbik sistem aktif. Önce duyguyu doğrula: "Zor bir görüşme olmuş." Kısa, samimi, yeterli.</p>\n<p>Adım 3: 30 dakika ara. PFC\'nin yeniden açılmasına izin ver. "Biraz mola verelim, sonra konuşalım." Bu 30 dakika kritik — Arnsten\'ın araştırması: PFC recovery süresi dakikalar-saatler arasında değişir. 30 dakika minimum.</p>\n<p>Adım 4: Yansıtma seansı. 30 dakika sonra: "Şimdi soğukkanlı bakabilir misin — ne oldu? Müşteri ne söyledi? Sen ne hissettin? Farklı ne olabilirdi?" Kolb döngüsü burada başlar. Kritik: "Farklı ne yapmalıydın" değil, "farklı ne olabilirdi" — birincisi suçlama, ikincisi keşif.</p>\n<p>Adım 5: "Ben de" itirafı. "Benim ilk redlerim de çok acıtmıştı. İlk 3 haftada her aramadan sonra tuvalete gidip yüzüme su atıyordum" — Emre\'nin hikayesi. Ya da kendi gerçek hikayen. Sahtelik sezilir, samimiyet iyileştirir.</p>\n<p>Adım 6: Sonraki adım. Bir sonraki müşteri görüşmesi için somut, küçük bir hedef: "Yarınki görüşmede sadece 1 iyi soru sormayı dene." Büyük hedef ("kapanış yap") baskı yaratır. Küçük hedef öz-yeterliliği inşa eder (Bandura).</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">SEKTÖREL ONBOARDING ŞABLONLARI</div></div>\n<p>Her sektörün 90 günlük planı farklı ağırlıklıdır. Ana bölümdeki 7 sektörden 4\'ü için somut şablon:</p>\n<p>FMCG (Saha Ağırlıklı):</p>\n<p>Gün 1-10: Ürün eğitimi (ofis) + distribütör ziyareti (gözlem). Gün 11-20: Kıdemli satışçıyla 10 saha ziyareti. Gün 21-30: 5 solo saha ziyareti + haftalık yansıtma. Gün 31-60: Kendi rota atanması, bayi ilişkisi kurma, sipariş yönetimi. Gün 61-90: Bağımsız çalışma + raf performansı takibi. Kritik yetkinlik: Saha dayanıklılığı — 1. ayda fiziksel tempoyu test et.</p>\n<p>SaaS Enterprise (Teknik Ağırlıklı):</p>\n<p>Gün 1-30: Ürün eğitimi yoğun — demo yapabilecek seviyeye gel. İç kullanıcılarla (müşteri başarısı ekibi) görüş. Gün 31-60: Deneyimli satışçıyla 5 müşteri görüşmesine katıl. Rol yapma: Farklı karar vericilerle (CTO, CFO, kullanıcı) 3 demo pratiği. Gün 61-90: İlk kendi pipeline oluşturma. İlk demo. Kritik yetkinlik: Teknik bilgi — demo kalitesi 30. günde test edilmeli.</p>\n<p>Bankacılık (Regülasyon Ağırlıklı):</p>\n<p>Gün 1-30: Ürün sertifikasyonları, yasal gereklilikler, risk kriterleri. Sıkıcı ama zorunlu — gerçek vakalarla zenginleştir. Gün 31-60: Kıdemli portföy yöneticisiyle 10 müşteri görüşmesi gözlemi. Tahsilat görüşmesi gözlemi (özel dikkat — Porges polivagal). Gün 61-90: Kendi portföy oluşturma. İlk cross-sell denemesi — Sibel testi eşliğinde. Kritik yetkinlik: Etik duyarlılık — müşteriye ihtiyacı olmayan ürünü sun-sun-dur testi.</p>\n<p>Gayrimenkul (Deneyim Ağırlıklı):</p>\n<p>Gün 1-10: Proje bilgisi + showroom turu + rakip analiz. Gün 11-20: Kıdemli satışçıyla 8 showroom görüşmesi gözlemi. Gün 21-30: 3 solo görüşme + yansıtma. Gün 31-60: Kendi müşteri portföyü oluşturma, WhatsApp takip sistemi. Gün 61-90: Dijital entegrasyon — Instagram içerik, online randevu. Kritik yetkinlik: Empati — müşterinin ev alma endişesini okuma.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">3 ONBOARDING OTOPSİSİ</div></div>\n<p>Vaka 1: Elif — Dosyayla Onboarding</p>\n<p>Ana bölümdeki Elif. 120 sayfa, 3 saat okuma, 3. gün sahaya atılma. Sonuç: 2 ay sonra ayrılma. Otopsi: Kolb döngüsü tamamen atlandı. Somut deneyim vardı (sahaya çıktı) ama yansıtma yoktu (kimse sormadı "ne öğrendin"). Elif deneyim yaşadı ama deneyimden öğrenmedi. Ayrılma nedeni: "Bana kimse bir şey öğretmedi" — teknik olarak doğru.</p>\n<p>Vaka 2: Kadir — Kıdemlinin Klonu</p>\n<p>Yeni FMCG satışçısı Kadir, kıdemli Hasan\'ın yanına kondu. 2 hafta birlikte gezdiler. Kadir, Hasan\'ın her şeyini kopyaladı — müşteriyle şakalaşma stili, sipariş alma rutini, bayi ilişkisi tonu. Sorun: Hasan CRM\'i kullanmıyordu — "kafamda tutarım" diyordu. Kadir de kullanmadı. Hasan bayiye borç takibi yapmıyordu — "ayıp olur" diyordu. Kadir da yapmadı. Bandura\'nın modelleme kuramının karanlık yüzü: Kötü alışkanlıklar da bulaşır. 4. ayda Kadir\'in CRM\'i boş, tahsilat gecikmiş. Yönetici: "Kim öğretti böyle?" Cevap: Hasan. Ama suç Hasan\'da değil, sistemde — çünkü sistem "Hasan\'ın yanına koy" idi.</p>\n<p>Vaka 3: Zeynep — Mükemmel Onboarding, Yanlış Kişi</p>\n<p>Yapılandırılmış 90 günlük program. Kolb döngüsü haftalık. Mentor + yönetici desteği. Her şey doğru yapıldı. 90. günde performans düşük. Neden? Zeynep yanlış role alınmıştı — saha satışı yerine ofis bazlı analitik rolde parlayacak biriydi. Enerji düşük, ilişki kurma yavaş, ama veri analizi mükemmel. Onboarding her şeyi düzeltmez — işe alım yanlışsa en iyi program da başarısız olur. B1\'deki seçim hatası B2\'de telafi edilmez.</p>\n<p>Kaynakça</p>\n<div class="ref-line">Allen, T. D. et al. (2004). Mentoring and newcomer socialization. Journal of Vocational Behavior, 65, 47–63.</div>\n<div class="ref-line">Arnsten, A. F. T. (2009). Stress signalling pathways. Nature Reviews Neuroscience, 10, 410–422.</div>\n<h4 class="researcher">Bandura, A. (1977). Social Learning Theory. Prentice-Hall.</h4>\n<div class="ref-line">Bauer, T. N. et al. (2007). Newcomer adjustment. Journal of Applied Psychology, 92(3), 707–721.</div>\n<h4 class="researcher">Dreyfus, S. E. &amp; Dreyfus, H. L. (1980). A Five-Stage Model of Skill Acquisition.</h4>\n<div class="ref-line">Eisenberger, N. I. et al. (2003). Does rejection hurt? Science, 302, 290–292.</div>\n<h4 class="researcher">Kolb, D. A. (1984). Experiential Learning. Prentice-Hall.</h4>\n<div class="ref-line">Watkins, M. D. (2013). The First 90 Days. HBR Press.</div>'},
'5-3':{b:'Koçluk',d:'Koçluk Simülasyonu',c:9272,h:'<h4 class="section-title">KOÇLUK</h4>\n<p>Koçluk Atölyesi: MI Senaryoları, Gottman 5:1 Pratiği, Denge Testi</p>\n<p>Ana bölümde eğitim vs koçluk farkını, MI\'nın koçluk versiyonunu, direktif vs keşfettirici koçluk dengesini, Gottman\'ın 5:1 oranını ve geri bildirim zamanlamasını gördün. Bu ek farklı: Burada 3 interaktif koçluk senaryosuna girecek, Gottman 5:1 oranını kendi konuşmalarına uygulayacak, direktif-keşfettirici denge testini yapacak ve 4 haftalık koçluk antrenman programını alacaksın.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">MÜLKİYETÇİ GÖRÜŞMENİN KOÇLUK VERSİYONU — DERİNLEŞTİRME</div></div>\n<p>MI\'nın 4 ilkesini ana bölümde gördük. Şimdi satış koçluğunda en sık karşılaşılan 4 durumda nasıl uygulandığını derinleştirelim.</p>\n<p>Durum 1: Eski refleks dönüşü (Demet tipi). Satışçı stres altında eski kalıba döndü — bildiği halde yapamadı. Klasik PFC kapanımı. MI yaklaşımı: "Ne olduğunu anlat" (dinle). "O anda ne hissettin" (duyguyu doğrula). "Stres altında bedende ne değişti" (somatik farkındalık — Porges). "Farklı ne olabilirdi — stres düşükken ne yapardın" (tutarsızlığı geliştir). "Bir dahaki stres anında kendine ne söyleyebilirsin" (Kross 3. şahıs tekniği). Dikkat: "Neden yaptın" sorusu MI\'ya aykırı — savunma tetikler. "Ne oldu" sorusu güvenli.</p>\n<p>Durum 2: Motivasyon düşüşü (tükenme eşiği). Satışçı performansı düşüyor, enerjisi yok, "ne yaparsam yapayım" tavrı. Seligman\'ın öğrenilmiş çaresizliği olabilir. MI yaklaşımı: "Bu aralar nasıl hissediyorsun" (açık soru, yargısız). "Ne zaman başladı" (tetikleyiciyi bul). "Bu işte seni en çok ne motive ediyordu" (kayıp kaynağı bul — para/ustalık/amaç hangisi kesildi?). "Küçük bir değişiklik yapsan ne olurdu" (büyük hedef değil, küçük adım). Dikkat: "Kendini topla" cümlesi çaresizliği derinleştirir — Seligman\'ın araştırması: Kontrol hissi verilmeden motivasyon dönmez.</p>\n<p>Durum 3: Kör nokta (Sinan tipi). Satışçı büyük fırsat peşinde koşuyor, pipeline şişkin, batık maliyet birikiyor — ama farkında değil. Pronin\'in biası. MI yaklaşımı: Doğrudan "yanlış yapıyorsun" demek direnç yaratır. Bunun yerine: "Bu fırsatla ilgili beni güncelle — ne aşamada?" (satışçı kendi ağzından anlatsın). "Bu müşteriyle bugün tanışsaydın yine bu kadar zaman ayırır mıydın?" (Kısım 4 Bölüm 3\'teki pipeline soru testi). "Bu 8 ayda başka hangi fırsatları kaçırmış olabilirsin?" (fırsat maliyeti görünür kılma). Satışçı kendi kör noktasını kendisi keşfetmeli — keşfettirici koçluk burada altın.</p>\n<p>Durum 4: Etik sınır ihlali (Taner tipi). Satışçı hedef baskısıyla müşteriye ihtiyacı olmayan ürünü satıyor. MI yaklaşımı: "Bu müşterinin gerçekten bu ürüne ihtiyacı var mı" (Sibel sorusu). "Eğer 3 ay sonra iptal ederse ne olur" (sonucu görünür kıl). "Hedef baskısıyla ne hissediyorsun" (yapısal sorunu adlandır). Dikkat: Bu durumda MI tek başına yetmez. Yapısal sorun var — hedef sistemi yanlış davranışı teşvik ediyor. Koçluk bireysel, ama sistem tasarımı yönetsel (Bölüm 7\'de göreceğiz).</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">3 İNTERAKTİF KOÇLUK SİMÜLASYONU</div></div>\n<p>Her senaryoda sen yöneticisin. Oku, kararını ver, sonra "karakterin ne yaptığını" oku.</p>\n<p>Senaryo 1: Demet\'in Ghost Müşterisi</p>\n<p>Demet CRM notuna "hâlâ bir gelişme var mı" mesajı attığını gördün. Bu 3. kez. Defne olarak koçluk seansındasın. Demet karşında. Ne söylersin?</p>\n<p>A) "Demet, bunu konuştuk. Bu mesaj işe yaramıyor, değer bazlı temas yap." (Direktif)</p>\n<p>B) "Demet, bu müşteride ne olduğunu anlat bana." (Keşfettirici — açık soru)</p>\n<p>C) "Demet, fark ettim ki stres altında eski kalıba dönüyorsun. Ben de yapıyorum." (Empati + Ben de)</p>\n<p>D) "Bu müşteriyi pipeline\'dan çıkaralım, zaman kaybı." (Sonuç odaklı)</p>\n<p>Defne B + C kombinasyonunu seçti. Önce açık soru: "Ne oldu?" Demet anlattı — müşteri 3 haftadır sessiz, Demet endişeli, endişe arttıkça eski refleks dönmüş. Sonra empati: "Ben de stres altında aynı şeyi yapıyorum — bildiğim halde." Demet rahatladı. Sonra keşif: "O anda bedende ne hissettin?" Demet: "Midemin düğümlendiğini." Porges sinyali — vagal fren. Fark etme = ilk adım.</p>\n<p>Senaryo 2: Sinan\'ın 5 Aylık Fırsatı</p>\n<p>Sinan 5 aydır bir enterprise fırsatın peşinde. Pipeline\'da "sıcak" olarak işaretli ama somut ilerleme yok. CRM notları: "Çok olumlu görüşme, yakında karar verecekler." 3 aydır aynı not. Ne yaparsın?</p>\n<p>A) "Sinan, 5 ay oldu, bu müşteri kapanmayacak. Pipeline\'dan çıkar." (Direktif, sert)</p>\n<p>B) "Sinan, bu müşteriyle ilgili beni güncelle — bugün tanışsaydın yine bu kadar yatırım yapar mıydın?" (Keşfettirici — pipeline soru testi)</p>\n<p>C) "Sinan, bu fırsat harika görünüyor, devam et." (Teyit — Sinan\'ın görüşünü doğrula)</p>\n<p>D) "5 ayda hangi somut adımlar atıldı? Karar verici ile son görüşme ne zaman oldu?" (Veri bazlı sorgulama)</p>\n<p>En etkili: B + D kombinasyonu. Önce perspektif sorusu ("bugün tanışsaydın") — batık maliyet biasını kırar. Sonra veri: "Son somut adım ne zaman atıldı?" Sinan düşündü — 2 ay. 2 aydır ilerleme yok. Kendisi fark etti. Yönetici söyleseydi savunma olurdu. Sinan keşfetti — sahiplenme oldu. A seçeneği doğru olabilir ama Sinan direnirdi. C seçeneği tehlikeli — doğrulama biası.</p>\n<p>Senaryo 3: Elif\'in İlk Haftası</p>\n<p>Elif 5. gününde. Dün ilk solo müşteri görüşmesine gitti, müşteri "düşüneyim" dedi, Elif mutsuz döndü. "Bu iş bana göre değil galiba" dedi. Ne yaparsın?</p>\n<p>A) "Herkes böyle başlar, alışırsın." (Normalleştirme — ama empati eksik)</p>\n<p>B) "Ne olduğunu anlat — müşteri ne söyledi, sen ne hissettin?" (MI — deneyimi işle)</p>\n<p>C) "Hadi birlikte gidelim, sana göstereyim nasıl yapılır." (Modelleme — Bandura)</p>\n<p>D) "Bu işin zor olduğunu biliyordun. Devam et." (Sert normalleştirme)</p>\n<p>Defne B seçti, sonra C\'ye geçti. Önce duyguyu işle — Elif\'in "bana göre değil" arkasında ilk reddin acısı var (Eisenberger). 30 dakika MI: Ne oldu, ne hissettin, müşterinin "düşüneyim" demesi ne anlama gelir (her zaman ret değil). Sonra modelleme: "Yarın birlikte gidelim — ama bu sefer sen yönet, ben izleyeyim." Elif müşteri karşısına çıkacak ama güvenli ağ var. A ve D seçenekleri empatisiz — PFC kapalıyken işe yaramaz.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">DİREKTİF-KEŞFETTİRİCİ DENGE TESTİ</div></div>\n<p>Aşağıdaki 10 durumu oku. Her birinde direktif mi keşfettirici mi koçluk uygun, karar ver.</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Yeni satışçı CRM\'e nasıl veri gireceğini bilmiyor. → DİREKTİF (beceri eksikliği, kural gerekli)</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Deneyimli satışçı stres altında eski kalıba dönüyor. → KEŞFETTİRİCİ (bilgi var, davranış transferi gerekli)</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Satışçı müşteri toplantısında sunumu yapılandıramadı. → MELEZ (sunum yapısını öğret + "sen olsan nasıl yapardın" sor)</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Yüksek performanslı satışçı son 2 aydır düşüşte. → KEŞFETTİRİCİ (motivasyon kaynağını keşfet)</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Yeni satışçı ilk kez fiyat itirazıyla karşılaştı. → DİREKTİF (itiraz çerçevesini öğret — K3B4)</span></div>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">Deneyimli satışçı etik sınır ihlali yapıyor. → KEŞFETTİRİCİ + YÖNETSİSTEM (bireysel farkındalık + yapısal sorun)</span></div>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">Satışçı ghost müşteriyle ne yapacağını bilmiyor. → DİREKTİF (4 neden testini öğret — K4B4)</span></div>\n<div class="test-q"><span class="q-label">8</span><span class="q-text">Ekipte 2 satışçı arasında müşteri çatışması var. → KEŞFETTİRİCİ (her ikisini dinle, ortak çözüm keşfettir)</span></div>\n<div class="test-q"><span class="q-label">9</span><span class="q-text">Satışçı pipeline\'ı şişkin ama farkında değil. → KEŞFETTİRİCİ (Sinan senaryosu — sorularla keşfettir)</span></div>\n<div class="test-q"><span class="q-label">10</span><span class="q-text">Kriz döneminde tüm ekip panik modunda. → DİREKTİF (acil yön gerekli — Bölüm 6\'da göreceğiz)</span></div>\n<p>Genel kural: Beceri eksikliği → direktif. Davranış/tutum değişikliği → keşfettirici. Acil durum → direktif. Uzun vadeli gelişim → keşfettirici. Yeni satışçı → ağırlıklı direktif. Deneyimli satışçı → ağırlıklı keşfettirici. Ama her kural bağlama göre esnemelidir — koçluğun kendisi de bir Kolb döngüsüdür: Deneyimle öğrenilir.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">GOTTMAN 5:1 PRATİĞİ — HAFTALIK ANTRENMAN</div></div>\n<p>4 haftalık program. Her hafta 1 odak:</p>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Sayım. Bu hafta her koçluk seansında ve her geri bildirimde olumlu ve olumsuz etkileşimlerini say. Not defterine yaz: "Olumlu: İyi sunum, takdir ettim. Olumsuz: Kapanış sorusu sormadın." Hafta sonunda oranı hesapla. Çoğu yönetici 2:1 veya 1:1 oranında — 5:1\'den çok uzak.</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">Olumlu artırma. Bilinçli olarak her geri bildirim seansında 5 olumlu gözlem bul. Zor ama mümkün. "İyi soru sordun, müşteriyi dinledin, zamanlamayı doğru tuttun, CRM notun detaylı, hazırlığın belliydi." Olumlu gözlemler spesifik olmalı — "harika gidiyorsun" genel ve etkisiz. "Müşterinin itirazına karşı sessiz kalman çok doğruydu" spesifik ve güçlü.</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Olumsuz kalibrasyon. Olumsuz geri bildirimi kalibre et: Kişiye değil davranışa yönelik, spesifik, gelişim odaklı. "Sen hep acele ediyorsun" → kişiye yönelik, genel, yıkıcı. "Bu görüşmede kapanış sorusunu erken sordun — müşteri henüz hazır değildi" → davranışa yönelik, spesifik, öğretici. Her olumsuz geri bildirimi vermeden önce kendine sor: Bu cümle Gottman\'ın "yapıcı" kategorisinde mi yoksa "yıkıcı" kategorisinde mi?</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Entegrasyon. Tüm hafta boyunca 5:1 oranını bilinçli uygula. Hafta sonunda retrospektif: Oran ne oldu? Satışçının tepkisi değişti mi? Seanslar daha açık mı geçiyor? Satışçı daha fazla mı paylaşıyor? 5:1 oranı güven inşa eder — ve güven koçluğun temelidir.</div></div>\n<p>Kaynakça</p>\n<div class="ref-line">Fredrickson, B. L. (2009). Positivity. Crown.</div>\n<h4 class="researcher">Gottman, J. M. (1994). What Predicts Divorce? Lawrence Erlbaum.</h4>\n<h4 class="researcher">Losada, M. &amp; Heaphy, E. (2004). Positivity and connectivity. American Behavioral Scientist, 47(6), 740–765.</h4>\n<div class="ref-line">Miller, W. R. &amp; Rollnick, S. (2013). Motivational Interviewing. 3rd ed. Guilford Press.</div>\n<div class="ref-line">Passmore, J. (2007). An integrative model for executive coaching. Consulting Psychology Journal, 59(1), 68–78.</div>\n<h4 class="researcher">Whitmore, J. (2009). Coaching for Performance. 4th ed. Nicholas Brealey.</h4>'},
'5-4':{b:'Performans',d:'Goodhart Metrik Auditi',c:8577,h:'<h4 class="section-title">PERFORMANS</h4>\n<p>Performans Laboratuvarı: Goodhart Audit, Maslach Envanteri, Sektörel Metrik Şablonu</p>\n<p>Ana bölümde Goodhart yasasının yönetici versiyonunu, dışsal vs içsel motivasyon dengesini, Maslach\'ın 6 faktörünü ve sektörel performans farklılıklarını gördün. Bu ek farklı: Burada kendi metriklerini Goodhart testiyle sınayacak, ekibindeki tükenmişlik riskini Maslach envanterinin yönetici versiyonuyla tarayacak, sektörel metrik şablonunu oluşturacak ve 3 performans krizi vakasını otopsi edeceksin.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">GOODHART METRİK AUDİTİ — SENİN METRİKLERİN NE SÖYLÜYOR?</div></div>\n<p>Goodhart yasası basit ama acımasız: Bir ölçüt hedef haline geldiğinde iyi ölçüt olmaktan çıkar. Serhat\'ın "15 cross-sell" hedefi bu yasanın kitaptaki en çarpıcı örneğiydi. Şimdi kendi metriklerini test et.</p>\n<p>Audit adımları:</p>\n<p>Adım 1: Listeleme. Ekibinin performansını ölçen TÜM metrikleri yaz. Resmi hedefler + resmi olmayan beklentiler. "Haftalık 50 arama" resmi hedef. "Müdüre her gün rapor at" resmi olmayan beklenti. Hepsini yaz.</p>\n<p>Adım 2: Davranış testi. Her metriğin yanına yaz: Bu metrik hangi davranışı teşvik ediyor? Dürüst ol — istediğin davranışı değil, gerçekte ürettiği davranışı yaz. "Haftalık arama sayısı" istenen: Prospecting aktivitesi. Gerçekte ürettiği: Hedefsiz arama, kalite düşüşü, Gülşen sendromu.</p>\n<p>Adım 3: Goodhart testi. Her metrik için sor: Eğer satışçı bu metriği manipüle etmek istese nasıl yapardı? Eğer manipülasyon kolay ve tespit edilmesi zorsa — metrik bozuk. "Toplantı sayısı" → gereksiz toplantılar ayarla. Manipülasyon kolay, tespit zor. Bozuk metrik. "Müşteri memnuniyet skoru" → manipülasyon zor (müşteriden gelir). Daha sağlam metrik.</p>\n<p>Adım 4: Alternatif tasarımı. Bozuk metriklere alternatif öner. Her alternatif için 3 soru: Doğru davranışı teşvik ediyor mu? Manipülasyona dirençli mi? Ölçülebilir mi? Üçünü de karşılayan metrik ideal — ama pratikte ikisini karşılayan yeterli.</p>\n<p>Örnek audit:</p>\n<p>Metrik: Aylık kapanış sayısı. Teşvik ettiği davranış: Hızlı kapanış baskısı — kolay müşteriye yöneliş, zor müşteriden kaçış. Goodhart testi: Küçük satışları çoğaltarak sayı artırılabilir. Alternatif: Aylık net gelir + müşteri tutma oranı kombinasyonu.</p>\n<p>Metrik: Pipeline büyüklüğü. Teşvik ettiği davranış: Pipeline şişirme — her teması "fırsat" olarak kaydet. Sinan sendromu. Goodhart testi: CRM\'e hayalet fırsat girişi. Alternatif: Pipeline velocity (hız) + 3 filtre geçme oranı.</p>\n<p>Metrik: Müşteri ziyaret sayısı. Teşvik ettiği davranış: Gereksiz ziyaret — kolay müşteriyi tekrar ziyaret et. Goodhart testi: Aynı müşteriye gereksiz ziyaretler. Alternatif: Yeni müşteri ziyareti oranı + ziyaret-teklif dönüşüm oranı.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">MASLACH TÜKENMİŞLİK TARAMASI — YÖNETİCİ VERSİYONU</div></div>\n<p>Maslach\'ın 6 faktör modeli bireysel düzeyde tükenmişliği ölçer. Şimdi bu 6 faktörü ekip düzeyinde tarayacağız — çünkü tükenmişlik bulaşıcıdır ve çoğu zaman kaynağı bireysel değil, sistemseldir.</p>\n<p>Her faktörü ekibin için 1-5 arası risk puanla (1: Düşük risk, 5: Yüksek risk):</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">İş yükü aşırılığı. Ekibindeki ortalama haftalık çalışma saati kaç? 50+ saat kronik risk. Satışçılar "yetişemiyorum" diyor mu? Pipeline\'lar sürekli dolu ama kapanış oranı düşük mü? Gülşen sendromu yaygın mı?</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Kontrol eksikliği. Satışçılar kendi yöntemlerini seçebiliyor mu? Müşteriye yaklaşım tarzında özerklik var mı? Yoksa her şeyi sen mi belirliyorsun — Kerem gibi? Seligman\'ın çaresizlik testi: "Ne yaparsam yapayım sonucu değiştiremem" hissi yaygın mı?</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Yetersiz ödüllendirme. Son 1 ayda kaç kez bireysel başarıyı takdir ettin? "Harika gidiyorsun" genel takdir — saymaz. Spesifik takdir: "Şu müşterideki itiraz yönetimin çok iyiydi" — sayar. Finansal ödül yeterli ama tanınma eksik mi?</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Topluluk çözülmesi. Ekip içi rekabet işbirliğini eziyor mu? Satışçılar bilgi paylaşıyor mu yoksa saklıyor mu? "En iyi satışçı" tablosu ekibi birleştiriyor mu böler mi? Ekipte yalnızlık hisseden var mı?</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Adalet eksikliği. Bölge/portföy dağılımı adil mi? Favori satışçı algısı var mı? Hedefler eşit mi — yoksa bazı satışçıların hedefi yapısal olarak ulaşılmaz mı?</span></div>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">Değerler çatışması. Şirketin beklentileri satışçının değerleriyle çatışıyor mu? Taner\'ın cross-sell yangını tipi durumlar yaşanıyor mu? Sibel testi: "Müşterinin ihtiyacı olmayan ürünü satmamız bekleniyor mu?"</span></div>\n<div class="score-box"><strong>📊 Puanlama:</strong>  Toplam 6-30. 20 ve üzeri: Ciddi tükenmişlik riski — acil müdahale gerekli. 13-19: Orta risk — önleyici tedbirler al. 6-12: Düşük risk — ama dikkat: Tükenmişlik sessiz başlar. En yüksek 2 faktöre odaklan — çünkü genellikle 1-2 faktör tüm sistemi bozar.</div>\n<p>En yüksek puanlı faktörler için eylem planı:</p>\n<p>İş yükü aşırılığı yüksekse → Pipeline kalite filtresi uygula, hedefsiz aktiviteyi azalt, "daha fazla" yerine "daha doğru" stratejisine geç.</p>\n<p>Kontrol eksikliği yüksekse → Özerklik alanları tanımla, mikro yönetimi azalt, karar yetkilerini devret.</p>\n<p>Yetersiz ödüllendirme yüksekse → Haftalık spesifik takdir rutini kur, finansal olmayan ödüller ekle.</p>\n<p>Topluluk çözülmesi yüksekse → Bireysel ödül yerine ekip ödülü ekle, bilgi paylaşım seansları kur.</p>\n<p>Adalet eksikliği yüksekse → Bölge/hedef dağılımını şeffaf yap, kriterlerini açıkla.</p>\n<p>Değerler çatışması yüksekse → Hedef sistemini gözden geçir, etik sınırları tanımla, Sibel testini kurumsallaştır.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">3 PERFORMANS KRİZİ OTOPSİSİ</div></div>\n<p>Vaka 1: Serhat\'ın Cross-sell Hedefi</p>\n<p>Ana bölümde gördük: 15 cross-sell hedefi, Taner dahil 12 portföy yöneticisi ihtiyaç bazlı değil envanter bazlı satış yaptı. 6 iptal, 2 müşteri kaybı. Otopsi: Goodhart — metrik davranışı yanlış yönlendirdi. Kerr — A ödüllendirildi ama B bekleniyordu (satış sayısı ödüllendirildi, müşteri memnuniyeti beklendi). Alternatif sistem: "Net pozitif cross-sell" metriği — iptal edilen çıkarılarak hesaplanan gerçek değer. Serhat bu metriği kullansaydı Taner farklı davranırdı.</p>\n<p>Vaka 2: Kerem\'in Turnover Krizi</p>\n<p>Kerem her çeyrekte hedef tutuyor — ama ekip turnover\'ı 3x ortalama. Son 2 yılda 8 satışçı ayrıldı. Her ayrılmanın maliyeti: İşe alım (2-3 ay) + onboarding (3-6 ay) + kayıp gelir (devir süresince) + müşteri ilişki kesintisi. Toplam tahmini maliyet: Her ayrılma 6-12 aylık gelir kaybı. 8 ayrılma = yıllar. Otopsi: Maslach 6 faktöründen kontrol eksikliği (Kerem mikro yönetim), topluluk çözülmesi (bireysel rekabet baskısı), değerler çatışması ("sonuç konuşur" mottosu etik hassasiyeti ezer). Kerem\'in kısa vadeli performansı uzun vadeli sürdürülebilirliği yok ediyor.</p>\n<p>Vaka 3: Defne\'nin Motivasyon Krizi</p>\n<p>Defne\'nin ekibindeki 4 yeni satışçı 3. ayda motivasyon çöküşü yaşadı. Hepsi aynı anda. Neden? Defne hepsine aynı hedefleri verdi — ama 4\'ünün de gelişim hızı farklıydı. En hızlı öğrenen hedefe yaklaştı, en yavaş öğrenen uzak kaldı. En yavaş öğrenen "arkadaşlarım yapabiliyor ben yapamıyorum" hissetti — sosyal karşılaştırma + öğrenilmiş çaresizlik. Defne farkı göremedi — hepsine aynı "devam et" mesajını verdi. Çözüm: Bireysel gelişim hedefleri. Aynı ekipte farklı hızda öğrenenler var — hedefler buna göre kalibre edilmeli. Locke-Latham: Zorlayıcı ama ulaşılabilir.</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">SEKTÖREL METRİK ŞABLON OLUŞTURUCU</div></div>\n<p>Kendi sektörün ve rolün için metrik şablonu oluştur. Her satırda 3 soru cevapla:</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Birincil sonuç metriği: Ne ölçeceksin? (Gelir, kapanış, büyüme, tutma...) → Goodhart testi: Manipüle edilebilir mi? → Alternatif varsa not et.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Süreç metriği 1: Doğru davranışı ölçen öncü gösterge. (Prospecting kalitesi, pipeline velocity, takip disiplini...)</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Süreç metriği 2: Müşteri tarafı gösterge. (Memnuniyet, NPS, referans oranı, churn...)</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Gelişim metriği: Satışçının öğrenme ve büyüme göstergesi. (Koçluk seansı katılımı, yeni beceri uygulaması, geri bildirime yanıt...)</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Sağlık metriği: Tükenmişlik erken uyarısı. (Devamsızlık, motivasyon düşüşü sinyalleri, ekip atmosferi...)</span></div>\n<p>5 satırlık şablon tamamlandığında senin "Performans Gösterge Tablon" hazır. Her çeyrekte gözden geçir: Metrikler hâlâ doğru davranışı mı teşvik ediyor? Goodhart çalışmaya başladı mı? Maslach sinyalleri var mı?</p>\n<p>Kaynakça</p>\n<h4 class="researcher">Campbell, D. T. (1979). Assessing the impact of planned social change. Evaluation and Program Planning, 2(1), 67–90.</h4>\n<div class="ref-line">Cascio, W. F. (2006). Economic impact of employee behaviors. California Management Review, 48(4), 41–59.</div>\n<h4 class="researcher">Goodhart, C. A. E. (1975). Problems of Monetary Management.</h4>\n<h4 class="researcher">Kerr, S. (1975). On the folly of rewarding A, while hoping for B. AMJ, 18(4), 769–783.</h4>\n<h4 class="researcher">Locke, E. A. &amp; Latham, G. P. (2002). Goal setting and task motivation. American Psychologist, 57(9), 705–717.</h4>\n<h4 class="researcher">Maslach, C. &amp; Leiter, M. P. (2016). Understanding the burnout experience. World Psychiatry, 15(2), 103–111.</h4>\n<h4 class="researcher">Pink, D. H. (2009). Drive. Riverhead Books.</h4>\n<h4 class="researcher">Seligman, M. E. P. (1975). Helplessness. Freeman.</h4>'},
'5-5':{b:'Kültür',d:'Psikolojik Güvenlik Envanteri',c:5495,h:'<h4 class="section-title">KÜLTÜR</h4>\n<p>Kültür Atölyesi: Psikolojik Güvenlik Envanteri, Rekabet-İşbirliği Dengesi, Kültür İnşa Planı</p>\n<p>Ana bölümde Kerem\'in performans panosunu, Edmondson\'ın psikolojik güvenlik kavramını, rekabet-işbirliği dengesini, "en iyi satışçı" ödülünün karanlık yüzünü ve kültürün görünmez mimarisini gördün. Bu ek farklı: Burada ekibinin psikolojik güvenlik seviyesini ölçecek, rekabet-işbirliği dengesini test edecek, Schein\'in 3 katmanını kendi ekibine uygulayacak ve 4 haftalık kültür inşa planı oluşturacaksın.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">PSİKOLOJİK GÜVENLİK ENVANTERİ</div></div>\n<p>Edmondson\'ın orijinal envanterinden uyarlanmış 7 soru. Her soruyu ekibin perspektifinden 1-5 arası puanla (1: Kesinlikle katılmıyorum, 5: Kesinlikle katılıyorum):</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Bu ekipte hata yaptığında karşına çıkarılmaz.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Ekip üyeleri zor konuları ve sorunları gündeme getirebilir.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Bu ekipte insanlar bazen farklı oldukları için dışlanır. (TERS — düşük puan iyi)</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Bu ekipte risk almak güvenlidir.</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Ekip arkadaşlarımdan yardım istemek kolaydır.</span></div>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">Bu ekipte hiç kimse bilinçli olarak başkasının çabasını baltalamaz.</span></div>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">Bu ekipte çalışırken benzersiz becerilerim ve yeteneklerim değer görür ve kullanılır.</span></div>\n<div class="score-box"><strong>📊 Puanlama:</strong>  Soru 3\'ü ters çevir (5→1, 4→2, 3→3, 2→4, 1→5). Toplam 7-35. 28-35: Yüksek psikolojik güvenlik — ekip öğrenme bölgesinde. 21-27: Orta — alan var, hedefli müdahale gerekli. 14-20: Düşük — Kerem\'in ekibi. Kaygı bölgesi. Acil kültürel müdahale. 7-13: Kritik — insanlar gizleniyor, hata saklıyor, en kısa sürede ayrılacak.</div>\n<p>Bu envanterin gücü anonim uygulamada. Kendin puanlamak yeterli değil — kendi algınla ekibinin algısı çok farklı olabilir. Ekibine anonim uygula: Kağıda yaz, kutucuğa at. Sonuçları görüp yüzleş.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">REKABET-İŞBİRLİĞİ DENGE TESTİ</div></div>\n<p>Ekibindeki dinamiği 10 sinyalle tara. Her sinyal için "Evet" veya "Hayır":</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Satışçılar müşteri bilgisi paylaşıyor mu? (işbirliği sinyali)</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Başarılı bir teknik/strateji bulan satışçı bunu ekiple paylaşır mı? (işbirliği)</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Bir satışçının başarısı diğerlerinde sevinç mi hayal kırıklığı mı yaratır? (rekabet sinyali)</span></div>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Ekip toplantılarında satışçılar birbirinden öğrenmek ister mi? (işbirliği)</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Müşteri çakışmalarında kavga çıkar mı? (toksik rekabet sinyali)</span></div>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">Bireysel ödül ekip hedefinin önüne geçiyor mu? (toksik rekabet)</span></div>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">Düşük performanslı satışçıya yardım eden var mı? (işbirliği)</span></div>\n<div class="test-q"><span class="q-label">8</span><span class="q-text">"En iyi satışçı" unvanı ekipte gerilim yaratıyor mu? (toksik rekabet)</span></div>\n<div class="test-q"><span class="q-label">9</span><span class="q-text">Yeni satışçıyı ekip benimsiyor mu? (işbirliği)</span></div>\n<div class="test-q"><span class="q-label">10</span><span class="q-text">Satışçılar başka firmalara bakıyor mu? (genel güvensizlik sinyali)</span></div>\n<p>İşbirliği sinyalleri (1,2,4,7,9): 5 Evet = güçlü işbirliği. 3 ve altı = işbirliği zayıf. Toksik rekabet sinyalleri (3,5,6,8,10): 3+ Evet = toksik rekabet dominant — acil müdahale. 1-2 = yönetilebilir. 0 = nadir ama mümkün.</p>\n<p>Denge kurma stratejisi: Bireysel ödülün yanına ekip ödülü ekle (%70/%30 kuralı). Haftalık "strateji paylaşım" seansı başlat — her satışçı 1 saha dersi paylaşır. "En iyi satışçı" yerine "en çok gelişen" ve "en çok katkı sağlayan" ödüllerini ekle.</p>\n<div class="mod-header"><div class="mod-num">3</div><div class="mod-title">SCHEİN 3 KATMAN ANALİZİ — KENDİ EKİBİN</div></div>\n<p>Schein\'in kültür modeli 3 katman: Görünen eserler, benimsenen değerler, temel varsayımlar. Kendi ekibini analiz et:</p>\n<p>Katman 1 — Görünen Eserler: Ofis düzeni nasıl? (Açık ofis mi, kapalı kapı mı?) Toplantılar nasıl geçiyor? (Kim konuşuyor, kim dinliyor?) Ödül sistemi ne? (Pano var mı, ekip ödülü var mı?) CRM kullanımı nasıl? (Dolu mu, boş mu?) Bu katmanı gözle — herkese görünür.</p>\n<p>Katman 2 — Benimsenen Değerler: Ekibin "biz şuyuz" dediği şey ne? "Müşteri odaklıyız" mı, "hedefe odaklıyız" mı, "takım ruhuyuz" mu? Bu değerler ne kadar gerçek? Kerem "kapım açık" diyordu — ama yüzünü ekşitiyordu. Benimsenen değer ile yaşanan değer arasındaki boşluk kültürel ikiyüzlülük. Bu boşluk ne kadar büyük?</p>\n<p>Katman 3 — Temel Varsayımlar: En zor katman — bilinçdışı. "Hata zayıflık göstergesidir" temel varsayımsa kimse hata paylaşmaz. "Güçlü olan kazanır" temel varsayımsa işbirliği oluşmaz. Bu varsayımları nasıl keşfedersin? Kriz anına bak: Kriz anında ekip ne yapar? O an temel varsayımlar görünür hale gelir. Defne\'nin ekibi kriz anında yöneticiye baktı — temel varsayım: "Lider bilir." Kerem\'in ekibi kriz anında bireysel kaçırdı — temel varsayım: "Herkes kendi başının çaresine baksın."</p>\n<div class="mod-header"><div class="mod-num">4</div><div class="mod-title">4 HAFTALIK KÜLTÜR İNŞA PLANI</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 1</div><div class="hafta-desc">Teşhis. Psikolojik güvenlik envanterini anonim uygula. Rekabet-işbirliği testini yap. Schein 3 katmanı analiz et. Bu hafta müdahale yok — sadece ölç, gözle, anla.</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 2</div><div class="hafta-desc">İlk müdahale. En düşük puanlı alana odaklan. Güvenlik düşükse: Ekip toplantısında kendi hatanı paylaş (Ben de itirafı). İşbirliği düşükse: 1 strateji paylaşım seansı yap. Rekabet toksikse: Panoyu kaldır veya "gelişim panosu" olarak dönüştür.</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 3</div><div class="hafta-desc">Derinleştirme. Her satışçıyla 15 dakika birebir: "Bu ekipte seni en çok ne rahatsız ediyor?" Soruyu samimiyetle sor — ve cevabı savunmadan dinle. Cevaplar kültürün gerçek yüzünü gösterir.</div></div>\n<div class="hafta-card"><div class="hafta-num">Hafta 4</div><div class="hafta-desc">Kalibrasyon. 1. haftanın envanterini tekrarla — 3 haftalık müdahale fark yarattı mı? Küçük iyileşmeler bile değerli — kültür aylar ve yıllarla değişir, haftalarla değil. Ama yönü doğru koymak haftalık iş.</div></div>\n<p>Kaynakça</p>\n<h4 class="researcher">Axelrod, R. (1984). The Evolution of Cooperation. Basic Books.</h4>\n<h4 class="researcher">Edmondson, A. C. (1999). Psychological safety. ASQ, 44(2), 350–383.</h4>\n<h4 class="researcher">Edmondson, A. C. (2019). The Fearless Organization. Wiley.</h4>\n<h4 class="researcher">Newman, A. et al. (2017). Psychological safety: A systematic review. HRMR, 27(3), 521–535.</h4>\n<h4 class="researcher">Schein, E. H. (2010). Organizational Culture and Leadership. 4th ed. Jossey-Bass.</h4>'},
'5-6':{b:'Kriz Liderliği',d:'Lider Kriz Profili',c:6062,h:'<h4 class="section-title">KRİZ LİDERLİĞİ</h4>\n<p>Kriz Liderliği Atölyesi: 3 Kriz Simülasyonu, İletişim Şablonu, Lider Kriz Profili</p>\n<p>Ana bölümde kolektif PFC kapanımını, "bilmiyorum" formülünü, kriz iletişiminin 4 ilkesini ve sektörel kriz senaryolarını gördün. Bu ek farklı: Burada 3 kriz senaryosunu interaktif simüle edecek, kriz iletişim şablonunu adım adım oluşturacak, kendi kriz liderlik profilini test edecek ve kriz sonrası toparlanma protokolü öğreneceksin.</p>\n<div class="mod-header"><div class="mod-num">1</div><div class="mod-title">LİDER KRİZ PROFİL TESTİ</div></div>\n<p>Kriz anında 3 temel tepki var (K4B8\'den): Panik, donma, agresif. Yönetici olarak senin doğal kriz tepkin hangisi? 9 soruyu 1-5 arası puanla:</p>\n<p>Panik profili (3 soru):</p>\n<div class="test-q"><span class="q-label">1</span><span class="q-text">Kriz anında aklıma hemen en kötü senaryo gelir.</span></div>\n<div class="test-q"><span class="q-label">2</span><span class="q-text">Belirsizlik beni çok rahatsız eder, hemen bir şey yapmam gerekir.</span></div>\n<div class="test-q"><span class="q-label">3</span><span class="q-text">Kriz döneminde uyku düzenim bozulur, sürekli düşünürüm.</span></div>\n<p>Donma profili (3 soru):</p>\n<div class="test-q"><span class="q-label">4</span><span class="q-text">Kriz anında ne yapacağımı bilemem, kararları ertelerim.</span></div>\n<div class="test-q"><span class="q-label">5</span><span class="q-text">Ekip bana sorduğunda cevap vermekte zorlanırım.</span></div>\n<div class="test-q"><span class="q-label">6</span><span class="q-text">Kriz döneminde kendimi geri çekerim, daha az iletişim kurarım.</span></div>\n<p>Agresif profil (3 soru):</p>\n<div class="test-q"><span class="q-label">7</span><span class="q-text">Kriz anında sert kararlar alırım, tereddüt etmem.</span></div>\n<div class="test-q"><span class="q-label">8</span><span class="q-text">Kriz döneminde ekibe daha fazla baskı yaparım.</span></div>\n<div class="test-q"><span class="q-label">9</span><span class="q-text">"Şimdi duygusallık zamanı değil" diye düşünürüm.</span></div>\n<p>Her kategoride toplam 3-15. En yüksek puan dominant kriz tepkin. Panik: Defne profili — hızlı tepki ama dağınık. Donma: Defne\'nin ilk 3 günü — sessizlik, boşluk, kaygı. Agresif: Kerem profili — hız var ama empati yok.</p>\n<p>Hiçbiri ideal değil. İdeal: Stratejik sakinlik — panik enerjisini yönlendir, donmayı kır, agresifliği empatiyle dengele. Bu doğal gelmez — pratikle gelişir. Bu yüzden kriz simülasyonu yapıyoruz.</p>\n<div class="mod-header"><div class="mod-num">2</div><div class="mod-title">3 İNTERAKTİF KRİZ SİMÜLASYONU</div></div>\n<p>Senaryo 1: Büyük Müşteri Kaybı</p>\n<p>Durum: Bölgenin en büyük müşterisi — gelirin yüzde 25\'i — rakibe geçtiğini bildirdi. Ekibin haberi henüz almadı. Sen yöneticisin. Ne yaparsın?</p>\n<p>A) Hemen ekiple toplantı çağır, durumu anlat, aksiyon planı iste.</p>\n<p>B) Önce durumu analiz et (neden gitti?), sonra ekiple paylaş.</p>\n<p>C) Sadece ilgili satışçıya söyle, ekibe duyurma — panik olmasın.</p>\n<p>D) Üst yönetime bildir, onların talimatını bekle.</p>\n<p>En etkili: B → A kombinasyonu. Önce 2-4 saat analiz: Neden gitti? Fiyat mı, ilişki mi, hizmet mi? Bilgiyle donatılmış olarak ekiple paylaş. İlk cümle empati: "Zor bir haber var, birlikte bakalım." Sonra veri: "Şu nedenlerle gitti." Sonra eylem: "Bu hafta şunları yapacağız." C seçeneği tehlikeli — dedikodu kanalı bilgiyi çarpıtır. D seçeneği pasif — lider beklemez, bilgilendirir.</p>\n<p>Senaryo 2: Ekonomik Kriz — Hedef Revizyonu</p>\n<p>Durum: Piyasa yüzde 30 daraldı. Üst yönetim hedefleri yüzde 10 düşürdü — ama yüzde 30 daralmayla yüzde 10 düşüş hâlâ ulaşılamaz. Ekip biliyor. Sen yöneticisin.</p>\n<p>A) "Hedef hedef, bulun bir yolunu" de. Kerem yaklaşımı.</p>\n<p>B) Üst yönetimle müzakere et — gerçekçi hedef iste.</p>\n<p>C) Ekiple şeffaf konuş: "Hedef zor, stratejimizi değiştirelim."</p>\n<p>D) Hedefi kabul et ama ekibe "ya
